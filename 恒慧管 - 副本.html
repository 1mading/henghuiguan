          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
            <!-- 任务类型分布 -->
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title"><i class="fas fa-chart-pie" style="color:#8B5CF6;"></i>任务类型分布</span>
              </div>
              <div class="panel-body">
                <div style="display:flex;gap:24px;">
                  <div style="flex:1;text-align:center;padding:20px;background:#DBEAFE;border-radius:12px;">
                    <div style="font-size:28px;font-weight:700;color:#2563EB;">${normalTasks}</div>
                    <div style="font-size:13px;color:#6B7280;margin-top:4px;">常规任务</div>
                    <div style="height:4px;background:#E5E7EB;border-radius:2px;margin-top:8px;">
                      <div style="height:100%;width:${totalTasks > 0 ? Math.round(normalTasks/totalTasks*100) : 0}%;background:#2563EB;border-radius:2px;"></div>
                    </div>
                  </div>
                  <div style="flex:1;text-align:center;padding:20px;background:#FEF3C7;border-radius:12px;">
                    <div style="font-size:28px;font-weight:700;color:#D97706;">${tempTasks}</div>
                    <div style="font-size:13px;color:#6B7280;margin-top:4px;">临时任务</div>
                    <div style="height:4px;background:#E5E7EB;border-radius:2px;margin-top:8px;">
                      <div style="height:100%;width:${totalTasks > 0 ? Math.round(tempTasks/totalTasks*100) : 0}%;background:#D97706;border-radius:2px;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 整体完成率 -->
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title"><i class="fas fa-chart-bar" style="color:#22C55E;"></i>任务完成情况</span>
              </div>
              <div class="panel-body">
                <div style="text-align:center;margin-bottom:20px;">
                  <div style="position:relative;width:120px;height:120px;margin:0 auto;">
                    <svg style="width:120px;height:120px;transform:rotate(-90deg);">
                      <circle cx="60" cy="60" r="50" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                      <circle cx="60" cy="60" r="50" fill="none" stroke="#22C55E" stroke-width="12"
                        stroke-dasharray="${2 * Math.PI * 50}" stroke-dashoffset="${2 * Math.PI * 50 * (1 - (totalTasks > 0 ? totalDone/totalTasks : 0))}"/>
                    </svg>
                    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;">
                      <span style="font-size:24px;font-weight:700;color:#1F2937;">${totalTasks > 0 ? Math.round(totalDone/totalTasks*100) : 0}%</span>
                      <span style="font-size:11px;color:#9CA3AF;">完成率</span>
                    </div>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                  <div style="padding:12px;background:#D1FAE5;border-radius:8px;text-align:center;">
                    <div style="font-size:20px;font-weight:600;color:#059669;">${totalDone}</div>
                    <div style="font-size:12px;color:#6B7280;">已完成</div>
                  </div>
                  <div style="padding:12px;background:#FEE2E2;border-radius:8px;text-align:center;">
                    <div style="font-size:20px;font-weight:600;color:#DC2626;">${totalTasks - totalDone}</div>
                    <div style="font-size:12px;color:#6B7280;">未完成</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 团队成员工作饱和度 -->
          <div class="panel" style="margin-bottom:24px;">
            <div class="panel-header">
              <span class="panel-title"><i class="fas fa-users" style="color:#D97706;"></i>团队成员工作饱和度 ${selectedDept === 'all' ? '(全部门)' : '(' + selectedDept + ')'}</span>
              <span style="font-size:12px;color:#9CA3AF;">待处理工时 / 标准周工时 · 点击成员卡片查看任务看板</span>
            </div>
            <div class="panel-body" style="padding:16px;">
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
                ${memberStats.map(m => {
                  let satColor = '#22C55E';
                  let satLabel = '空闲';
                  if (m.saturation >= 80) { satColor = '#DC2626'; satLabel = '饱和'; }
                  else if (m.saturation >= 50) { satColor = '#F59E0B'; satLabel = '适中'; }
                  else if (m.saturation >= 20) { satColor = '#3B82F6'; satLabel = '正常'; }

                  const roleClass = m.role === 'gm' ? 'role-gm' : m.role === 'manager' ? 'role-manager' : 'role-staff';
                  const roleName = m.role === 'gm' ? '总经理' : m.role === 'manager' ? '部门经理' : '执行人员';

                  const isNonStaff = m.role !== 'staff';
                  return `
                    <div class="team-member-card" onclick="showMemberKanban('${m.id}')" title="点击查看${m.name}的任务看板" style="padding:16px;background:#F9FAFB;border-radius:12px;border:1px solid #E5E7EB;">
                      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;">${m.name.charAt(0)}</div>
                        <div style="flex:1;">
                          <div style="font-size:14px;font-weight:600;color:#1F2937;">${m.name}</div>
                          <div style="font-size:12px;color:#9CA3AF;">${m.dept}</div>
                          <span class="role-badge ${roleClass}" style="margin-top:4px;">${roleName}</span>
                        </div>
                        <span class="tag" style="background:${satColor}15;color:${satColor};">${satLabel}</span>
                      </div>

                      <div style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                          <span style="font-size:12px;color:#6B7280;">周工时饱和度</span>
                          <span style="font-size:12px;font-weight:600;color:${satColor};">${m.saturation}%</span>
                        </div>
                        <div style="height:8px;background:#E5E7EB;border-radius:4px;">
                          <div style="height:100%;width:${m.saturation}%;background:${satColor};border-radius:4px;transition:width 0.3s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:#9CA3AF;">
                          <span>待处理：${m.weeklyHours}h</span>
                          <span>标准：${m.standardWeekHours}h/周</span>
                        </div>
                      </div>

                      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;">
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#1F2937;">${m.total}</div>
                          <div style="font-size:10px;color:#9CA3AF;">总任务</div>
                        </div>
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#2563EB;">${m.doing}</div>
                          <div style="font-size:10px;color:#9CA3AF;">进行中</div>
                        </div>
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#059669;">${m.done}</div>
                          <div style="font-size:10px;color:#9CA3AF;">已完成</div>
                        </div>
                        <div style="padding:6px 4px;background:${m.overdue > 0 ? '#FEE2E2' : '#fff'};border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:${m.overdue > 0 ? '#DC2626' : '#9CA3AF'};">${m.overdue}</div>
                          <div style="font-size:10px;color:#9CA3AF;">已逾期</div>
                        </div>
                      </div>

                      <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;">
                        <span style="color:#9CA3AF;">完成率</span>
                        <span style="font-weight:500;color:${m.completionRate >= 80 ? '#059669' : m.completionRate >= 50 ? '#D97706' : '#DC2626'};">${m.completionRate}%</span>
                      </div>
                      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #E5E7EB;text-align:center;font-size:12px;color:#7C3AED;">
                        <i class="fas fa-columns" style="margin-right:4px;"></i>${isNonStaff ? '查看管理岗任务看板' : '查看任务看板'}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== 弹窗渲染 ==========
    function renderModal() {
      switch(state.showModal) {
        case 'taskDetail': return renderTaskDetailModal();
        case 'taskEdit': return renderTaskEditModal();
        case 'quickTask': return renderTaskEditModal();
        case 'staffEdit': return renderStaffEditModal();
        case 'projectDetail': return renderProjectDetailModal();
        case 'projectCreate': return renderProjectCreateModal();
        case 'projectEdit': return renderProjectEditModal();
        case 'tempTask': return renderTempTaskModal();
        case 'reject': return renderRejectModal();
        case 'transfer': return renderTransferModal();
        case 'archive': return renderArchiveModal();
        case 'memberKanban': return renderMemberKanbanModal();
        default: return '';
      }
    }

    // ========== 任务详情弹窗 ==========
    function renderTaskDetailModal() {
      const task = tasks.find(t => t.id === state.form.taskId);
      if (!task) return '';
      const st = statusMap[isOverdue(task) ? 'overdue' : task.status];
      const pr = priorityMap[task.priority];
      const project = projects.find(p => p.id === task.projectId);
      const parent = task.parentId ? tasks.find(t => t.id === task.parentId) : null;
      const children = tasks.filter(t => t.parentId === task.id);
      const progress = task.parentId ? task.progress : calcProgress(task.id);

      const canEdit = task.creator === currentUser.name || currentUser.role === 'gm' || currentUser.role === 'manager';
      const canReject = (currentUser.role === 'gm' || currentUser.role === 'manager') && task.status !== 'done' && task.status !== 'archived' && task.status !== 'abolished';
      const canTransfer = task.assignee === currentUser.name || currentUser.role === 'gm' || currentUser.role === 'manager';
      const canArchive = (currentUser.role === 'gm' || currentUser.role === 'manager') && task.status === 'done';
      const canAddSubTask = canCreateSubTask(task);

      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:650px;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                  ${state.returnToMemberId ? `<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#7C3AED;font-size:13px;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all 0.2s;" onmouseover="this.style.background='#F5F3FF'" onmouseout="this.style.background='none'" title="返回成员任务看板"><i class="fas fa-arrow-left"></i>返回看板</button>` : ''}
                  ${parent ? `<button onclick="viewTask('${parent.id}')" style="background:none;border:none;cursor:pointer;color:#2563EB;font-size:13px;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all 0.2s;" onmouseover="this.style.background='#EFF6FF'" onmouseout="this.style.background='none'" title="返回上级任务"><i class="fas fa-arrow-left"></i>返回</button>` : ''}
                  ${task.type === 'temp' ? '<span class="tag tag-temp"><i class="fas fa-bolt"></i>临时任务</span>' : '<span class="tag tag-normal"><i class="fas fa-folder"></i>常规任务</span>'}
                  <span style="font-size:12px;color:#9CA3AF;">${task.id}</span>
                </div>
                <h3 class="modal-title">${task.title}</h3>
              </div>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;" title="关闭"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="max-height:60vh;overflow-y:auto;">
              ${task.status === 'rejected' ? `
              <div style="padding:12px;background:#FEF3C7;border-radius:8px;margin-bottom:16px;border:1px solid #FDE68A;">
                <div style="font-size:13px;font-weight:600;color:#92400E;margin-bottom:4px;"><i class="fas fa-undo" style="margin-right:4px;"></i>驳回原因</div>
                <div style="font-size:13px;color:#92400E;">${task.rejectReason || '未填写原因'}</div>
              </div>
              ` : ''}

              <p style="color:#6B7280;margin-bottom:16px;">${task.desc || '暂无描述'}</p>

              ${parent ? `
              <div style="padding:10px 12px;background:#F0FDF4;border-radius:8px;margin-bottom:16px;font-size:12px;">
                <span style="color:#9CA3AF;">上级任务：</span>
                <span style="color:#059669;font-weight:500;cursor:pointer;" onclick="viewTask('${parent.id}')">${parent.title}</span>
              </div>
              ` : ''}

              <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;">
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">状态</div>
                  <span class="status-tag status-${isOverdue(task) ? 'overdue' : task.status}"><i class="fas ${st.icon}"></i>${st.label}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">优先级</div>
                  <span class="priority-dot priority-${task.priority}" style="display:inline-block;margin-right:4px;"></span>
                  <span style="font-size:13px;font-weight:500;">${pr.label}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">主负责人</div>
                  <span style="font-size:13px;font-weight:500;">${task.assignee}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">截止日期</div>
                  <span style="font-size:13px;font-weight:500;${isOverdue(task) ? 'color:#DC2626;' : ''}">${task.dueDate}${isOverdue(task) ? ' (延期' + getDaysOverdue(task) + '天)' : ''}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>计划开始</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${task.planStartDate || '未设置'}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-calendar-check" style="margin-right:4px;"></i>计划截止</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${task.planStartDate && task.estimatedHours ? calcEndDate(task.planStartDate, task.estimatedHours) : task.dueDate || '未设置'}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-clock" style="margin-right:4px;"></i>预计工时</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${task.estimatedHours || 0} 小时</span>
                </div>
                <div style="padding:10px 12px;background:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#FEF2F2' : '#F0FDF4'};border-radius:8px;">
                  <div style="font-size:11px;color:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#DC2626' : '#059669'};margin-bottom:4px;"><i class="fas fa-stopwatch" style="margin-right:4px;"></i>实际工时</div>
                  <span style="font-size:13px;font-weight:600;color:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#DC2626' : '#059669'};">${task.actualHours || 0} 小时</span>
                  ${task.estimatedHours ? `<span style="font-size:11px;color:#9CA3AF;margin-left:4px;">(${Math.round((task.actualHours || 0) / task.estimatedHours * 100)}%)</span>` : ''}
                </div>
                ${task.actualStartDate ? `
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;grid-column:span 2;">
                  <div style="display:flex;gap:16px;">
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">实际开始</div>
                      <span style="font-size:12px;font-weight:500;">${task.actualStartDate}</span>
                    </div>
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">实际结束</div>
                      <span style="font-size:12px;font-weight:500;">${task.actualEndDate || '进行中...'}</span>
                    </div>
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">耗时</div>
                      <span style="font-size:12px;font-weight:500;color:${task.actualEndDate ? (task.actualHours > task.estimatedHours ? '#DC2626' : '#059669') : '#2563EB'};">
                        ${task.actualEndDate ? task.actualHours + ' 小时' : calcActualHours(task.actualStartDate) + ' 小时 (进行中)'}
                      </span>
                    </div>
                  </div>
                </div>
                ` : ''}
                ${project ? `
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;grid-column:span 2;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">所属项目</div>
                  <span style="font-size:13px;font-weight:500;">${project.name}</span>
                </div>
                ` : ''}
              </div>

              ${task.collaborators && task.collaborators.length > 0 ? `
              <div style="margin-bottom:16px;">
                <div style="font-size:12px;color:#9CA3AF;margin-bottom:8px;">协办人</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  ${task.collaborators.map(c => `<span style="padding:4px 10px;background:#F3F4F6;border-radius:6px;font-size:12px;">${c}</span>`).join('')}
                </div>
              </div>
              ` : ''}

              <div style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                  <span style="font-size:13px;font-weight:500;">进度</span>
                  <span style="font-size:13px;font-weight:500;">${progress}%</span>
                </div>
                <div class="progress-bar" style="height:8px;"><div class="progress-fill" style="width:${progress}%;"></div></div>
              </div>

              ${canQuickUpdateProgress(task) ? `
              <div style="margin-bottom:16px;padding:12px;background:#F5F3FF;border-radius:8px;border:1px solid #EDE9FE;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <span style="font-size:12px;font-weight:500;color:#7C3AED;"><i class="fas fa-sliders-h" style="margin-right:4px;"></i>快捷更新进度</span>
                  <span style="font-size:13px;font-weight:600;color:#7C3AED;" id="quickProgressVal-${task.id}">${progress}%</span>
                </div>
                <input type="range" min="0" max="100" value="${progress}" style="width:100%;cursor:pointer;accent-color:#7C3AED;"
                  oninput="document.getElementById('quickProgressVal-${task.id}').textContent=this.value+'%'"
                  onchange="quickUpdateProgress('${task.id}', this.value)">
                <div style="font-size:11px;color:#9CA3AF;margin-top:6px;">拖动滑条即可更新，无需填写修改原因</div>
              </div>
              ` : ''}

              ${children.length > 0 ? `
              <div style="border-top:1px solid #E5E7EB;padding-top:16px;">
                <div style="font-size:14px;font-weight:600;margin-bottom:12px;"><i class="fas fa-sitemap" style="color:#D97706;margin-right:6px;"></i>下级任务 (${children.length})</div>
                ${children.map(c => {
                  const cSt = statusMap[isOverdue(c) ? 'overdue' : c.status];
                  return `
                    <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;margin-bottom:8px;cursor:pointer;" onclick="viewTask('${c.id}')">
                      <div style="display:flex;align-items:center;gap:8px;">
                        <span class="priority-dot priority-${c.priority}"></span>
                        <span style="font-size:13px;font-weight:500;flex:1;">${c.title}</span>
                        <span class="status-tag status-${isOverdue(c) ? 'overdue' : c.status}" style="font-size:10px;">${cSt.label}</span>
                      </div>
                      <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">${c.assignee} · ${c.dueDate}</div>
                    </div>
                  `;
                }).join('')}
              </div>
              ` : ''}

            </div>
            <div class="modal-footer">
              ${canAddSubTask ? `<button class="btn btn-ghost" onclick="showNewSubTaskModal('${task.id}')" style="color:#059669;"><i class="fas fa-sitemap"></i>添加子任务</button>` : ''}
              ${canReject ? `<button class="btn btn-ghost" style="color:#D97706;" onclick="showRejectModal('${task.id}')"><i class="fas fa-undo"></i>驳回</button>` : ''}
              <div style="flex:1;"></div>

              ${task.status === 'todo' && canOperateTask(task) && !hasActiveChildren(task.id) ? `
                <button class="btn btn-primary" onclick="updateTaskStatus('${task.id}', 'doing')"><i class="fas fa-play"></i>开始执行</button>
              ` : ''}

              ${task.status === 'doing' && canOperateTask(task) && !hasActiveChildren(task.id) ? `
                <button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'done')"><i class="fas fa-check"></i>标记完成</button>
              ` : ''}

              ${canOperateTask(task) && hasActiveChildren(task.id) ? `
                <span style="font-size:12px;color:#9CA3AF;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>有未完成的下级任务</span>
              ` : ''}

              ${canTransfer ? `<button class="btn btn-ghost" onclick="showTransferModal('${task.id}')"><i class="fas fa-exchange-alt"></i>转办</button>` : ''}
              ${canOperateTask(task) && task.status !== 'abolished' ? `<button class="btn btn-ghost" style="color:#DC2626;" onclick="abolishTask('${task.id}')"><i class="fas fa-ban"></i>作废</button>` : ''}
              ${canOperateTask(task) ? `<button class="btn btn-primary" onclick="editTask('${task.id}')"><i class="fas fa-edit"></i>编辑</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // 项目状态流转
    function updateProjectStatus(projectId, newStatus) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      const oldStatus = project.status;
      project.status = newStatus;

      // 记录日志
      changeLogs.push({
        id: genId('L'),
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || oldStatus,
        after: projectStatusMap[newStatus]?.label || newStatus,
        reason: '项目状态变更',
        project: project.name,
      });

      save();
      render();
    }

    // 项目归档
    function archiveProject(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      if (!confirm('确定归档该项目？归档后项目将移至归档列表。')) return;

      project.status = 'archived';
      project.archived = true;

      // 记录日志
      changeLogs.push({
        id: genId('L'),
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || project.status,
        after: '已归档',
        reason: '项目归档',
        project: project.name,
      });

      save();
      goTo('projects');
    }

    // 更新任务状态，自动计算实际工时
    function updateTaskStatus(taskId, newStatus) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      const oldStatus = task.status;
      const today = new Date().toISOString().split('T')[0];

      // 状态从其他状态变为"进行中"，记录实际开始时间
      if (newStatus === 'doing' && oldStatus !== 'doing' && oldStatus !== 'done') {
        task.actualStartDate = today;
      }

      // 状态变为"已完成"，记录实际结束时间并计算实际工时
      if (newStatus === 'done' && oldStatus !== 'done') {
        task.actualEndDate = today;
        if (task.actualStartDate) {
          task.actualHours = calcActualHours(task.actualStartDate, task.actualEndDate);
        }
      }

      // 更新状态
      task.status = newStatus;

      // 记录日志
      changeLogs.push({
        id: genId('L'),
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: statusMap[oldStatus]?.label || oldStatus,
        after: statusMap[newStatus]?.label || newStatus,
        reason: '状态变更',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      // 更新上级任务进度
      if (task.parentId) {
        updateParentProgress(task.parentId);
      }

      if (newStatus === 'done') {
        notifyTaskCompleted(task);
      }

      save();

      const returnToMember = state.returnToMemberId;
      if (returnToMember) {
        state.returnToMemberId = null;
        state.form = { memberUserId: returnToMember };
        state.showModal = 'memberKanban';
        state.prevProjectId = null;
        render();
        return;
      }

      // 关闭弹窗，刷新页面
      state.showModal = null;
      state.form = state.prevProjectId ? { projectId: state.prevProjectId } : {};
      state.prevProjectId = null;
      render();
    }

    function quickUpdateProgress(taskId, progress) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !canQuickUpdateProgress(task)) return;

      const newProgress = Math.max(0, Math.min(100, parseInt(progress, 10) || 0));
      const oldProgress = task.progress || 0;
      if (newProgress === oldProgress) return;

      task.progress = newProgress;
      if (newProgress > 0 && task.status === 'todo') {
        task.actualStartDate = task.actualStartDate || new Date().toISOString().split('T')[0];
        task.status = 'doing';
      }

      changeLogs.push({
        id: genId('L'),
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: oldProgress + '%',
        after: newProgress + '%',
        reason: '快捷更新进度',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      if (task.parentId) updateParentProgress(task.parentId);
      save();
      state.showModal = 'taskDetail';
      state.form = { taskId };
      render();
    }

    // 递归更新上级任务进度
    function updateParentProgress(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      // 计算子任务完成情况（排除已作废的任务）
      const children = tasks.filter(t => t.parentId === taskId);
      const activeChildren = children.filter(t => t.status !== 'abolished');
      const doneCount = children.filter(t => t.status === 'done').length;

      if (activeChildren.length > 0) {
        // 进度 = 已完成数 / 有效子任务总数（不含已作废）
        task.progress = Math.round(doneCount / activeChildren.length * 100);

        // 如果所有有效子任务都完成了，自动完成上级任务
        if (task.progress === 100 && task.status !== 'done') {
          task.status = 'done';
          task.actualEndDate = new Date().toISOString().split('T')[0];
          if (task.actualStartDate) {
            task.actualHours = calcActualHours(task.actualStartDate, task.actualEndDate);
          }
        }

        // 继续递归更新更上层
        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      } else {
        // 如果所有子任务都作废了，上级进度保持不变或设为0
        task.progress = 0;
        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      }
    }

    function saveTask() {
      if (!state.form.title) { alert('请输入任务标题'); return; }

      // 校验子任务工时是否超过上级
      if (state.form.parentId && state.form.estimatedHours) {
        const parentTask = tasks.find(t => t.id === state.form.parentId);
        if (parentTask) {
          const isEdit = !!state.form.id;
          const currentTask = isEdit ? tasks.find(t => t.id === state.form.id) : null;
          const currentHours = currentTask ? (currentTask.estimatedHours || 0) : 0;
          const children = tasks.filter(t => t.parentId === state.form.parentId && t.status !== 'abolished' && t.id !== state.form.id);
          const otherChildrenHours = children.reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
          const totalAllocated = otherChildrenHours + (state.form.estimatedHours || 0);

          if (totalAllocated > (parentTask.estimatedHours || 0)) {
            const remaining = (parentTask.estimatedHours || 0) - otherChildrenHours;
            alert(`子任务工时不能超过上级任务！\n\n上级任务工时：${parentTask.estimatedHours}小时\n已分配给其他子任务：${otherChildrenHours}小时\n剩余可分配：${remaining}小时`);
            return;
          }
        }
      }

      const task = tasks.find(t => t.id === state.form.id);
      if (task) {
        // 编辑已有任务，必须填写修改原因
        if (!state.form.reason) { alert('请填写修改原因'); return; }
        const oldAssignee = task.assignee;
        changeLogs.push({
          id: genId('L'),
          taskId: task.id,
          operator: currentUser.name,
          operateTime: new Date().toLocaleString(),
          before: JSON.stringify({ title: task.title, status: task.status, progress: task.progress }),
          after: JSON.stringify({ title: state.form.title, status: state.form.status, progress: state.form.progress }),
          reason: state.form.reason,
          project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
        });
        Object.assign(task, state.form);
        if (state.form.assignee && state.form.assignee !== oldAssignee) {
          notifyTaskAssigned(task);
        }
      } else {
        // 新建任务，不需要修改原因
        const newTask = {
          ...state.form,
          id: genId('T'),
          projectId: state.form.projectId || '',
          parentId: state.form.parentId || null,
          assignee: state.form.assignee || currentUser.name,
          collaborators: [],
          creator: currentUser.name,
          createdAt: new Date().toISOString().split('T')[0],
          estimatedHours: state.form.estimatedHours || 0,
          actualHours: 0,
          planStartDate: state.form.planStartDate || null,
          actualStartDate: null,
          actualEndDate: null,
        };
        tasks.push(newTask);
        notifyTaskAssigned(newTask);
        if (newTask.parentId) updateParentProgress(newTask.parentId);
        const returnTo = state.returnToTaskId;
        save();
        if (returnTo) {
          state.returnToTaskId = null;
          state.form = { taskId: returnTo };
          state.showModal = 'taskDetail';
          render();
          return;
        }
      }
      save();
      closeModal();
    }

    function normalizeImportRow(raw) {
      const row = {};
      Object.keys(raw).forEach(key => {
        const k = key.trim().replace(/^\uFEFF/, '');
        const mapped = IMPORT_HEADER_MAP[k] || k;
        row[mapped] = String(raw[key] || '').trim();
      });
      return row;
    }

    function detectImportType(rows) {
      if (!rows.length) return 'unified';
      const keys = Object.keys(rows[0]).map(k => k.trim());
      if (keys.some(k => ['项目名称', '一级任务', '主任务', 'level1', 'projectName'].includes(k))) return 'unified';
      if (keys.includes('name') && keys.includes('dept') && !keys.some(k => ['title', '任务标题', '一级任务'].includes(k))) return 'project';
      if (keys.some(k => ['title', '任务标题', 'projectId', '所属项目ID'].includes(k))) return 'task';
      return 'unified';
    }

    function normalizePriority(p) {
      const map = { '紧急': 'urgent', urgent: 'urgent', '高': 'urgent', '重要': 'important', important: 'important', '中': 'important', '普通': 'normal', normal: 'normal', '低': 'normal' };
      return map[p] || 'normal';
    }

    function normalizeTaskType(t) {
      if (!t) return 'normal';
      return (t === '临时' || t === 'temp') ? 'temp' : 'normal';
    }

    function getUnifiedTaskLevels(row) {
      const levels = [row.level1, row.level2, row.level3, row.level4].filter(Boolean);
      if (row.taskTitle) {
        if (levels.length === 0) return [row.taskTitle];
        if (levels[levels.length - 1] !== row.taskTitle) levels.push(row.taskTitle);
      }
      return levels;
    }

    function validateUnifiedRow(row, projectCache) {
      const levels = getUnifiedTaskLevels(row);
      if (!row.projectName) return { valid: false, reason: '缺少项目名称' };
      if (levels.length === 0) return { valid: false, reason: '缺少任务层级' };
      if (!row.assignee) return { valid: false, reason: '缺少负责人' };
      const existing = projectCache[row.projectName] || projects.find(p => p.name === row.projectName);
      if (!existing && (!row.dept || !row.manager)) return { valid: false, reason: '新项目需填部门和负责人' };
      return { valid: true, levels };
    }

    function getOrCreateProject(row, cache) {
      if (cache[row.projectName]) return cache[row.projectName];
      let project = projects.find(p => p.name === row.projectName);
      if (!project) {
        project = {
          id: genId('PRJ'),
          name: row.projectName,
          desc: row.projectDesc || '',
          dept: row.dept,
          manager: row.manager,
          status: 'active',
          startDate: row.startDate || new Date().toISOString().split('T')[0],
          endDate: row.endDate || '',
          archived: false,
          creator: currentUser.name,
          createdAt: new Date().toISOString().split('T')[0],
        };
        projects.push(project);
      }
      cache[row.projectName] = project;
      return project;
    }

    function findTaskByParent(projectId, parentId, title) {
      return tasks.find(t => t.projectId === projectId && t.parentId === parentId && t.title === title);
    }

    function ensureTaskPath(projectId, levels, taskMap, row) {
      let parentId = null;
      for (let i = 0; i < levels.length; i++) {
        const pathKey = projectId + '::' + levels.slice(0, i + 1).join(' / ');
        if (taskMap[pathKey]) {
          parentId = taskMap[pathKey];
          continue;
        }
        const existing = findTaskByParent(projectId, parentId, levels[i]);
        if (existing) {
          taskMap[pathKey] = existing.id;
          parentId = existing.id;
          continue;
        }
        const isLast = i === levels.length - 1;
        const task = {
          id: genId('T'),
          projectId,
          parentId,
          title: levels[i],
          desc: isLast ? (row.taskDesc || '') : '',
          assignee: isLast ? row.assignee : (row.assignee || row.manager || currentUser.name),
          collaborators: [],
          creator: currentUser.name,
          status: 'todo',
          priority: isLast ? normalizePriority(row.priority) : 'normal',
          type: isLast ? normalizeTaskType(row.taskType) : 'normal',
          dueDate: isLast ? (row.dueDate || '') : '',
          progress: 0,
          estimatedHours: isLast ? (parseFloat(row.estimatedHours) || 0) : 0,
          actualHours: 0,
          planStartDate: isLast ? (row.planStartDate || null) : null,
          actualStartDate: null,
          actualEndDate: null,
          createdAt: new Date().toISOString().split('T')[0],
        };
        tasks.push(task);
        taskMap[pathKey] = task.id;
        parentId = task.id;
      }
    }

    // 处理文件上传
    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseCSV(e.target.result).map(normalizeImportRow));
          } catch (error) {
            alert('CSV 解析失败：' + error.message);
          }
        };
        reader.readAsText(file, 'UTF-8');
      } else if (ext === 'xlsx' || ext === 'xls') {
        if (typeof XLSX === 'undefined') {
          alert('Excel 解析库未加载，请检查网络连接后刷新页面重试');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseExcel(e.target.result));
          } catch (error) {
            alert('Excel 解析失败：' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert('不支持的文件格式，请上传 .xlsx、.xls 或 .csv 文件');
      }
    }

    function processImportRows(rows) {
      const data = rows.filter(row => Object.values(row).some(v => String(v || '').trim()));
      if (!data.length) {
        alert('文件中没有有效数据，请检查表头和内容行');
        return;
      }
      state.importData = data;
      state.importType = detectImportType(data);
      state.importStatus = 'preview';
      state.importResult = null;
      render();
    }

    // 解析 Excel
    function parseExcel(arrayBuffer) {
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      return json.map(row => {
        const raw = {};
        Object.keys(row).forEach(k => {
          raw[k.trim().replace(/^\uFEFF/, '')] = String(row[k] ?? '').trim();
        });
        return normalizeImportRow(raw);
      });
    }

    // 解析CSV
    function parseCSV(text) {
      const lines = text.split('\n').filter(line => line.trim());
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      const data = [];

      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.trim());
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || '';
        });
        data.push(row);
      }

      return data;
    }

    // 执行导入
    function executeImport() {
      const importType = state.importType || 'unified';

      if (importType === 'unified') {
        const validData = state.importData.filter(row => validateUnifiedRow(row, {}).valid);
        if (validData.length === 0) {
          alert('没有有效的数据可导入，请检查项目名称、任务层级和负责人是否填写完整');
          return;
        }
        const projectNames = [...new Set(validData.map(r => r.projectName))];
        if (!confirm(`确定一键导入？\n\n• ${validData.length} 条任务\n• ${projectNames.length} 个项目\n\n系统将自动创建项目并建立任务层级。`)) return;

        const projectsBefore = projects.length;
        const tasksBefore = tasks.length;
        const projectCache = {};
        const taskMap = {};
        let successCount = 0;
        let failCount = 0;

        validData.forEach(row => {
          try {
            const v = validateUnifiedRow(row, projectCache);
            if (!v.valid) { failCount++; return; }
            const project = getOrCreateProject(row, projectCache);
            ensureTaskPath(project.id, v.levels, taskMap, row);
            successCount++;
          } catch (e) {
            failCount++;
          }
        });

        const projectCreated = projects.length - projectsBefore;
        const taskCreated = tasks.length - tasksBefore;

        save();
        state.importResult = {
          success: failCount === 0,
          message: `导入完成！成功 ${successCount} 条任务，新建 ${projectCreated} 个项目、${taskCreated} 个任务节点${failCount > 0 ? '，失败 ' + failCount + ' 条' : ''}`
        };
        state.importData = [];
        state.importStatus = 'done';
        render();
        return;
      }

      const validData = state.importData.filter(row => {
        if (importType === 'project') {
          return (row.name || row.projectName) && row.dept && (row.manager || row.assignee);
        } else {
          return (row.title || row.taskTitle) && row.projectId && row.assignee;
        }
      });

      if (validData.length === 0) {
        alert('没有有效的数据可导入');
        return;
      }

      if (!confirm(`确定导入 ${validData.length} 条数据？`)) return;

      let successCount = 0;
      let failCount = 0;

      if (importType === 'project') {
        validData.forEach(row => {
          try {
            // 检查项目是否已存在
            const existing = projects.find(p => p.name === (row.name || row.projectName));
            if (existing) {
              failCount++;
              return;
            }

            projects.push({
              id: genId('PRJ'),
              name: row.name || row.projectName,
              desc: row.desc || row.projectDesc || '',
              dept: row.dept,
              manager: row.manager || row.assignee,
              status: 'active',
              startDate: row.startDate || new Date().toISOString().split('T')[0],
              endDate: row.endDate || '',
              archived: false,
              creator: currentUser.name,
              createdAt: new Date().toISOString().split('T')[0],
            });
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      } else {
        // 任务导入需要先生成项目ID映射
        const projectIdMap = {};
        validData.forEach(row => {
          if (row.projectId && !projectIdMap[row.projectId]) {
            const existingProject = projects.find(p => p.id === row.projectId || p.name === row.projectId);
            if (existingProject) {
              projectIdMap[row.projectId] = existingProject.id;
            }
          }
        });

        validData.forEach(row => {
          try {
            const projectId = projectIdMap[row.projectId] || row.projectId;
            // 检查项目是否存在
            const project = projects.find(p => p.id === projectId);
            if (!project) {
              failCount++;
              return;
            }

            // 查找上级任务
            let parentId = null;
            if (row.parentId) {
              const parentTask = tasks.find(t => t.id === row.parentId || t.title === row.parentId);
              parentId = parentTask ? parentTask.id : null;
            }

            tasks.push({
              id: genId('T'),
              type: 'normal',
              projectId: projectId,
              parentId: parentId,
              title: row.title || row.taskTitle,
              desc: row.desc || '',
              assignee: row.assignee,
              collaborators: [],
              creator: currentUser.name,
              status: 'todo',
              priority: row.priority || 'normal',
              dueDate: row.dueDate || '',
              estimatedHours: parseFloat(row.estimatedHours) || 0,
              actualHours: 0,
              planStartDate: row.planStartDate || null,
              actualStartDate: null,
              actualEndDate: null,
              createdAt: new Date().toISOString().split('T')[0],
            });
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      }

      save();

      state.importResult = {
        success: failCount === 0,
        message: `导入完成！成功 ${successCount} 条，失败 ${failCount} 条`
      };
      state.importData = [];
      state.importStatus = 'done';
      render();
    }

        return {

          rows: [['示例项目', '这是一个示例项目', '实施交付部', '张三', '2024-01-01', '2024-12-31']],
          filename: 'project_import_template',
        };
      }
      return {
        headers: ['任务标题', '任务描述', '所属项目ID', '上级任务ID', '负责人', '优先级', '预计工时', '截止日期'],
        rows: [
          ['示例任务', '这是一个示例任务', 'PRJ-001', '', '张三', 'normal', '8', '2024-02-01'],
          ['子任务示例', '这是子任务', 'PRJ-001', '示例任务', '李四', 'important', '4', '2024-01-25'],
        ],
        filename: 'task_import_template',
      };
    }

    function downloadTemplate() {
      const importType = state.importType || 'unified';
      const tpl = getTemplateData(importType);

      if (typeof XLSX !== 'undefined') {
        const ws = XLSX.utils.aoa_to_sheet([tpl.headers, ...tpl.rows]);
        ws['!cols'] = tpl.headers.map(() => ({ wch: 16 }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '导入模板');
        XLSX.writeFile(wb, `${tpl.filename}.xlsx`);
        return;
      }

      const csvContent = [tpl.headers.join(','), ...tpl.rows.map(r => r.join(','))].join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${tpl.filename}.csv`;
      link.click();
    }

    // 初始化：本地/服务端数据、钉钉登录、扫描推送、渲染页面
    async function bootstrapApp() {
      load();
      if (ApiConfig.enabled && !authSession.token) {
        await AuthService.loginDemo(currentUser.id);
      }
      await AuthService.init();
      if (ApiConfig.enabled && authSession.token) {
        await DataService.loadFromServer();
      }
      await NotificationService.scanScheduledPushes();
      render();
    }
    bootstrapApp();
  </script>
