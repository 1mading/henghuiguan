      getAuthHeaders() {
        return authSession.token ? { Authorization: 'Bearer ' + authSession.token } : {};
      },

      /** 钉钉客户端内 H5 免登：requestAuthCode → 后端换 userid */
      tryDingTalkJsApiLogin() {
        if (!this.isDingTalkMode() || typeof dd === 'undefined') {
          return Promise.resolve(null);
        }
        const corpId = DingTalkApi.corpId;
        if (!corpId) return Promise.resolve(null);
        const self = this;
        return new Promise(function(resolve) {
          var finished = false;
          function finish(val) {
            if (finished) return;
            finished = true;
            resolve(val);
          }
          var timer = setTimeout(function() { finish(null); }, 12000);
          try {
            dd.ready(function() {
              dd.runtime.permission.requestAuthCode({
                corpId: corpId,
                onSuccess: async function(res) {
                  clearTimeout(timer);
                  var code = res && res.code ? String(res.code).trim() : '';
                  if (!code) { finish(null); return; }
                  finish(await self.loginByAuthCode(code, corpId));
                },
                onFail: function() {
                  clearTimeout(timer);
                  finish(null);
                },
              });
            });
            dd.error(function() {
              clearTimeout(timer);
              finish(null);
            });
          } catch (e) {
            clearTimeout(timer);
            finish(null);
          }
        });
      },

      /** 应用启动：优先 URL userid/authCode，其次钉钉 JSAPI 免登，再次已保存会话 */
      async init() {
        const urlParams = this.parseUrlParams();

        if (urlParams.dingTalkUserId) {
          const result = await this.loginByDingTalkUserId(urlParams.dingTalkUserId, urlParams.corpId);
          if (result.success) {
            this.cleanAuthUrlParams();
            return result;
          }
          state.authError = result.message || '钉钉 userid 登录失败';
        }

        if (urlParams.authCode) {
          const result = await this.loginByAuthCode(urlParams.authCode, urlParams.corpId);
          if (result.success) {
            this.cleanAuthUrlParams();
            return result;
          }
          state.authError = result.message || '钉钉免登失败';
        }

        if (this.isDingTalkMode() && !urlParams.dingTalkUserId && !urlParams.authCode) {
          const jsResult = await this.tryDingTalkJsApiLogin();
          if (jsResult && jsResult.success) return jsResult;
          if (jsResult && !jsResult.success) {
            state.authError = jsResult.message || '钉钉免登失败';
          }
        }

        if (authSession.token && this.isDingTalkMode()) {
          const result = await this.fetchSession();
          if (result.success) return result;
        }

        return { success: true, source: authSession.loginSource || 'persisted' };
      },

    /**
     * 创建人与任务负责人或项目负责人相同时，不向创建人推送（避免自己通知自己）
     */
    function filterPushRecipientNames(names, payload = {}) {
      const list = [...new Set((names || []).filter(Boolean))];
      if (!list.length) return list;

      let task = null;
      let project = null;
      if (payload.taskId) task = tasks.find(t => t.id === payload.taskId);
      if (payload.projectId) project = projects.find(p => p.id === payload.projectId);
      if (!project && task?.projectId) project = projects.find(p => p.id === task.projectId);

      const creator = task?.creator || project?.creator;
      if (!creator) return list;

      const assignee = task?.assignee;
      const projectManager = project?.manager || payload.projectManager;
      const creatorIsAssignee = !!(assignee && creator === assignee);
      const creatorIsProjectManager = !!(projectManager && creator === projectManager);

      if (!creatorIsAssignee && !creatorIsProjectManager) return list;

      return list.filter(name => {
        if (name !== creator) return true;
        if (creatorIsAssignee && name === assignee) return false;
        if (creatorIsProjectManager && name === projectManager) return false;
        return true;
      });
    }

      }),
    };

    const NotificationService = {
      /** 统一推送入口 */
      async send(eventType, payload) {
        const template = PushTemplates[eventType];
        if (!template) {
          console.warn('[推送] 未知事件类型:', eventType);
          return { success: false, reason: 'unknown_event' };
        }
        const rawNames = payload.recipientNames || (payload.recipientName ? [payload.recipientName] : []);
        const filteredNames = filterPushRecipientNames(rawNames, payload);
        if (!filteredNames.length) {
          const logEntry = {
            id: genId('P'),
            eventType,
            title: template(payload).title,
            recipients: (rawNames || []).join('、') || '-',
            status: 'skipped',
            error: '创建人与项目负责人或任务负责人相同，已跳过推送',
            time: new Date().toLocaleString(),
            taskId: payload.taskId || payload.projectId || null,
          };
          pushLogs.unshift(logEntry);
          if (pushLogs.length > 100) pushLogs = pushLogs.slice(0, 100);
          return logEntry;
        }
        const message = template(payload);
        const recipients = this.resolveRecipients(eventType, { ...payload, recipientNames: filteredNames }).filter(r => r.dingTalkUserId);
        const body = {
          eventType,
          message,
          recipients: recipients.map(r => ({
            userId: r.id,
            userName: r.name,
            dingTalkUserId: r.dingTalkUserId || '',
            dept: r.dept,
            role: r.role,
          })),
          payload,
          operator: currentUser.name,
          operatorId: currentUser.id,
          timestamp: new Date().toISOString(),
        };

        const logEntry = {
          id: genId('P'),
          eventType,
          title: message.title,
          recipients: recipients.map(r => r.name).join('、'),
          status: 'pending',
          time: new Date().toLocaleString(),
          taskId: payload.taskId || payload.projectId || null,
        };

        if (!recipients.length) {
          logEntry.status = 'skipped';
          logEntry.error = '接收人未绑定钉钉 userid';
          pushLogs.unshift(logEntry);
          if (pushLogs.length > 100) pushLogs = pushLogs.slice(0, 100);
          return logEntry;
        }

        if (ApiConfig.enabled) {
          try {
            const result = await this.callPushApi(body);
            logEntry.status = result.success ? 'sent' : 'failed';
            logEntry.response = result;
          } catch (e) {
            logEntry.status = 'failed';
            logEntry.error = e.message;
            console.warn('[推送] API 调用失败:', e);
          }
        } else {
          logEntry.status = 'queued';
          console.log('[推送预留]', eventType, message, '→', recipients.map(r => r.name).join('、'));
        }

        pushLogs.unshift(logEntry);
        if (pushLogs.length > 100) pushLogs = pushLogs.slice(0, 100);
        return logEntry;
      },

      /** 调用后端钉钉推送接口 */
      async callPushApi(body) {
        const url = ApiConfig.baseUrl + DingTalkApi.endpoints.pushWorkNotification;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify(body),
          signal: AbortSignal.timeout(ApiConfig.timeout),
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      },

      /** 批量推送（定时任务场景，由后端调度，前端预留调用） */
      async sendBatch(items) {
        const url = ApiConfig.baseUrl + DingTalkApi.endpoints.pushBatch;
        if (!ApiConfig.enabled) {
          console.log('[推送预留] 批量推送', items.length, '条');
          return { success: true, queued: items.length };
        }
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify({ items }),
          signal: AbortSignal.timeout(ApiConfig.timeout),
        });
        return response.json();
      },

      resolveRecipients(eventType, payload) {
        const names = payload.recipientNames || (payload.recipientName ? [payload.recipientName] : []);
        return names.map(name => users.find(u => u.name === name)).filter(Boolean);
      },

      getTaskPayload(task, extra = {}) {
        const project = projects.find(p => p.id === task.projectId);
        return {
          taskId: task.id,
          taskTitle: task.title,
          projectId: task.projectId || '',
          projectName: project ? project.name : '临时任务',
          projectManager: project?.manager || '',
          projectDept: project?.dept || '',
          assignee: task.assignee,
          planStartDate: task.planStartDate || '',
          dueDate: resolveTaskDueDate(task),
          ...extra,
        };
      },

      /** 扫描临期/逾期任务并触发推送（正式环境：同一任务同一天只推一次） */
      async scanScheduledPushes() {
        if (!ApiConfig.enabled || !authSession.token) return;
        const today = todayStr();
        const items = [];

        function wasPushedToday(eventType, taskId) {
          if (!taskId) return false;
          const dayPrefix = new Date().toLocaleDateString('zh-CN').split(' ')[0];
          return pushLogs.some(l =>
            l.eventType === eventType &&
            l.taskId === taskId &&
            l.status !== 'failed' &&
            String(l.time || '').startsWith(dayPrefix)
          );
        }

        tasks.forEach(task => {
          if (task.status === 'done' || task.status === 'archived' || task.status === 'abolished') return;
          if (!task.dueDate || !task.assignee) return;

          const effectiveDueDate = resolveTaskDueDate(task);
          if (!effectiveDueDate) return;

          const dueKey = `due:${task.id}:${today}`;
          const overdueKey = `overdue:${task.id}:${today}`;

          if (isOverdue(task) && !pushSentKeys.has(overdueKey) && !wasPushedToday(PushEventType.TASK_OVERDUE, task.id)) {
            items.push({
              eventType: PushEventType.TASK_OVERDUE,
              payload: {
                ...this.getTaskPayload(task),
                recipientNames: [task.assignee],
                daysOverdue: getDaysOverdue(task),
                operator: '系统',
              },
              sentKey: overdueKey,
            });
          } else if (isDueSoon(task) && !pushSentKeys.has(dueKey) && !wasPushedToday(PushEventType.TASK_DUE_SOON, task.id)) {
            items.push({
              eventType: PushEventType.TASK_DUE_SOON,
              payload: {
                ...this.getTaskPayload(task),
                recipientNames: [task.assignee],
                operator: '系统',
              },
              sentKey: dueKey,
            });
          }
        });

        for (const item of items) {
          await this.send(item.eventType, item.payload);
          pushSentKeys.add(item.sentKey);
        }
        if (items.length) save({ skipUsers: true });
      },

      getRecentLogs(limit = 10) {
        return pushLogs.slice(0, limit);
      },
    };

    function submitCollaboratorAssistProposal(taskId) {
      const task = tasks.find(t => t.id === taskId);
      const entry = getCollaboratorEntry(task, COLLAB_TYPE_ASSIST, currentUser.name);
      if (!task || !entry || entry.status !== COLLAB_STATUS_PENDING) {
        alert('当前无法提交协助时段');
        return;
      }
      const startEl = document.getElementById('collab-start-' + taskId);
      const endEl = document.getElementById('collab-end-' + taskId);
      const noteEl = document.getElementById('collab-note-' + taskId);
      const planStartDate = startEl?.value || '';
      const planEndDate = endEl?.value || '';
      const proposedNote = noteEl?.value?.trim() || '';
      if (!planStartDate || !planEndDate) {
        alert('请填写协助开始与截止时间');
        return;
      }
      if (parseLocalDate(planStartDate) > parseLocalDate(planEndDate)) {
        alert('协助开始日期不能晚于截止日期');
        return;
      }
      const estimatedHours = calcAssistEntryEstimatedHours(planStartDate, planEndDate);
      if (estimatedHours <= 0) {
        alert('协助时段内需至少包含一个有效工作日');
        return;
      }
      entry.planStartDate = planStartDate;
      entry.planEndDate = planEndDate;
      entry.estimatedHours = estimatedHours;
      entry.proposedNote = proposedNote;
      entry.proposedAt = new Date().toLocaleString();
      entry.status = COLLAB_STATUS_PROPOSED;
      appendChangeLogEntry({
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: '待填写协助时段',
        after: `${planStartDate} ~ ${planEndDate}（${estimatedHours}h）`,
        reason: '协办人提交协助时段',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });
      notifyCollaboratorAssistProposed(task, entry);
      save();
      alert('协助时段已提交，等待任务负责人或项目负责人审批');
      render();
    }

      const task = tasks.find(t => t.id === taskId);

      if (!canReviewCollaboratorProposal(task)) {

        operator: currentUser.name,

    function notifyTaskCompleted(task) {

      const assigneeUser = users.find(u => u.name === task.assignee);
      const names = new Set();
      if (project?.manager) names.add(project.manager);
      if (assigneeUser?.leaderId) {
        const leader = users.find(u => u.id === assigneeUser.leaderId);
        if (leader?.name) names.add(leader.name);
      }
      const recipients = [...names];
      if (!recipients.length) return;
      NotificationService.send(PushEventType.TASK_COMPLETED, {

        recipientNames: recipients,

    const DingTalkConfig = {
      ...DingTalkApi,
      syncFromDingTalk: async (payload = {}) => {
        const url = ApiConfig.baseUrl + DingTalkApi.endpoints.syncUsers;
        if (!ApiConfig.enabled) {
          return { success: false, message: '后端未接入' };
        }
        if (!authSession.token) {
          return {
            success: false,
            message: '请先完成钉钉登录后再同步（当前无登录凭证，需总经理账号）',
          };
        }
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify(payload),
        });
        const text = await response.text();
        let res;
        try {
          res = JSON.parse(text);
        } catch {
          return {
            success: false,
            message: `服务器返回异常（HTTP ${response.status}）：${text.slice(0, 150)}`,
          };
        }
        if (!response.ok && res && !res.success) {
          res.message = res.message || `请求失败（HTTP ${response.status}）`;
        }
        return res;
      },
    };

        return;
      }
      if (!authSession.token) {
        alert('请先完成钉钉登录后再同步');
        return;
      }
      state.form = {
        syncMode: 'selected',
        syncSelectedIds: users.map(u => u.id),
        syncDeptNames: STAFF_DEPT_OPTIONS.slice(),
        syncSearch: '',
      };
      state.showModal = 'dingTalkSync';
      render();
    }

    function setSyncMode(mode) {
      state.form.syncMode = mode;
      render();
    }

    function toggleSyncSelectAll(checked) {
      const q = (state.form.syncSearch || '').trim().toLowerCase();
      const list = q
        ? users.filter(u => u.name.toLowerCase().includes(q) || u.dept.toLowerCase().includes(q))
        : users;
      const ids = list.map(u => u.id);
      const set = new Set(state.form.syncSelectedIds || []);
      ids.forEach(id => { if (checked) set.add(id); else set.delete(id); });
      state.form.syncSelectedIds = [...set];
      render();
    }

    function toggleSyncUser(userId, checked) {
      const set = new Set(state.form.syncSelectedIds || []);
      if (checked) set.add(userId); else set.delete(userId);
      state.form.syncSelectedIds = [...set];
      render();
    }

    function toggleSyncDept(dept, checked) {
      const set = new Set(state.form.syncDeptNames || []);
      if (checked) set.add(dept); else set.delete(dept);
      state.form.syncDeptNames = [...set];
      render();
    }

    async function confirmDingTalkSync() {
      const mode = state.form.syncMode || 'selected';
      const payload = { mode };
      if (mode === 'selected') {
        payload.localUserIds = state.form.syncSelectedIds || [];
        if (!payload.localUserIds.length) {
          alert('请至少勾选一名人员');
          return;
        }
      } else if (mode === 'departments') {
        payload.deptNames = state.form.syncDeptNames || [];
        if (!payload.deptNames.length) {
          alert('请至少选择一个部门');
          return;
        }
      } else if (mode === 'all') {
        if (!confirm('全量同步会拉取全公司钉钉通讯录，可能耗时较长，确定继续？')) return;
      }

      state.showModal = null;
      DataService.cancelScheduledSave();
      state.dingTalkSyncing = true;
      render();
      try {
        const res = await DingTalkConfig.syncFromDingTalk(payload);
        if (ApiConfig.enabled && res && res.success) {
          if (res.persisted === false) {
            alert('同步未能写入服务端磁盘，刷新后数据会丢失。请关闭占用 data 文件的程序后重试。');
          } else {
            if (Array.isArray(res.allUsers) && res.allUsers.length) {
              DataService.applyAllUsersFromServer(res.allUsers);
            } else if (Array.isArray(res.updatedUsers) && res.updatedUsers.length) {
              DataService.applyUserUpdates(res.updatedUsers);
            }
            const loaded = Array.isArray(res.allUsers)
              ? true
              : await DataService.loadFromServer({ timeout: 120000 });
            const boundList = res.updatedUsers || (res.allUsers || []).filter(u => u.dingTalkUserId);
            const updatedIds = boundList.map(u => u.id);
            state.syncHighlightIds = updatedIds;
            state.syncFeedback = {
              type: (res.bound || res.updated || 0) > 0 ? 'success' : 'warn',
              message: res.message || '',
              updated: res.bound || res.updated || 0,
              skipped: res.skipped || 0,
              loaded,
              htmlPersisted: res.htmlPersisted,
              names: boundList.map(u => `${u.name} → ${u.dingTalkUserId || '未绑定'}`),
            };
            state.page = 'staff';
            const bound = res.bound || boundList.length || 0;
            if (bound === 0) {
              alert('同步完成，但没有人员被绑定 userid。\n\n' + (res.message || '') + '\n\n可能原因：钉钉姓名与本地不一致，或权限未拉取到成员列表。');
            } else {
              const list = boundList.map(u => `${u.name}: ${u.dingTalkUserId}`).join('\n');
              const htmlNote = res.htmlPersisted ? '\n\n已同步写入后端 JSON 与 HTML 文件。' : '\n\n已写入后端 JSON（HTML 写入失败，请检查文件占用）。';
              alert(`已绑定 ${bound} 人：\n${list}${htmlNote}`);
            }
          }
        } else {
          const msg = (res && res.message) || '同步失败，请检查钉钉权限与 AppSecret';
          alert(msg.length > 800 ? msg.slice(0, 800) + '…' : msg);
        }
      } catch (e) {
        alert('同步失败：' + (e.message || e));
      } finally {
        state.dingTalkSyncing = false;
        render();
      }
    }

    function getMemberTasks(memberName) {
      return tasks
        .filter(t => t.assignee === memberName && t.status !== 'archived' && t.status !== 'abolished')
        .sort((a, b) => {
          if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
          if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
          if (isOverdue(a) && !isOverdue(b)) return -1;
          if (isOverdue(b) && !isOverdue(a)) return 1;
          return new Date(a.dueDate || 0) - new Date(b.dueDate || 0);
        });
    }

    function canViewMemberKanban(member) {
      if (!member || currentUser.role === 'staff') return false;
      if (isFullAccess(currentUser.role)) return true;
      return member.dept === currentUser.dept;
    }

    function showMemberKanban(userId) {
      const member = users.find(u => u.id === userId);
      if (!canViewMemberKanban(member)) return;
      state.form = { memberUserId: userId };
      state.showModal = 'memberKanban';
      render();
    }

    function renderKanbanCard(task) {
      const displayStatus = getTaskDisplayStatus(task);
      const st = statusMap[displayStatus] || statusMap[task.status];
      const project = projects.find(p => p.id === task.projectId);
      const parent = task.parentId ? tasks.find(t => t.id === task.parentId) : null;
      const progress = task.parentId ? task.progress : calcProgress(task.id);
      return `
        <div class="kanban-card" onclick="viewTaskFromTeamKanban('${task.id}')" style="${isOverdue(task) ? 'border-color:#FECACA;background:#FFFBFB;' : ''}">
          <div class="kanban-card-header">
            <span class="priority-dot priority-${task.priority}"></span>
            <span class="kanban-card-title">${task.title}${renderDependencyBadges(task, true)}</span>
            ${task.type === 'temp' ? '<span class="tag tag-temp" style="font-size:10px;"><i class="fas fa-bolt"></i></span>' : ''}
          </div>
          <div class="kanban-card-meta" style="flex-wrap:wrap;">
            ${parent ? `<span style="color:#059669;"><i class="fas fa-level-up-alt" style="margin-right:4px;transform:rotate(90deg);"></i>${parent.title}</span>` : ''}
            <span><i class="fas fa-folder" style="margin-right:4px;"></i>${project ? project.name : '临时任务'}</span>
            <span style="${isOverdue(task) ? 'color:#DC2626;' : ''}"><i class="fas fa-calendar" style="margin-right:4px;"></i>${task.dueDate || '-'}</span>
          </div>
          ${task.status !== 'done' ? `
          <div style="margin-top:8px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-size:10px;color:#9CA3AF;">进度</span>
              <span style="font-size:10px;font-weight:500;">${progress}%</span>
            </div>
            <div class="progress-bar" style="height:4px;"><div class="progress-fill" style="width:${progress}%;"></div></div>
          </div>
          ` : ''}
          <div class="kanban-card-footer">
            <span class="status-tag status-${displayStatus}" style="font-size:10px;padding:2px 6px;">
              <i class="fas ${st.icon}"></i>${st.label}
            </span>
            <span style="font-size:10px;color:#9CA3AF;">${task.estimatedHours || 0}h</span>
          </div>
        </div>
      `;
    }

    function renderMemberKanbanModal() {
      const member = users.find(u => u.id === state.form.memberUserId);
      if (!member) return '';
      const memberTasks = getMemberTasks(member.name);
      const todoTasks = memberTasks.filter(t => t.status === 'todo');
      const doingTasks = memberTasks.filter(t => t.status === 'doing');
      const doneTasks = memberTasks.filter(t => t.status === 'done');
      const otherTasks = memberTasks.filter(t => !['todo', 'doing', 'done'].includes(t.status));
      const roleClass = roleBadgeClass(member.role);
      const roleName = roleDisplayName(member.role);
      const columns = [
        { key: 'todo', label: '待开始', tasks: todoTasks, color: '#6B7280', icon: 'fa-clock' },
        { key: 'doing', label: '进行中', tasks: doingTasks, color: '#2563EB', icon: 'fa-spinner' },
        { key: 'done', label: '已完成', tasks: doneTasks, color: '#059669', icon: 'fa-check-circle' },
        { key: 'other', label: '其他', tasks: otherTasks, color: '#D97706', icon: 'fa-ellipsis-h' },
      ];

      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:1100px;width:95vw;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                  <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;">${member.name.charAt(0)}</div>
                  <div>
                    <h3 class="modal-title" style="margin:0;">${member.name} · 任务看板</h3>
                    <div style="font-size:12px;color:#9CA3AF;margin-top:2px;">
                      ${member.dept} · ${member.position}
                      <span class="role-badge ${roleClass}" style="margin-left:6px;">${roleName}</span>
                    </div>
                  </div>
                </div>
              </div>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;" title="关闭"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
                <div style="padding:12px;background:#F9FAFB;border-radius:8px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;color:#1F2937;">${memberTasks.length}</div>
                  <div style="font-size:11px;color:#9CA3AF;">总任务</div>
                </div>
                <div style="padding:12px;background:#DBEAFE;border-radius:8px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;color:#2563EB;">${doingTasks.length}</div>
                  <div style="font-size:11px;color:#6B7280;">进行中</div>
                </div>
                <div style="padding:12px;background:#FEE2E2;border-radius:8px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;color:#DC2626;">${memberTasks.filter(t => isOverdue(t)).length}</div>
                  <div style="font-size:11px;color:#6B7280;">已逾期</div>
                </div>
                <div style="padding:12px;background:#D1FAE5;border-radius:8px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;color:#059669;">${memberTasks.length > 0 ? Math.round(doneTasks.length / memberTasks.length * 100) : 0}%</div>
                  <div style="font-size:11px;color:#6B7280;">完成率</div>
                </div>
              </div>
              ${memberTasks.length === 0 ? `
                <div style="text-align:center;padding:48px;color:#9CA3AF;">
                  <i class="fas fa-inbox" style="font-size:40px;margin-bottom:12px;opacity:0.4;display:block;"></i>
                  ${member.role !== 'staff' ? '该管理岗位暂无负责的任务' : '该成员暂无任务'}
                </div>
              ` : `
                <div class="kanban-board">
                  ${columns.map(col => `
                    <div class="kanban-column">
                      <div class="kanban-column-header">
                        <div class="kanban-column-title">
                          <i class="fas ${col.icon}" style="color:${col.color};"></i>${col.label}
                        </div>
                        <span class="kanban-column-count" style="background:${col.color};">${col.tasks.length}</span>
                      </div>
                      <div class="kanban-column-body">
                        ${col.tasks.map(t => renderKanbanCard(t)).join('')}
                        ${col.tasks.length === 0 ? '<div style="text-align:center;padding:24px 8px;color:#CBD5E1;font-size:11px;">暂无</div>' : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
                <p style="margin-top:12px;font-size:12px;color:#9CA3AF;text-align:center;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>点击任务卡片可查看详情（只读，管理岗任务亦可查看）</p>
              `}
            </div>
          </div>
        </div>
      `;
    }

    // ========== 团队管理 ==========
    function renderTeam() {
      const isTeamAdmin = isFullAccess(currentUser.role);
      const deptTabs = getDeptFilterTabs();
      const selectedDept = isTeamAdmin ? (state.teamDept || 'all') : currentUser.dept;
      let filteredMembers = getDeptScopeUsers();
      if (isTeamAdmin && selectedDept !== 'all') {
        filteredMembers = filteredMembers.filter(u => u.dept === selectedDept);
      }

      // 搜索过滤
      if (state.teamSearch) {
        const q = state.teamSearch.toLowerCase();
        filteredMembers = filteredMembers.filter(u =>
          u.name.toLowerCase().includes(q) ||
          u.position.toLowerCase().includes(q) ||
          u.dept.toLowerCase().includes(q)
        );
      }

      // 统计每个成员的任务情况（基于工时）
      const memberStats = sortTeamMembers(getFilteredTeamStats());
      const weekRange = memberStats[0]?.weekRange || getCurrentWeekRange();
      const teamSort = state.teamSort || 'saturation_desc';
      const teamSortOptions = [
        { key: 'saturation_desc', label: '当周饱和度从高到低' },
        { key: 'saturation_asc', label: '当周饱和度从低到高' },
        { key: 'weeklyHours_desc', label: '当周工时从高到低' },
        { key: 'weeklyHours_asc', label: '当周工时从低到高' },
        { key: 'name', label: '姓名 A-Z' },
      ];

      // 部门整体统计
      const allDeptTasks = tasks.filter(t => filteredMembers.some(u => u.name === t.assignee));
      const totalTasks = allDeptTasks.length;
      const totalDone = allDeptTasks.filter(t => t.status === 'done').length;
      const totalDoing = allDeptTasks.filter(t => t.status === 'doing').length;
      const totalTodo = allDeptTasks.filter(t => t.status === 'todo').length;
      const totalOverdue = allDeptTasks.filter(t => isOverdue(t)).length;

      // 任务类型分布
      const tempTasks = allDeptTasks.filter(t => t.type === 'temp').length;
      const normalTasks = allDeptTasks.filter(t => t.type === 'normal').length;

      return `
        <div>
          <!-- 部门筛选Tab和搜索 -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              ${deptTabs.map(tab => {
                const isActive = selectedDept === tab.id;
                return `
                  <button onclick="state.teamDept='${tab.id}';render()" style="padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid ${isActive ? '#7C3AED' : '#E5E7EB'};background:${isActive ? '#F5F3FF' : '#fff'};color:${isActive ? '#7C3AED' : '#6B7280'};cursor:pointer;transition:all 0.2s;">
                    ${tab.icon ? `<i class="fas ${tab.icon}" style="margin-right:4px;font-size:11px;"></i>` : ''}${tab.label}
                    <span style="margin-left:4px;background:${isActive ? '#7C3AED' : '#E5E7EB'};color:${isActive ? '#fff' : '#6B7280'};padding:2px 6px;border-radius:10px;font-size:10px;">${tab.count}</span>
                  </button>
                `;
              }).join('')}
              ${!isTeamAdmin ? `<span style="font-size:12px;color:#9CA3AF;margin-left:4px;">仅本部门数据</span>` : ''}
            </div>
            <div style="position:relative;">
              <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;"></i>
              <input class="input" style="width:240px;padding-left:36px;" placeholder="搜索成员姓名..." value="${state.teamSearch}" onchange="state.teamSearch=this.value;render()">
            </div>
          </div>

          <!-- 部门整体数据 -->
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px;">
            <div class="stat-card">
              <div class="stat-icon" style="background:#DBEAFE;color:#2563EB;"><i class="fas fa-tasks"></i></div>
              <div class="stat-value">${totalTasks}</div>
              <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#D1FAE5;color:#059669;"><i class="fas fa-check-circle"></i></div>
              <div class="stat-value">${totalDone}</div>
              <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#DBEAFE;color:#3B82F6;"><i class="fas fa-spinner"></i></div>
              <div class="stat-value">${totalDoing}</div>
              <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#F3F4F6;color:#6B7280;"><i class="fas fa-clock"></i></div>
              <div class="stat-value">${totalTodo}</div>
              <div class="stat-label">待开始</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#FEE2E2;color:#DC2626;"><i class="fas fa-exclamation-triangle"></i></div>
              <div class="stat-value">${totalOverdue}</div>
              <div class="stat-label">已逾期</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
            <!-- 任务类型分布 -->
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title"><i class="fas fa-chart-pie" style="color:#8B5CF6;"></i>任务类型分布</span>
              </div>
              <div class="panel-body">
                <div style="display:flex;gap:24px;">
                  <div style="flex:1;text-align:center;padding:20px;background:#DBEAFE;border-radius:12px;">
                    <div style="font-size:28px;font-weight:700;color:#2563EB;">${normalTasks}</div>
                    <div style="font-size:13px;color:#6B7280;margin-top:4px;">常规任务</div>
                    <div style="height:4px;background:#E5E7EB;border-radius:2px;margin-top:8px;">
                      <div style="height:100%;width:${totalTasks > 0 ? Math.round(normalTasks/totalTasks*100) : 0}%;background:#2563EB;border-radius:2px;"></div>
                    </div>
                  </div>
                  <div style="flex:1;text-align:center;padding:20px;background:#FEF3C7;border-radius:12px;">
                    <div style="font-size:28px;font-weight:700;color:#D97706;">${tempTasks}</div>
                    <div style="font-size:13px;color:#6B7280;margin-top:4px;">临时任务</div>
                    <div style="height:4px;background:#E5E7EB;border-radius:2px;margin-top:8px;">
                      <div style="height:100%;width:${totalTasks > 0 ? Math.round(tempTasks/totalTasks*100) : 0}%;background:#D97706;border-radius:2px;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 整体完成率 -->
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title"><i class="fas fa-chart-bar" style="color:#22C55E;"></i>任务完成情况</span>
              </div>
              <div class="panel-body">
                <div style="text-align:center;margin-bottom:20px;">
                  <div style="position:relative;width:120px;height:120px;margin:0 auto;">
                    <svg style="width:120px;height:120px;transform:rotate(-90deg);">
                      <circle cx="60" cy="60" r="50" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                      <circle cx="60" cy="60" r="50" fill="none" stroke="#22C55E" stroke-width="12"
                        stroke-dasharray="${2 * Math.PI * 50}" stroke-dashoffset="${2 * Math.PI * 50 * (1 - (totalTasks > 0 ? totalDone/totalTasks : 0))}"/>
                    </svg>
                    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;">
                      <span style="font-size:24px;font-weight:700;color:#1F2937;">${totalTasks > 0 ? Math.round(totalDone/totalTasks*100) : 0}%</span>
                      <span style="font-size:11px;color:#9CA3AF;">完成率</span>
                    </div>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                  <div style="padding:12px;background:#D1FAE5;border-radius:8px;text-align:center;">
                    <div style="font-size:20px;font-weight:600;color:#059669;">${totalDone}</div>
                    <div style="font-size:12px;color:#6B7280;">已完成</div>
                  </div>
                  <div style="padding:12px;background:#FEE2E2;border-radius:8px;text-align:center;">
                    <div style="font-size:20px;font-weight:600;color:#DC2626;">${totalTasks - totalDone}</div>
                    <div style="font-size:12px;color:#6B7280;">未完成</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 团队成员工作饱和度 -->
          <div class="panel" style="margin-bottom:24px;">
            <div class="panel-header" style="flex-wrap:wrap;gap:12px;">
              <span class="panel-title"><i class="fas fa-users" style="color:#D97706;"></i>团队成员工作饱和度 ${selectedDept === 'all' ? '(全部门)' : '(' + selectedDept + ')'}</span>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto;">
                <span style="font-size:12px;color:#9CA3AF;white-space:nowrap;"><i class="fas fa-sort-amount-down" style="margin-right:4px;"></i>排序</span>
                ${teamSortOptions.map(opt => `
                  <button type="button" onclick="setTeamSort('${opt.key}')" style="padding:6px 12px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid ${teamSort === opt.key ? '#7C3AED' : '#E5E7EB'};background:${teamSort === opt.key ? '#F5F3FF' : '#fff'};color:${teamSort === opt.key ? '#7C3AED' : '#6B7280'};cursor:pointer;white-space:nowrap;">
                    ${opt.label}
                  </button>
                `).join('')}
              </div>
            </div>
            <div style="padding:0 20px 12px;font-size:12px;color:#9CA3AF;border-bottom:1px solid #F3F4F6;">
              统计周期：${weekRange.start} ~ ${weekRange.end}（当周周一至周日）· 主责任务按计划在本周分摊 · 已批准辅助性协办按协助时段分摊 · 告知性协办不计工时
            </div>
            <div class="panel-body" style="padding:16px;">
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
                ${memberStats.map(m => {
                  let satColor = '#22C55E';
                  let satLabel = '空闲';
                  if (m.saturation >= 80) { satColor = '#DC2626'; satLabel = '饱和'; }
                  else if (m.saturation >= 50) { satColor = '#F59E0B'; satLabel = '适中'; }
                  else if (m.saturation >= 20) { satColor = '#3B82F6'; satLabel = '正常'; }

                  const roleClass = roleBadgeClass(m.role);
                  const roleName = roleDisplayName(m.role);

                  const isNonStaff = m.role !== 'staff';
                  return `
                    <div class="team-member-card" onclick="showMemberKanban('${m.id}')" title="点击查看${m.name}的任务看板" style="padding:16px;background:#F9FAFB;border-radius:12px;border:1px solid #E5E7EB;">
                      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;">${m.name.charAt(0)}</div>
                        <div style="flex:1;">
                          <div style="font-size:14px;font-weight:600;color:#1F2937;">${m.name}</div>
                          <div style="font-size:12px;color:#9CA3AF;">${m.dept}</div>
                          <span class="role-badge ${roleClass}" style="margin-top:4px;">${roleName}</span>
                        </div>
                        <span class="tag" style="background:${satColor}15;color:${satColor};">${satLabel}</span>
                      </div>

                      <div style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                          <span style="font-size:12px;color:#6B7280;">当周工时饱和度</span>
                          <span style="font-size:12px;font-weight:600;color:${satColor};">${m.saturation}%</span>
                        </div>
                        <div style="height:8px;background:#E5E7EB;border-radius:4px;">
                          <div style="height:100%;width:${m.saturation}%;background:${satColor};border-radius:4px;transition:width 0.3s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:#9CA3AF;">
                          <span>当周待处理：${m.weeklyHours}h${m.weeklyBreakdown?.assistHours > 0 ? `（主责 ${m.weeklyBreakdown.assigneeHours}h · 协办 ${m.weeklyBreakdown.assistHours}h）` : ''}${m.pendingBlockedHours > 0 ? ` · <span style="color:#D97706;">${m.pendingBlockedHours}h 因阻塞挂起</span>` : ''}</span>
                          <span>标准：${m.standardWeekHours}h/周</span>
                        </div>
                      </div>

                      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;">
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#1F2937;">${m.total}</div>
                          <div style="font-size:10px;color:#9CA3AF;">总任务</div>
                        </div>
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#2563EB;">${m.doing}</div>
                          <div style="font-size:10px;color:#9CA3AF;">进行中</div>
                        </div>
                        <div style="padding:6px 4px;background:#fff;border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:#059669;">${m.done}</div>
                          <div style="font-size:10px;color:#9CA3AF;">已完成</div>
                        </div>
                        <div style="padding:6px 4px;background:${m.overdue > 0 ? '#FEE2E2' : '#fff'};border-radius:6px;">
                          <div style="font-size:14px;font-weight:600;color:${m.overdue > 0 ? '#DC2626' : '#9CA3AF'};">${m.overdue}</div>
                          <div style="font-size:10px;color:#9CA3AF;">已逾期</div>
                        </div>
                      </div>

                      <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;">
                        <span style="color:#9CA3AF;">完成率</span>
                        <span style="font-weight:500;color:${m.completionRate >= 80 ? '#059669' : m.completionRate >= 50 ? '#D97706' : '#DC2626'};">${m.completionRate}%</span>
                      </div>
                      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #E5E7EB;text-align:center;font-size:12px;color:#7C3AED;">
                        <i class="fas fa-columns" style="margin-right:4px;"></i>${isNonStaff ? '查看管理岗任务看板' : '查看任务看板'}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== 任务依赖 UI ==========
    function renderDependencySchemeHint(compact) {
      return `
        <div style="padding:${compact ? '10px 12px' : '12px 14px'};background:linear-gradient(135deg,#EFF6FF,#F5F3FF);border:1px solid #BFDBFE;border-radius:8px;margin-bottom:${compact ? '10px' : '12px'};font-size:12px;color:#374151;line-height:1.65;">
          <div style="font-weight:600;color:#1D4ED8;margin-bottom:6px;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>跨项目依赖说明</div>
          <div>· <strong>前置依赖</strong>：需等待其他任务（可跨项目）完成后，本任务才可继续</div>
          <div>· <strong>阻塞期间</strong>：任务显示「阻塞中」，<strong>不计入</strong>工时饱和度，不算逾期/临期</div>

    function renderProjectDependencyPanel(projectId) {
      const rows = getProjectDependencyRows(projectId);

          <div class="panel-header" style="background:#F8FAFC;">

          </div>
          <div class="panel-body" style="padding:${rows.length ? '12px 12px 0' : '16px'};">
            ${renderDependencySchemeHint(false)}
            ${rows.length ? `
            <div class="log-table-wrap">
              <table class="log-table">
                <thead>
                  <tr>
                    <th>本任务</th>
                    <th>关系</th>
                    <th>关联任务</th>

                    <th>阻塞</th>
                    <th>挂起工时</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(({ dep, pred, succ, cross }) => {

                    const local = isOutgoing ? pred : succ;
                    const remote = isOutgoing ? succ : pred;
                    const blocked = isTaskBlocked(succ);
                    return `
                      <tr style="cursor:pointer;" onclick="viewTask('${local.id}')">
                        <td>${escapeHtml(local.title)}${renderDependencyBadges(local, true)}</td>

                        <td style="color:#2563EB;" onclick="event.stopPropagation();viewTask('${remote.id}')">${escapeHtml(remote.title)}</td>
                        <td>${escapeHtml(getTaskProjectLabel(remote))}</td>
                        <td>${renderDependencyStatusIcon(dep, isOutgoing ? 'succ' : 'pred')}</td>
                        <td>${blocked ? '<span style="color:#D97706;">是</span>' : '否'}</td>
                        <td>${!isOutgoing && isTaskBlocked(local) ? ((local.estimatedHours || 0) + 'h') : '-'}</td>

                </tbody>
              </table>
            </div>
            ` : `
              <div style="text-align:center;padding:24px 12px;color:#9CA3AF;font-size:13px;">
                <i class="fas fa-link" style="font-size:24px;margin-bottom:8px;opacity:0.4;display:block;"></i>
                暂无跨项目依赖。请在<strong>任务详情</strong>中点击「添加前置依赖」配置（可关联其他项目的任务）。
              </div>

    function renderTaskDependencyPanel(task) {
      if (!task || !canViewTask(task)) return '';
      const preds = getTaskPredecessorDeps(task.id);
      const succs = getTaskSuccessorDeps(task.id);
      const canManage = canManageTaskDependency(task);
      return `
        <div id="task-dep-panel" style="margin-bottom:16px;border:2px solid #BFDBFE;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(37,99,235,0.08);">
          <div style="padding:10px 12px;background:linear-gradient(90deg,#EFF6FF,#F8FAFC);border-bottom:1px solid #BFDBFE;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-size:13px;font-weight:600;color:#1D4ED8;"><i class="fas fa-link" style="margin-right:6px;"></i>依赖关系（跨项目）</span>
            ${canManage ? `<button class="btn btn-primary btn-sm" onclick="showAddDependencyModal('${task.id}')"><i class="fas fa-plus"></i> 添加前置依赖</button>` : ''}
          </div>
          <div style="padding:12px;">
            ${renderDependencySchemeHint(true)}
            <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;">前置依赖（需先完成）</div>
            ${preds.length ? preds.map(dep => {
              const pred = getDependencyTask(dep.predecessorTaskId);
              if (!pred) return '';
              return `
                <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F9FAFB;border-radius:8px;margin-bottom:6px;font-size:12px;">
                  <span style="min-width:72px;">${renderDependencyStatusIcon(dep, 'pred')}</span>
                  <span style="flex:1;">${isDependencyCrossProject(dep) ? '<span class="dep-badge dep-cross">🌐</span> ' : ''}${escapeHtml(getTaskProjectLabel(pred))} / <a href="javascript:void(0)" onclick="viewTask('${pred.id}')" style="color:#2563EB;text-decoration:none;">${escapeHtml(pred.title)}</a></span>
                  <span style="color:#6B7280;">${pred.assignee}</span>
                  <span style="color:#6B7280;">${normalizeDateStr(resolveTaskDueDate(pred)) || '-'}</span>
                  ${canManage ? `<button class="btn btn-ghost btn-sm" style="color:#DC2626;" onclick="removeTaskDependency('${dep.id}')" title="解除依赖"><i class="fas fa-unlink"></i></button>` : ''}
                </div>
              `;
            }).join('') : '<div style="font-size:12px;color:#9CA3AF;margin-bottom:8px;">暂无前置依赖</div>'}
            ${isTaskBlocked(task) ? '<div style="font-size:11px;color:#D97706;margin:8px 0;padding:8px;background:#FFFBEB;border-radius:6px;"><i class="fas fa-pause-circle" style="margin-right:4px;"></i>阻塞期间：本任务<strong>不计入</strong>工时饱和度</div>' : ''}
            ${succs.length ? `
              <div style="font-size:12px;font-weight:600;color:#374151;margin:12px 0 8px;">阻塞的后续任务</div>
              ${succs.map(dep => {
                const succ = getDependencyTask(dep.successorTaskId);
                if (!succ) return '';
                return `
                  <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#FAF5FF;border-radius:8px;margin-bottom:6px;font-size:12px;">
                    <span style="min-width:88px;">${renderDependencyStatusIcon(dep, 'succ')}</span>
                    <span style="flex:1;">${isDependencyCrossProject(dep) ? '<span class="dep-badge dep-cross">🌐</span> ' : ''}${escapeHtml(getTaskProjectLabel(succ))} / <a href="javascript:void(0)" onclick="viewTask('${succ.id}')" style="color:#7C3AED;text-decoration:none;">${escapeHtml(succ.title)}</a></span>
                    <span style="color:#6B7280;">${succ.assignee}</span>
                    <span style="color:#6B7280;">${normalizeDateStr(resolveTaskDueDate(succ)) || '-'}</span>
                  </div>
                `;
              }).join('')}
            ` : ''}
          </div>
        </div>
      `;
    }

    function getDependencyCandidateTasks(successorTaskId) {
      return tasks
        .filter(t => t.id !== successorTaskId && t.status !== 'abolished' && t.status !== 'archived')
        .filter(t => !wouldCreateDependencyCycle(t.id, successorTaskId))
        .sort((a, b) => getTaskProjectLabel(a).localeCompare(getTaskProjectLabel(b), 'zh-CN') || a.title.localeCompare(b.title, 'zh-CN'));
    }

    function showAddDependencyModal(successorTaskId) {
      const task = tasks.find(t => t.id === successorTaskId);
      if (!task || !canManageTaskDependency(task)) {
        alert('无权添加依赖');
        return;
      }
      state.form = {
        successorTaskId,
        predecessorTaskId: '',
        blockMode: DEP_BLOCK_HARD,
        note: '',
      };
      state.showModal = 'addDependency';
      render();
    }

    function renderAddDependencyModal() {
      const succ = tasks.find(t => t.id === state.form.successorTaskId);
      if (!succ) return '';
      const candidates = getDependencyCandidateTasks(succ.id);
      const grouped = {};
      candidates.forEach(t => {
        const label = getTaskProjectLabel(t);
        if (!grouped[label]) grouped[label] = [];
        grouped[label].push(t);
      });
      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:560px;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3 class="modal-title"><i class="fas fa-link" style="color:#2563EB;margin-right:8px;"></i>添加前置依赖</h3>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
              <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;margin-bottom:12px;font-size:12px;color:#1E40AF;">
                后继任务：<strong>${escapeHtml(succ.title)}</strong>（${escapeHtml(getTaskProjectLabel(succ))}）<br>
                前置任务完成后，后继任务才可继续（强阻塞时不可开始/完成）。
              </div>
              <div class="form-group">
                <label class="form-label">前置任务 <span class="form-required">*</span></label>
                <select class="select" style="width:100%;" onchange="state.form.predecessorTaskId=this.value">
                  <option value="">请选择前置任务</option>
                  ${Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'zh-CN')).map(projectName => `
                    <optgroup label="${escapeHtml(projectName)}">
                      ${grouped[projectName].map(t => `<option value="${t.id}" ${state.form.predecessorTaskId === t.id ? 'selected' : ''}>${escapeHtml(t.title)} · ${escapeHtml(t.assignee)} · ${statusMap[getTaskDisplayStatus(t)]?.label || t.status}</option>`).join('')}
                    </optgroup>
                  `).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">阻塞强度</label>
                <select class="select" style="width:100%;" onchange="state.form.blockMode=this.value">
                  <option value="${DEP_BLOCK_HARD}" ${state.form.blockMode !== DEP_BLOCK_SOFT ? 'selected' : ''}>强阻塞（不可开始/完成，不计饱和度）</option>
                  <option value="${DEP_BLOCK_SOFT}" ${state.form.blockMode === DEP_BLOCK_SOFT ? 'selected' : ''}>弱阻塞（仅提醒）</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">说明</label>
                <textarea class="textarea" style="width:100%;height:70px;" placeholder="为何需要此依赖？" onchange="state.form.note=this.value">${state.form.note || ''}</textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="state.showModal='taskDetail';state.form={taskId:'${succ.id}'};render()">取消</button>
              <button class="btn btn-primary" onclick="saveTaskDependency()"><i class="fas fa-save"></i>保存</button>
            </div>
          </div>
        </div>
      `;
    }

    function saveTaskDependency() {
      const successorTaskId = state.form.successorTaskId;
      const predecessorTaskId = state.form.predecessorTaskId;
      const succ = tasks.find(t => t.id === successorTaskId);
      const pred = tasks.find(t => t.id === predecessorTaskId);
      if (!succ || !canManageTaskDependency(succ)) {
        alert('无权操作');
        return;
      }
      if (!pred) {
        alert('请选择前置任务');
        return;
      }
      if (wouldCreateDependencyCycle(predecessorTaskId, successorTaskId)) {
        alert('不能形成循环依赖');
        return;
      }
      if (getActiveTaskDependencies().some(d => d.predecessorTaskId === predecessorTaskId && d.successorTaskId === successorTaskId)) {
        alert('该依赖已存在');
        return;
      }
      const dep = {
        id: genId('DEP'),
        predecessorTaskId,
        successorTaskId,
        type: DEP_TYPE_FS,
        blockMode: state.form.blockMode || DEP_BLOCK_HARD,
        note: state.form.note || '',
        status: DEP_STATUS_ACTIVE,
        createdBy: currentUser.name,
        createdAt: new Date().toISOString().slice(0, 10),
      };
      taskDependencies.push(dep);
      refreshTaskDependencySchedule(succ);
      appendChangeLogEntry({
        taskId: succ.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: '无此前置依赖',
        after: `依赖 ${getTaskProjectLabel(pred)}/${pred.title}`,
        reason: dep.note || '添加任务依赖',
        project: projects.find(p => p.id === succ.projectId)?.name || '临时任务',
      });
      notifyTaskDependencyAdded(dep, pred, succ);
      save();
      state.form = { taskId: succ.id };
      state.showModal = 'taskDetail';
      render();
    }

    function removeTaskDependency(depId) {
      const dep = taskDependencies.find(d => d.id === depId);
      if (!dep) return;
      const succ = getDependencyTask(dep.successorTaskId);
      if (!succ || !canManageTaskDependency(succ)) {
        alert('无权解除依赖');
        return;
      }
      if (!confirm('确定解除该依赖关系？')) return;
      const pred = getDependencyTask(dep.predecessorTaskId);
      taskDependencies = taskDependencies.filter(d => d.id !== depId);
      refreshTaskDependencySchedule(succ);
      appendChangeLogEntry({
        taskId: succ.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: pred ? `依赖 ${pred.title}` : depId,
        after: '已解除依赖',
        reason: '解除任务依赖',
        project: projects.find(p => p.id === succ.projectId)?.name || '临时任务',
      });
      save();
      state.form = { taskId: succ.id };
      state.showModal = 'taskDetail';
      render();
    }

    function onPredecessorTaskCompleted(completedTask) {
      getTaskSuccessorDeps(completedTask.id).forEach(dep => {
        const succ = getDependencyTask(dep.successorTaskId);
        if (!succ) return;
        const wasBlocked = isTaskBlocked(succ);
        refreshTaskDependencySchedule(succ);
        if (wasBlocked && !isTaskBlocked(succ)) {
          notifyTaskDependencyUnblocked(completedTask, succ, dep);
        }
      });
    }

    function notifyTaskDependencyAdded(dep, pred, succ) {
      const names = new Set([succ.assignee, pred.assignee]);
      const p1 = projects.find(p => p.id === pred.projectId);
      const p2 = projects.find(p => p.id === succ.projectId);
      if (p1?.manager) names.add(p1.manager);
      if (p2?.manager) names.add(p2.manager);
      NotificationService.send(PushEventType.TASK_DEPENDENCY_ADDED, {
        ...NotificationService.getTaskPayload(succ),
        predecessorTitle: pred.title,
        predecessorProject: getTaskProjectLabel(pred),
        recipientNames: [...names],
        operator: currentUser.name,
      });
    }

    function notifyTaskDependencyUnblocked(pred, succ, dep) {
      const names = new Set([succ.assignee]);
      const p2 = projects.find(p => p.id === succ.projectId);
      if (p2?.manager) names.add(p2.manager);
      NotificationService.send(PushEventType.TASK_DEPENDENCY_UNBLOCKED, {
        ...NotificationService.getTaskPayload(succ),
        predecessorTitle: pred.title,
        predecessorProject: getTaskProjectLabel(pred),
        recipientNames: [...names],
        operator: currentUser.name,
      });
    }

    // ========== 弹窗渲染 ==========
    function renderModal() {
      switch(state.showModal) {
        case 'taskDetail': return renderTaskDetailModal();
        case 'taskEdit': return renderTaskEditModal();

        case 'staffEdit': return renderStaffEditModal();
        case 'projectDetail': return renderProjectDetailModal();
        case 'projectCreate': return renderProjectCreateModal();
        case 'projectEdit': return renderProjectEditModal();
        case 'tempTask': return renderTempTaskModal();
        case 'reject': return renderRejectModal();
        case 'transfer': return renderTransferModal();
        case 'archive': return renderArchiveModal();

        case 'dingTalkSync': return renderDingTalkSyncModal();
        case 'wikiDocPicker': return renderWikiDocPickerModal();
        case 'systemUpdate': return renderSystemUpdateModal();
        default: return '';

            </div>
            <div class="modal-footer">
              <button class="btn btn-primary" onclick="dismissSystemUpdateModal()" style="width:100%;justify-content:center;">
                <i class="fas fa-check"></i>我知道了
              </button>
            </div>
          </div>
        </div>
      `;

    function renderTaskDetailModal() {

      const st = statusMap[displayStatus] || statusMap[task.status];
      const pr = priorityMap[task.priority];
      const project = projects.find(p => p.id === task.projectId);
      const parent = task.parentId ? tasks.find(t => t.id === task.parentId) : null;
      const children = tasks.filter(t => t.parentId === task.id);

        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">

                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">

              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;" title="关闭"><i class="fas fa-times"></i></button>

              ${parent ? `
