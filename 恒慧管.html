              <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;">
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">状态</div>
                  <span class="status-tag status-${displayStatus}"><i class="fas ${st.icon}"></i>${st.label}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">优先级</div>
                  <span class="priority-dot priority-${task.priority}" style="display:inline-block;margin-right:4px;"></span>
                  <span style="font-size:13px;font-weight:500;">${pr.label}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">主负责人</div>
                  <span style="font-size:13px;font-weight:500;">${task.assignee}</span>
                </div>
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">截止日期</div>
                  <span style="font-size:13px;font-weight:500;${isOverdue(task) ? 'color:#DC2626;' : isDueSoon(task) ? 'color:#D97706;' : ''}">${normalizeDateStr(resolveTaskDueDate(task)) || task.dueDate || '未设置'}${isOverdue(task) ? ' (延期' + getDaysOverdue(task) + '天)' : isDueSoon(task) ? ' (临期)' : ''}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>计划开始</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${task.planStartDate || '未设置'}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-calendar-check" style="margin-right:4px;"></i>计划截止</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${normalizeDateStr(resolveTaskDueDate(task)) || task.dueDate || '未设置'}</span>
                </div>
                <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;">
                  <div style="font-size:11px;color:#2563EB;margin-bottom:4px;"><i class="fas fa-clock" style="margin-right:4px;"></i>预计工时</div>
                  <span style="font-size:13px;font-weight:600;color:#2563EB;">${task.estimatedHours || 0} 小时</span>
                  ${taskDailyHours(task) ? `<span style="font-size:11px;color:#6B7280;margin-left:4px;">（每天 ${taskDailyHours(task)}h）</span>` : ''}
                </div>
                <div style="padding:10px 12px;background:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#FEF2F2' : '#F0FDF4'};border-radius:8px;">
                  <div style="font-size:11px;color:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#DC2626' : '#059669'};margin-bottom:4px;"><i class="fas fa-stopwatch" style="margin-right:4px;"></i>实际工时</div>
                  <span style="font-size:13px;font-weight:600;color:${(task.actualHours || 0) > (task.estimatedHours || 0) ? '#DC2626' : '#059669'};">${task.actualHours || 0} 小时</span>
                  ${task.estimatedHours ? `<span style="font-size:11px;color:#9CA3AF;margin-left:4px;">(${Math.round((task.actualHours || 0) / task.estimatedHours * 100)}%)</span>` : ''}
                </div>
                ${task.actualStartDate ? `
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;grid-column:span 2;">
                  <div style="display:flex;gap:16px;">
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">实际开始</div>
                      <span style="font-size:12px;font-weight:500;">${task.actualStartDate}</span>
                    </div>
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">实际结束</div>
                      <span style="font-size:12px;font-weight:500;">${task.actualEndDate || '进行中...'}</span>
                    </div>
                    <div>
                      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">耗时</div>
                      <span style="font-size:12px;font-weight:500;color:${task.actualEndDate ? (task.actualHours > task.estimatedHours ? '#DC2626' : '#059669') : '#2563EB'};">
                        ${task.actualEndDate ? task.actualHours + ' 小时' : calcActualHours(task.actualStartDate, null, task.dailyHours) + ' 小时 (进行中)'}
                      </span>
                    </div>
                  </div>
                </div>
                ` : ''}
                ${project ? `
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;grid-column:span 2;">
                  <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">所属项目</div>
                  <span style="font-size:13px;font-weight:500;">${project.name}</span>
                </div>
                ` : ''}
              </div>

              ${renderCollaboratorReviewBlock(task)}
              ${renderCollaboratorSummary(task)}

              <div style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                  <span style="font-size:13px;font-weight:500;">进度</span>
                  <span style="font-size:13px;font-weight:500;">${progress}%</span>
                </div>
                <div class="progress-bar" style="height:8px;"><div class="progress-fill" style="width:${progress}%;"></div></div>
              </div>

              ${canQuickUpdateProgress(task) ? `
              <div style="margin-bottom:16px;padding:12px;background:#F5F3FF;border-radius:8px;border:1px solid #EDE9FE;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <span style="font-size:12px;font-weight:500;color:#7C3AED;"><i class="fas fa-sliders-h" style="margin-right:4px;"></i>快捷更新进度</span>
                  <span style="font-size:13px;font-weight:600;color:#7C3AED;" id="quickProgressVal-${task.id}">${progress}%</span>
                </div>
                <input type="range" min="0" max="100" value="${progress}" style="width:100%;cursor:pointer;accent-color:#7C3AED;"
                  oninput="document.getElementById('quickProgressVal-${task.id}').textContent=this.value+'%'"
                  onchange="quickUpdateProgress('${task.id}', this.value)">
                <div style="font-size:11px;color:#9CA3AF;margin-top:6px;">拖动滑条即可更新，无需填写修改原因</div>
              </div>
              ` : ''}

              ${renderTaskDiscussion(task)}

              ${!canEdit && canViewTask(task) ? `
              <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;margin-bottom:12px;font-size:12px;color:#9CA3AF;">
                <i class="fas fa-eye" style="margin-right:4px;"></i>您正在查看他人任务，仅可浏览
              </div>
              ` : ''}

              ${children.length > 0 ? `
              <div style="border-top:1px solid #E5E7EB;padding-top:16px;">
                <div style="font-size:14px;font-weight:600;margin-bottom:12px;"><i class="fas fa-sitemap" style="color:#D97706;margin-right:6px;"></i>下级任务 (${children.length})</div>
                ${children.map(c => {
                  const cDisplayStatus = getTaskDisplayStatus(c);
                  const cSt = statusMap[cDisplayStatus] || statusMap[c.status];
                  return `
                    <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;margin-bottom:8px;cursor:pointer;" onclick="viewTask('${c.id}')">
                      <div style="display:flex;align-items:center;gap:8px;">
                        <span class="priority-dot priority-${c.priority}"></span>
                        <span style="font-size:13px;font-weight:500;flex:1;">${c.title}</span>
                        <span class="status-tag status-${cDisplayStatus}" style="font-size:10px;">${cSt.label}</span>
                      </div>
                      <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">${c.assignee} · ${c.dueDate}</div>
                    </div>
                  `;
                }).join('')}
              </div>
              ` : ''}

            </div>
            <div class="modal-footer">
              ${canAddSubTask ? `<button class="btn btn-ghost" onclick="showNewSubTaskModal('${task.id}')" style="color:#059669;"><i class="fas fa-sitemap"></i>添加子任务</button>` : ''}
              ${canReject ? `<button class="btn btn-ghost" style="color:#D97706;" onclick="showRejectModal('${task.id}')"><i class="fas fa-undo"></i>驳回</button>` : ''}
              <div style="flex:1;"></div>

              ${task.status === 'todo' && canOperateTask(task) && !hasActiveChildren(task.id) && !hasHardBlock(task) ? `
                <button class="btn btn-primary" onclick="updateTaskStatus('${task.id}', 'doing')"><i class="fas fa-play"></i>开始执行</button>
              ` : ''}

              ${task.status === 'doing' && canOperateTask(task) && !hasActiveChildren(task.id) && !hasHardBlock(task) ? `
                <button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'done')"><i class="fas fa-check"></i>标记完成</button>
              ` : ''}

              ${hasHardBlock(task) && canOperateTask(task) ? `
                <span style="font-size:12px;color:#D97706;"><i class="fas fa-pause-circle" style="margin-right:4px;"></i>等待前置任务完成</span>
              ` : ''}

              ${canOperateTask(task) && hasActiveChildren(task.id) ? `
                <span style="font-size:12px;color:#9CA3AF;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>有未完成的下级任务</span>
              ` : ''}

              ${canTransfer ? `<button class="btn btn-ghost" onclick="showTransferModal('${task.id}')"><i class="fas fa-exchange-alt"></i>转办</button>` : ''}
              ${canOperateTask(task) && task.status !== 'abolished' ? `<button class="btn btn-ghost" style="color:#DC2626;" onclick="abolishTask('${task.id}')"><i class="fas fa-ban"></i>作废</button>` : ''}
              ${canOperateTask(task) ? `<button class="btn btn-primary" onclick="editTask('${task.id}')"><i class="fas fa-edit"></i>编辑</button>` : ''}
              ${!canEdit ? `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ========== 其他弹窗简化实现 ==========
    function renderTaskEditModal() {
      const task = tasks.find(t => t.id === state.form.id) || state.form;
      const isEdit = !!state.form.id;
      const isSubTask = !isEdit && !!state.form.parentId;
      const parentTask = state.form.parentId ? tasks.find(t => t.id === state.form.parentId) : null;
      const breadcrumb = parentTask ? getTaskBreadcrumb(state.form.parentId) : [];
      const subTaskDepth = parentTask ? getTaskDepth(state.form.parentId) + 1 : 1;
      // 编辑时只有负责人可以操作
      const canEdit = !isEdit || canOperateTask(task);
      const assigneeName = task.assignee || state.form.assignee || currentUser.name;
      const informEntry = getCollaboratorEntry(task, COLLAB_TYPE_INFORM, null) || getCollaboratorEntries(task, { type: COLLAB_TYPE_INFORM })[0];
      const assistEntry = getCollaboratorEntry(task, COLLAB_TYPE_ASSIST, null) || getCollaboratorEntries(task, { type: COLLAB_TYPE_ASSIST, excludeRejected: true })[0]
        || getCollaboratorEntries(task, { type: COLLAB_TYPE_ASSIST })[0];
      const selectedInformCollaborator = state.form.informCollaborator ?? informEntry?.userName ?? '';
      const selectedAssistCollaborator = state.form.assistCollaborator ?? assistEntry?.userName ?? '';

      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3 class="modal-title">${isEdit ? '编辑任务' : (isSubTask ? '添加子任务' : '新建任务')}</h3>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
              ${isSubTask && parentTask ? `
              <div style="padding:10px 12px;background:#F0FDF4;border-radius:8px;margin-bottom:16px;font-size:12px;border:1px solid #BBF7D0;">
                <div style="color:#6B7280;margin-bottom:6px;"><i class="fas fa-layer-group" style="margin-right:4px;color:#059669;"></i>上级任务路径 · 新建为第 <strong>${subTaskDepth}</strong> 层（支持无限层级拆分）</div>
                <div style="color:#059669;line-height:1.8;font-weight:500;">
                  ${breadcrumb.map((t, i) => `${i > 0 ? '<span style="color:#CBD5E1;font-weight:400;"> › </span>' : ''}<span>${t.title}</span>`).join('')}
                </div>
              </div>
              ` : ''}
              <div class="form-group">
                <label class="form-label">任务标题 <span class="form-required">*</span></label>
                <input class="input" style="width:100%;" value="${task.title || ''}" onchange="state.form.title=this.value" placeholder="输入任务标题" ${!canEdit ? 'disabled' : ''}>
              </div>
              <div class="form-group">
                <label class="form-label">任务描述</label>
                <textarea class="textarea" style="width:100%;height:80px;" onchange="state.form.desc=this.value" placeholder="描述任务内容" ${!canEdit ? 'disabled' : ''}>${task.desc || ''}</textarea>
              </div>
              <div class="form-group">
                <label class="form-label">创建人</label>
                <input class="input" style="width:100%;background:#F3F4F6;" value="${isEdit ? task.creator : currentUser.name}" disabled>
                <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">创建人默认为当前用户，不可修改</div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">负责人</label>
                  <select class="select" style="width:100%;" onchange="state.form.assignee=this.value" ${!canEdit ? 'disabled' : ''}>
                    ${getTaskAssigneeCandidates().map(u => `<option value="${u.name}" ${task.assignee === u.name ? 'selected' : ''}>${formatUserOptionLabel(u)}</option>`).join('')}
                  </select>
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">可选本部门及信息中心人员</div>
                </div>
                <div class="form-group">
                  <label class="form-label">优先级</label>
                  <select class="select" style="width:100%;" onchange="state.form.priority=this.value" ${!canEdit ? 'disabled' : ''}>
                    <option value="normal" ${task.priority === 'normal' ? 'selected' : ''}>普通</option>
                    <option value="important" ${task.priority === 'important' ? 'selected' : ''}>重要</option>
                    <option value="urgent" ${task.priority === 'urgent' ? 'selected' : ''}>紧急</option>
                  </select>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">告知性协办人</label>
                  <select class="select" style="width:100%;" onchange="state.form.informCollaborator=this.value" ${!canEdit ? 'disabled' : ''}>
                    <option value="">无</option>
                    ${getTaskCollaboratorCandidates().filter(u => u.name !== assigneeName && u.name !== selectedAssistCollaborator).map(u => `<option value="${u.name}" ${selectedInformCollaborator === u.name ? 'selected' : ''}>${formatUserOptionLabel(u)}</option>`).join('')}
                  </select>
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">仅接收任务/项目进展通知，不计入工时</div>
                </div>
                <div class="form-group">
                  <label class="form-label">辅助性协办人</label>
                  <select class="select" style="width:100%;" onchange="state.form.assistCollaborator=this.value" ${!canEdit ? 'disabled' : ''}>
                    <option value="">无</option>
                    ${getTaskCollaboratorCandidates().filter(u => u.name !== assigneeName && u.name !== selectedInformCollaborator).map(u => `<option value="${u.name}" ${selectedAssistCollaborator === u.name ? 'selected' : ''}>${formatUserOptionLabel(u)}</option>`).join('')}
                  </select>
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">需协办人填写协助时段并经审批后计入工时</div>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">计划开始日期</label>
                  <input class="input" type="date" style="width:100%;" value="${task.planStartDate || ''}" onchange="state.form.planStartDate=this.value;updateEndDate()">
                </div>
                <div class="form-group">
                  <label class="form-label">预计工时（小时）</label>
                  <input class="input" type="number" min="0" step="1" style="width:100%;" value="${task.estimatedHours || ''}" onchange="state.form.estimatedHours=parseFloat(this.value)||0;updateEndDate();refreshChildHoursBudgetHint();refreshParentHoursBudgetHint();">
                  ${task.parentId ? `<div id="childHoursBudgetHint">${renderChildHoursBudgetHint(task.parentId, task.id || null, state.form.estimatedHours ?? task.estimatedHours)}</div>` : ''}
                  ${isEdit && !task.parentId && task.id ? renderParentHoursBudgetHint(task.id, state.form.estimatedHours ?? task.estimatedHours) : ''}
                  ${task.parentId ? (() => {
                    const internalAllocated = getChildrenInternalHours(task.parentId);
                    const externalAllocated = getChildrenExternalHours(task.parentId);
                    return `
                      <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">
                        <span style="color:#2563EB;">内部工时：${internalAllocated}h</span> | <span style="color:#D97706;">外部工时：${externalAllocated}h</span>
                      </div>
                    `;
                  })() : ''}
                </div>
                <div class="form-group">
                  <label class="form-label">每日投入工时（选填）</label>
                  <input class="input" type="number" min="0" step="0.5" style="width:100%;" value="${task.dailyHours || ''}" placeholder="留空=标准满日" onchange="state.form.dailyHours=this.value?parseFloat(this.value):null;updateEndDate()">
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">留空按标准 ${getWorkDayBounds().hoursPerDay} 小时/天推算截止日；填写后按每日投入推算（如带教每天 2h）</div>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">计划截止日期（自动计算）</label>
                  <input class="input" type="text" style="width:100%;background:#F3F4F6;" id="autoEndDate" value="${task.planStartDate && task.estimatedHours ? calcEndDate(task.planStartDate, task.estimatedHours, task.dailyHours) : ''}" readonly>
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">按工作日历推算（跳过节假日/非上班日，含单双休）</div>
                </div>
                <div class="form-group">
                  <label class="form-label">实际工时（按工作日历自动计算）</label>
                  <input class="input" type="text" style="width:100%;background:#F3F4F6;" value="${task.actualHours || 0} 小时" readonly>
                  <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">根据实际开始/结束日期自动计算</div>
                </div>
              </div>
              ${isEdit ? renderTaskDependencyPanel(tasks.find(t => t.id === state.form.id) || task) : `
              <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;margin-bottom:12px;font-size:12px;color:#2563EB;">
                <i class="fas fa-link" style="margin-right:4px;"></i>保存任务后，可在任务详情中配置<strong>跨项目前置依赖</strong>（前置完成后才可继续，阻塞期间不计饱和度）。
              </div>`}
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">进度 (%)</label>
                  <input class="input" type="number" min="0" max="100" style="width:100%;" value="${task.progress || 0}" onchange="state.form.progress=parseInt(this.value)">
                </div>
                <div class="form-group">
                  <label class="form-label">状态</label>
                  <select class="select" style="width:100%;" onchange="state.form.status=this.value">
                    <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>待开始</option>
                    <option value="doing" ${task.status === 'doing' ? 'selected' : ''}>进行中</option>
                    <option value="done" ${task.status === 'done' ? 'selected' : ''}>已完成</option>
                    <option value="paused" ${task.status === 'paused' ? 'selected' : ''}>已暂停</option>
                  </select>
                </div>
              </div>
              ${isEdit ? '<div class="form-group"><label class="form-label">修改原因 <span class="form-required">*</span></label><textarea class="textarea" style="width:100%;height:60px;" onchange="state.form.reason=this.value" placeholder="请填写修改原因（必填）"></textarea></div>' : ''}
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="cancelAndGoBack()">取消</button>
              <button class="btn btn-primary" onclick="saveTask()"><i class="fas fa-save"></i>保存</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderProjectDetailModal() { return renderTaskDetailModal(); }

    function renderProjectEditModal() {
      const project = projects.find(p => p.id === state.form.projectId) || state.form;
      const pst = projectStatusMap[project.status] || projectStatusMap.planning;

      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:560px;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3 class="modal-title"><i class="fas fa-edit" style="color:#D97706;margin-right:8px;"></i>编辑项目</h3>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">项目名称 <span style="color:#DC2626;">*</span></label>
                <input class="input" style="width:100%;" value="${project.name || ''}" onchange="state.form.name=this.value" placeholder="输入项目名称">
              </div>
              <div class="form-group">
                <label class="form-label">项目描述</label>
                <textarea class="textarea" style="width:100%;height:80px;" onchange="state.form.desc=this.value" placeholder="描述项目目标和范围">${project.desc || ''}</textarea>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                  <label class="form-label">所属部门</label>
                  <select class="select" style="width:100%;" onchange="state.form.dept=this.value">
                    ${departments.map(d => `<option value="${d}" ${project.dept === d ? 'selected' : ''}>${d}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">

    // 项目状态流转
    function updateProjectStatus(projectId, newStatus) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;
      if (!canManageProject(project)) {
        alert('仅项目负责人或创建人可变更状态');

      project.status = newStatus;

      // 记录日志
      appendChangeLogEntry({

        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || oldStatus,
        after: projectStatusMap[newStatus]?.label || newStatus,
        reason: '项目状态变更',
        project: project.name,
      });

      save();
      render();
    }

    // 项目归档
    function archiveProject(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;
      if (!canManageProject(project) && !isFullAccess(currentUser.role)) {
        alert('仅项目负责人或创建人可归档项目');
        return;
      }

      if (!confirm('确定归档该项目？归档后项目将移至归档列表。')) return;

      const oldStatus = project.status;
      project.status = 'archived';
      project.archived = true;

      // 记录日志
      appendChangeLogEntry({
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || oldStatus,
        after: '已归档',
        reason: '项目归档',
        project: project.name,
      });

      save();
      goTo('projects');
    }

    // 项目删除（仅总经理/管理员）
    async function deleteProject(projectId, evt) {
      if (evt) evt.stopPropagation();
      if (!canDeleteProject()) {
        alert('仅总经理/管理员可删除项目');
        return;
      }
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      const projectTasks = tasks.filter(t => t.projectId === projectId);
      const taskCount = projectTasks.length;
      const docCount = (project.documents || []).length;
      const attachCount = projectTasks.reduce((n, t) => n + (t.attachments || []).length, 0);
      const msg = [
        `确定永久删除项目「${project.name}」？`,
        '',
        `· 关联任务：${taskCount} 个`,
        `· 项目文档：${docCount} 个`,
        `· 任务附件：${attachCount} 个`,
        '',
        '此操作不可恢复。',
      ].join('\n');
      if (!confirm(msg)) return;

      const taskIds = new Set(projectTasks.map(t => t.id));
      const fileIds = new Set();
      (project.documents || []).forEach(d => {
        const key = d.fileId || d.id;
        if (key) fileIds.add(key);
      });
      projectTasks.forEach(t => {
        (t.attachments || []).forEach(a => {
          const key = a.fileId || a.id;
          if (key) fileIds.add(key);
        });
        (t.comments || []).forEach(c => {
          (c.attachments || []).forEach(a => { if (a.fileId) fileIds.add(a.fileId); });
        });
      });

      appendChangeLogEntry({
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: project.name,
        after: '已删除',
        reason: '管理员删除项目',
        project: project.name,
      });

      projects = projects.filter(p => p.id !== projectId);
      tasks = tasks.filter(t => t.projectId !== projectId);
      taskIds.forEach(id => removeDependenciesForTask(id));
      transferLogs = transferLogs.filter(l => !taskIds.has(l.taskId));

      persistLocalCache();
      DataService.cancelScheduledSave();

      if (ApiConfig.enabled && authSession.token) {
        const synced = await DataService.syncToServer({ skipUsers: !isFullAccess(currentUser.role) });
        if (!synced) {
          alert('删除已在本地生效，但同步服务端失败，请检查网络后重试或刷新页面');
        }
        if (fileIds.size) {
          const headers = AuthService.getAuthHeaders();
          fileIds.forEach(fileId => {
            fetch(ApiConfig.baseUrl + '/files/' + encodeURIComponent(fileId), {
              method: 'DELETE',
              headers,
            }).catch(() => {});
          });
        }
      }

      const nextPage = state.page === 'archive' ? 'archive' : 'projects';
      await goTo(nextPage, { skipReload: true });
    }

    // 更新任务状态，自动计算实际工时
    function updateTaskStatus(taskId, newStatus) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      if ((newStatus === 'doing' || newStatus === 'done') && hasHardBlock(task)) {
        alert(getHardBlockAlertMessage(task));
        return;
      }

      const oldStatus = task.status;
      const today = todayStr();

      // 状态从其他状态变为"进行中"，记录实际开始时间
      if (newStatus === 'doing' && oldStatus !== 'doing' && oldStatus !== 'done') {
        task.actualStartDate = today;
      }

      // 状态变为"已完成"，进度 100% 并记录实际结束时间
      if (newStatus === 'done' && oldStatus !== 'done') {
        applyTaskDoneFields(task);
      }

      // 更新状态
      task.status = newStatus;

      // 记录日志
      appendChangeLogEntry({
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: statusMap[oldStatus]?.label || oldStatus,
        after: statusMap[newStatus]?.label || newStatus,
        reason: '状态变更',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      // 更新上级任务进度
      if (task.parentId) {
        updateParentProgress(task.parentId);
      }

      if (newStatus === 'done') {
        notifyTaskCompleted(task);
        onPredecessorTaskCompleted(task);
      }

      save();

      const returnToMember = state.returnToMemberId;
      if (returnToMember) {
        state.returnToMemberId = null;
        state.form = { memberUserId: returnToMember };
        state.showModal = 'memberKanban';
        state.prevProjectId = null;
        render();
        return;
      }

      // 关闭弹窗，刷新页面
      state.showModal = null;
      state.form = state.prevProjectId ? { projectId: state.prevProjectId } : {};
      state.prevProjectId = null;
      render();
    }

    function quickUpdateProgress(taskId, progress) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !canQuickUpdateProgress(task)) return;

      const newProgress = Math.max(0, Math.min(100, parseInt(progress, 10) || 0));
      const oldProgress = task.progress || 0;
      if (newProgress === oldProgress) return;

      task.progress = newProgress;
      if (newProgress === 100 && task.status !== 'done') {
        if (hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          task.progress = oldProgress;
          render();
          return;
        }
        applyTaskDoneFields(task);
        task.status = 'done';
        onPredecessorTaskCompleted(task);
      } else if (newProgress > 0 && task.status === 'todo') {
        if (hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          task.progress = oldProgress;
          render();
          return;
        }
        task.actualStartDate = task.actualStartDate || todayStr();
        task.status = 'doing';
      }

      appendChangeLogEntry({
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: oldProgress + '%',
        after: newProgress + '%',
        reason: '快捷更新进度',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      if (task.parentId) updateParentProgress(task.parentId);
      save();
      state.showModal = 'taskDetail';
      state.form = { taskId };
      render();
    }

    // 递归更新上级任务进度（按子任务进度比例平均）
    function updateParentProgress(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      const activeChildren = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      if (activeChildren.length > 0) {
        task.progress = calcProgress(taskId);

        const allChildrenDone = activeChildren.every(c => c.status === 'done');
        if (allChildrenDone && task.progress === 100 && task.status !== 'done' && task.status !== 'archived' && task.status !== 'abolished') {
          applyTaskDoneFields(task);
          task.status = 'done';
          notifyTaskCompleted(task);
        }

        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      } else {
        const hadChildren = tasks.some(t => t.parentId === taskId);
        if (hadChildren) task.progress = 0;
        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      }
    }

    function saveTask() {
      if (!state.form.title) { alert('请输入任务标题'); return; }
      state.form.dailyHours = resolveDailyHours(state.form.dailyHours);

      // 编辑上级任务：预计工时不得低于子任务已分配合计
      if (state.form.id && !state.form.parentId) {
        const allocated = getChildrenAllocatedHours(state.form.id);
        const proposedParent = Number(state.form.estimatedHours) || 0;
        if (allocated > 0 && proposedParent < allocated) {
          alert(`上级任务预计工时不能低于子任务已分配合计！\n\n子任务已分配：${allocated}小时\n当前填写：${proposedParent}小时\n\n请将预计工时调整为至少 ${allocated} 小时。`);
          return;
        }
      }

      // 校验子任务工时是否超过上级
      if (state.form.parentId && state.form.estimatedHours) {
        const budget = getChildHoursBudgetInfo(state.form.parentId, state.form.id || null, state.form.estimatedHours);
        if (budget && budget.overflow > 0) {
          const { parentTask, parentHours, otherChildrenHours, proposed, totalAllocated, minParentHours } = budget;
          alert(
            `子任务工时不能超过上级任务！\n\n` +
            `上级任务「${parentTask.title}」工时：${parentHours}小时\n` +
            `其他子任务已分配：${otherChildrenHours}小时\n` +
            `本任务拟填写：${proposed}小时\n` +
            `合计需：${totalAllocated}小时，超出 ${budget.overflow} 小时\n\n` +
            `建议：请编辑上级任务「${parentTask.title}」，将预计工时调整为至少 ${minParentHours} 小时后再保存本任务。\n` +
            `或将本任务预计工时调整为不超过 ${Math.max(0, parentHours - otherChildrenHours)} 小时。`
          );
          return;
        }
      }

      const task = tasks.find(t => t.id === state.form.id);
      if (task) {
        if (!canEditTask(task)) {
          alert('您没有编辑该任务的权限');
          return;
        }
        // 编辑已有任务，必须填写修改原因
        if (!state.form.reason) { alert('请填写修改原因'); return; }
        const oldAssignee = task.assignee;
        const oldStatus = task.status;
        if ((state.form.status === 'doing' || state.form.status === 'done') && state.form.status !== oldStatus && hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          return;
        }
        appendChangeLogEntry({
          taskId: task.id,
          operator: currentUser.name,
          operateTime: new Date().toLocaleString(),
          before: JSON.stringify({ title: task.title, status: task.status, progress: task.progress }),
          after: JSON.stringify({ title: state.form.title, status: state.form.status, progress: state.form.progress }),
          reason: state.form.reason,
          project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
        });
        Object.assign(task, state.form);
        delete task.informCollaborator;
        delete task.assistCollaborator;
        syncTaskScheduleFields(task);
        try {
          upsertCollaboratorEntry(task, COLLAB_TYPE_INFORM, state.form.informCollaborator || '', { notify: false });
          upsertCollaboratorEntry(task, COLLAB_TYPE_ASSIST, state.form.assistCollaborator || '');
        } catch (e) {
          alert(e.message);
          return;
        }
        if (state.form.status === 'done' && oldStatus !== 'done') {
          applyTaskDoneFields(task);
          notifyTaskCompleted(task);
          onPredecessorTaskCompleted(task);
        } else if (task.status === 'done') {
          task.progress = 100;
        }
        if (state.form.assignee && state.form.assignee !== oldAssignee) {
          notifyTaskAssigned(task);
        }
        if (task.parentId) updateParentProgress(task.parentId);
      } else {
        const parentTask = state.form.parentId ? tasks.find(t => t.id === state.form.parentId) : null;
        if (parentTask && !canCreateSubTask(parentTask)) {
          alert('无权在该任务下添加子任务');
          return;
        }
        if (!parentTask && state.form.projectId) {
          const project = projects.find(p => p.id === state.form.projectId);
          if (!project || !canManageProject(project)) {
            alert('仅项目负责人或创建人可添加任务');
            return;
          }
        }
        // 新建任务，不需要修改原因
        const newTask = syncTaskScheduleFields({
          ...state.form,
          id: genId('T'),
          projectId: state.form.projectId || '',
          parentId: state.form.parentId || null,
          assignee: state.form.assignee || currentUser.name,
          collaboratorEntries: [],
          creator: currentUser.name,
          createdAt: new Date().toISOString().split('T')[0],
          estimatedHours: state.form.estimatedHours || 0,
          actualHours: 0,
          planStartDate: state.form.planStartDate || null,
          actualStartDate: null,
          actualEndDate: null,
          attachments: [],
        });
        tasks.push(newTask);
        try {
          upsertCollaboratorEntry(newTask, COLLAB_TYPE_INFORM, state.form.informCollaborator || '', { notify: false });
          upsertCollaboratorEntry(newTask, COLLAB_TYPE_ASSIST, state.form.assistCollaborator || '');
        } catch (e) {
          tasks.pop();
          alert(e.message);
          return;
        }
        notifyTaskAssigned(newTask);
        if (newTask.parentId) updateParentProgress(newTask.parentId);
        const returnTo = state.returnToTaskId;
        save();
        if (returnTo) {
          state.returnToTaskId = null;
          state.form = { taskId: returnTo };
          state.showModal = 'taskDetail';
          render();
          return;
        }
      }
      save();
      closeModal();
    }

    // ========== 数据导入 ==========
    const IMPORT_HEADER_MAP = {
      '项目名称': 'projectName', 'projectName': 'projectName', '项目': 'projectName',

    function normalizeImportRow(raw) {
      const row = {};
      Object.keys(raw).forEach(key => {
        const k = key.trim().replace(/^\uFEFF/, '');
        const mapped = IMPORT_HEADER_MAP[k] || k;
        row[mapped] = String(raw[key] || '').trim();
      });
      if (row.projectName && !row.name) row.name = row.projectName;
      if (row.taskTitle && !row.title) row.title = row.taskTitle;
      if (row.taskDesc && !row.desc) row.desc = row.taskDesc;
      if (row.projectDesc && !row.desc) row.desc = row.projectDesc;
      row.startDate = normalizeImportDate(row.startDate);
      row.endDate = normalizeImportDate(row.endDate);
      row.planStartDate = normalizeImportDate(row.planStartDate);
      row.dueDate = normalizeImportDate(row.dueDate);
      return row;
    }

    function normalizeImportDate(val) {
      if (val === null || val === undefined || val === '') return '';
      const s = String(val).trim();
      if (!s) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const slash = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if (slash) {
        return `${slash[1]}-${String(slash[2]).padStart(2, '0')}-${String(slash[3]).padStart(2, '0')}`;
      }
      const parsed = parseLocalDate(s);
      return parsed ? formatLocalDate(parsed) : s.slice(0, 10);
    }

    function parseImportCollaborators(raw, assignee) {
      if (!raw) return [];
      return String(raw).split(/[,，;；、|/\\]+/).map(s => s.trim()).filter(Boolean);
    }

    function applyImportCollaborators(task, raw, assignee) {
      const names = sanitizeTaskCollaborators(assignee, parseImportCollaborators(raw, assignee));
      ensureCollaboratorEntries(task);
      task.collaboratorEntries = (task.collaboratorEntries || []).filter(e => e.type !== COLLAB_TYPE_INFORM);
      names.forEach(name => {
        task.collaboratorEntries.push({
          id: genId('COL'),
          userName: name,
          type: COLLAB_TYPE_INFORM,
          status: COLLAB_STATUS_ACTIVE,
        });
      });
      syncCollaboratorsArray(task);
      return names;
    }

    function finalizeImportedTask(task, row) {
      task.priority = normalizePriority(row.priority || task.priority || 'normal');
      task.type = normalizeTaskType(row.taskType || task.type);
      task.estimatedHours = parseFloat(row.estimatedHours) || task.estimatedHours || 0;
      task.dailyHours = resolveDailyHours(row.dailyHours) ?? task.dailyHours ?? null;
      task.planStartDate = row.planStartDate || task.planStartDate || null;
      task.dueDate = row.dueDate || task.dueDate || '';
      applyImportCollaborators(task, row.collaboratorsRaw, task.assignee);
      if (task.planStartDate && task.estimatedHours > 0) {
        syncTaskScheduleFields(task);
      } else if (task.dueDate && !task.planStartDate) {
        task.planStartDate = task.dueDate;
      }
      return task;
    }

    function detectImportType(rows) {
      if (!rows.length) return 'unified';
      const keys = Object.keys(rows[0]).map(k => k.trim());
      const hasTaskLevels = keys.some(k => ['一级任务', '二级任务', '三级任务', '四级任务', 'level1', 'level2', 'level3', 'level4', '主任务'].includes(k));
      if (hasTaskLevels) return 'unified';
      if (keys.some(k => ['title', 'taskTitle', '任务标题', '任务名称'].includes(k))) return 'task';
      if (keys.some(k => ['name', 'projectName', '项目名称'].includes(k)) && keys.some(k => ['dept', '所属部门', '部门'].includes(k))) return 'project';
      return 'unified';
    }

    function normalizePriority(p) {
      const map = { '紧急': 'urgent', urgent: 'urgent', '高': 'urgent', '重要': 'important', important: 'important', '中': 'important', '普通': 'normal', normal: 'normal', '低': 'normal' };
      return map[p] || 'normal';
    }

    function normalizeTaskType(t) {
      if (!t) return 'normal';
      return (t === '临时' || t === 'temp') ? 'temp' : 'normal';
    }

    function getUnifiedTaskLevels(row) {
      const levels = [row.level1, row.level2, row.level3, row.level4].filter(Boolean);
      if (row.taskTitle) {
        if (levels.length === 0) return [row.taskTitle];
        if (levels[levels.length - 1] !== row.taskTitle) levels.push(row.taskTitle);
      }
      return levels;
    }

    function validateUnifiedRow(row, projectCache) {
      const levels = getUnifiedTaskLevels(row);
      if (!row.projectName) return { valid: false, reason: '缺少项目名称' };
      if (levels.length === 0) return { valid: false, reason: '缺少任务层级' };
      if (!row.assignee) return { valid: false, reason: '缺少负责人' };
      const existing = projectCache[row.projectName] || projects.find(p => p.name === row.projectName);
      if (!existing && (!row.dept || !row.manager)) return { valid: false, reason: '新项目需填部门和负责人' };
      return { valid: true, levels };
    }

    function getOrCreateProject(row, cache) {
      if (cache[row.projectName]) return cache[row.projectName];
      let project = projects.find(p => p.name === row.projectName);
      if (!project) {
        project = {
          id: genId('PRJ'),
          name: row.projectName,
          desc: row.projectDesc || '',
          dept: row.dept,
          manager: row.manager,
          status: 'active',
          startDate: row.startDate || new Date().toISOString().split('T')[0],
          endDate: row.endDate || '',
          archived: false,
          creator: currentUser.name,
          createdAt: new Date().toISOString().split('T')[0],
        };
        projects.push(project);
      }
      cache[row.projectName] = project;
      return project;
    }

    function findTaskByParent(projectId, parentId, title) {
      return tasks.find(t => t.projectId === projectId && t.parentId === parentId && t.title === title);
    }

    function ensureTaskPath(projectId, levels, taskMap, row) {
      let parentId = null;
      for (let i = 0; i < levels.length; i++) {
        const pathKey = projectId + '::' + levels.slice(0, i + 1).join(' / ');
        if (taskMap[pathKey]) {
          parentId = taskMap[pathKey];
          continue;
        }
        const existing = findTaskByParent(projectId, parentId, levels[i]);
        if (existing) {
          taskMap[pathKey] = existing.id;
          parentId = existing.id;
          continue;
        }
        const isLast = i === levels.length - 1;
        const assignee = isLast ? row.assignee : (row.assignee || row.manager || currentUser.name);
        const task = {
          id: genId('T'),
          projectId,
          parentId,
          title: levels[i],
          desc: isLast ? (row.taskDesc || row.desc || '') : '',
          assignee,
          collaboratorEntries: [],
          creator: currentUser.name,
          status: 'todo',
          priority: 'normal',
          type: 'normal',
          dueDate: '',
          progress: 0,
          estimatedHours: 0,
          actualHours: 0,
          planStartDate: null,
          actualStartDate: null,
          actualEndDate: null,
          createdAt: new Date().toISOString().split('T')[0],
        };
        if (isLast) finalizeImportedTask(task, row);
        tasks.push(task);
        taskMap[pathKey] = task.id;
        parentId = task.id;
      }
    }

            ${data.map((row, index) => {
              const projectRef = row.projectId || row.projectName;
              const projectOk = projectRef && projects.some(p => p.id === projectRef || p.name === projectRef);
              const isValid = (row.title || row.taskTitle) && projectRef && row.assignee && projectOk;
              return `
                <tr style="border-bottom:1px solid #F3F4F6;${!isValid ? 'background:#FEF2F2;' : ''}">
                  <td style="padding:12px 16px;font-size:13px;">${row.title || row.taskTitle || '<span style="color:#DC2626;">必填</span>'}</td>
                  <td style="padding:12px 16px;font-size:13px;">${projectRef || '<span style="color:#DC2626;">必填</span>'}${projectRef && !projectOk ? ' <span style="color:#DC2626;font-size:11px;">(不存在)</span>' : ''}</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.parentId || '主任务'}</td>
                  <td style="padding:12px 16px;font-size:13px;">${row.assignee || '<span style="color:#DC2626;">必填</span>'}</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.collaboratorsRaw || '-'}</td>
                  <td style="padding:12px 16px;font-size:13px;">${row.priority || '普通'}</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.estimatedHours || '-'}h</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.planStartDate || '-'}</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.dueDate || '自动推算'}</td>
                  <td style="padding:12px 16px;font-size:13px;color:#6B7280;">${row.taskType || '常规'}</td>
                  <td style="padding:12px 16px;text-align:center;">
                    <span style="color:${isValid ? '#059669' : '#DC2626'};">${isValid ? '✓ 有效' : '✗ 无效'}</span>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    // 处理文件上传
    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseCSV(e.target.result).map(normalizeImportRow));
          } catch (error) {
            alert('CSV 解析失败：' + error.message);
          }
        };
        reader.readAsText(file, 'UTF-8');
      } else if (ext === 'xlsx' || ext === 'xls') {
        if (typeof XLSX === 'undefined') {
          alert('Excel 解析库未加载，请检查网络连接后刷新页面重试');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseExcel(e.target.result));
          } catch (error) {
            alert('Excel 解析失败：' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert('不支持的文件格式，请上传 .xlsx、.xls 或 .csv 文件');
      }
    }

    function processImportRows(rows) {
      const data = rows.filter(row => Object.values(row).some(v => String(v || '').trim()));
      if (!data.length) {
        alert('文件中没有有效数据，请检查表头和内容行');
        return;
      }
      state.importData = data;
      state.importType = detectImportType(data);
      state.importStatus = 'preview';
      state.importResult = null;
      render();
    }

    // 解析 Excel
    function parseExcel(arrayBuffer) {
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      return json.map(row => {
        const raw = {};
        Object.keys(row).forEach(k => {
          raw[k.trim().replace(/^\uFEFF/, '')] = String(row[k] ?? '').trim();
        });
        return normalizeImportRow(raw);
      });
    }

    // 解析CSV
    function parseCSV(text) {
      const lines = text.split('\n').filter(line => line.trim());
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      const data = [];

      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.trim());
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || '';
        });
        data.push(row);
      }

      return data;
    }

    // 执行导入
    function executeImport() {
      const importType = state.importType || 'unified';

      if (importType === 'unified') {
        const validData = state.importData.filter(row => validateUnifiedRow(row, {}).valid);
        if (validData.length === 0) {
          alert('没有有效的数据可导入，请检查项目名称、任务层级和负责人是否填写完整');
          return;
        }
        const projectNames = [...new Set(validData.map(r => r.projectName))];
        if (!confirm(`确定一键导入？\n\n• ${validData.length} 条任务\n• ${projectNames.length} 个项目\n\n系统将自动创建项目并建立任务层级。`)) return;

        const projectsBefore = projects.length;
        const tasksBefore = tasks.length;
        const projectCache = {};
        const taskMap = {};
        let successCount = 0;
        let failCount = 0;

        validData.forEach(row => {
          try {
            const v = validateUnifiedRow(row, projectCache);
            if (!v.valid) { failCount++; return; }
            const project = getOrCreateProject(row, projectCache);
            ensureTaskPath(project.id, v.levels, taskMap, row);
            successCount++;
          } catch (e) {
            failCount++;
          }
        });

        const projectCreated = projects.length - projectsBefore;
        const taskCreated = tasks.length - tasksBefore;

        save();
        state.importResult = {
          success: failCount === 0,
          message: `导入完成！成功 ${successCount} 条任务，新建 ${projectCreated} 个项目、${taskCreated} 个任务节点${failCount > 0 ? '，失败 ' + failCount + ' 条' : ''}`
        };
        state.importData = [];
        state.importStatus = 'done';
        render();
        return;
      }

      const validData = state.importData.filter(row => {
        if (importType === 'project') {
          return (row.name || row.projectName) && row.dept && (row.manager || row.assignee);
        } else {
          const projectRef = row.projectId || row.projectName;
          return (row.title || row.taskTitle) && projectRef && row.assignee
            && projects.some(p => p.id === projectRef || p.name === projectRef);
        }
      });

      if (validData.length === 0) {
        alert('没有有效的数据可导入');
        return;
      }

      if (!confirm(`确定导入 ${validData.length} 条数据？`)) return;

      let successCount = 0;
      let failCount = 0;

      if (importType === 'project') {
        validData.forEach(row => {
          try {
            // 检查项目是否已存在
            const existing = projects.find(p => p.name === (row.name || row.projectName));
            if (existing) {
              failCount++;
              return;
            }

            projects.push({
              id: genId('PRJ'),
              name: row.name || row.projectName,
              desc: row.desc || row.projectDesc || '',
              dept: row.dept,
              manager: row.manager || row.assignee,
              status: 'active',
              startDate: row.startDate || new Date().toISOString().split('T')[0],
              endDate: row.endDate || '',
              archived: false,
              creator: currentUser.name,
              createdAt: new Date().toISOString().split('T')[0],
            });
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      } else {
        // 任务导入需要先生成项目ID映射
        const projectIdMap = {};
        validData.forEach(row => {
          const ref = row.projectId || row.projectName;
          if (ref && !projectIdMap[ref]) {
            const existingProject = projects.find(p => p.id === ref || p.name === ref);
            if (existingProject) projectIdMap[ref] = existingProject.id;
          }
        });

        validData.forEach(row => {
          try {
            const ref = row.projectId || row.projectName;
            const projectId = projectIdMap[ref];
            const project = projects.find(p => p.id === projectId);
            if (!project) {
              failCount++;
              return;
            }

            // 查找上级任务
            let parentId = null;
            if (row.parentId) {
              const parentTask = tasks.find(t =>
                (t.id === row.parentId || t.title === row.parentId) && t.projectId === projectId
              );
              parentId = parentTask ? parentTask.id : null;
            }

            const task = {
              id: genId('T'),
              type: 'normal',
              projectId,
              parentId,
              title: row.title || row.taskTitle,
              desc: row.desc || row.taskDesc || '',
              assignee: row.assignee,
              collaborators: [],
              creator: currentUser.name,
              status: 'todo',
              priority: 'normal',
              dueDate: '',
              progress: 0,
              estimatedHours: 0,
              actualHours: 0,
              planStartDate: null,
              actualStartDate: null,
              actualEndDate: null,
              createdAt: new Date().toISOString().split('T')[0],
            };
            finalizeImportedTask(task, row);
            tasks.push(task);
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      }

      save();

      state.importResult = {
        success: failCount === 0,
        message: `导入完成！成功 ${successCount} 条，失败 ${failCount} 条`
      };
      state.importData = [];
      state.importStatus = 'done';
      render();
    }

          ['功能测试验证', '测试验证', '项目管理系统1.0版本上线', '主方案自研系统开发', '王元斌', '章志红', '重要', '16', '2026-07-01', '', '常规'],

    function downloadTemplate() {
      const importType = state.importType || 'unified';
      const tpl = getTemplateData(importType);

      if (typeof XLSX !== 'undefined') {
        const ws = XLSX.utils.aoa_to_sheet([tpl.headers, ...tpl.rows]);
        ws['!cols'] = tpl.headers.map(() => ({ wch: 16 }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '导入模板');
        XLSX.writeFile(wb, `${tpl.filename}.xlsx`);
        return;
      }

      const csvContent = [tpl.headers.join(','), ...tpl.rows.map(r => r.join(','))].join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${tpl.filename}.csv`;
      link.click();
    }

    const SystemUpdateService = {
      async loadAll() {
        if (!ApiConfig.enabled || !authSession.token) return [];
        try {
          const res = await fetch(ApiConfig.baseUrl + '/system-updates', {
            headers: AuthService.getAuthHeaders(),
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          if (!data.success) return [];
          state.systemUpdatesList = data.updates || [];
          return state.systemUpdatesList;
        } catch (e) {
          console.warn('[更新] 加载记录失败', e);
          return [];
        }
      },

      async checkPending() {
        if (!ApiConfig.enabled || !authSession.token) return;
        try {
          const res = await fetch(ApiConfig.baseUrl + '/system-updates/pending', {
            headers: AuthService.getAuthHeaders(),
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          if (!data.success || data.initialized || !data.pending?.length) return;
          state.pendingSystemUpdates = data.pending;
          state.showModal = 'systemUpdate';
        } catch (e) {
          console.warn('[更新] 检查待展示更新失败', e);
        }
      },

      async markRead(version) {
        if (!ApiConfig.enabled || !authSession.token) return false;
        try {
          const res = await fetch(ApiConfig.baseUrl + '/system-updates/mark-read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
            body: JSON.stringify({ version: version || null }),
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          return !!data.success;
        } catch (e) {
          console.warn('[更新] 标记已读失败', e);
          return false;
        }
      },
    };

    // 初始化：本地/服务端数据、钉钉登录、扫描推送、渲染页面
    async function bootstrapApp() {
      load();
      await loadPublicConfig();
      if (ApiConfig.enabled && !authSession.token && AuthService.isDemoMode()) {
        await AuthService.loginDemo(currentUser.id);
      }
      await AuthService.init();
      if (ApiConfig.enabled && !authSession.token && AuthService.isDingTalkMode() && !AuthService.isDingTalkClient()) {
        state.authError = '请通过钉钉工作台打开，或使用带 userid 的链接登录';
      }
      if (ApiConfig.enabled && authSession.token) {
        await DataService.loadFromServer();
        tryRecoverFromLocalStorage();
        await SystemUpdateService.checkPending();
      }
      await NotificationService.scanScheduledPushes();
      render();
    }
    bootstrapApp();
