    // ========== 任务卡片 ==========
    function getAllActiveProjects() {
      return projects.filter(p => !p.archived);
    }

    function getAllVisibleTasks() {
      return tasks.filter(t => t.status !== 'abolished');
    }

    function isRelatedToTask(task) {
      if (!task) return false;
      if (task.assignee === currentUser.name) return true;
      if (isTaskCollaborator(task)) return true;
      if (task.creator === currentUser.name) return true;
      if (isTaskProjectManager(task)) return true;
      return false;
    }

    /** 可管理项目：项目负责人/创建人，或总经理/管理员 */
    function canManageProject(project) {
      if (!project || project.archived) return false;
      if (isFullAccess(currentUser.role)) return true;
      return project.manager === currentUser.name || project.creator === currentUser.name;
    }

    /** 可新建项目：总经理/管理员/部门经理 */
    function canCreateProject() {
      return isFullAccess(currentUser.role) || currentUser.role === 'manager';
    }

    /** 可删除项目：仅总经理/管理员 */
    function canDeleteProject() {
      return isFullAccess(currentUser.role);
    }

    /** 可编辑任务：负责人/协办人/创建人/项目负责人，或总经理/管理员 */
    function canEditTask(task) {
      if (!task || task.status === 'archived' || task.status === 'abolished') return false;
      if (isFullAccess(currentUser.role)) return true;
      return isRelatedToTask(task);
    }

    function getMyAssignedTasks() {
      return tasks.filter(t => t.assignee === currentUser.name);
    }

    function getMyCollaboratorTasks() {
      return tasks.filter(t =>
        t.assignee !== currentUser.name &&
        (isInformCollaborator(t) || isAssistCollaborator(t))
      );
    }

    function getMyPendingAssistCollabTasks() {
      return tasks.filter(t => {
        const entry = getCollaboratorEntry(t, COLLAB_TYPE_ASSIST, currentUser.name);
        return entry && (entry.status === COLLAB_STATUS_PENDING || entry.status === COLLAB_STATUS_PROPOSED);
      });
    }

    function getMyRelatedTasks() {
      const assignedIds = new Set(getMyAssignedTasks().map(t => t.id));
      return [
        ...getMyAssignedTasks(),
        ...getMyCollaboratorTasks().filter(t => !assignedIds.has(t.id)),
      ];
    }

    /** 本人参与的项目：有相关任务，或本人为项目负责人（不含仅创建人） */
    function getMyParticipatingProjects() {
      const idSet = new Set();
      getMyRelatedTasks().forEach(t => { if (t.projectId) idSet.add(t.projectId); });
      projects.forEach(p => {
        if (!p.archived && p.manager === currentUser.name) {
          idSet.add(p.id);
        }
      });
      return projects.filter(p => idSet.has(p.id) && !p.archived);
    }

    /** @deprecated 使用 canManageProject */
    function canStaffManageProject(project) {
      return canManageProject(project);
    }

    function getStaffProjectScope() {
      return getViewableProjects();
    }

    function canQuickUpdateProgress(task) {
      if (!task || task.status === 'done' || task.status === 'archived' || task.status === 'abolished') return false;
      if (hasActiveChildren(task.id)) return false;
      return canEditTask(task);
    }

    function formatFileSize(bytes) {
      if (!bytes || bytes < 1024) return (bytes || 0) + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function canUploadTaskAttachment(task) {
      return canEditTask(task);
    }

    function canUploadProjectDoc(project) {
      return canManageProject(project);
    }

    function getTaskProject(task) {
      return task?.projectId ? projects.find(p => p.id === task.projectId) : null;
    }

    function isTaskProjectManager(task) {
      const project = getTaskProject(task);
      return !!(project && project.manager === currentUser.name);
    }

    function isTaskCollaborator(task) {
      return isInformCollaborator(task) || isAssistCollaborator(task);
    }

    function canPostTaskComment(task) {
      return canEditTask(task);
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function isImageMime(mime) {
      return /^image\//i.test(mime || '');
    }

    function isImageFileName(name) {
      return /\.(png|jpe?g|gif|webp|bmp)$/i.test(name || '');
    }

    function getTaskCommentMentionCandidates(task) {
      const names = new Set();
      if (task.assignee) names.add(task.assignee);
      (getCollaboratorEntries(task, { excludeRejected: true }) || []).forEach(e => names.add(e.userName));
      const project = getTaskProject(task);
      if (project?.manager) names.add(project.manager);
      names.delete(currentUser.name);
      return [...names].map(name => users.find(u => u.name === name) || { name });
    }

    function formatCommentContentHtml(content, task) {
      const candidates = new Set(getTaskCommentMentionCandidates(task).map(u => u.name));
      const parts = [];
      const regex = /[@＠]([\u4e00-\u9fa5A-Za-z0-9·]+)/g;
      let last = 0;
      let m;
      while ((m = regex.exec(content || '')) !== null) {
        parts.push(escapeHtml(content.slice(last, m.index)));
        const name = m[1];
        if (candidates.has(name)) {
          parts.push(`<span style="color:#7C3AED;font-weight:600;">@${escapeHtml(name)}</span>`);
        } else {
          parts.push(escapeHtml(m[0]));
        }
        last = m.index + m[0].length;
      }
      parts.push(escapeHtml((content || '').slice(last)));
      return parts.join('');
    }

    function parseCommentMentions(content, task) {
      const candidates = new Set(getTaskCommentMentionCandidates(task).map(u => u.name));
      const matches = (content || '').match(/[@＠]([\u4e00-\u9fa5A-Za-z0-9·]+)/g) || [];
      const names = matches.map(token => token.slice(1));
      return [...new Set(names.filter(n => candidates.has(n) && n !== currentUser.name))];
    }

    function extractClipboardImageFiles(event) {
      const items = event.clipboardData?.items;
      if (!items) return [];
      const files = [];
      for (const item of items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) files.push(file);
        }
      }
      return files;
    }

    function clipboardFileName(file, prefix) {
      const ext = (file.type || '').split('/')[1] || 'png';
      const safeExt = ext.replace(/[^a-z0-9]/gi, '') || 'png';
      return `${prefix}-${Date.now()}.${safeExt}`;
    }

    async function getAuthedFileBlobUrl(fileId) {
      if (fileObjectUrlCache.has(fileId)) return fileObjectUrlCache.get(fileId);
      if (!ApiConfig.enabled || !authSession.token) throw new Error('未登录');
      const res = await fetch(ApiConfig.baseUrl + '/files/' + encodeURIComponent(fileId), {
        headers: { ...AuthService.getAuthHeaders() },
        signal: AbortSignal.timeout(60000),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || '加载失败');
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      fileObjectUrlCache.set(fileId, url);
      return url;
    }

    async function hydrateAuthedImages(root) {
      if (!root) return;
      const imgs = root.querySelectorAll('img[data-authed-file]');
      for (const img of imgs) {
        const fileId = img.getAttribute('data-authed-file');
        if (!fileId || img.dataset.loaded === '1') continue;
        try {
          img.src = await getAuthedFileBlobUrl(fileId);
          img.dataset.loaded = '1';
        } catch (e) {
          img.alt = '加载失败';
        }
      }
    }

    function showImageLightbox(url) {
      if (!url) return;
      closeImageLightbox();
      const overlay = document.createElement('div');
      overlay.className = 'image-lightbox';
      overlay.id = 'imageLightbox';
      overlay.onclick = closeImageLightbox;
      overlay.tabIndex = -1;
      overlay.onkeydown = (e) => { if (e.key === 'Escape') closeImageLightbox(); };
      const img = document.createElement('img');
      img.src = url;
      img.alt = '图片预览';
      img.onclick = (e) => e.stopPropagation();
      overlay.appendChild(img);
      document.body.appendChild(overlay);
      overlay.focus();
    }

    function closeImageLightbox() {
      document.getElementById('imageLightbox')?.remove();
    }

    async function previewAuthedImage(fileId) {
      try {
        const url = await getAuthedFileBlobUrl(fileId);
        showImageLightbox(url);
      } catch (e) {
        alert(e.message || '预览失败');
      }
    }

    function ensureCommentDraft(taskId) {
      if (!commentDrafts[taskId]) commentDrafts[taskId] = { pendingImages: [] };
      return commentDrafts[taskId];
    }

    function renderCommentDraftImages(taskId) {
      const draft = commentDrafts[taskId];
      if (!draft?.pendingImages?.length) return '';
      return `
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
          ${draft.pendingImages.map((entry, idx) => {
            const preview = entry.previewUrl
              ? `src="${entry.previewUrl}"`
              : `data-authed-file="${entry.item.fileId}"`;
            return `
            <div style="position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid #E5E7EB;background:#fff;">
              <img ${preview} alt="待发送图片" style="width:100%;height:100%;object-fit:cover;cursor:pointer;" onclick="event.stopPropagation();previewCommentDraftImage('${taskId}',${idx})">
              <button type="button" onclick="event.stopPropagation();removeCommentDraftImage('${taskId}',${idx})" style="position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;line-height:18px;cursor:pointer;">×</button>
            </div>`;
          }).join('')}
        </div>
      `;
    }

    function previewCommentDraftImage(taskId, index) {
      const draft = commentDrafts[taskId];
      const entry = draft?.pendingImages?.[index];
      if (!entry) return;
      if (entry.previewUrl) {
        showImageLightbox(entry.previewUrl);
        return;
      }
      previewAuthedImage(entry.item.fileId);
    }

    function getTaskCommentMentionPortal() {
      let portal = document.getElementById('taskCommentMentionPortal');
      if (!portal) {
        portal = document.createElement('div');
        portal.id = 'taskCommentMentionPortal';
        portal.style.cssText = 'display:none;position:fixed;background:#fff;border:1px solid #E5E7EB;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.18);max-height:220px;overflow-y:auto;z-index:30001;';
        document.body.appendChild(portal);
      }
      return portal;
    }

    function bindTaskCommentMentionScroll() {
      if (taskCommentMentionScrollBound) return;
      taskCommentMentionScrollBound = true;
      const reposition = () => {
        if (taskCommentMentionTaskId) positionTaskCommentMentionDropdown(taskCommentMentionTaskId);
      };
      window.addEventListener('scroll', reposition, true);
      window.addEventListener('resize', reposition);
    }

    function hideTaskCommentMentionDropdown(taskId) {
      taskCommentMentionTaskId = null;
      const portal = document.getElementById('taskCommentMentionPortal');
      if (portal) {
        portal.style.display = 'none';
        portal.innerHTML = '';
      }
      if (taskId) {
        const legacy = document.getElementById('taskCommentMention-' + taskId);
        if (legacy) {
          legacy.style.display = 'none';
          legacy.innerHTML = '';
        }
      }
    }

    function positionTaskCommentMentionDropdown(taskId) {
      const ta = document.getElementById('taskCommentInput-' + taskId);
      const portal = document.getElementById('taskCommentMentionPortal');
      if (!ta || !portal || portal.style.display === 'none') return;
      const rect = ta.getBoundingClientRect();
      const width = Math.min(rect.width, window.innerWidth - 16);
      let left = Math.max(8, rect.left);
      if (left + width > window.innerWidth - 8) left = Math.max(8, window.innerWidth - width - 8);
      let top = rect.bottom + 4;
      const maxHeight = 220;
      if (top + maxHeight > window.innerHeight - 8) {
        top = Math.max(8, rect.top - maxHeight - 4);
      }
      portal.style.left = `${left}px`;
      portal.style.top = `${top}px`;
      portal.style.width = `${width}px`;
    }

    function findActiveCommentMentionMatch(text, pos) {
      const before = text.slice(0, pos);
      return before.match(/[@＠]([\u4e00-\u9fa5A-Za-z0-9·]*)$/);
    }

    function updateTaskCommentMentionDropdown(taskId) {
      const ta = document.getElementById('taskCommentInput-' + taskId);
      if (!ta) return;
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      const pos = ta.selectionStart ?? ta.value.length;
      const atMatch = findActiveCommentMentionMatch(ta.value, pos);
      if (!atMatch) {
        hideTaskCommentMentionDropdown(taskId);
        return;
      }
      const filter = atMatch[1];
      const candidates = getTaskCommentMentionCandidates(task).filter(u =>
        !filter || u.name.includes(filter)
      );
      if (!candidates.length) {
        hideTaskCommentMentionDropdown(taskId);
        return;
      }
      bindTaskCommentMentionScroll();
      taskCommentMentionTaskId = taskId;
      const portal = getTaskCommentMentionPortal();
      portal.style.display = 'block';
      portal.innerHTML = candidates.map(u => `
        <button type="button" data-mention-name="${escapeHtml(u.name)}"
          onclick="insertTaskCommentMentionFromEl('${taskId}', this)"
          style="display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:#fff;cursor:pointer;font-size:13px;color:#374151;"
          onmouseover="this.style.background='#F5F3FF'" onmouseout="this.style.background='#fff'">
          @${escapeHtml(u.name)}
        </button>
      `).join('');
      positionTaskCommentMentionDropdown(taskId);
    }

    function insertTaskCommentMentionFromEl(taskId, el) {
      const name = el?.getAttribute?.('data-mention-name');
      if (!name) return;
      insertTaskCommentMention(taskId, name);
    }

    function removeCommentDraftImage(taskId, index) {
      const draft = commentDrafts[taskId];
      if (!draft?.pendingImages?.length) return;
      const entry = draft.pendingImages[index];
      if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      draft.pendingImages.splice(index, 1);
      state.showModal = 'taskDetail';
      state.form.taskId = taskId;
      render();
    }

    function insertTaskCommentMention(taskId, name) {
      const ta = document.getElementById('taskCommentInput-' + taskId);
      if (!ta) return;
      const pos = ta.selectionStart ?? ta.value.length;
      const before = ta.value.slice(0, pos);
      const after = ta.value.slice(pos);
      const atMatch = findActiveCommentMentionMatch(ta.value, pos);
      if (!atMatch) return;
      const prefix = before.slice(0, before.length - atMatch[0].length);
      ta.value = `${prefix}@${name} ${after}`;
      const cursor = prefix.length + name.length + 2;
      ta.focus();
      ta.setSelectionRange(cursor, cursor);
      hideTaskCommentMentionDropdown(taskId);
    }

    function handleTaskCommentInput(event, taskId) {
      updateTaskCommentMentionDropdown(taskId);
    }

    function handleTaskCommentKeydown(event, taskId) {
      if (event.key === 'Escape') {
        hideTaskCommentMentionDropdown(taskId);
        return;
      }
      setTimeout(() => updateTaskCommentMentionDropdown(taskId), 0);
    }

    function handleTaskCommentCompositionEnd(event, taskId) {
      setTimeout(() => updateTaskCommentMentionDropdown(taskId), 0);
    }

    async function handleTaskCommentPaste(event, taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !canPostTaskComment(task)) return;
      const files = extractClipboardImageFiles(event);
      if (!files.length) return;
      event.preventDefault();
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录并连接服务端后粘贴图片');
        return;
      }
      const draft = ensureCommentDraft(taskId);
      for (const file of files) {
        const previewUrl = URL.createObjectURL(file);
        try {
          const item = await uploadFileToEntity('task', taskId, file, clipboardFileName(file, 'comment'), 'comment');
          draft.pendingImages.push({ item, previewUrl });
        } catch (e) {
          URL.revokeObjectURL(previewUrl);
          alert(e.message || '图片上传失败');
        }
      }
      state.showModal = 'taskDetail';
      state.form.taskId = taskId;
      render();
    }

    async function handleEntityFilesPaste(event, entityType, entityId) {
      if (entityType !== 'task') return;
      const task = tasks.find(t => t.id === entityId);
      if (!task || !canUploadTaskAttachment(task)) return;
      const files = extractClipboardImageFiles(event);
      if (!files.length) return;
      event.preventDefault();
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录并连接服务端后粘贴图片');
        return;
      }
      for (const file of files) {
        try {
          await uploadFileToEntity('task', entityId, file, clipboardFileName(file, 'paste'), 'attachment');
        } catch (e) {
          alert(e.message || '图片上传失败');
        }
      }
      state.showModal = 'taskDetail';
      state.form.taskId = entityId;
      render();
    }

    function renderCommentAttachmentsHtml(attachments) {
      const images = (attachments || []).filter(a => isImageMime(a.mimeType) || isImageFileName(a.name));
      if (!images.length) return '';
      return `
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
          ${images.map(img => `
            <img data-authed-file="${img.fileId}" alt="${escapeHtml(img.name || '图片')}"
              onclick="previewAuthedImage('${img.fileId}')"
              style="max-width:160px;max-height:120px;border-radius:8px;border:1px solid #E5E7EB;cursor:pointer;object-fit:cover;">
          `).join('')}
        </div>
      `;
    }

    function renderTaskDiscussion(task) {
      const comments = Array.isArray(task.comments)
        ? task.comments.slice().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))
        : [];
      const canPost = canPostTaskComment(task);
      return `
        <div style="border-top:1px solid #E5E7EB;padding-top:16px;margin-top:16px;">
          <div style="font-size:14px;font-weight:600;margin-bottom:12px;">
            <i class="fas fa-comments" style="color:#7C3AED;margin-right:6px;"></i>留言讨论 (${comments.length})
          </div>
          ${comments.length === 0 ? `
            <div style="font-size:12px;color:#9CA3AF;margin-bottom:12px;">暂无留言。项目负责人、协办人与任务负责人可在此沟通进度与问题。</div>
          ` : `
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:260px;overflow-y:auto;">
              ${comments.map(c => `
                <div style="padding:10px 12px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;">
                    <span style="font-size:12px;font-weight:600;color:#374151;">${escapeHtml(c.author)}</span>
                    <span style="font-size:11px;color:#9CA3AF;white-space:nowrap;">${escapeHtml(c.createdAt || '')}</span>
                  </div>
                  ${c.content ? `<div style="font-size:13px;color:#4B5563;line-height:1.6;white-space:pre-wrap;word-break:break-word;">${formatCommentContentHtml(c.content, task)}</div>` : ''}
                  ${renderCommentAttachmentsHtml(c.attachments)}
                </div>
              `).join('')}
            </div>
          `}
          ${canPost ? `
            <div style="padding:12px;background:#F5F3FF;border-radius:8px;border:1px solid #EDE9FE;">
              <textarea id="taskCommentInput-${task.id}" class="input" rows="3" style="width:100%;resize:vertical;font-size:13px;"
                placeholder="输入留言，输入 @ 可提及相关人员，Ctrl+V 可粘贴图片…"
                oninput="handleTaskCommentInput(event,'${task.id}')"
                onkeyup="handleTaskCommentInput(event,'${task.id}')"
                onkeydown="handleTaskCommentKeydown(event,'${task.id}')"
                oncompositionend="handleTaskCommentCompositionEnd(event,'${task.id}')"
                onpaste="handleTaskCommentPaste(event,'${task.id}')"></textarea>
              ${renderCommentDraftImages(task.id)}
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;flex-wrap:wrap;">
                <div style="font-size:11px;color:#6B7280;">
                  <i class="fas fa-at" style="margin-right:4px;color:#7C3AED;"></i>输入 @ 提及 · Ctrl+V 粘贴图片
                </div>
                <button class="btn btn-primary btn-sm" onclick="postTaskComment('${task.id}')"><i class="fas fa-paper-plane" style="margin-right:4px;"></i>发送留言</button>
              </div>
            </div>
          ` : `
            <div style="font-size:12px;color:#9CA3AF;"><i class="fas fa-lock" style="margin-right:4px;"></i>仅项目负责人、协办人及任务负责人可留言</div>
          `}
        </div>
      `;
    }

    async function postTaskComment(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !canPostTaskComment(task)) {
        alert('您没有留言权限');
        return;
      }
      const textarea = document.getElementById('taskCommentInput-' + taskId);
      const content = (textarea?.value || '').trim();
      const draft = commentDrafts[taskId] || { pendingImages: [] };
      const pendingImages = draft.pendingImages || [];
      if (!content && !pendingImages.length) {
        alert('请输入留言内容或粘贴图片');
        return;
      }
      if (content.length > 2000) {
        alert('留言内容不能超过 2000 字');
        return;
      }
      const mentions = parseCommentMentions(content, task);
      pendingImages.forEach(entry => {
        if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      });
      if (!Array.isArray(task.comments)) task.comments = [];
      task.comments.push({
        id: genId('C'),
        author: currentUser.name,
        content,
        mentions,
        attachments: pendingImages.map(entry => entry.item),
        createdAt: new Date().toLocaleString(),
      });
      if (Array.isArray(task.commentPendingFiles) && pendingImages.length) {
        const usedIds = new Set(pendingImages.map(e => e.item?.fileId).filter(Boolean));
        task.commentPendingFiles = task.commentPendingFiles.filter(f => !usedIds.has(f.fileId));
      }
      delete commentDrafts[taskId];
      save();
      if (mentions.length) {
        NotificationService.send(PushEventType.TASK_COMMENT_MENTION, {
          ...NotificationService.getTaskPayload(task),
          operator: currentUser.name,
          recipientNames: mentions,
          commentPreview: content ? content.slice(0, 120) : '[图片]',
        });
      }
      state.showModal = 'taskDetail';
      state.form.taskId = taskId;
      render();
    }

    function isWikiAttachment(item) {
      return item?.source === 'dingtalk_wiki';
    }

    function attachmentRefKey(item) {
      return item?.fileId || item?.id || '';
    }

    function openDingTalkDoc(url) {
      if (!url) {
        alert('文档链接无效');
        return;
      }
      if (typeof dd !== 'undefined' && dd.openLink) {
        dd.openLink({
          url,
          fail: () => window.open(url, '_blank'),
        });
      } else {
        window.open(url, '_blank');
      }
    }

    async function parseApiJsonResponse(res, fallbackMessage) {
      const text = await res.text();
      try {
        const data = JSON.parse(text);
        if (!res.ok && data && !data.message) {
          data.message = data.message || `${fallbackMessage || '请求失败'}（HTTP ${res.status}）`;
        }
        return data;
      } catch {
        if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
          throw new Error(
            (fallbackMessage || '接口请求失败') +
            `：服务器返回了网页而非 JSON（HTTP ${res.status}）。` +
            '请确认后端已重启到最新版本，且访问地址正确。'
          );
        }
        throw new Error((fallbackMessage || '接口请求失败') + `：${text.slice(0, 120)}`);
      }
    }

    async function submitWikiDocLink(entityType, entityId, payload) {
      const res = await fetch(ApiConfig.baseUrl + '/files/link-dingtalk-doc', {
        method: 'POST',
        headers: {
          ...AuthService.getAuthHeaders(),
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ entityType, entityId, ...payload }),
        signal: AbortSignal.timeout(30000),
      });
      const data = await parseApiJsonResponse(res, '添加钉钉文档失败');
      if (!data.success) throw new Error(data.message || '添加失败');
      if (entityType === 'project') {
        const p = projects.find(x => x.id === entityId);
        if (p) {
          if (!p.documents) p.documents = [];
          p.documents.push(data.item);
        }
      } else {
        const t = tasks.find(x => x.id === entityId);
        if (t) {
          if (!t.attachments) t.attachments = [];
          t.attachments.push(data.item);
        }
      }
      save();
      state.showModal = null;
      render();
    }

    const wikiNodeLookup = {};

    function rememberWikiNodes(nodes) {
      (nodes || []).forEach(n => {
        if (n?.nodeId) wikiNodeLookup[n.nodeId] = n;
      });
    }

    function getSelectedWikiWorkspace() {
      return (state.form.wikiWorkspaces || []).find(w => w.workspaceId === state.form.wikiSelectedWorkspaceId) || null;
    }

    async function showWikiDocPicker(entityType, entityId) {
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录并连接服务端后添加钉钉文档');
        return;
      }
      Object.keys(wikiNodeLookup).forEach(k => { delete wikiNodeLookup[k]; });
      state.form = {
        wikiEntityType: entityType,
        wikiEntityId: entityId,
        wikiWorkspaces: [],
        wikiSelectedWorkspaceId: '',
        wikiExpanded: {},
        wikiChildren: {},
        wikiLoadingKey: 'workspaces',
        wikiSelectedNode: null,
        wikiError: '',
        wikiSearch: '',
      };
      state.showModal = 'wikiDocPicker';
      render();
      await loadWikiWorkspacesList();
    }

    async function loadWikiWorkspacesList() {
      state.form.wikiLoadingKey = 'workspaces';
      state.form.wikiError = '';
      render();
      try {
        const res = await fetch(ApiConfig.baseUrl + '/files/wiki/workspaces', {
          headers: { ...AuthService.getAuthHeaders() },
          signal: AbortSignal.timeout(30000),
        });
        const data = await parseApiJsonResponse(res, '加载知识库失败');
        if (!data.success) throw new Error(data.message || '加载知识库失败');
        state.form.wikiWorkspaces = data.workspaces || [];
        if (state.form.wikiWorkspaces.length) {
          await selectWikiWorkspace(state.form.wikiWorkspaces[0].workspaceId, { skipRender: true });
        } else {
          state.form.wikiError = '人员档案中暂无可访问的知识库（请确认已同步通讯录并绑定 dingTalkUserId / unionId）';
        }
        state.form.wikiLoadingKey = '';
        render();
      } catch (e) {
        state.form.wikiLoadingKey = '';
        state.form.wikiError = e.message || '加载知识库失败';
        render();
      }
    }

    async function selectWikiWorkspace(workspaceId, opts) {
      const ws = (state.form.wikiWorkspaces || []).find(w => w.workspaceId === workspaceId);
      if (!ws) return;
      state.form.wikiSelectedWorkspaceId = workspaceId;
      state.form.wikiSelectedNode = null;
      state.form.wikiExpanded = {};
      state.form.wikiChildren = {};
      state.form.wikiError = '';
      if (!opts?.skipRender) render();
      if (ws.rootNodeId) {
        state.form.wikiExpanded[ws.rootNodeId] = true;
        await loadWikiTreeNodes(ws.rootNodeId, workspaceId);
      } else {
        render();
      }
    }

    async function loadWikiTreeNodes(parentNodeId, workspaceId) {
      if (!parentNodeId || state.form.wikiChildren[parentNodeId]) return;
      const wsId = workspaceId || state.form.wikiSelectedWorkspaceId || '';
      state.form.wikiLoadingKey = parentNodeId;
      render();
      try {
        const qs = new URLSearchParams({ parentNodeId });
        if (wsId) qs.set('workspaceId', wsId);
        const res = await fetch(
          ApiConfig.baseUrl + '/files/wiki/nodes?' + qs.toString(),
          {
            headers: { ...AuthService.getAuthHeaders() },
            signal: AbortSignal.timeout(30000),
          }
        );
        const data = await parseApiJsonResponse(res, '加载目录失败');
        if (!data.success) throw new Error(data.message || '加载目录失败');
        state.form.wikiChildren[parentNodeId] = data.nodes || [];
        rememberWikiNodes(data.nodes);
        state.form.wikiLoadingKey = '';
        render();
      } catch (e) {
        state.form.wikiLoadingKey = '';
        state.form.wikiError = e.message || '加载目录失败';
        render();
      }
    }

    async function toggleWikiTreeNodeById(nodeId) {
      const node = wikiNodeLookup[nodeId];
      if (!node) return;
      if (node.type !== 'FOLDER') {
        state.form.wikiSelectedNode = node;
        render();
        return;
      }
      const expanded = !!state.form.wikiExpanded[node.nodeId];
      state.form.wikiExpanded[node.nodeId] = !expanded;
      if (!expanded) await loadWikiTreeNodes(node.nodeId, node.workspaceId || state.form.wikiSelectedWorkspaceId);
      else render();
    }

    function setWikiDocSearch(value) {
      state.form.wikiSearch = value;
      render();
    }

    function wikiNodeMatchesSearch(node, search) {
      if (!search) return true;
      const q = search.toLowerCase();
      return String(node.name || '').toLowerCase().includes(q);
    }

    function renderWikiTreeBranch(parentNodeId, depth) {
      const nodes = (state.form.wikiChildren[parentNodeId] || []).filter(n =>
        wikiNodeMatchesSearch(n, (state.form.wikiSearch || '').trim())
      );
      const loadingKey = state.form.wikiLoadingKey;
      return nodes.map(node => {
        const isFolder = node.type === 'FOLDER';
        const expanded = !!state.form.wikiExpanded[node.nodeId];
        const selected = state.form.wikiSelectedNode?.nodeId === node.nodeId;
        const padding = 12 + depth * 16;
        const icon = isFolder
          ? (expanded ? 'fa-folder-open' : 'fa-folder')
          : 'fa-file-alt';
        const iconColor = isFolder ? '#D97706' : '#0089FF';
        let html = `
          <div onclick="toggleWikiTreeNodeById('${node.nodeId}')"
            style="display:flex;align-items:center;gap:8px;padding:8px 10px 8px ${padding}px;cursor:pointer;border-radius:6px;
              background:${selected ? '#EFF6FF' : 'transparent'};border:1px solid ${selected ? '#BFDBFE' : 'transparent'};"
            onmouseover="if(!${selected})this.style.background='#F9FAFB'"
            onmouseout="if(!${selected})this.style.background='${selected ? '#EFF6FF' : 'transparent'}'">
            ${isFolder ? `<i class="fas ${expanded ? 'fa-chevron-down' : 'fa-chevron-right'}" style="width:12px;font-size:10px;color:#9CA3AF;"></i>` : '<span style="width:12px;"></span>'}
            <i class="fas ${icon}" style="color:${iconColor};width:16px;text-align:center;"></i>
            <span style="flex:1;font-size:13px;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(node.name || '')}">${escapeHtml(node.name || '未命名')}</span>
            ${!isFolder && node.extension ? `<span style="font-size:10px;color:#9CA3AF;">.${escapeHtml(node.extension)}</span>` : ''}
          </div>`;
        if (isFolder && expanded) {
          if (loadingKey === node.nodeId && !state.form.wikiChildren[node.nodeId]) {
            html += `<div style="padding:4px 10px 4px ${padding + 28}px;font-size:12px;color:#9CA3AF;"><i class="fas fa-spinner fa-spin"></i> 加载中…</div>`;
          } else {
            html += renderWikiTreeBranch(node.nodeId, depth + 1);
          }
        }
        return html;
      }).join('');
    }

    function formatWikiErrorHtml(message) {
      const text = String(message || '');
      const escaped = escapeHtml(text);
      return escaped.replace(
        /(https:\/\/open-dev\.dingtalk\.com[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener" style="color:#B91C1C;text-decoration:underline;word-break:break-all;">点击申请权限</a>'
      ).replace(/\n/g, '<br>');
    }

    function renderWikiDocPickerModal() {
      const workspaces = state.form.wikiWorkspaces || [];
      const selectedWs = getSelectedWikiWorkspace();
      const loadingWorkspaces = state.form.wikiLoadingKey === 'workspaces';
      const selectedNode = state.form.wikiSelectedNode;
      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:760px;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3 class="modal-title"><i class="fas fa-sitemap" style="color:#0089FF;margin-right:8px;"></i>从知识库选择钉钉文档</h3>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding-top:0;">
              ${state.form.wikiError ? `
                <div style="padding:10px 12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;color:#B91C1C;font-size:12px;margin-bottom:12px;">
                  <i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>${formatWikiErrorHtml(state.form.wikiError)}
                </div>
              ` : ''}

    async function uploadFileToEntity(entityType, entityId, file, fileName, uploadPurpose) {
      if (!ApiConfig.enabled || !authSession.token) {
        throw new Error('请登录并连接服务端后上传附件');
      }
      const form = new FormData();
      form.append('file', file, fileName || file.name);
      form.append('entityType', entityType);
      form.append('entityId', entityId);
      if (uploadPurpose) form.append('uploadPurpose', uploadPurpose);
      const res = await fetch(ApiConfig.baseUrl + '/files/upload', {
        method: 'POST',
        headers: { ...AuthService.getAuthHeaders() },
        body: form,
        signal: AbortSignal.timeout(60000),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || '上传失败');
      if (uploadPurpose === 'comment') {
        const t = tasks.find(x => x.id === entityId);
        if (t) {
          if (!Array.isArray(t.commentPendingFiles)) t.commentPendingFiles = [];
          t.commentPendingFiles.push(data.item);
          save();
        }
        return data.item;
      }
      if (entityType === 'project') {
        const p = projects.find(x => x.id === entityId);
        if (p) {
          if (!p.documents) p.documents = [];
          p.documents.push(data.item);
        }
      } else {
        const t = tasks.find(x => x.id === entityId);
        if (t) {
          if (!t.attachments) t.attachments = [];
          t.attachments.push(data.item);
        }
      }
      save();
      return data.item;
    }

    async function uploadEntityFile(entityType, entityId, event) {
      const file = event.target.files[0];
      event.target.value = '';
      if (!file) return;
      try {
        await uploadFileToEntity(entityType, entityId, file, file.name, 'attachment');
        render();
      } catch (e) {
        alert(e.message || '上传失败');
      }
    }

    async function downloadEntityFile(fileId, fileName) {
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录后下载');
        return;
      }
      try {
        const res = await fetch(ApiConfig.baseUrl + '/files/' + encodeURIComponent(fileId), {
          headers: { ...AuthService.getAuthHeaders() },
          signal: AbortSignal.timeout(60000),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || '下载失败');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName || 'download';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert(e.message || '下载失败');
      }
    }

    async function deleteEntityFile(entityType, entityId, refKey) {
      if (!confirm('确定删除该附件？')) return;
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录后操作');
        return;
      }
      try {
        const res = await fetch(ApiConfig.baseUrl + '/files/' + encodeURIComponent(refKey), {
          method: 'DELETE',
          headers: { ...AuthService.getAuthHeaders() },
          signal: AbortSignal.timeout(30000),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '删除失败');
        if (entityType === 'project') {
          const p = projects.find(x => x.id === entityId);
          if (p && p.documents) {
            p.documents = p.documents.filter(d => d.fileId !== refKey && d.id !== refKey);
          }
        } else {
          const t = tasks.find(x => x.id === entityId);
          if (t && t.attachments) {
            t.attachments = t.attachments.filter(a => a.fileId !== refKey && a.id !== refKey);
          }
        }
        save();
        render();
      } catch (e) {
        alert(e.message || '删除失败');
      }
    }

    // ========== 数据导出 ==========
    function downloadExcel(sheetName, headers, rows, filename) {
      if (typeof XLSX === 'undefined') {
        const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename.replace(/\.xlsx$/, '.csv');
        link.click();
        return;
      }
      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      ws['!cols'] = headers.map(() => ({ wch: 14 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, filename.endsWith('.xlsx') ? filename : filename + '.xlsx');
    }

    function getFilteredTeamStats() {
      const selectedDept = state.teamDept || 'all';
      const weekRange = getCurrentWeekRange();
      let filteredMembers = getDeptScopeUsers();
      if (isFullAccess(currentUser.role) && selectedDept !== 'all') {
        filteredMembers = filteredMembers.filter(u => u.dept === selectedDept);
      }
      if (state.teamSearch) {
        const q = state.teamSearch.toLowerCase();
        filteredMembers = filteredMembers.filter(u =>
          u.name.toLowerCase().includes(q) ||
          u.position.toLowerCase().includes(q) ||
          u.dept.toLowerCase().includes(q)
        );
      }
      return filteredMembers.map(u => {
        const userTasks = tasks.filter(t => t.assignee === u.name);
        const total = userTasks.length;
        const doing = userTasks.filter(t => t.status === 'doing').length;
        const todo = userTasks.filter(t => t.status === 'todo').length;
        const done = userTasks.filter(t => t.status === 'done').length;
        const overdue = userTasks.filter(t => isOverdue(t)).length;
        const weeklyBreakdown = getMemberWeeklyHoursBreakdown(u.name, weekRange);
        const weeklyHours = weeklyBreakdown.totalHours;
        const standardWeekHours = u.standardWeekHours || 60;
        const saturation = Math.min(100, Math.round(weeklyHours / standardWeekHours * 100));
        const roleName = roleDisplayName(u.role);
        return { ...u, total, doing, todo, done, overdue, weeklyHours, weeklyBreakdown, saturation, roleName, completionRate: total > 0 ? Math.round(done / total * 100) : 0, weekRange, pendingBlockedHours: weeklyBreakdown.pendingBlockedHours || 0 };
      });
    }

    function sortTeamMembers(list) {
      const sort = state.teamSort || 'saturation_desc';
      const arr = list.slice();
      const byName = (a, b) => a.name.localeCompare(b.name, 'zh-CN');
      switch (sort) {
        case 'saturation_asc':
          return arr.sort((a, b) => a.saturation - b.saturation || byName(a, b));
        case 'weeklyHours_desc':
          return arr.sort((a, b) => b.weeklyHours - a.weeklyHours || b.saturation - a.saturation || byName(a, b));
        case 'weeklyHours_asc':
          return arr.sort((a, b) => a.weeklyHours - b.weeklyHours || a.saturation - b.saturation || byName(a, b));
        case 'name':
          return arr.sort(byName);
        case 'saturation_desc':
        default:
          return arr.sort((a, b) => b.saturation - a.saturation || b.weeklyHours - a.weeklyHours || byName(a, b));
      }
    }

    function exportProjects() {
      const list = getFilteredProjects();
      if (!list.length) { alert('当前没有可导出的项目'); return; }
      const headers = ['项目编号', '项目名称', '所属部门', '负责人', '状态', '开始日期', '结束日期', '进度(%)', '主任务数', '总任务数', '项目描述'];
      const rows = list.map(p => {
        const projectTasks = tasks.filter(t => t.projectId === p.id && t.status !== 'abolished');
        const mainTasks = projectTasks.filter(t => !t.parentId);
        const doneTasks = projectTasks.filter(t => t.status === 'done');
        const progress = projectTasks.length > 0 ? Math.round(doneTasks.length / projectTasks.length * 100) : 0;
        const pst = projectStatusMap[p.status] || projectStatusMap.active;

    // ========== 任务中心 ==========
    function renderTasks() {
      let myTasks = getMyRelatedTasks();

      // 按类型筛选
      const typeTab = state.taskTab || 'all';
      if (typeTab === 'normal') myTasks = myTasks.filter(t => t.type === 'normal');
      if (typeTab === 'temp') myTasks = myTasks.filter(t => t.type === 'temp');

      const allMine = getMyRelatedTasks();

      // 搜索过滤（含上级任务名）
      if (state.taskSearch) {
        const q = state.taskSearch.toLowerCase();
        myTasks = myTasks.filter(t => {
          const parent = t.parentId ? tasks.find(pt => pt.id === t.parentId) : null;
          return t.title.toLowerCase().includes(q) ||
            t.id.toLowerCase().includes(q) ||
            t.assignee.toLowerCase().includes(q) ||
            (parent && parent.title.toLowerCase().includes(q));
        });
      }

      // 排序：紧急置顶、然后按截止日期
      myTasks.sort((a, b) => {
        if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
        if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
        if (isOverdue(a) && !isOverdue(b)) return -1;
        if (isOverdue(b) && !isOverdue(a)) return 1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      const todoTasks = myTasks.filter(t => t.status === 'todo');
      const doingTasks = myTasks.filter(t => t.status === 'doing');
      const doneTasks = myTasks.filter(t => t.status === 'done');
      const otherTasks = myTasks.filter(t => !['todo', 'doing', 'done'].includes(t.status));

      return `
        <div style="margin-bottom:16px;">
          <p class="content-intro" style="margin-bottom:16px;">任务中心展示<strong>本人负责或协办</strong>的任务。查看全公司项目及其他同事任务，请进入<strong>项目管理</strong>。</p>

              <button onclick="state.taskTab='all';render()" style="padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid ${typeTab === 'all' ? '#7C3AED' : '#E5E7EB'};background:${typeTab === 'all' ? '#F5F3FF' : '#fff'};color:${typeTab === 'all' ? '#7C3AED' : '#6B7280'};cursor:pointer;transition:all 0.2s;">

                <span style="margin-left:4px;background:${typeTab === 'all' ? '#7C3AED' : '#E5E7EB'};color:${typeTab === 'all' ? '#fff' : '#6B7280'};padding:2px 6px;border-radius:10px;font-size:10px;">${allMine.length}</span>
              </button>
              <button onclick="state.taskTab='normal';render()" style="padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid ${typeTab === 'normal' ? '#7C3AED' : '#E5E7EB'};background:${typeTab === 'normal' ? '#F5F3FF' : '#fff'};color:${typeTab === 'normal' ? '#7C3AED' : '#6B7280'};cursor:pointer;transition:all 0.2s;">
                <i class="fas fa-folder" style="margin-right:4px;font-size:11px;"></i>常规任务
                <span style="margin-left:4px;background:${typeTab === 'normal' ? '#7C3AED' : '#E5E7EB'};color:${typeTab === 'normal' ? '#fff' : '#6B7280'};padding:2px 6px;border-radius:10px;font-size:10px;">${allMine.filter(t => t.type === 'normal').length}</span>
              </button>
              <button onclick="state.taskTab='temp';render()" style="padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid ${typeTab === 'temp' ? '#7C3AED' : '#E5E7EB'};background:${typeTab === 'temp' ? '#F5F3FF' : '#fff'};color:${typeTab === 'temp' ? '#7C3AED' : '#6B7280'};cursor:pointer;transition:all 0.2s;">
                <i class="fas fa-bolt" style="margin-right:4px;font-size:11px;"></i>临时任务
                <span style="margin-left:4px;background:${typeTab === 'temp' ? '#7C3AED' : '#E5E7EB'};color:${typeTab === 'temp' ? '#fff' : '#6B7280'};padding:2px 6px;border-radius:10px;font-size:10px;">${allMine.filter(t => t.type === 'temp').length}</span>
              </button>
            </div>
            <div style="position:relative;">
              <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;"></i>
              <input class="input search-input-wide" style="width:280px;padding-left:36px;" placeholder="搜索任务名称、编号..." value="${state.taskSearch}" onchange="state.taskSearch=this.value;render()">
            </div>
          </div>
        </div>

        <div class="task-status-grid">
          ${[
            { label: '待开始', tasks: todoTasks, color: '#6B7280', icon: 'fa-clock' },
            { label: '进行中', tasks: doingTasks, color: '#2563EB', icon: 'fa-spinner' },
            { label: '已完成', tasks: doneTasks, color: '#059669', icon: 'fa-check-circle' },
            { label: '其他状态', tasks: otherTasks, color: '#D97706', icon: 'fa-ellipsis-h' },
          ].map(col => `
            <div>

                <i class="fas ${col.icon}" style="color:${col.color};"></i>
                <span style="font-size:14px;font-weight:600;">${col.label}</span>
                <span class="tag" style="background:${col.color};color:#fff;font-size:11px;">${col.tasks.length}</span>

      return `
        <div>
          ${project.archived ? `<p class="content-intro" style="margin-bottom:16px;"><i class="fas fa-archive" style="margin-right:6px;"></i>该项目已归档，仅可查看。归档操作请在未归档项目的详情页进行。</p>` : ''}
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <button class="btn btn-ghost" onclick="goBack()"><i class="fas fa-arrow-left"></i>返回</button>
            <span class="tag" style="background:${pst.bg};color:${pst.color};"><i class="fas ${pst.icon}"></i>${pst.label}</span>
            <span style="font-size:13px;color:#9CA3AF;">${project.id}</span>
          </div>

          <div class="panel" style="margin-bottom:20px;">
            <div class="panel-body">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
                <div>
                  <h2 style="font-size:20px;font-weight:600;color:#1F2937;margin-bottom:8px;">${project.name}</h2>
                  <div style="font-size:13px;color:#9CA3AF;">${project.desc || '暂无描述'}</div>
                </div>
                <div style="display:flex;gap:8px;">
                  ${!project.archived && canManageProject(project) ? `
                    <button class="btn btn-ghost" onclick="editProject('${project.id}')"><i class="fas fa-edit"></i>编辑</button>
                    <button class="btn btn-primary" onclick="showNewTaskModal('${project.id}')"><i class="fas fa-plus"></i>添加任务</button>
                  ` : ''}
                  ${canDeleteProject() ? `
                    <button class="btn btn-ghost" style="color:#DC2626;" onclick="deleteProject('${project.id}')" title="永久删除项目及全部关联任务"><i class="fas fa-trash-alt"></i>删除</button>
                  ` : ''}
                </div>
              </div>

              ${renderEntityFiles(project.documents, {
                entityType: 'project',
                entityId: project.id,
                canUpload: canUploadProjectDoc(project),
                title: '项目文档',
                emptyHint: '暂无项目文档，可上传文件或添加钉钉文档链接',
              })}

              <!-- 项目状态流转 -->
              ${canManageProject(project) && project.status !== 'archived' ? `
              <div style="margin-bottom:16px;padding:12px;background:#F9FAFB;border-radius:8px;">
                <div style="font-size:12px;color:#9CA3AF;margin-bottom:8px;">项目状态</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  ${Object.entries(projectStatusMap).filter(([key]) => key !== 'archived').map(([key, val]) => `
                    <button onclick="updateProjectStatus('${project.id}', '${key}')" style="padding:6px 14px;border-radius:6px;border:1px solid ${project.status === key ? val.color : '#E5E7EB'};background:${project.status === key ? val.bg : '#fff'};color:${project.status === key ? val.color : '#6B7280'};cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;">
                      <i class="fas ${val.icon}"></i>${val.label}
                    </button>
                  `).join('')}
                  ${canManageProject(project) || isFullAccess(currentUser.role) ? `
                  <button onclick="archiveProject('${project.id}')" style="padding:6px 14px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;color:#9CA3AF;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;">
                    <i class="fas fa-archive"></i>归档
                  </button>
                  ` : ''}
                </div>
              </div>
              ` : ''}
              <div style="display:flex;gap:24px;font-size:13px;color:#6B7280;margin-bottom:16px;">
                <span><i class="fas fa-building" style="margin-right:6px;"></i>${project.dept}</span>
                <span><i class="fas fa-user" style="margin-right:6px;"></i>${project.manager}</span>
                <span><i class="fas fa-calendar" style="margin-right:6px;"></i>${project.startDate} ~ ${project.endDate}</span>
              </div>
              <div style="display:flex;gap:24px;margin-bottom:16px;">
                <div style="padding:12px 20px;background:#F9FAFB;border-radius:8px;text-align:center;">
                  <div style="font-size:24px;font-weight:700;color:#1F2937;">${projectTasks.length}</div>
                  <div style="font-size:12px;color:#9CA3AF;">总任务</div>
                </div>
                <div style="padding:12px 20px;background:#D1FAE5;border-radius:8px;text-align:center;">
                  <div style="font-size:24px;font-weight:700;color:#059669;">${doneTasks.length}</div>
                  <div style="font-size:12px;color:#059669;">已完成</div>
                </div>
                <div style="padding:12px 20px;background:#FEE2E2;border-radius:8px;text-align:center;">
                  <div style="font-size:24px;font-weight:700;color:#DC2626;">${overdueTasks.length}</div>
                  <div style="font-size:12px;color:#DC2626;">已延期</div>
                </div>
              </div>
              <div>
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                  <span style="font-size:13px;font-weight:500;">项目进度</span>
                  <span style="font-size:13px;font-weight:600;color:#D97706;">${progress}%</span>
                </div>
                <div class="progress-bar" style="height:10px;"><div class="progress-fill" style="width:${progress}%;"></div></div>
              </div>
            </div>
          </div>

          ${renderProjectDependencyPanel(project.id)}

          <div class="panel">
            <div class="panel-header">
              <span class="panel-title"><i class="fas fa-tasks" style="color:#D97706;"></i>项目任务</span>
            </div>
            <div class="panel-body" style="padding:12px;">
              ${rootTasks.length === 0 ? '<div style="text-align:center;padding:40px;color:#9CA3AF;">暂无任务</div>' : ''}
              ${rootTasks.map(t => renderProjectTaskTree(t, 0, projectTasks)).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderProjectTaskTree(task, level, allTasks) {
      const displayStatus = getTaskDisplayStatus(task);
      const st = statusMap[displayStatus] || statusMap[task.status];
      const pr = priorityMap[task.priority];
      const children = allTasks.filter(t => t.parentId === task.id);
      const progress = task.parentId ? task.progress : calcProgress(task.id);
      const indent = level * 24;

      let html = `
        <div style="padding:12px 16px;background:${level === 0 ? '#F9FAFB' : '#FAFAFA'};border-radius:8px;border:1px solid #E5E7EB;margin-bottom:8px;${level > 0 ? 'margin-left:' + indent + 'px;' : ''}cursor:pointer;${isTaskBlocked(task) ? 'border-color:#FDE68A;background:#FFFBEB;' : isOverdue(task) ? 'border-color:#FECACA;background:#FFFBFB;' : ''}" onclick="viewTask('${task.id}')">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            ${level > 0 ? '<span style="color:#CBD5E1;font-size:12px;">└</span>' : ''}
            <span class="priority-dot priority-${task.priority}"></span>
            <span style="font-size:14px;font-weight:500;flex:1;">${task.title}${renderDependencyBadges(task, true)}</span>
            ${task.type === 'temp' ? '<span class="tag tag-temp" style="font-size:10px;"><i class="fas fa-bolt"></i>临时</span>' : ''}
            <span class="status-tag status-${displayStatus}" style="font-size:10px;">${st.label}</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:#9CA3AF;">
            <span><i class="fas fa-user" style="margin-right:4px;"></i>${task.assignee}</span>
            <span><i class="fas fa-calendar" style="margin-right:4px;"></i>${task.dueDate}</span>
            <span>进度：${progress}%</span>
          </div>
          <div style="margin-top:8px;">
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
          </div>
        </div>
      `;

      children.forEach(c => {
        html += renderProjectTaskTree(c, level + 1, allTasks);
      });

      return html;
    }

    function showNewTaskModal(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project || !canManageProject(project)) {
        alert('仅项目负责人或创建人可添加任务');
        return;
      }
      state.returnToTaskId = null;
      state.form = { projectId, type: 'normal', creator: currentUser.name, status: 'todo', priority: 'normal', progress: 0, informCollaborator: '', assistCollaborator: '' };
      state.page = 'projectDetail';
      state.showModal = 'taskEdit';
      render();
    }

    function showNewSubTaskModal(parentTaskId) {
      const parent = tasks.find(t => t.id === parentTaskId);
      if (!parent || !canCreateSubTask(parent)) {
        alert('无权在该任务下添加子任务');
        return;
      }
      state.returnToTaskId = parentTaskId;
      state.form = {
        projectId: parent.projectId,
        parentId: parentTaskId,
        type: 'normal',
        creator: currentUser.name,
        status: 'todo',
        priority: 'normal',
        progress: 0,
        planStartDate: parent.planStartDate || new Date().toISOString().split('T')[0],
        dueDate: parent.dueDate || '',
        assignee: parent.assignee || currentUser.name,
        informCollaborator: '',
        assistCollaborator: '',
      };
      state.showModal = 'taskEdit';
      render();
    }

    // ========== 归档管理 ==========
    function renderArchive() {
      const archivedProjects = getViewableArchivedProjects();

      return `
        <p class="content-intro" style="margin-bottom:20px;">此页仅用于查询已归档项目。如需归档，请进入「项目管理」→ 项目详情 → 点击「归档」。</p>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title"><i class="fas fa-archive" style="color:#9CA3AF;"></i>已归档项目</span>
            <span style="font-size:12px;color:#9CA3AF;">共 ${archivedProjects.length} 个项目</span>
          </div>
          <div class="panel-body">
            ${archivedProjects.length === 0 ? '<div style="text-align:center;padding:60px;color:#9CA3AF;"><i class="fas fa-archive" style="font-size:48px;margin-bottom:16px;opacity:0.3;"></i><p>暂无归档项目</p></div>' : ''}
            ${archivedProjects.map(p => `
              <div style="padding:16px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;margin-bottom:12px;cursor:pointer;transition:border-color 0.2s;" onclick="viewProject('${p.id}')" onmouseover="this.style.borderColor='#C4B5FD'" onmouseout="this.style.borderColor='#E5E7EB'">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                  <div>
                    <h3 style="font-size:15px;font-weight:600;color:#1F2937;">${p.name}</h3>
                    <div style="font-size:12px;color:#9CA3AF;margin-top:4px;">${p.id} · ${p.dept} · ${p.manager}</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;" onclick="event.stopPropagation()">
                    <span class="status-tag status-archived"><i class="fas fa-archive"></i>已归档</span>
                    ${canDeleteProject() ? `
                      <button class="btn btn-ghost btn-sm" style="color:#DC2626;" onclick="deleteProject('${p.id}', event)" title="永久删除"><i class="fas fa-trash-alt"></i></button>
                    ` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // ========== 人员档案 ==========
    const STAFF_DEPT_OPTIONS = ['信息中心', '规划建设部', '实施交付部', '研发集成部', '网络运维部', 'AI创新部', '项目管控部'];

    function canAccessStaffPage() {
      return isFullAccess(currentUser.role) || currentUser.role === 'manager';
    }

    /** 人员档案 / 团队管理的数据范围：部门经理仅本部门 */
    function getDeptScopeUsers() {
      if (isFullAccess(currentUser.role)) return users;
      if (currentUser.role === 'manager') return users.filter(u => u.dept === currentUser.dept);
      return [];
    }

    function getDeptFilterTabs() {
      if (isFullAccess(currentUser.role)) {
        return [
          { id: 'all', label: '全部', count: users.length, icon: 'fa-globe' },
          ...STAFF_DEPT_OPTIONS.map(dept => ({
            id: dept,
            label: dept,
            count: users.filter(u => u.dept === dept).length,
            icon: '',
          })),
        ];
      }
      if (currentUser.role === 'manager') {
        const dept = currentUser.dept;
        return [{
          id: dept,
          label: dept,
          count: users.filter(u => u.dept === dept).length,
          icon: 'fa-building',
        }];
      }
      return [];
    }

    // 判断是否有编辑权限
    function canEditStaff(targetUser) {
      // 总经理和管理员可以编辑所有人
      if (isFullAccess(currentUser.role)) return true;

      // 部门经理只能编辑本部门的执行人员
      if (currentUser.role === 'manager') {
        return targetUser.dept === currentUser.dept && targetUser.role === 'staff';
      }

      return false;
    }

    function canCreateSubTask(task) {
      if (!task || task.type === 'temp' || !task.projectId) return false;
      if (task.status === 'archived' || task.status === 'abolished') return false;
      const project = projects.find(p => p.id === task.projectId);
      if (!project || project.archived) return false;
      if (isFullAccess(currentUser.role)) return true;
      if (canManageProject(project)) return true;
      if (task.assignee === currentUser.name) return true;
      return false;
    }

    function getTaskDepth(taskId) {
      let depth = 1;
      let t = tasks.find(x => x.id === taskId);
      while (t && t.parentId) {
        depth++;
        t = tasks.find(x => x.id === t.parentId);
      }
      return depth;
    }

    function getTaskBreadcrumb(taskId) {
      const chain = [];
      let t = tasks.find(x => x.id === taskId);
      while (t) {
        chain.unshift(t);
        t = t.parentId ? tasks.find(x => x.id === t.parentId) : null;
      }
      return chain;
    }

    // 判断是否可以操作任务（拆解、编辑、推进状态）
    function canOperateTask(task) {
      return canEditTask(task);
    }

    // 检查下级任务是否都已失效（已完成或已作废）
    function allChildrenInvalidated(taskId) {
      const children = tasks.filter(t => t.parentId === taskId);
      if (children.length === 0) return true; // 没有子任务，可以操作
      return children.every(t => t.status === 'done' || t.status === 'abolished');
    }

    // 检查是否有未完成的下级任务
    function hasActiveChildren(taskId) {
      const children = tasks.filter(t => t.parentId === taskId);
      return children.some(t => t.status !== 'done' && t.status !== 'abolished');
    }

    // 计算下级任务已分配的总工时（所有子任务，无论内部外部）
    function getChildrenAllocatedHours(taskId) {
      const children = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      return children.reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
    }

    // 计算下级任务的内部工时（信息中心部门人员做的）
    function getChildrenInternalHours(taskId) {
      const children = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      const internalChildren = children.filter(t => {
        const assigneeUser = users.find(u => u.name === t.assignee);
        return assigneeUser && assigneeUser.dept === '信息中心';
      });
      return internalChildren.reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
    }

    // 计算下级任务的外部工时（非信息中心部门人员做的）
    function getChildrenExternalHours(taskId) {
      const children = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      const externalChildren = children.filter(t => {
        const assigneeUser = users.find(u => u.name === t.assignee);
        return !assigneeUser || assigneeUser.dept !== '信息中心';
      });
      return externalChildren.reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
    }

    // 计算上级任务剩余可分配工时
    function getRemainingHours(taskId) {
      const parentTask = tasks.find(t => t.id === taskId);
      if (!parentTask) return 0;
      const allocated = getChildrenAllocatedHours(taskId);
      return Math.max(0, (parentTask.estimatedHours || 0) - allocated);
    }

    // 检查子任务工时是否超过上级任务（所有子任务工时总和不能超过）
    function checkChildrenHoursExceeded(taskId, newChildHours = 0, excludeChildId = null) {
      const parentTask = tasks.find(t => t.id === taskId);
      if (!parentTask) return false;

      const children = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished' && t.id !== excludeChildId);
      const currentAllocated = children.reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
      const totalAllocated = currentAllocated + newChildHours;

      return totalAllocated > (parentTask.estimatedHours || 0);
    }

    /** 子任务相对上级任务的工时预算信息 */
    function getChildHoursBudgetInfo(parentId, excludeChildId, proposedHours) {
      const parentTask = tasks.find(t => t.id === parentId);
      if (!parentTask) return null;
      const otherChildrenHours = tasks
        .filter(t => t.parentId === parentId && t.status !== 'abolished' && t.id !== excludeChildId)
        .reduce((sum, t) => sum + (t.estimatedHours || 0), 0);
      const proposed = Number(proposedHours) || 0;
      const totalAllocated = otherChildrenHours + proposed;
      const parentHours = parentTask.estimatedHours || 0;
      return {
        parentTask,
        parentHours,
        otherChildrenHours,
        proposed,
        totalAllocated,
        remaining: parentHours - otherChildrenHours,
        overflow: totalAllocated - parentHours,
        minParentHours: totalAllocated,
      };
    }

    function renderChildHoursBudgetHint(parentId, excludeChildId, proposedHours) {
      const info = getChildHoursBudgetInfo(parentId, excludeChildId, proposedHours);
      if (!info) return '';
      const { parentTask, parentHours, otherChildrenHours, proposed, totalAllocated, remaining, overflow, minParentHours } = info;
      const overflowHtml = overflow > 0
        ? `<div style="margin-top:6px;padding:6px 8px;background:#FEF2F2;border-radius:6px;color:#DC2626;line-height:1.5;">
            <i class="fas fa-exclamation-triangle" style="margin-right:4px;"></i>
            子任务合计 ${totalAllocated}h，超出上级 ${overflow}h。请编辑上级任务「${escapeHtml(parentTask.title)}」，将预计工时调整为至少 <strong>${minParentHours}h</strong> 后再保存。
          </div>`
        : '';
      return `
        <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">
          上级「${escapeHtml(parentTask.title)}」总工时：${parentHours}h | 其他子任务：${otherChildrenHours}h | 剩余可分配：<span style="color:${remaining < 0 ? '#DC2626' : '#059669'};font-weight:500;">${remaining}h</span>
          ${overflowHtml}
        </div>`;
    }

    function renderParentHoursBudgetHint(taskId, proposedParentHours) {
      const allocated = getChildrenAllocatedHours(taskId);
      if (allocated <= 0) return '';
      const parentH = Number(proposedParentHours) || 0;
      const gap = allocated - parentH;
      if (gap > 0) {
        return `<div id="parentHoursBudgetHint" style="font-size:11px;color:#DC2626;margin-top:4px;padding:6px 8px;background:#FEF2F2;border-radius:6px;line-height:1.5;">
          <i class="fas fa-exclamation-triangle" style="margin-right:4px;"></i>
          子任务已分配 ${allocated}h，超过当前预计 ${parentH}h（缺 ${gap}h）。请将预计工时调整为至少 <strong>${allocated}h</strong>。
        </div>`;
      }
      return `<div id="parentHoursBudgetHint" style="font-size:11px;color:#9CA3AF;margin-top:4px;">
        子任务已分配 ${allocated}h，剩余可分配 <span style="color:#059669;font-weight:500;">${parentH - allocated}h</span>
      </div>`;
    }

    function refreshChildHoursBudgetHint() {
      const el = document.getElementById('childHoursBudgetHint');
      if (!el || !state.form.parentId) return;
      el.innerHTML = renderChildHoursBudgetHint(state.form.parentId, state.form.id || null, state.form.estimatedHours);
    }

    function refreshParentHoursBudgetHint() {
      const el = document.getElementById('parentHoursBudgetHint');
      if (!el || !state.form.id || state.form.parentId) return;
      const html = renderParentHoursBudgetHint(state.form.id, state.form.estimatedHours);
      if (html) el.outerHTML = html;
    }

    // 判断任务是否是外部工时（非信息中心部门人员）
    function isExternalTask(assignee) {
      const assigneeUser = users.find(u => u.name === assignee);
      return !assigneeUser || assigneeUser.dept !== '信息中心';
    }

    // 判断是否可以作废任务
    function canAbolishTask(task) {
      if (isFullAccess(currentUser.role)) return true;
      if (isTaskProjectManager(task)) return true;
      if (task.creator === currentUser.name) return true;
      return false;
    }

    // ========== 后端 API & 钉钉推送（预留接口） ==========
    const ApiConfig = {
      baseUrl: '/api',
      enabled: false,
      timeout: 10000,
    };

    /** 登录模式：demo=侧边栏切换账号；dingtalk=钉钉 userid/免登（需 ApiConfig.enabled=true） */
    const AuthConfig = {
      mode: 'demo',
    };

    function isPrivateHost(hostname) {
      return /^(localhost|127\.0\.0\.1)$/.test(hostname)
        || /^192\.168\.\d{1,3}\.\d{1,3}$/.test(hostname)
        || /^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(hostname)
        || /^172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}$/.test(hostname);
    }

    (function initApiConfig() {
      const { hostname, port } = window.location;
      const isLocalDev = (hostname === 'localhost' || hostname === '127.0.0.1') && port === '3000';
      const isProduction = hostname === 'henghuiguan.handagroup.com' || hostname.endsWith('.handagroup.com');
      const isLanServer = isPrivateHost(hostname) && port === '3000';
      if (isLocalDev || isProduction || isLanServer) {
        ApiConfig.enabled = true;
        ApiConfig.baseUrl = '/api';
      }
      if (isProduction || isLanServer) {
        AuthConfig.mode = 'dingtalk';
      }
    })();

    async function loadPublicConfig() {
      if (!ApiConfig.enabled) return;
      try {
        const res = await fetch(ApiConfig.baseUrl + '/config/public', {
          signal: AbortSignal.timeout(8000),
        });
        const data = await res.json();
        if (!data.success) return;
        if (data.corpId) DingTalkApi.corpId = data.corpId;
        if (data.appKey) DingTalkApi.appKey = data.appKey;
        if (data.agentId) DingTalkApi.agentId = data.agentId;
        if (data.localAsServer || data.isProduction || !data.allowDemoLogin) {
          AuthConfig.mode = 'dingtalk';
        }
      } catch (e) {
        console.warn('[配置] 无法加载公开配置', e);
      }
    }

    const DingTalkApi = {
      corpId: '',

      parseUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const pick = (keys) => {
          for (const k of keys) {
            const v = params.get(k);
            if (v) return v.trim();
          }
          return null;
        };
        return {
          dingTalkUserId: pick(this.urlParamKeys.userId),
          authCode: pick(this.urlParamKeys.authCode),
          corpId: pick(this.urlParamKeys.corpId) || DingTalkApi.corpId || '',
        };
      },

      cleanAuthUrlParams() {
        const url = new URL(window.location.href);
        [...this.urlParamKeys.userId, ...this.urlParamKeys.authCode, ...this.urlParamKeys.corpId]
          .forEach(k => url.searchParams.delete(k));
        window.history.replaceState({}, '', url.pathname + (url.search || ''));
      },

      findUserByDingTalkId(dingTalkUserId) {
        if (!dingTalkUserId) return null;
        return users.find(u =>
          u.dingTalkUserId === dingTalkUserId ||
          u.id === dingTalkUserId
        ) || null;
      },

      mergeUserFromServer(serverUser) {
        if (!serverUser) return null;
        const idx = users.findIndex(u => u.id === serverUser.id || u.dingTalkUserId === serverUser.dingTalkUserId);
        if (idx >= 0) {
          users[idx] = { ...users[idx], ...serverUser };
          return users[idx];
        }
        users.push(serverUser);
        return serverUser;
      },

      applySession(user, session = {}) {
        if (!user) return { success: false, message: '用户不存在' };
        currentUser = user;
        authSession = {
          ...authSession,
          token: session.token ?? authSession.token,
          refreshToken: session.refreshToken ?? authSession.refreshToken,
          dingTalkUserId: session.dingTalkUserId ?? user.dingTalkUserId ?? authSession.dingTalkUserId,
          loginSource: session.loginSource || authSession.loginSource || 'demo',
          expiresAt: session.expiresAt ?? authSession.expiresAt,
        };
        state.authError = null;
        state.page = 'dashboard';
        save();
        return { success: true, user };
      },

      /** 演示模式：侧边栏切换账号（后端启用时走 /api/auth/demo-login） */
      async loginDemo(userId) {
        const user = users.find(u => u.id === userId);
        if (!user) return { success: false, message: '用户不存在' };

        if (ApiConfig.enabled) {
          try {
            const res = await fetch(ApiConfig.baseUrl + '/auth/demo-login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId }),
              signal: AbortSignal.timeout(ApiConfig.timeout),
            });
            const data = await res.json();
            if (!data.success) return data;
            const merged = users.find(u => u.id === data.user?.id) || this.mergeUserFromServer(data.user);
            const result = this.applySession(merged, {
              loginSource: 'demo',
              dingTalkUserId: merged.dingTalkUserId || null,
              token: data.token,
              refreshToken: data.refreshToken,
              expiresAt: data.expiresAt,
            });
            await DataService.loadFromServer();
            return result;
          } catch (e) {
            console.warn('[登录] 演示登录接口失败，降级本地', e);
          }
        }

        return this.applySession(user, {
          loginSource: 'demo',
          dingTalkUserId: user.dingTalkUserId || null,
          token: null,
          refreshToken: null,
        });
      },

      /**
       * 钉钉 userid 跳转登录（工作台/链接带 ?userid=xxx）
       * 后端接入：POST /api/dingtalk/auth/login-by-userid
       * 演示模式：按用户档案 dingTalkUserId 本地匹配
       */
      async loginByDingTalkUserId(dingTalkUserId, corpId) {
        if (!dingTalkUserId) return { success: false, message: '缺少钉钉 userid' };

        if (this.isDingTalkMode()) {
          const url = ApiConfig.baseUrl + DingTalkApi.endpoints.loginByUserId;
          try {
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...this.getAuthHeaders() },
              body: JSON.stringify({ dingTalkUserId, corpId: corpId || DingTalkApi.corpId }),
              signal: AbortSignal.timeout(ApiConfig.timeout),
            });
            const data = await res.json();
            if (!data.success) return data;
            const user = users.find(u => u.id === data.user?.id) || this.mergeUserFromServer(data.user);
            const result = this.applySession(user, {
              token: data.token,
              refreshToken: data.refreshToken,
              dingTalkUserId,
              loginSource: 'dingtalk_userid',
              expiresAt: data.expiresAt,
            });
            await DataService.loadFromServer();
            return result;
          } catch (e) {
            console.warn('[登录] userid 接口失败:', e);
            return { success: false, message: e.message };
          }
        }

        const user = this.findUserByDingTalkId(dingTalkUserId);
        if (!user) {

          return { success: false, message: `未找到钉钉用户 ${dingTalkUserId}，请先同步通讯录` };
        }
        console.log('[登录预留] 演示模式 userid 匹配:', dingTalkUserId, '→', user.name);
        return this.applySession(user, {
          loginSource: 'dingtalk_userid',
          dingTalkUserId,
          token: null,
        });
      },

      /** 小程序 / H5 authCode 免登 */
      async loginByAuthCode(authCode, corpId) {
        if (!authCode) return { success: false, message: '缺少 authCode' };
        const endpoint = DingTalkApi.endpoints.miniAppLogin;
        const url = ApiConfig.baseUrl + endpoint;

        if (!ApiConfig.enabled) {
          console.log('[登录预留] POST', url, { authCode, corpId });
          return { success: false, message: '后端未接入，无法 authCode 免登' };
        }

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ authCode, corpId: corpId || DingTalkApi.corpId }),
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          if (!data.success) return data;
          const user = users.find(u => u.id === data.user?.id) || this.mergeUserFromServer(data.user);
          const result = this.applySession(user, {
            token: data.token,
            refreshToken: data.refreshToken,
            dingTalkUserId: data.user?.dingTalkUserId || data.dingTalkUserId,
            loginSource: 'dingtalk_miniapp',
            expiresAt: data.expiresAt,
          });
          await DataService.loadFromServer();
          return result;
        } catch (e) {
          return { success: false, message: e.message };
        }
      },

      async fetchSession() {
        if (!authSession.token) return { success: false, message: '无 token' };
        const url = ApiConfig.baseUrl + DingTalkApi.endpoints.session;
        try {
          const res = await fetch(url, {
            headers: { ...this.getAuthHeaders() },
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          if (!data.success) return data;
          const user = users.find(u => u.id === data.user?.id) || this.mergeUserFromServer(data.user);
          return this.applySession(user, {
            token: authSession.token,
            dingTalkUserId: data.user?.dingTalkUserId,
            loginSource: authSession.loginSource,
            expiresAt: data.expiresAt,
          });
        } catch (e) {
          return { success: false, message: e.message };
        }
      },

      async logout() {
        if (ApiConfig.enabled && authSession.token) {
          try {
            await fetch(ApiConfig.baseUrl + DingTalkApi.endpoints.logout, {
              method: 'POST',
              headers: { ...this.getAuthHeaders() },
              signal: AbortSignal.timeout(ApiConfig.timeout),
            });
          } catch (e) {
            console.warn('[登录] 退出接口失败:', e);
          }
        }
        authSession = { token: null, refreshToken: null, dingTalkUserId: null, loginSource: 'demo', expiresAt: null };
        const fallback = users.find(u => u.name === '王元斌') || users[0];
        currentUser = fallback;
        state.authError = null;
        save();
        render();
