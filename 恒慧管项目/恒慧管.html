              </div>
              <div class="panel-body">
                <div style="text-align:center;margin-bottom:16px;">
                  <div style="position:relative;width:120px;height:120px;margin:0 auto;">
                    <svg style="width:120px;height:120px;transform:rotate(-90deg);">
                      <circle cx="60" cy="60" r="50" fill="none" stroke="var(--border)" stroke-width="12"/>
                      <circle cx="60" cy="60" r="50" fill="none" stroke="var(--brand)" stroke-width="12"
                        stroke-dasharray="${2 * Math.PI * 50}" stroke-dashoffset="${2 * Math.PI * 50 * (1 - (totalTasks > 0 ? totalDone / totalTasks : 0))}"/>
                    </svg>
                    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;">
                      <span style="font-size:24px;font-weight:700;color:var(--text);">${donePct}%</span>
                      <span style="font-size:11px;color:var(--text-light);">完成率</span>
                    </div>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                  <div class="team-complete-mini is-done">
                    <div class="mini-value">${totalDone}</div>
                    <div class="mini-label">已完成</div>
                  </div>
                  <div class="team-complete-mini is-todo">
                    <div class="mini-value">${totalTasks - totalDone}</div>
                    <div class="mini-label">未完成</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="panel" style="margin-bottom:24px;">
            <div class="panel-header" style="flex-wrap:wrap;gap:12px;">
              <span class="panel-title"><i class="fas fa-users" style="color:var(--brand);"></i>团队成员工作饱和度 ${selectedDept === 'all' ? '(全部门)' : '(' + selectedDept + ')'}</span>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto;">
                <span style="font-size:12px;color:var(--text-light);white-space:nowrap;"><i class="fas fa-sort-amount-down" style="margin-right:4px;"></i>排序</span>
                ${teamSortOptions.map(opt => `
                  <button type="button" class="team-sort-btn${teamSort === opt.key ? ' is-active' : ''}" onclick="setTeamSort('${opt.key}')">${opt.label}</button>
                `).join('')}
              </div>
            </div>
            <div class="team-period-note">
              统计周期：${weekRange.start} ~ ${weekRange.end}（当周周一至周日）· 本周原计划按任务原始计划分摊（含已完成/阻塞）· 当周待处理仅计未完成且未阻塞 · 已批准辅助性协办按协助时段分摊 · 告知性协办不计工时
            </div>
            <div class="panel-body" style="padding:16px;">
              <div class="team-member-grid">
                ${memberStats.map(m => {
                  let satColor = '#059669';
                  let satBg = 'rgba(5,150,105,0.12)';
                  let satLabel = '空闲';
                  if (m.saturation >= 80) {
                    satColor = '#DC2626'; satBg = 'rgba(220,38,38,0.12)'; satLabel = '饱和';
                  } else if (m.saturation >= 50) {
                    satColor = '#E8A84A'; satBg = 'rgba(232,168,74,0.16)'; satLabel = '适中';
                  } else if (m.saturation >= 20) {
                    satColor = '#3D4A8C'; satBg = 'var(--brand-soft)'; satLabel = '正常';
                  }

                  const roleClass = roleBadgeClass(m.role);
                  const roleName = roleDisplayName(m.role);
                  const isNonStaff = m.role !== 'staff';
                  const rateColor = m.completionRate >= 80 ? '#059669' : m.completionRate >= 50 ? '#E8A84A' : '#DC2626';
                  return `
                    <div class="team-member-card" onclick="showMemberKanban('${m.id}')" title="点击查看${m.name}的任务看板">
                      <div class="team-member-card-head">
                        <div class="team-member-avatar">${m.name.charAt(0)}</div>
                        <div style="flex:1;min-width:0;">
                          <div class="team-member-name">${m.name}</div>
                          <div class="team-member-dept">${m.dept}</div>
                          <span class="role-badge ${roleClass}" style="margin-top:4px;">${roleName}</span>
                        </div>

                      </div>

                      <div style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                          <span style="font-size:12px;color:var(--text-muted);">当周工时饱和度</span>
                          <span style="font-size:12px;font-weight:600;color:${satColor};">${m.saturation}%</span>
                        </div>
                        <div class="team-sat-bar"><span style="width:${Math.min(m.saturation, 100)}%;background:${satColor};"></span></div>
                        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text-light);flex-wrap:wrap;gap:4px;">
                          <span>本周原计划：${m.originalPlannedHours ?? 0}h</span>
                          <span>标准：${m.standardWeekHours}h/周</span>
                        </div>
                        <div style="margin-top:2px;font-size:11px;color:var(--text-light);">
                          <span>当周待处理：${m.weeklyHours}h${m.weeklyBreakdown?.assistHours > 0 ? `（主责 ${m.weeklyBreakdown.assigneeHours}h · 协办 ${m.weeklyBreakdown.assistHours}h）` : ''}${m.pendingBlockedHours > 0 ? ` · <span style="color:#E8A84A;">${m.pendingBlockedHours}h 因阻塞挂起</span>` : ''}</span>

                          <div class="metric-label">进行中</div>
                        </div>

                          <div class="metric-value" style="color:#059669;">${m.done}</div>
                          <div class="metric-label">已完成</div>

                          <div class="metric-value"${m.overdue > 0 ? '' : ' style="color:var(--text-light);"'}>${m.overdue}</div>
                          <div class="metric-label">已逾期</div>
                        </div>
                      </div>

                      <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;">
                        <span style="color:var(--text-light);">完成率</span>
                        <span style="font-weight:500;color:${rateColor};">${m.completionRate}%</span>
                      </div>
                      <div class="team-member-footer">
                        <i class="fas fa-columns" style="margin-right:4px;"></i>${isNonStaff ? '查看管理岗任务看板' : '查看任务看板'}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== 任务依赖 UI ==========
    function renderDependencySchemeHint(compact) {
      return `
        <div style="padding:${compact ? '10px 12px' : '12px 14px'};background:linear-gradient(135deg,#EFF6FF,#ECFDF5);border:1px solid #BFDBFE;border-radius:8px;margin-bottom:${compact ? '10px' : '12px'};font-size:12px;color:#374151;line-height:1.65;">
          <div style="font-weight:600;color:#1D4ED8;margin-bottom:6px;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>跨项目依赖说明</div>
          <div>· <strong>前置依赖</strong>：需等待其他任务（可跨项目）完成后，本任务才可继续</div>
          <div>· <strong>阻塞期间</strong>：任务显示「阻塞中」，<strong>不计入</strong>工时饱和度，不算逾期/临期</div>
          <div>· <strong>标识</strong>：🔗 前置 · ⏸ 阻塞中 · ▶ 可继续 · 🚧 阻塞后续 · 🌐 跨项目</div>
          <div style="margin-top:6px;color:#2563EB;">配置入口：打开<strong>任务详情</strong> →「依赖关系」→「添加前置依赖」</div>
        </div>
      `;
    }

    function renderProjectDependencyPanel(projectId) {
      const rows = getProjectDependencyRows(projectId);
      return `
        <div class="panel" style="margin-bottom:20px;border-color:#BFDBFE;">
          <div class="panel-header" style="background:#F8FAFC;">
            <span class="panel-title"><i class="fas fa-link" style="color:#2563EB;"></i>跨项目 / 任务依赖</span>
          </div>
          <div class="panel-body" style="padding:${rows.length ? '12px 12px 0' : '16px'};">
            ${renderDependencySchemeHint(false)}
            ${rows.length ? `
            <div class="log-table-wrap">
              <table class="log-table">
                <thead>
                  <tr>
                    <th>本任务</th>
                    <th>关系</th>
                    <th>关联任务</th>
                    <th>关联项目</th>
                    <th>状态</th>
                    <th>阻塞</th>
                    <th>挂起工时</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(({ dep, pred, succ, cross }) => {
                    const isOutgoing = pred.projectId === projectId;
                    const local = isOutgoing ? pred : succ;
                    const remote = isOutgoing ? succ : pred;
                    const blocked = isTaskBlocked(succ);
                    return `
                      <tr style="cursor:pointer;" onclick="viewTask('${local.id}')">
                        <td>${escapeHtml(local.title)}${renderDependencyBadges(local, true)}</td>
                        <td>${isOutgoing ? '🚧 阻塞后续' : '🔗 前置依赖'}${cross ? ' 🌐' : ''}</td>
                        <td style="color:#2563EB;" onclick="event.stopPropagation();viewTask('${remote.id}')">${escapeHtml(remote.title)}</td>
                        <td>${escapeHtml(getTaskProjectLabel(remote))}</td>
                        <td>${renderDependencyStatusIcon(dep, isOutgoing ? 'succ' : 'pred')}</td>
                        <td>${blocked ? '<span style="color:#D97706;">是</span>' : '否'}</td>
                        <td>${!isOutgoing && isTaskBlocked(local) ? ((local.estimatedHours || 0) + 'h') : '-'}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
            ` : `
              <div style="text-align:center;padding:24px 12px;color:#9CA3AF;font-size:13px;">
                <i class="fas fa-link" style="font-size:24px;margin-bottom:8px;opacity:0.4;display:block;"></i>
                暂无跨项目依赖。请在<strong>任务详情</strong>中点击「添加前置依赖」配置（可关联其他项目的任务）。
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderTaskDependencyPanel(task) {
      if (!task || !canViewTask(task)) return '';
      const preds = getTaskPredecessorDeps(task.id);
      const succs = getTaskSuccessorDeps(task.id);
      const canManage = canManageTaskDependency(task);
      return `
        <div id="task-dep-panel" style="margin-bottom:16px;border:2px solid #BFDBFE;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(37,99,235,0.08);">
          <div style="padding:10px 12px;background:linear-gradient(90deg,#EFF6FF,#F8FAFC);border-bottom:1px solid #BFDBFE;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-size:13px;font-weight:600;color:#1D4ED8;"><i class="fas fa-link" style="margin-right:6px;"></i>依赖关系（跨项目）</span>
            ${canManage ? `<button class="btn btn-primary btn-sm" onclick="showAddDependencyModal('${task.id}')"><i class="fas fa-plus"></i> 添加前置依赖</button>` : ''}
          </div>
          <div style="padding:12px;">
            ${renderDependencySchemeHint(true)}
            <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;">前置依赖（需先完成）</div>
            ${preds.length ? preds.map(dep => {
              const pred = getDependencyTask(dep.predecessorTaskId);
              if (!pred) return '';
              return `
                <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F9FAFB;border-radius:8px;margin-bottom:6px;font-size:12px;">
                  <span style="min-width:72px;">${renderDependencyStatusIcon(dep, 'pred')}</span>
                  <span style="flex:1;">${isDependencyCrossProject(dep) ? '<span class="dep-badge dep-cross">🌐</span> ' : ''}${escapeHtml(getTaskProjectLabel(pred))} / <a href="javascript:void(0)" onclick="viewTask('${pred.id}')" style="color:#2563EB;text-decoration:none;">${escapeHtml(pred.title)}</a></span>
                  <span style="color:#6B7280;">${pred.assignee}</span>
                  <span style="color:#6B7280;">${normalizeDateStr(resolveTaskDueDate(pred)) || '-'}</span>
                  ${canManage ? `<button class="btn btn-ghost btn-sm" style="color:#DC2626;" onclick="removeTaskDependency('${dep.id}')" title="解除依赖"><i class="fas fa-unlink"></i></button>` : ''}
                </div>
              `;
            }).join('') : '<div style="font-size:12px;color:#9CA3AF;margin-bottom:8px;">暂无前置依赖</div>'}
            ${isTaskBlocked(task) ? '<div style="font-size:11px;color:#D97706;margin:8px 0;padding:8px;background:#FFFBEB;border-radius:6px;"><i class="fas fa-pause-circle" style="margin-right:4px;"></i>阻塞期间：本任务<strong>不计入</strong>工时饱和度</div>' : ''}
            ${succs.length ? `
              <div style="font-size:12px;font-weight:600;color:#374151;margin:12px 0 8px;">阻塞的后续任务</div>
              ${succs.map(dep => {
                const succ = getDependencyTask(dep.successorTaskId);
                if (!succ) return '';
                return `
                  <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#FAF5FF;border-radius:8px;margin-bottom:6px;font-size:12px;">
                    <span style="min-width:88px;">${renderDependencyStatusIcon(dep, 'succ')}</span>
                    <span style="flex:1;">${isDependencyCrossProject(dep) ? '<span class="dep-badge dep-cross">🌐</span> ' : ''}${escapeHtml(getTaskProjectLabel(succ))} / <a href="javascript:void(0)" onclick="viewTask('${succ.id}')" style="color:#10B981;text-decoration:none;">${escapeHtml(succ.title)}</a></span>
                    <span style="color:#6B7280;">${succ.assignee}</span>
                    <span style="color:#6B7280;">${normalizeDateStr(resolveTaskDueDate(succ)) || '-'}</span>
                  </div>
                `;
              }).join('')}
            ` : ''}
          </div>
        </div>
      `;
    }

    function getDependencyCandidateTasks(successorTaskId) {
      return tasks
        .filter(t => t.id !== successorTaskId && t.status !== 'abolished' && t.status !== 'archived')
        .filter(t => !wouldCreateDependencyCycle(t.id, successorTaskId))
        .sort((a, b) => getTaskProjectLabel(a).localeCompare(getTaskProjectLabel(b), 'zh-CN') || a.title.localeCompare(b.title, 'zh-CN'));
    }

    function showAddDependencyModal(successorTaskId) {
      const task = tasks.find(t => t.id === successorTaskId);
      if (!task || !canManageTaskDependency(task)) {
        alert('无权添加依赖');
        return;
      }
      state.form = {
        successorTaskId,
        predecessorTaskId: '',
        blockMode: DEP_BLOCK_HARD,
        note: '',
      };
      state.showModal = 'addDependency';
      render();
    }

    function renderAddDependencyModal() {
      const succ = tasks.find(t => t.id === state.form.successorTaskId);
      if (!succ) return '';
      const candidates = getDependencyCandidateTasks(succ.id);
      const grouped = {};
      candidates.forEach(t => {
        const label = getTaskProjectLabel(t);
        if (!grouped[label]) grouped[label] = [];
        grouped[label].push(t);
      });
      return `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-box" style="max-width:560px;" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3 class="modal-title"><i class="fas fa-link" style="color:#2563EB;margin-right:8px;"></i>添加前置依赖</h3>
              <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
              <div style="padding:10px 12px;background:#EFF6FF;border-radius:8px;margin-bottom:12px;font-size:12px;color:#1E40AF;">
                后继任务：<strong>${escapeHtml(succ.title)}</strong>（${escapeHtml(getTaskProjectLabel(succ))}）<br>
                前置任务完成后，后继任务才可继续（强阻塞时不可开始/完成）。
              </div>
              <div class="form-group">
                <label class="form-label">前置任务 <span class="form-required">*</span></label>
                <select class="select" style="width:100%;" onchange="state.form.predecessorTaskId=this.value">
                  <option value="">请选择前置任务</option>
                  ${Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'zh-CN')).map(projectName => `
                    <optgroup label="${escapeHtml(projectName)}">
                      ${grouped[projectName].map(t => `<option value="${t.id}" ${state.form.predecessorTaskId === t.id ? 'selected' : ''}>${escapeHtml(t.title)} · ${escapeHtml(t.assignee)} · ${statusMap[getTaskDisplayStatus(t)]?.label || t.status}</option>`).join('')}
                    </optgroup>
                  `).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">阻塞强度</label>
                <select class="select" style="width:100%;" onchange="state.form.blockMode=this.value">
                  <option value="${DEP_BLOCK_HARD}" ${state.form.blockMode !== DEP_BLOCK_SOFT ? 'selected' : ''}>强阻塞（不可开始/完成，不计饱和度）</option>
                  <option value="${DEP_BLOCK_SOFT}" ${state.form.blockMode === DEP_BLOCK_SOFT ? 'selected' : ''}>弱阻塞（仅提醒）</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">说明</label>
                <textarea class="textarea" style="width:100%;height:70px;" placeholder="为何需要此依赖？" onchange="state.form.note=this.value">${state.form.note || ''}</textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="state.showModal='taskDetail';state.form={taskId:'${succ.id}'};render()">取消</button>
              <button class="btn btn-primary" onclick="saveTaskDependency()"><i class="fas fa-save"></i>保存</button>
            </div>
          </div>
        </div>
      `;
    }

    function saveTaskDependency() {
      const successorTaskId = state.form.successorTaskId;
      const predecessorTaskId = state.form.predecessorTaskId;
      const succ = tasks.find(t => t.id === successorTaskId);
      const pred = tasks.find(t => t.id === predecessorTaskId);
      if (!succ || !canManageTaskDependency(succ)) {
        alert('无权操作');
        return;
      }
      if (!pred) {
        alert('请选择前置任务');
        return;
      }
      if (wouldCreateDependencyCycle(predecessorTaskId, successorTaskId)) {
        alert('不能形成循环依赖');
        return;
      }
      if (getActiveTaskDependencies().some(d => d.predecessorTaskId === predecessorTaskId && d.successorTaskId === successorTaskId)) {
        alert('该依赖已存在');
        return;
      }
      const dep = {
        id: genId('DEP'),
        predecessorTaskId,
        successorTaskId,
        type: DEP_TYPE_FS,
        blockMode: state.form.blockMode || DEP_BLOCK_HARD,
        note: state.form.note || '',
        status: DEP_STATUS_ACTIVE,
        createdBy: currentUser.name,
        createdAt: new Date().toISOString().slice(0, 10),
      };
      taskDependencies.push(dep);
      refreshTaskDependencySchedule(succ);
      appendChangeLogEntry({
        taskId: succ.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: '无此前置依赖',
        after: `依赖 ${getTaskProjectLabel(pred)}/${pred.title}`,
        reason: dep.note || '添加任务依赖',
        project: projects.find(p => p.id === succ.projectId)?.name || '临时任务',
      });
      notifyTaskDependencyAdded(dep, pred, succ);
      save();
      state.form = { taskId: succ.id };
      state.showModal = 'taskDetail';
      render();
    }

    function removeTaskDependency(depId) {
      const dep = taskDependencies.find(d => d.id === depId);
      if (!dep) return;
      const succ = getDependencyTask(dep.successorTaskId);
      if (!succ || !canManageTaskDependency(succ)) {
        alert('无权解除依赖');
        return;
      }
      if (!confirm('确定解除该依赖关系？')) return;
      const pred = getDependencyTask(dep.predecessorTaskId);
      taskDependencies = taskDependencies.filter(d => d.id !== depId);
      refreshTaskDependencySchedule(succ);
      appendChangeLogEntry({
        taskId: succ.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: pred ? `依赖 ${pred.title}` : depId,
        after: '已解除依赖',
        reason: '解除任务依赖',
        project: projects.find(p => p.id === succ.projectId)?.name || '临时任务',
      });
      save();
      state.form = { taskId: succ.id };
      state.showModal = 'taskDetail';
      render();
    }

    function onPredecessorTaskCompleted(completedTask) {
      getTaskSuccessorDeps(completedTask.id).forEach(dep => {
        const succ = getDependencyTask(dep.successorTaskId);
        if (!succ) return;
        const wasBlocked = isTaskBlocked(succ);
        refreshTaskDependencySchedule(succ);
        if (wasBlocked && !isTaskBlocked(succ)) {
          notifyTaskDependencyUnblocked(completedTask, succ, dep);
        }
      });
    }

    function notifyTaskDependencyAdded(dep, pred, succ) {
      const names = new Set([succ.assignee, pred.assignee]);
      const p1 = projects.find(p => p.id === pred.projectId);
      const p2 = projects.find(p => p.id === succ.projectId);
      if (p1?.manager) names.add(p1.manager);
      if (p2?.manager) names.add(p2.manager);
      NotificationService.send(PushEventType.TASK_DEPENDENCY_ADDED, {
        ...NotificationService.getTaskPayload(succ),
        predecessorTitle: pred.title,
        predecessorProject: getTaskProjectLabel(pred),
        recipientNames: [...names],
        operator: currentUser.name,
      });
    }

    function notifyTaskDependencyUnblocked(pred, succ, dep) {
      const names = new Set([succ.assignee]);
      const p2 = projects.find(p => p.id === succ.projectId);
      if (p2?.manager) names.add(p2.manager);
      NotificationService.send(PushEventType.TASK_DEPENDENCY_UNBLOCKED, {
        ...NotificationService.getTaskPayload(succ),
        predecessorTitle: pred.title,
        predecessorProject: getTaskProjectLabel(pred),
        recipientNames: [...names],
        operator: currentUser.name,
      });
    }

    function getTaskDetailActivityLogs(taskId) {
      const rows = [];
      (changeLogs || []).forEach(l => {

          rows.push({
            time: l.operateTime || l.createdAt || '',
            operator: l.operator || '-',
            kind: '变更',
            detail: [formatLogCell(l.before), formatLogCell(l.after)].filter(Boolean).join(' → ') || (l.reason || '字段变更'),
            reason: l.reason || '',
          });
        }
      });
      (transferLogs || []).forEach(l => {
        if (l && l.taskId === taskId) {
          rows.push({
            time: l.operateTime || l.createdAt || '',
            operator: l.operator || '-',
            kind: '转办',
            detail: `${l.fromAssignee || '-'} → ${l.toAssignee || '-'}`,
            reason: l.reason || '',
          });
        }
      });
      rows.sort((a, b) => String(b.time).localeCompare(String(a.time)));
      return rows;
    }

                  ${canTransfer ? `<button type="button" onclick="showTransferModal('${task.id}')"><i class="fas fa-exchange-alt"></i>转办</button>` : ''}

                  ${canOperateTask(task) ? `<button type="button" onclick="editTask('${task.id}')"><i class="fas fa-edit"></i>编辑</button>` : ''}
                </div>
              </div>
              ` : ''}
              <div style="flex:1;"></div>

              ${canPostTaskComment(task) ? `
                <button class="btn btn-ghost" onclick="focusTaskComment('${task.id}')"><i class="fas fa-comment"></i>留言</button>
              ` : ''}

              ${isMilestoneTask(task) ? `
                ${canCompleteMilestone(task) && canOperateTask(task) ? `
                  <button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'done')"><i class="fas fa-check"></i>完成里程碑</button>

                  <span style="font-size:12px;color:#9CA3AF;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>${escapeHtml(getMilestoneIncompleteHint(task.id))}</span>

                  <button class="btn btn-primary" onclick="showNewSubTaskModal('${task.id}')"><i class="fas fa-plus"></i>添加任务</button>
                ` : ''}
              ` : `
                ${task.status === 'todo' && canOperateTask(task) && !hasActiveChildren(task.id) && !hasHardBlock(task) ? `
                  <button class="btn btn-primary" onclick="updateTaskStatus('${task.id}', 'doing')"><i class="fas fa-play"></i>开始</button>
                  <button class="btn btn-ghost" onclick="updateTaskStatus('${task.id}', 'paused')"><i class="fas fa-pause"></i>暂停</button>
                ` : ''}

                ${task.status === 'doing' && canOperateTask(task) && !hasActiveChildren(task.id) && !hasHardBlock(task) ? `
                  <button class="btn btn-ghost" onclick="updateTaskStatus('${task.id}', 'paused')"><i class="fas fa-pause"></i>暂停</button>
                  <button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'done')"><i class="fas fa-check"></i>完成</button>
                ` : ''}

                ${task.status === 'paused' && canOperateTask(task) && !hasActiveChildren(task.id) && !hasHardBlock(task) ? `
                  <button class="btn btn-primary" onclick="updateTaskStatus('${task.id}', 'doing')"><i class="fas fa-play"></i>继续</button>
                  <button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'done')"><i class="fas fa-check"></i>完成</button>
                ` : ''}

                ${hasHardBlock(task) && canOperateTask(task) ? `
                  <span style="font-size:12px;color:#D97706;"><i class="fas fa-pause-circle" style="margin-right:4px;"></i>等待前置任务完成</span>

                  <span style="font-size:12px;color:#9CA3AF;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>有未完成的下级任务</span>
                ` : ''}
              `}

              ${!canEdit ? `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>` : ''}

          </div>
        </div>

    function editProject(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;
      if (!canManageProject(project)) {
        alert('仅项目负责人或创建人可编辑');
        return;
      }
      state.form = {
        ...project,
        teamMembers: [...(project.teamMembers || [])],
      };
      state.showModal = 'projectEdit';
      render();
    }

    function saveProjectEdit() {
      if (!state.form.name) { alert('请输入项目名称'); return; }

      const idx = projects.findIndex(p => p.id === state.form.id);
      if (idx < 0) return;
      const existing = projects[idx];
      if (!canManageProject(existing)) {
        alert('仅项目负责人或创建人可编辑');
        return;
      }

      const oldStatus = existing.status;
      const newStatus = state.form.status || existing.status;
      if (newStatus === 'paused' && oldStatus !== 'paused') {
        if (!confirm('暂停项目将同时暂停其下未完成任务，且不计入待办与工时。确定暂停？')) return;
      }

      const oldManager = existing.manager;
      projects[idx] = {
        ...projects[idx],
        ...state.form,
        teamMembers: sanitizeProjectTeamMembers(
          state.form.manager || existing.manager,
          state.form.teamMembers
        ),
      };
      syncProjectPauseCascade(projects[idx], oldStatus);
      if (state.form.manager && state.form.manager !== oldManager) {
        notifyProjectManagerAssigned(projects[idx]);
      }
      save();
      closeModal();
    }

    // 项目状态流转
    function updateProjectStatus(projectId, newStatus) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;
      if (!canManageProject(project)) {
        alert('仅项目负责人或创建人可变更状态');
        return;
      }

      const oldStatus = project.status;
      if (newStatus === oldStatus) return;
      if (newStatus === 'paused' && oldStatus !== 'paused') {
        if (!confirm('暂停项目将同时暂停其下未完成任务，且不计入待办与工时。确定暂停？')) return;
      }

      project.status = newStatus;
      syncProjectPauseCascade(project, oldStatus);

      // 记录日志
      appendChangeLogEntry({
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || oldStatus,
        after: projectStatusMap[newStatus]?.label || newStatus,
        reason: newStatus === 'paused' || oldStatus === 'paused'
          ? (newStatus === 'paused' ? '项目暂停（下属任务同步暂停）' : '项目恢复（自动暂停的任务已恢复）')
          : '项目状态变更',
        project: project.name,
      });

      save();
      render();
    }

    // 项目归档
    function archiveProject(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;
      if (!canManageProject(project) && !isFullAccess(currentUser.role)) {
        alert('仅项目负责人或创建人可归档项目');
        return;
      }

      if (!confirm('确定归档该项目？归档后项目将移至归档列表。')) return;

      const oldStatus = project.status;
      project.status = 'archived';
      project.archived = true;
      normalizeProjectRecord(project);

      // 记录日志
      appendChangeLogEntry({
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: projectStatusMap[oldStatus]?.label || oldStatus,
        after: '已归档',
        reason: '项目归档',
        project: project.name,
      });

      save();
      goTo('archive');
    }

    // 项目删除（仅总经理/管理员）
    async function deleteProject(projectId, evt) {
      if (evt) evt.stopPropagation();
      if (!canDeleteProject()) {
        alert('仅总经理/管理员可删除项目');
        return;
      }
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      const projectTasks = tasks.filter(t => t.projectId === projectId);
      const taskCount = projectTasks.length;
      const docCount = (project.documents || []).length;
      const attachCount = projectTasks.reduce((n, t) => n + (t.attachments || []).length, 0);
      const msg = [
        `确定永久删除项目「${project.name}」？`,
        '',
        `· 关联任务：${taskCount} 个`,
        `· 项目文档：${docCount} 个`,
        `· 任务附件：${attachCount} 个`,
        '',
        '此操作不可恢复。',
      ].join('\n');
      if (!confirm(msg)) return;

      const taskIds = new Set(projectTasks.map(t => t.id));
      const fileIds = new Set();
      (project.documents || []).forEach(d => {
        const key = d.fileId || d.id;
        if (key) fileIds.add(key);
      });
      projectTasks.forEach(t => {
        (t.attachments || []).forEach(a => {
          const key = a.fileId || a.id;
          if (key) fileIds.add(key);
        });
        (t.comments || []).forEach(c => {
          (c.attachments || []).forEach(a => { if (a.fileId) fileIds.add(a.fileId); });
        });
      });

      appendChangeLogEntry({
        taskId: 'PROJECT-' + projectId,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: project.name,
        after: '已删除',
        reason: '管理员删除项目',
        project: project.name,
      });

      projects = projects.filter(p => p.id !== projectId);
      tasks = tasks.filter(t => t.projectId !== projectId);
      taskIds.forEach(id => removeDependenciesForTask(id));
      transferLogs = transferLogs.filter(l => !taskIds.has(l.taskId));

      persistLocalCache();
      DataService.cancelScheduledSave();

      if (ApiConfig.enabled && authSession.token) {
        const synced = await DataService.syncToServer({ skipUsers: !isFullAccess(currentUser.role) });
        if (!synced) {
          alert('删除已在本地生效，但同步服务端失败，请检查网络后重试或刷新页面');
        }
        if (fileIds.size) {
          const headers = AuthService.getAuthHeaders();
          fileIds.forEach(fileId => {
            fetch(ApiConfig.baseUrl + '/files/' + encodeURIComponent(fileId), {
              method: 'DELETE',
              headers,
            }).catch(() => {});
          });
        }
      }

      const nextPage = state.page === 'archive' ? 'archive' : 'projects';
      await goTo(nextPage, { skipReload: true });
    }

          kind: normalizeProfileKind(kind),

    function saveStaff() {
      if (!state.form.userId && !isFullAccess(currentUser.role)) {

        return;
      }
      if (!state.form.name && isFullAccess(currentUser.role)) { alert('请输入姓名'); return; }

      let savedUser = null;
      const idx = users.findIndex(u => u.id === state.form.userId);
      if (idx >= 0) {
        const existing = users[idx];
        if (!canEditStaff(existing)) {
          alert('您没有权限编辑该人员');
          return;
        }
        if (currentUser.role === 'manager') {
          users[idx] = {
            ...existing,
            position: state.form.position ?? existing.position,
            leaderId: state.form.leaderId ?? existing.leaderId,
          };
        } else {
          const profileKind = normalizeProfileKind(state.form.profileKind || existing.profileKind);
          const role = profileKind === 'contact' ? 'staff' : (state.form.role || existing.role || 'staff');
          const { userId, profileKindLocked, ...rest } = state.form;
          users[idx] = {
            ...users[idx],
            ...rest,
            role,
            profileKind,
          };
        }
        savedUser = users[idx];
      } else if (isFullAccess(currentUser.role)) {
        if (!state.form.name) { alert('请输入姓名'); return; }
        const profileKind = normalizeProfileKind(
          state.form.profileKind || catalogKindForDept(state.form.dept || currentUser.dept)

        savedUser = {
          id: genId('U'),
          name: state.form.name,
          dept: state.form.dept || currentUser.dept,

        users.push(savedUser);

      if (savedUser) {
        const allIdx = allStaffUsers.findIndex(u => u.id === savedUser.id);
        if (allIdx >= 0) allStaffUsers[allIdx] = { ...allStaffUsers[allIdx], ...savedUser };

      closeModal();

        alert(`已同步更新本部门 ${batchLeaderSyncCount} 名人员的上级为「${savedUser.name}」`);

    }

    // 更新计划截止日期
    function updateEndDate() {
      const startDate = state.form.planStartDate;
      const hours = state.form.estimatedHours;
      if (startDate && hours && hours > 0) {
        const endDate = calcEndDate(startDate, hours, state.form.dailyHours);
        state.form.dueDate = endDate; // dueDate 自动设置为计划截止日期
        const endDateInput = document.getElementById('autoEndDate');
        if (endDateInput) endDateInput.value = endDate;
      }
    }

    // 更新任务状态，自动计算实际工时
    function updateTaskStatus(taskId, newStatus) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      if (isTaskProjectPaused(task) && newStatus !== 'paused') {
        alert('所属项目已暂停，请先恢复项目后再变更任务状态');
        return;
      }

      if ((newStatus === 'doing' || newStatus === 'done') && hasHardBlock(task)) {
        alert(getHardBlockAlertMessage(task));
        return;
      }

      if (newStatus === 'done' && isMilestoneTask(task) && !areAllMilestoneTasksDone(task.id)) {
        alert(getMilestoneIncompleteHint(task.id));
        return;
      }

      if (newStatus === 'done' && !isMilestoneTask(task) && hasActiveChildren(task.id)) {
        alert('该任务存在未完成的下级任务，请先完成下级任务。');
        return;
      }

      const oldStatus = task.status;
      const today = todayStr();

      if ((newStatus === 'doing' || newStatus === 'done') && oldStatus !== newStatus) {
        if (!ensureIntakeEstimatedHours(task)) return;
      }

      // 进入进行中：无实际开工日时记录；从暂停恢复时保留原开工日
      if (newStatus === 'doing' && oldStatus !== 'doing' && oldStatus !== 'done') {
        if (!task.actualStartDate) task.actualStartDate = today;
      }

      // 状态变为"已完成"，进度 100% 并记录实际结束时间
      if (newStatus === 'done' && oldStatus !== 'done') {
        // 表单提报可直达完成：补实际开始日以便计算实际工时
        if (isAitableIntakeTask(task) && !task.actualStartDate) task.actualStartDate = today;
        applyTaskDoneFields(task);
      }

      // 更新状态
      task.status = newStatus;

      // 记录日志
      appendChangeLogEntry({
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: statusMap[oldStatus]?.label || oldStatus,
        after: statusMap[newStatus]?.label || newStatus,
        reason: '状态变更',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      // 更新上级任务进度
      if (task.parentId) {
        updateParentProgress(task.parentId);
      }

      if (newStatus === 'done') {
        onTaskMarkedDone(task);
        onPredecessorTaskCompleted(task);
      }

      save();

      const returnToMember = state.returnToMemberId;
      if (returnToMember) {
        state.returnToMemberId = null;
        state.form = { memberUserId: returnToMember };
        state.showModal = 'memberKanban';
        state.prevProjectId = null;
        render();
        return;
      }

      // 关闭弹窗，刷新页面
      state.showModal = null;
      state.form = state.prevProjectId ? { projectId: state.prevProjectId } : {};
      state.prevProjectId = null;
      render();
    }

    function quickUpdateProgress(taskId, progress) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !canQuickUpdateProgress(task)) return;

      const newProgress = Math.max(0, Math.min(100, parseInt(progress, 10) || 0));
      const oldProgress = task.progress || 0;
      if (newProgress === oldProgress) return;

      task.progress = newProgress;
      if (newProgress === 100 && task.status !== 'done') {
        if (hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          task.progress = oldProgress;
          render();
          return;
        }
        if (isMilestoneTask(task) && !areAllMilestoneTasksDone(task.id)) {
          alert(getMilestoneIncompleteHint(task.id));
          task.progress = oldProgress;
          render();
          return;
        }
        if (!isMilestoneTask(task) && hasActiveChildren(task.id)) {
          alert('该任务存在未完成的下级任务，请先完成下级任务。');
          task.progress = oldProgress;
          render();
          return;
        }
        if (!ensureIntakeEstimatedHours(task)) {
          task.progress = oldProgress;
          render();
          return;
        }
        if (isAitableIntakeTask(task) && !task.actualStartDate) task.actualStartDate = todayStr();
        applyTaskDoneFields(task);
        task.status = 'done';
        onTaskMarkedDone(task);
        onPredecessorTaskCompleted(task);
      } else if (newProgress > 0 && task.status === 'todo') {
        if (hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          task.progress = oldProgress;
          render();
          return;
        }
        if (!ensureIntakeEstimatedHours(task)) {
          task.progress = oldProgress;
          render();
          return;
        }
        task.actualStartDate = task.actualStartDate || todayStr();
        task.status = 'doing';
      }

      appendChangeLogEntry({
        taskId: task.id,
        operator: currentUser.name,
        operateTime: new Date().toLocaleString(),
        before: oldProgress + '%',
        after: newProgress + '%',
        reason: '快捷更新进度',
        project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
      });

      if (task.parentId) updateParentProgress(task.parentId);
      save();
      state.showModal = 'taskDetail';
      state.form = { taskId };
      render();
    }

    // 递归更新上级任务进度（按子任务进度比例平均）；任意子任务开始则上级自动开始，全部完成则上级自动完成
    function updateParentProgress(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      const activeChildren = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      if (activeChildren.length > 0) {
        task.progress = calcProgress(taskId);

        // 任意未作废子任务已开始/已完成，且上级仍为待开始 → 自动开始
        const anyChildStarted = activeChildren.some(
          c => c.status === 'doing' || c.status === 'done'
        );
        if (anyChildStarted && task.status === 'todo') {
          task.status = 'doing';
          task.actualStartDate = task.actualStartDate || todayStr();
        }

        const allChildrenDone = activeChildren.every(c => c.status === 'done');
        const canAutoDone = isMilestoneTask(task)
          ? areAllMilestoneTasksDone(task.id)
          : (allChildrenDone && task.progress === 100);
        if (canAutoDone && task.status !== 'done' && task.status !== 'archived' && task.status !== 'abolished') {
          applyTaskDoneFields(task);
          task.status = 'done';
          onTaskMarkedDone(task);
        }

        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      } else {
        const hadChildren = tasks.some(t => t.parentId === taskId);
        if (hadChildren) task.progress = 0;
        if (task.parentId) {
          updateParentProgress(task.parentId);
        }
      }
    }

    /** 打开任务详情；节点间跳转时压入浏览栈，供「返回前一步」 */
    function viewTask(taskId, opts) {
      const t = tasks.find(x => x.id === taskId);
      if (!t || !canViewTask(t)) {
        alert('无权查看该任务');
        return;
      }
      const skipStack = !!(opts && opts.skipStack);
      if (!Array.isArray(state.taskViewStack)) state.taskViewStack = [];
      if (!skipStack) {
        if (state.showModal === 'taskDetail' && state.form.taskId && state.form.taskId !== taskId) {
          state.taskViewStack.push(state.form.taskId);
        } else if (state.showModal !== 'taskDetail') {
          state.taskViewStack = [];
        }
      }
      // 如果当前在项目详情页且还没有保存prevProjectId，记录projectId以便返回
      if (state.page === 'projectDetail' && !state.prevProjectId) {
        state.prevProjectId = state.form.projectId;
      }
      state.form = { taskId };
      state.showModal = 'taskDetail';
      state.taskDetailTab = 'info';
      render();
    }

    /** 任务详情：返回前一步（浏览历史 → 上级节点 → 关闭） */
    function goBackTaskStep() {
      if (!Array.isArray(state.taskViewStack)) state.taskViewStack = [];
      while (state.taskViewStack.length) {
        const prevId = state.taskViewStack.pop();
        if (prevId && prevId !== state.form.taskId) {
          const prev = tasks.find(x => x.id === prevId);
          if (prev && canViewTask(prev)) {
            viewTask(prevId, { skipStack: true });
            return;
          }
        }
      }
      const task = tasks.find(x => x.id === state.form.taskId);
      if (task && task.parentId) {
        const parent = tasks.find(x => x.id === task.parentId);
        if (parent && canViewTask(parent)) {
          viewTask(parent.id, { skipStack: true });
          return;
        }
      }
      closeModal();
    }

    const QUICK_CREATE_MAX_ATTACH_BYTES = 20 * 1024 * 1024;

    function clearQuickCreatePendingAttachments(form) {
      const list = form?.pendingAttachments;
      if (!Array.isArray(list)) return;
      list.forEach(entry => {
        if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      });
      form.pendingAttachments = [];
    }

    function ensureQuickCreatePendingAttachments() {
      if (!Array.isArray(state.form.pendingAttachments)) state.form.pendingAttachments = [];
      return state.form.pendingAttachments;
    }

    function appendQuickCreatePendingFiles(files) {
      if (!files?.length) return;
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请登录并连接服务端后上传附件');
        return;
      }
      const pending = ensureQuickCreatePendingAttachments();
      let rejected = 0;
      for (const file of files) {
        if (!file) continue;
        if (file.size > QUICK_CREATE_MAX_ATTACH_BYTES) {
          rejected++;
          continue;
        }
        const isImg = isImageMime(file.type) || isImageFileName(file.name);
        pending.push({
          localId: genId('PA'),
          file,
          previewUrl: isImg ? URL.createObjectURL(file) : null,
        });
      }
      if (rejected) {
        alert(`有 ${rejected} 个文件超过 20MB，已跳过`);
      }
      render();
    }

    function addQuickCreateFiles(event) {
      const files = Array.from(event.target.files || []);
      event.target.value = '';
      appendQuickCreatePendingFiles(files);
    }

    function removeQuickCreatePendingFile(localId) {
      const pending = ensureQuickCreatePendingAttachments();
      const idx = pending.findIndex(x => x.localId === localId);
      if (idx < 0) return;
      const entry = pending[idx];
      if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      pending.splice(idx, 1);
      render();
    }

    function handleQuickCreateFilesPaste(event) {
      const files = extractClipboardImageFiles(event);
      if (!files.length) return;
      event.preventDefault();
      appendQuickCreatePendingFiles(files.map(file => {
        const named = clipboardFileName(file, 'paste');
        return new File([file], named, { type: file.type || 'image/png' });
      }));
    }

    async function saveQuickCreate() {
      if (state._quickCreateSaving) return;
      const title = (state.form.title || '').trim();
      if (!title) { alert('请输入标题'); return; }
      if (!state.form.assignee) { alert('请选择负责人'); return; }
      if (!state.form.dueDate) { alert('请选择截止日期'); return; }
      if (state.form.planStartDate && state.form.dueDate && state.form.planStartDate > state.form.dueDate) {
        alert('计划开始时间不能晚于截止日期');
        return;
      }
      const projectId = state.form.projectId || '';
      if (projectId) {
        const project = projects.find(p => p.id === projectId);
        if (!project || !canManageProject(project)) {
          alert('仅项目负责人或创建人可将事项挂到该项目');
          return;
        }
      }
      const pending = (state.form.pendingAttachments || []).slice();
      state.form.pendingAttachments = [];
      const newTask = {
        id: genId('T'),
        title,
        desc: '',
        type: projectId ? 'normal' : 'temp',
        projectId,
        parentId: null,
        assignee: state.form.assignee,
        collaboratorEntries: [],
        collaborators: [],
        creator: currentUser.name,
        createdAt: getNowCreatedAt(),
        status: 'todo',
        priority: 'normal',
        progress: 0,
        dueDate: state.form.dueDate,
        estimatedHours: 0,
        actualHours: 0,
        planStartDate: state.form.planStartDate || null,
        actualStartDate: null,
        actualEndDate: null,
        comments: [],
        attachments: [],
      };
      state._quickCreateSaving = true;
      const submitBtn = document.getElementById('quickCreateSubmitBtn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 创建中…';
      }
      try {
        tasks.push(newTask);
        notifyTaskAssigned(newTask);
        if (pending.length && ApiConfig.enabled && authSession.token) {
          persistLocalCache();
          DataService.cancelScheduledSave();
          for (let i = 0; i < 25 && DataService._syncing; i++) {
            await new Promise(r => setTimeout(r, 200));
          }
          const synced = await DataService.syncToServer({ skipUsers: !isFullAccess(currentUser.role) });
          if (!synced) {
            pending.forEach(entry => {
              if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
            });
            save();
            alert('事项已创建，但同步失败，附件未能上传。请稍后在事项详情中重新上传。');
            closeModal();
            return;
          }
          let failCount = 0;
          for (const entry of pending) {
            try {
              const file = entry.file;
              await uploadFileToEntity('task', newTask.id, file, file?.name, 'attachment');
            } catch (e) {
              failCount++;
              console.warn('[新建事项] 附件上传失败', e);
            }
            if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
          }
          if (failCount) {
            alert(`事项已创建，但有 ${failCount} 个附件上传失败，可在详情中重试`);
          }
        } else {
          pending.forEach(entry => {
            if (entry?.previewUrl) URL.revokeObjectURL(entry.previewUrl);
          });
          if (pending.length) {
            alert('事项已创建。附件上传需连接服务端，请在详情中重新上传。');
          }
          save();
        }
        closeModal();
      } finally {
        state._quickCreateSaving = false;
      }
    }

    function saveTask() {
      if (!state.form.title) { alert(state.form.isMilestone ? '请输入里程碑名称' : '请输入任务标题'); return; }
      state.form.dailyHours = resolveDailyHours(state.form.dailyHours);
      if (state.form.planStartDate && Number(state.form.estimatedHours) > 0) {
        const autoDue = calcEndDate(state.form.planStartDate, state.form.estimatedHours, state.form.dailyHours);
        if (autoDue) state.form.dueDate = autoDue;
      }

      const formIsMilestone = !!state.form.isMilestone || (!!state.form.id && isMilestoneTask(tasks.find(t => t.id === state.form.id)));

      // 编辑上级任务：预计工时不得低于子任务已分配合计
      if (state.form.id && (formIsMilestone || !state.form.parentId)) {
        const allocated = getChildrenAllocatedHours(state.form.id);
        const proposedParent = Number(state.form.estimatedHours) || 0;
        if (allocated > 0 && proposedParent < allocated) {
          alert(`${formIsMilestone ? '里程碑' : '上级任务'}预计工时不能低于子任务已分配合计！\n\n子任务已分配：${allocated}小时\n当前填写：${proposedParent}小时\n\n请将预计工时调整为至少 ${allocated} 小时。`);
          return;
        }
      }

      // 校验子任务工时是否超过上级
      if (state.form.parentId && state.form.estimatedHours) {
        const budget = getChildHoursBudgetInfo(state.form.parentId, state.form.id || null, state.form.estimatedHours);
        if (budget && budget.overflow > 0) {
          const { parentTask, parentHours, otherChildrenHours, proposed, totalAllocated, minParentHours } = budget;
          alert(
            `子任务工时不能超过上级任务！\n\n` +
            `上级任务「${parentTask.title}」工时：${parentHours}小时\n` +
            `其他子任务已分配：${otherChildrenHours}小时\n` +
            `本任务拟填写：${proposed}小时\n` +
            `合计需：${totalAllocated}小时，超出 ${budget.overflow} 小时\n\n` +
            `建议：请编辑上级任务「${parentTask.title}」，将预计工时调整为至少 ${minParentHours} 小时后再保存本任务。\n` +
            `或将本任务预计工时调整为不超过 ${Math.max(0, parentHours - otherChildrenHours)} 小时。`
          );
          return;
        }
      }

      const task = tasks.find(t => t.id === state.form.id);
      if (task) {
        if (!canEditTask(task)) {
          alert('您没有编辑该任务的权限');
          return;
        }
        if (isTerminalTaskStatus(task.status)) {
          alert('已作废或已归档的任务不可编辑');
          return;
        }
        // 编辑已有任务，必须填写修改原因
        if (!state.form.reason) { alert('请填写修改原因'); return; }
        const oldAssignee = task.assignee;
        const oldStatus = task.status;
        if (isTaskProjectPaused(task) && state.form.status !== 'paused' && state.form.status !== oldStatus) {
          alert('所属项目已暂停，请先恢复项目后再变更任务状态');
          return;
        }
        if ((state.form.status === 'doing' || state.form.status === 'done') && state.form.status !== oldStatus && hasHardBlock(task)) {
          alert(getHardBlockAlertMessage(task));
          return;
        }
        if (state.form.status === 'done' && oldStatus !== 'done' && isMilestoneTask(task) && !areAllMilestoneTasksDone(task.id)) {
          alert(getMilestoneIncompleteHint(task.id));
          return;
        }
        if (state.form.status === 'done' && oldStatus !== 'done' && !isMilestoneTask(task) && hasActiveChildren(task.id)) {
          alert('该任务存在未完成的下级任务，请先完成下级任务。');
          return;
        }
        if (
          isAitableIntakeTask(task)
          && (state.form.status === 'doing' || state.form.status === 'done')
          && state.form.status !== oldStatus
          && !(Number(state.form.estimatedHours) > 0)
        ) {
          alert('表单提报任务须填写预计工时后才能开始或完成');
          return;
        }
        if (
          isAitableIntakeTask(task)
          && (state.form.status === 'doing' || state.form.status === 'done')
          && !state.form.planStartDate
        ) {
          state.form.planStartDate = todayStr();
        }
        if (
          isAitableIntakeTask(task)
          && state.form.status === 'done'
          && oldStatus !== 'done'
          && !task.actualStartDate
        ) {
          task.actualStartDate = todayStr();
        }
        const diffs = buildTaskChangeDiff(task, state.form);
        appendChangeLogEntry({
          taskId: task.id,
          operator: currentUser.name,
          operateTime: new Date().toLocaleString(),
          before: formatChangeDiffText(diffs, 'before'),
          after: formatChangeDiffText(diffs, 'after'),
          reason: state.form.reason,
          project: projects.find(p => p.id === task.projectId)?.name || '临时任务',
        });
        const preservedCreatedAt = task.createdAt;
        const preservedStatus = isTerminalTaskStatus(task.status) ? task.status : null;
        Object.assign(task, state.form);
        if (preservedCreatedAt) task.createdAt = preservedCreatedAt;
        if (preservedStatus) task.status = preservedStatus;
        if (isAitableIntakeTask(task) && (task.status === 'doing' || task.status === 'done') && !task.actualStartDate) {
          task.actualStartDate = todayStr();
        }
        if (isMilestoneTask(task) || formIsMilestone) {
          task.isMilestone = true;
          task.parentId = null;
        } else {
          task.isMilestone = false;
        }
        delete task.informCollaborator;
        delete task.assistCollaborator;
        delete task.informCollaborators;
        delete task.assistCollaborators;
        reconcileEffectivePlanStart(task);
        syncTaskScheduleFields(task);
        try {
          syncCollaboratorsByType(task, COLLAB_TYPE_INFORM, getTaskFormCollaboratorNames(task, COLLAB_TYPE_INFORM), { notify: false });
          syncCollaboratorsByType(task, COLLAB_TYPE_ASSIST, getTaskFormCollaboratorNames(task, COLLAB_TYPE_ASSIST));
        } catch (e) {
          alert(e.message);
          return;
        }
        if (state.form.status === 'done' && oldStatus !== 'done') {
          applyTaskDoneFields(task);
          onTaskMarkedDone(task);
          onPredecessorTaskCompleted(task);
        } else if (task.status === 'done') {
          task.progress = 100;
        }
        if (state.form.assignee && state.form.assignee !== oldAssignee) {
          notifyTaskAssigned(task);
        }
        if (task.parentId) updateParentProgress(task.parentId);
      } else {
        const creatingMilestone = !!state.form.isMilestone;
        const parentTask = state.form.parentId ? tasks.find(t => t.id === state.form.parentId) : null;
        if (!creatingMilestone && state.form.projectId && !parentTask) {
          alert('项目任务须挂在里程碑下，请选择所属里程碑');
          return;
        }
        if (parentTask && !canCreateSubTask(parentTask)) {
          alert(isMilestoneTask(parentTask) ? '无权在该里程碑下添加任务' : '无权在该任务下添加子任务');
          return;
        }
        if (creatingMilestone || (!parentTask && state.form.projectId)) {
          const project = projects.find(p => p.id === state.form.projectId);
          if (!project || !canManageProject(project)) {
            alert(creatingMilestone ? '仅项目负责人或创建人可添加里程碑' : '仅项目负责人或创建人可添加任务');
            return;
          }
        }
        // 新建任务，不需要修改原因
        const newTask = {
          ...state.form,
          id: genId('T'),
          projectId: state.form.projectId || '',
          parentId: creatingMilestone ? null : (state.form.parentId || null),
          isMilestone: creatingMilestone,
          assignee: state.form.assignee || currentUser.name,
          collaboratorEntries: [],
          creator: currentUser.name,
          createdAt: getNowCreatedAt(),
          estimatedHours: state.form.estimatedHours || 0,
          actualHours: 0,
          planStartDate: state.form.planStartDate || null,
          actualStartDate: null,
          actualEndDate: null,
          attachments: [],
        };
        reconcileEffectivePlanStart(newTask);
        syncTaskScheduleFields(newTask);
        tasks.push(newTask);
        try {
          syncCollaboratorsByType(newTask, COLLAB_TYPE_INFORM, getTaskFormCollaboratorNames(newTask, COLLAB_TYPE_INFORM), { notify: false });
          syncCollaboratorsByType(newTask, COLLAB_TYPE_ASSIST, getTaskFormCollaboratorNames(newTask, COLLAB_TYPE_ASSIST));
        } catch (e) {
          tasks.pop();
          alert(e.message);
          return;
        }
        notifyTaskAssigned(newTask);
        if (newTask.parentId) updateParentProgress(newTask.parentId);
        const returnTo = state.returnToTaskId;
        save();
        if (returnTo) {
          state.returnToTaskId = null;
          state.form = { taskId: returnTo };
          state.showModal = 'taskDetail';
          render();
          return;
        }
      }
      save();
      closeModal();
    }

    const IMPORT_HEADER_MAP = {
      '项目名称': 'projectName', 'projectName': 'projectName', '项目': 'projectName',

    function normalizeImportRow(raw) {
      const row = {};
      Object.keys(raw).forEach(key => {
        const k = key.trim().replace(/^\uFEFF/, '');
        const mapped = IMPORT_HEADER_MAP[k] || k;
        row[mapped] = String(raw[key] || '').trim();
      });
      if (row.projectName && !row.name) row.name = row.projectName;
      if (row.taskTitle && !row.title) row.title = row.taskTitle;
      if (row.taskDesc && !row.desc) row.desc = row.taskDesc;
      if (row.projectDesc && !row.desc) row.desc = row.projectDesc;
      row.startDate = normalizeImportDate(row.startDate);
      row.endDate = normalizeImportDate(row.endDate);
      row.planStartDate = normalizeImportDate(row.planStartDate);
      row.dueDate = normalizeImportDate(row.dueDate);
      return row;
    }

    function normalizeImportDate(val) {
      if (val === null || val === undefined || val === '') return '';
      const s = String(val).trim();
      if (!s) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const slash = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if (slash) {
        return `${slash[1]}-${String(slash[2]).padStart(2, '0')}-${String(slash[3]).padStart(2, '0')}`;
      }
      const parsed = parseLocalDate(s);
      return parsed ? formatLocalDate(parsed) : s.slice(0, 10);
    }

    function parseImportCollaborators(raw, assignee) {
      if (!raw) return [];
      return String(raw).split(/[,，;；、|/\\]+/).map(s => s.trim()).filter(Boolean);
    }

    function applyImportCollaborators(task, raw, assignee) {
      const names = sanitizeTaskCollaborators(assignee, parseImportCollaborators(raw, assignee));
      ensureCollaboratorEntries(task);
      task.collaboratorEntries = (task.collaboratorEntries || []).filter(e => e.type !== COLLAB_TYPE_INFORM);
      names.forEach(name => {
        task.collaboratorEntries.push({
          id: genId('COL'),
          userName: name,
          type: COLLAB_TYPE_INFORM,
          status: COLLAB_STATUS_ACTIVE,
        });
      });
      syncCollaboratorsArray(task);
      return names;
    }

    function finalizeImportedTask(task, row) {
      task.priority = normalizePriority(row.priority || task.priority || 'normal');
      task.type = normalizeTaskType(row.taskType || task.type);
      task.estimatedHours = parseFloat(row.estimatedHours) || task.estimatedHours || 0;
      task.dailyHours = resolveDailyHours(row.dailyHours) ?? task.dailyHours ?? null;
      task.planStartDate = row.planStartDate || task.planStartDate || null;
      task.dueDate = row.dueDate || task.dueDate || '';
      applyImportCollaborators(task, row.collaboratorsRaw, task.assignee);
      if (task.planStartDate && task.estimatedHours > 0) {
        reconcileEffectivePlanStart(task);
        syncTaskScheduleFields(task);
      } else if (task.dueDate && !task.planStartDate) {
        task.planStartDate = task.dueDate;
      }
      return task;
    }

    function detectImportType(rows) {
      if (!rows.length) return 'unified';
      const keys = Object.keys(rows[0]).map(k => k.trim());
      const hasTaskLevels = keys.some(k => ['一级任务', '二级任务', '三级任务', '四级任务', 'level1', 'level2', 'level3', 'level4', '主任务'].includes(k));
      if (hasTaskLevels) return 'unified';
      if (keys.some(k => ['title', 'taskTitle', '任务标题', '任务名称'].includes(k))) return 'task';
      if (keys.some(k => ['name', 'projectName', '项目名称'].includes(k)) && keys.some(k => ['dept', '所属部门', '部门'].includes(k))) return 'project';
      return 'unified';
    }

    function normalizePriority(p) {
      const map = { '紧急': 'urgent', urgent: 'urgent', '高': 'urgent', '重要': 'important', important: 'important', '中': 'important', '普通': 'normal', normal: 'normal', '低': 'normal' };
      return map[p] || 'normal';
    }

    function normalizeTaskType(t) {
      if (!t) return 'normal';
      return (t === '临时' || t === 'temp') ? 'temp' : 'normal';
    }

    function getUnifiedTaskLevels(row) {
      const levels = [row.level1, row.level2, row.level3, row.level4].filter(Boolean);
      if (row.taskTitle) {
        if (levels.length === 0) return [row.taskTitle];
        if (levels[levels.length - 1] !== row.taskTitle) levels.push(row.taskTitle);
      }
      return levels;
    }

    function validateUnifiedRow(row, projectCache) {
      const levels = getUnifiedTaskLevels(row);
      if (!row.projectName) return { valid: false, reason: '缺少项目名称' };
      if (levels.length === 0) return { valid: false, reason: '缺少任务层级' };
      if (!row.assignee) return { valid: false, reason: '缺少负责人' };
      const existing = projectCache[row.projectName] || projects.find(p => p.name === row.projectName);
      if (!existing && (!row.dept || !row.manager)) return { valid: false, reason: '新项目需填部门和负责人' };
      return { valid: true, levels };
    }

    function getOrCreateProject(row, cache) {
      if (cache[row.projectName]) return cache[row.projectName];
      let project = projects.find(p => p.name === row.projectName);
      if (!project) {
        project = {
          id: genId('PRJ'),
          name: row.projectName,
          desc: row.projectDesc || '',
          dept: row.dept,
          manager: row.manager,
          status: 'active',
          startDate: row.startDate || new Date().toISOString().split('T')[0],
          endDate: row.endDate || '',
          archived: false,
          creator: currentUser.name,
          createdAt: getNowCreatedAt(),
        };
        projects.push(project);
      } else {
        // 同名已存在时仍挂到该项目；用导入行补全空描述/日期，避免旧脏数据导致「导了却像没变」
        if (row.projectDesc && !project.desc) project.desc = row.projectDesc;
        if (row.dept && !project.dept) project.dept = row.dept;
        if (row.manager && !project.manager) project.manager = row.manager;
        if (row.startDate) project.startDate = row.startDate;
        if (row.endDate) project.endDate = row.endDate;
      }
      cache[row.projectName] = project;
      return project;
    }

    function findTaskByParent(projectId, parentId, title) {
      return tasks.find(t => t.projectId === projectId && t.parentId === parentId && t.title === title);
    }

    function ensureTaskPath(projectId, levels, taskMap, row) {
      let parentId = null;
      // 仅一级时：一级作里程碑，并在其下生成同名任务承载工时/负责人
      const workLevels = levels.length === 1 ? [levels[0], levels[0]] : levels;
      for (let i = 0; i < workLevels.length; i++) {
        const isMilestoneLevel = i === 0;
        const pathKey = projectId + '::' + workLevels.slice(0, i + 1).join(' / ') + (levels.length === 1 && i === 1 ? '::work' : '');
        if (taskMap[pathKey]) {
          parentId = taskMap[pathKey];
          continue;
        }
        const existing = findTaskByParent(projectId, parentId, workLevels[i]);
        if (existing && !(levels.length === 1 && i === 1 && isMilestoneTask(existing))) {
          if (isMilestoneLevel) existing.isMilestone = true;
          if (i === workLevels.length - 1 && !isMilestoneTask(existing)) finalizeImportedTask(existing, row);
          taskMap[pathKey] = existing.id;
          parentId = existing.id;
          continue;
        }
        const isLast = i === workLevels.length - 1;
        const assignee = isLast ? row.assignee : (row.assignee || row.manager || currentUser.name);
        const task = {
          id: genId('T'),
          projectId,
          parentId,
          title: workLevels[i],
          desc: isLast && !isMilestoneLevel ? (row.taskDesc || row.desc || '') : '',
          assignee,
          collaboratorEntries: [],
          creator: currentUser.name,
          status: 'todo',
          priority: 'normal',
          type: 'normal',
          isMilestone: isMilestoneLevel,
          dueDate: '',
          progress: 0,
          estimatedHours: 0,
          actualHours: 0,
          planStartDate: null,
          actualStartDate: null,
          actualEndDate: null,
          createdAt: getNowCreatedAt(),
        };
        if (isLast && !isMilestoneLevel) finalizeImportedTask(task, row);
        tasks.push(task);
        taskMap[pathKey] = task.id;
        parentId = task.id;
      }
    }

    // 处理文件上传
    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseCSV(e.target.result).map(normalizeImportRow));
          } catch (error) {
            alert('CSV 解析失败：' + error.message);
          }
        };
        reader.readAsText(file, 'UTF-8');
      } else if (ext === 'xlsx' || ext === 'xls') {
        if (typeof XLSX === 'undefined') {
          alert('Excel 解析库未加载，请检查网络连接后刷新页面重试');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            processImportRows(parseExcel(e.target.result));
          } catch (error) {
            alert('Excel 解析失败：' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert('不支持的文件格式，请上传 .xlsx、.xls 或 .csv 文件');
      }
    }

    function processImportRows(rows) {
      const data = rows.filter(row => Object.values(row).some(v => String(v || '').trim()));
      if (!data.length) {
        alert('文件中没有有效数据，请检查表头和内容行');
        return;
      }
      state.importData = data;
      state.importType = detectImportType(data);
      state.importStatus = 'preview';
      state.importResult = null;
      render();
    }

    // 解析 Excel
    function parseExcel(arrayBuffer) {
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      const preferred = ['统一导入', '导入', 'Sheet1'];
      const sheetName = preferred.find(n => workbook.SheetNames.includes(n)) || workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      return json.map(row => {
        const raw = {};
        Object.keys(row).forEach(k => {
          raw[k.trim().replace(/^\uFEFF/, '')] = String(row[k] ?? '').trim();
        });
        return normalizeImportRow(raw);
      });
    }

    // 解析CSV
    function parseCSV(text) {
      const lines = text.split('\n').filter(line => line.trim());
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      const data = [];

      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.trim());
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || '';
        });
        data.push(row);
      }

      return data;
    }

    // 执行导入
    function executeImport() {
      const importType = state.importType || 'unified';

      if (importType === 'unified') {
        const validData = state.importData.filter(row => validateUnifiedRow(row, {}).valid);
        if (validData.length === 0) {
          alert('没有有效的数据可导入，请检查项目名称、任务层级和负责人是否填写完整');
          return;
        }
        const projectNames = [...new Set(validData.map(r => r.projectName))];
        if (!confirm(`确定一键导入？\n\n• ${validData.length} 条任务\n• ${projectNames.length} 个项目\n\n系统将自动创建项目并建立任务层级。`)) return;

        const projectsBefore = projects.length;
        const tasksBefore = tasks.length;
        const projectCache = {};
        const taskMap = {};
        let successCount = 0;
        let failCount = 0;

        validData.forEach(row => {
          try {
            const v = validateUnifiedRow(row, projectCache);
            if (!v.valid) { failCount++; return; }
            const project = getOrCreateProject(row, projectCache);
            ensureTaskPath(project.id, v.levels, taskMap, row);
            successCount++;
          } catch (e) {
            failCount++;
          }
        });

        const projectCreated = projects.length - projectsBefore;
        const taskCreated = tasks.length - tasksBefore;

        save();
        state.importResult = {
          success: failCount === 0,
          message: `导入完成！成功 ${successCount} 条任务，新建 ${projectCreated} 个项目、${taskCreated} 个任务节点${failCount > 0 ? '，失败 ' + failCount + ' 条' : ''}`
        };
        state.importData = [];
        state.importStatus = 'done';
        render();
        return;
      }

      const validData = state.importData.filter(row => {
        if (importType === 'project') {
          return (row.name || row.projectName) && row.dept && (row.manager || row.assignee);
        } else {
          const projectRef = row.projectId || row.projectName;
          return (row.title || row.taskTitle) && projectRef && row.assignee
            && projects.some(p => p.id === projectRef || p.name === projectRef);
        }
      });

      if (validData.length === 0) {
        alert('没有有效的数据可导入');
        return;
      }

      if (!confirm(`确定导入 ${validData.length} 条数据？`)) return;

      let successCount = 0;
      let failCount = 0;

      if (importType === 'project') {
        validData.forEach(row => {
          try {
            // 检查项目是否已存在
            const existing = projects.find(p => p.name === (row.name || row.projectName));
            if (existing) {
              failCount++;
              return;
            }

            projects.push({
              id: genId('PRJ'),
              name: row.name || row.projectName,
              desc: row.desc || row.projectDesc || '',
              dept: row.dept,
              manager: row.manager || row.assignee,
              status: 'active',
              startDate: row.startDate || new Date().toISOString().split('T')[0],
              endDate: row.endDate || '',
              archived: false,
              creator: currentUser.name,
              createdAt: getNowCreatedAt(),
            });
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      } else {
        // 任务导入需要先生成项目ID映射
        const projectIdMap = {};
        validData.forEach(row => {
          const ref = row.projectId || row.projectName;
          if (ref && !projectIdMap[ref]) {
            const existingProject = projects.find(p => p.id === ref || p.name === ref);
            if (existingProject) projectIdMap[ref] = existingProject.id;
          }
        });

        validData.forEach(row => {
          try {
            const ref = row.projectId || row.projectName;
            const projectId = projectIdMap[ref];
            const project = projects.find(p => p.id === projectId);
            if (!project) {
              failCount++;
              return;
            }

            // 查找上级任务
            let parentId = null;
            if (row.parentId) {
              const parentTask = tasks.find(t =>
                (t.id === row.parentId || t.title === row.parentId) && t.projectId === projectId
              );
              parentId = parentTask ? parentTask.id : null;
            }

            const task = {
              id: genId('T'),
              type: 'normal',
              projectId,
              parentId,
              title: row.title || row.taskTitle,
              desc: row.desc || row.taskDesc || '',
              assignee: row.assignee,
              collaborators: [],
              creator: currentUser.name,
              status: 'todo',
              priority: 'normal',
              dueDate: '',
              progress: 0,
              estimatedHours: 0,
              actualHours: 0,
              planStartDate: null,
              actualStartDate: null,
              actualEndDate: null,
              createdAt: getNowCreatedAt(),
            };
            finalizeImportedTask(task, row);
            tasks.push(task);
            successCount++;
          } catch (e) {
            failCount++;
          }
        });
      }

      save();

      state.importResult = {
        success: failCount === 0,
        message: `导入完成！成功 ${successCount} 条，失败 ${failCount} 条`
      };
      state.importData = [];
      state.importStatus = 'done';
      render();
    }

          ['功能测试验证', '测试验证', '项目管理系统1.0版本上线', '主方案自研系统开发', '王元斌', '章志红', '重要', '16', '2026-07-01', '', '常规'],
