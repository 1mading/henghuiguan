<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>恒慧管 - 部门内部项目管控系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
  <style>
    :root {
      /* DESIGN：暖白底 + 深靛蓝主色 + 琥珀强调（扣子 UI 渐进升级） */
      --bg-page: #FAFAF8;
      --bg-panel: #FFFFFF;
      --sidebar-bg: #FFFFFF;
      --text: #1A1A1A;
      --text-muted: #6B6B6B;
      --text-light: #9A9A9A;
      --brand: #3D4A8C;
      --brand-dark: #2F3A6E;
      --brand-soft: #E8EAF5;
      --accent-urgent: #E8A84A;
      --border: #E8E8E4;
      --border-light: #F3F3F0;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; color: var(--text); font-size: 14px; line-height: 1.55;
      background: var(--bg-page);
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

    /* ========== 布局 ========== */
    .app-layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 232px; flex-shrink: 0; background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 0;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 20px 16px; border-bottom: 1px solid var(--border-light);
    }
    .brand-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .brand-text strong { display: block; font-size: 15px; color: var(--text); }
    .brand-text span { font-size: 11px; color: var(--text-muted); }
    .sidebar-logo {
      padding: 28px 22px 22px; border-bottom: none;
    }
    .sidebar-logo h2 { color: var(--text); font-size: 18px; font-weight: 600; letter-spacing: -0.03em; }
    .sidebar-logo h2 i { color: var(--brand); margin-right: 10px; }
    .sidebar-logo p { color: var(--text-muted); font-size: 12px; margin-top: 6px; line-height: 1.4; }
    .nav-section { padding: 10px 12px 6px; font-size: 11px; color: var(--text-light); letter-spacing: 0.04em; font-weight: 500; }
    .nav-group { margin-bottom: 6px; }
    .nav-group-head {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; margin: 0 10px 2px;
      border-radius: 8px; color: var(--text); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; background: transparent; width: calc(100% - 20px); text-align: left;
      font-family: inherit;
    }
    .nav-group-head:hover { background: var(--border-light); }
    .nav-group-head i.nav-group-icon { width: 18px; text-align: center; color: var(--brand); }
    .nav-group-head .nav-group-chevron { margin-left: auto; font-size: 11px; color: var(--text-light); transition: transform .15s; }
    .nav-group.is-collapsed .nav-group-chevron { transform: rotate(-90deg); }
    .nav-group-body {
      margin: 0 10px 4px 22px; padding: 2px 0 4px 12px;
      border-left: 2px solid var(--border);
    }
    .nav-group.is-collapsed .nav-group-body { display: none; }
    .nav-group-body .nav-item {
      width: 100%; margin: 0 0 2px; padding: 8px 12px; border-radius: 6px;
    }
    .nav-group-body .nav-item.active {
      background: transparent; color: var(--brand); font-weight: 600;
    }
    .nav-group-body .nav-item.active i { color: var(--brand); }
    .nav-group-body .nav-item.active::before { display: none; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; margin: 0 10px 2px;
      border-radius: 8px; color: var(--text); font-size: 14px;
      cursor: pointer; transition: background 0.15s, color 0.15s; border: none; background: transparent;
      width: calc(100% - 20px); text-align: left; position: relative;
      font-family: inherit; font-weight: 500;
    }
    .nav-item:hover { background: var(--border-light); color: var(--text); }
    .nav-item.active { background: var(--brand); color: #fff; font-weight: 600; }
    .nav-item.active i { color: #fff; }
    /* 扣子模板：扁平主导航 — 柔和底色 + 左侧指示条 */
    .nav-item.nav-item--flat.active {
      background: rgba(61, 74, 140, 0.08); color: var(--brand); font-weight: 600;
      box-shadow: inset 3px 0 0 var(--brand);
    }
    .nav-item.nav-item--flat.active i { color: var(--brand); }
    .nav-item.nav-item--flat:not(.active) { color: var(--text-muted); }
    .nav-item.nav-item--flat:not(.active):hover { color: var(--text); }
    .nav-item i { width: 18px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .nav-badge {
      margin-left: auto; min-width: 20px; height: 20px; padding: 0 6px;
      border-radius: 10px; background: rgba(255,255,255,0.28);
      font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center;
    }
    .nav-item:not(.active) .nav-badge { background: #FEE2E2; color: #DC2626; }
    .nav-group-body .nav-item:not(.active) .nav-badge { background: #FEE2E2; color: #DC2626; }
    .nav-group-body .nav-item.active .nav-badge { background: var(--brand-soft); color: var(--brand-dark); }
    .sidebar-footer {
      margin-top: auto; padding: 12px 14px; border-top: 1px solid var(--border);
    }
    .sidebar-user-row {
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-user-row .user-avatar { flex-shrink: 0; }
    .sidebar-user-meta { flex: 1; min-width: 0; }
    .sidebar-user-meta .user-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-user-meta .user-role { font-size: 11px; color: var(--text-muted); }
    .settings-gear-wrap { position: relative; flex-shrink: 0; }
    .settings-gear-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background 0.15s, color 0.15s;
    }
    .settings-gear-btn:hover, .settings-gear-btn.is-open {
      background: var(--border-light); color: var(--text);
    }
    .settings-dropdown {
      position: absolute; bottom: calc(100% + 8px); right: 0; z-index: 90;
      width: 220px; max-height: min(70vh, 420px); overflow-y: auto;
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.16); padding: 6px 0;
    }
    .main-header-actions .settings-dropdown {
      bottom: auto; top: calc(100% + 8px);
    }
    .settings-dropdown-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 14px; border: none; background: none; cursor: pointer;
      font-size: 13px; color: var(--text); text-align: left; font-family: inherit;
    }
    .settings-dropdown-item:hover { background: var(--border-light); }
    .settings-dropdown-item i { width: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .settings-dropdown-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .settings-dropdown-hint {
      padding: 8px 14px 4px; font-size: 11px; color: var(--text-light);
    }
    .settings-dropdown select {
      width: calc(100% - 28px); margin: 4px 14px 10px; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 8px; font-size: 12px;
      font-family: inherit; background: #fff; color: var(--text);
    }
    .user-card {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      background: #F5F5F4; border-radius: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 600;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { color: var(--text); font-size: 13px; font-weight: 500; }
    .user-role { color: var(--text-muted); font-size: 11px; }

    /* 工作台（对齐扣子模板截图） */
    .wb-wrap { max-width: 1200px; padding: 4px 4px 12px; }
    .wb-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px;
    }
    .wb-stat-card {
      background: #fff; border-radius: 16px; padding: 20px 22px;
      border: 1px solid rgba(232, 232, 228, 0.8); box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 14px;
    }
    .wb-stat-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .wb-stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.15; letter-spacing: -0.02em; }
    .wb-stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .wb-layout {
      display: grid; grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); gap: 32px; align-items: start;
    }
    .wb-new-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 18px; margin-bottom: 20px; border: none; border-radius: 12px;
      background: var(--brand); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; box-shadow: 0 1px 3px rgba(61, 74, 140, 0.25);
    }
    .wb-new-btn:hover { background: var(--brand-dark); }
    .wb-section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .wb-section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; color: var(--text);
    }
    .wb-section-title .wb-count {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      background: var(--border-light); padding: 2px 8px; border-radius: 999px;
    }
    .wb-urgency-chips { display: flex; align-items: center; gap: 8px; }
    .wb-chip {
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    }
    .wb-chip--overdue { color: #DC2626; background: #FEF2F2; }
    .wb-chip--soon { color: #D97706; background: #FFFBEB; }
    .wb-todo-list { display: flex; flex-direction: column; gap: 14px; }
    .wb-todo-card {
      background: #fff; border: 1px solid rgba(232, 232, 228, 0.9); border-radius: 14px;
      padding: 18px 20px; border-left: 3px solid transparent; box-shadow: var(--shadow);
      cursor: pointer; transition: box-shadow 0.15s;
    }
    .wb-todo-card:hover { box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08); }
    .wb-todo-card.is-overdue { border-left-color: #EF4444; background: rgba(254, 242, 242, 0.45); }
    .wb-todo-card.is-duesoon { border-left-color: #F59E0B; background: rgba(255, 251, 235, 0.4); }
    .wb-todo-bar {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .wb-todo-bar-main { flex: 1; min-width: 0; }
    .wb-todo-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .wb-todo-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .wb-todo-badge {
      flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    }
    .wb-todo-badge.is-overdue { color: #DC2626; background: #FEE2E2; }
    .wb-todo-badge.is-duesoon { color: #D97706; background: #FEF3C7; }
    .wb-todo-desc {
      font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .wb-todo-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
    }
    .wb-todo-meta .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px; background: var(--border-light); font-size: 11px;
    }
    .wb-todo-actions {
      display: flex; flex-wrap: wrap; gap: 8px;
      flex-shrink: 0; margin-left: auto; align-items: center;
    }
    .wb-todo-actions .btn {
      padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 8px;
    }
    @media (max-width: 720px) {
      .wb-todo-actions { width: 100%; justify-content: flex-end; }
    }
    .wb-todo-actions .btn-primary {
      background: var(--brand); color: #fff; border: none;
      box-shadow: 0 1px 3px rgba(61, 74, 140, 0.3);
    }
    .wb-todo-actions .btn-primary:hover { background: var(--brand-dark); }
    .wb-todo-actions .btn-success {
      background: #059669; color: #fff; border: none;
      box-shadow: 0 1px 3px rgba(5, 150, 105, 0.3);
    }
    .wb-todo-actions .btn-success:hover { background: #047857; }
    .wb-todo-actions .btn-warning {
      background: #D97706; color: #fff; border: none;
      box-shadow: 0 1px 3px rgba(217, 119, 6, 0.28);
    }
    .wb-todo-actions .btn-warning:hover { background: #B45309; }
    .wb-todo-actions .btn-ghost {
      background: var(--brand-soft); color: var(--brand-dark); border: 1px solid #C7CEE8;
    }
    .wb-todo-actions .btn-ghost:hover { background: #DCE0F2; }
    .wb-activity-panel {
      background: #fff; border: 1px solid rgba(232, 232, 228, 0.9); border-radius: 16px;
      padding: 20px 22px; box-shadow: var(--shadow);
    }
    .wb-activity-item {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .wb-activity-item:last-child { border-bottom: none; padding-bottom: 0; }
    .wb-activity-item:first-child { padding-top: 0; }
    .wb-activity-icon {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
      background: var(--brand-soft); color: var(--brand);
    }
    .wb-activity-icon.is-done {
      background: #D1FAE5; color: #059669;
    }
    .wb-activity-body { flex: 1; min-width: 0; }
    .wb-activity-text { font-size: 13px; color: var(--text); line-height: 1.5; }
    .wb-activity-meta { font-size: 12px; color: var(--text-light); margin-top: 6px; }
    .wb-week-done { margin-top: 28px; }
    .wb-empty {
      background: #fff; border-radius: 14px; padding: 48px 24px; text-align: center;
      border: 1px solid var(--border); color: var(--text-muted); font-size: 13px;
    }
    .wb-more-link {
      border: none; background: none; color: var(--brand); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; padding: 0;
    }
    .wb-more-link:hover { text-decoration: underline; }
    .wr-wrap { max-width: 960px; }
    .wr-toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 16px;
    }
    .wr-tabs { display: flex; gap: 6px; margin-right: auto; }
    .wr-tab {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: #fff; color: var(--text-muted); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .wr-tab.is-active { background: var(--brand-soft); color: var(--brand-dark); border-color: #99F6E4; }
    .wr-metrics {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
    }
    .wr-metric {
      font-size: 12px; padding: 4px 10px; border-radius: 999px;
      background: #F3F4F6; color: var(--text-muted);
    }
    .wr-field { margin-bottom: 16px; }
    .wr-field-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-bottom: 6px;
    }
    .wr-field label {
      display: block; font-size: 13px; font-weight: 600; color: var(--text);
    }
    .wr-field label .req { color: #DC2626; margin-right: 4px; }
    .wr-field textarea {
      width: 100%; min-height: 110px; resize: vertical; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px; font-family: inherit;
      font-size: 13px; line-height: 1.55; color: var(--text); background: #fff;
    }
    .wr-field textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(13,148,136,.12); }
    .wr-field textarea[readonly] { background: #F9FAFB; color: var(--text); }
    .wr-side {
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .wr-list-item {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: #fff; margin-bottom: 8px; cursor: pointer;
    }
    .wr-list-item:hover { border-color: #99F6E4; }
    .wr-list-item.is-active { border-color: var(--brand); background: #F0FDFA; }
    .wr-list-meta { font-size: 12px; color: var(--text-muted); }
    .wr-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600;
    }
    .wr-badge--draft { background: #F3F4F6; color: #6B7280; }
    .wr-badge--submitted { background: #D1FAE5; color: #047857; }
    .wr-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    @media (max-width: 960px) {
      .wb-stats { grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 22px; }
      .wb-layout { grid-template-columns: 1fr; gap: 24px; }
      .wb-wrap { padding: 0; }
    }
    .role-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; margin-top: 4px;
    }
    .role-gm { background: #FEE2E2; color: #DC2626; }
    .role-admin { background: var(--brand-soft); color: var(--brand-dark); }
    .role-manager { background: #DBEAFE; color: #2563EB; }
    .role-staff { background: #D1FAE5; color: #059669; }

    /* 人员档案（仅内容区） */
    .staff-page { position: relative; }
    .staff-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .staff-seg {
      display: inline-flex; padding: 3px; border-radius: 8px;
      background: #F3F4F6; border: 1px solid #E5E7EB; gap: 2px;
    }
    .staff-seg button {
      border: none; background: transparent; cursor: pointer;
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      color: #6B7280; font-weight: 500; font-family: inherit;
    }
    .staff-seg button.is-active {
      background: #fff; color: var(--brand-dark);
      box-shadow: 0 1px 2px rgba(0,0,0,.06); font-weight: 600;
    }
    .staff-tree-node {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 8px; margin-bottom: 2px;
      cursor: pointer; border-left: 3px solid transparent;
    }
    .staff-tree-node:hover { background: #F8FAFC; }
    .staff-tree-node.is-selected {
      background: var(--brand-soft); border-left-color: var(--brand);
    }
    .staff-tree-node .staff-tree-name {
      font-size: 13px; color: #1F2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .staff-tree-node .staff-tree-meta { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
    .staff-row { cursor: pointer; border-bottom: 1px solid #F3F4F6; }
    .staff-row:hover { background: #F8FAFC !important; }
    .staff-row.is-active-row { background: var(--brand-soft) !important; }
    .staff-row .staff-name { font-weight: 500; color: #1F2937; }
    .staff-row .staff-pos { font-size: 12px; color: #9CA3AF; margin-top: 2px; }
    .staff-leader-link {
      color: var(--brand); background: none; border: none; cursor: pointer;
      font-size: 13px; font-family: inherit; padding: 0;
    }
    .staff-leader-link:hover { text-decoration: underline; }
    .staff-ding-fold {
      margin-top: 16px; border: 1px solid #E5E7EB; border-radius: 10px; background: #F9FAFB; overflow: hidden;
    }
    .staff-ding-fold summary {
      list-style: none; cursor: pointer; padding: 12px 16px;
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; font-weight: 500;
    }
    .staff-ding-fold summary::-webkit-details-marker { display: none; }
    .staff-ding-fold .staff-ding-body { padding: 0 16px 14px; }
    .staff-drawer-mask {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.28); z-index: 80;
    }
    .staff-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(360px, 100vw);

    @media (min-width: 769px) {

    /* ========== 快速操作栏 ========== */
    .quick-actions {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .quick-action-btn {
      display: flex; align-items: center; gap: 6px; padding: 10px 16px;
      background: #fff; border: 1px dashed #D1D5DB; border-radius: 10px;
      cursor: pointer; transition: all 0.2s; font-size: 13px; color: #6B7280;
    }
    .quick-action-btn:hover { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-soft); }
    .quick-action-btn i { font-size: 16px; }

    /* ========== 看板视图 ========== */
    .kanban-board {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      min-height: 400px;
    }
    .kanban-column {
      background: #F8FAFC; border-radius: 12px; border: 1px solid #E5E7EB;
      display: flex; flex-direction: column;
    }
    .kanban-column-header {
      padding: 12px 14px; border-bottom: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-column-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
    .kanban-column-count {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      font-weight: 600; color: #fff;
    }
    .kanban-column-body {
      flex: 1; padding: 8px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .kanban-card {
      background: #fff; border-radius: 10px; border: 1px solid #E5E7EB;
      padding: 12px; cursor: pointer; transition: all 0.2s;
    }
    .kanban-card:hover { border-color: var(--brand); box-shadow: var(--shadow); }
    .kanban-card .task-card-context { margin-bottom: 4px; font-size: 11px; }
    .kanban-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .kanban-card-title { font-size: 13px; font-weight: 500; flex: 1; }
    .kanban-card-meta { font-size: 11px; color: #9CA3AF; display: flex; align-items: center; gap: 8px; }
    .kanban-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #F3F4F6; }
    .kanban-card-assignee {
      display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6B7280;
      background: #F3F4F6; padding: 2px 8px; border-radius: 4px;
    }
    .team-page-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .team-filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .team-filter-tab {
      padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-muted);
      cursor: pointer; transition: border-color 0.15s, background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .team-filter-tab:hover { border-color: var(--brand); color: var(--brand); }
    .team-filter-tab.is-active {
      border-color: var(--brand); background: var(--brand-soft); color: var(--brand);
    }
    .team-filter-tab .tab-count {
      margin-left: 4px; padding: 2px 6px; border-radius: 10px; font-size: 10px;
      background: var(--border); color: var(--text-muted);
    }
    .team-filter-tab.is-active .tab-count {
      background: var(--brand); color: #fff;
    }
    .team-sort-btn {
      padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-muted);
      cursor: pointer; white-space: nowrap; font-family: inherit;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .team-sort-btn.is-active {
      border-color: var(--brand); background: var(--brand-soft); color: var(--brand);
    }
    .team-type-chip {
      flex: 1; text-align: center; padding: 18px 16px;
      background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .team-type-chip .chip-value { font-size: 28px; font-weight: 700; color: var(--brand); }
    .team-type-chip.is-temp .chip-value { color: var(--accent-urgent); }
    .team-type-chip .chip-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .team-type-chip .chip-bar {
      height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .team-type-chip .chip-bar > span {
      display: block; height: 100%; border-radius: 2px; background: var(--brand);
    }
    .team-type-chip.is-temp .chip-bar > span { background: var(--accent-urgent); }
    .team-complete-mini {
      padding: 12px; background: var(--bg-page); border: 1px solid var(--border);
      border-radius: 8px; text-align: center;
    }
    .team-complete-mini .mini-value { font-size: 20px; font-weight: 600; color: var(--text); }
    .team-complete-mini.is-done .mini-value { color: #059669; }
    .team-complete-mini.is-todo .mini-value { color: #DC2626; }
    .team-complete-mini .mini-label { font-size: 12px; color: var(--text-muted); }
    .team-member-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
    }
    .team-member-card {
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      padding: 16px; background: var(--bg-panel); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow); text-align: left;
    }
    .team-member-card:hover {
      border-color: var(--brand); box-shadow: 0 4px 12px rgba(61, 74, 140, 0.08);
      transform: translateY(-1px);
    }
    .team-member-card-head {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .team-member-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #7B8BC4, var(--brand));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 600;
    }
    .team-member-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .team-member-dept { font-size: 12px; color: var(--text-light); }
    .team-sat-tag {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
      white-space: nowrap;
    }
    .team-sat-bar {
      height: 8px; background: var(--border-light); border-radius: 4px; overflow: hidden;
    }
    .team-sat-bar > span { display: block; height: 100%; border-radius: 4px; transition: width 0.3s; }
    .team-member-metrics {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; text-align: center;
    }
    .team-metric {
      padding: 6px 4px; background: var(--bg-page); border-radius: 8px; border: 1px solid var(--border-light);
    }
    .team-metric .metric-value { font-size: 14px; font-weight: 600; color: var(--text); }
    .team-metric .metric-label { font-size: 10px; color: var(--text-light); }
    .team-metric.is-overdue { background: #FEF2F2; border-color: #FECACA; }
    .team-metric.is-overdue .metric-value { color: #DC2626; }
    .team-member-footer {
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
      text-align: center; font-size: 12px; color: var(--brand);
    }
    .team-period-note {
      padding: 0 20px 12px; font-size: 12px; color: var(--text-light);
      border-bottom: 1px solid var(--border-light);
    }
    .member-kanban-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #7B8BC4, var(--brand));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 600;
    }
    .member-kanban-stat {
      padding: 12px; background: var(--bg-page); border: 1px solid var(--border);
      border-radius: 8px; text-align: center;
    }
    .member-kanban-stat .stat-num { font-size: 20px; font-weight: 700; color: var(--text); }
    .member-kanban-stat .stat-cap { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* ========== 子任务列表 ========== */
    .subtask-list {
      margin-top: 8px; padding: 6px 8px; background: #F0FDF4; border-radius: 6px;
      font-size: 11px;
    }
    .subtask-item {
      display: flex; align-items: center; gap: 4px; padding: 2px 0;
    }
    .subtask-item i { font-size: 8px; }

    /* ========== 按钮 ========== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
      border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; border: none; white-space: nowrap; flex-shrink: 0;
    }
    .btn-primary {
      background: var(--brand); color: #fff;
      box-shadow: none;
    }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-ghost { background: #fff; color: #374151; border: 1px solid #E5E7EB; }
    .btn-ghost:hover { background: #F9FAFB; }
    .btn-danger { background: #FEE2E2; color: #DC2626; }
    .btn-success { background: #D1FAE5; color: #059669; }
    .btn-warning { background: #FEF3C7; color: #D97706; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ========== 卡片/面板 ========== */
    .panel {
      background: var(--bg-panel); border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: none; overflow: hidden;
    }
    .panel-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-size: 16px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: -0.02em; }
    .panel-body { padding: 22px; }

    /* ========== 标签 ========== */
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
    }
    .tag-temp { background: #FEF3C7; color: #D97706; }
    .tag-normal { background: #EFF6FF; color: #2563EB; }
    .tag-urgent { background: #FEE2E2; color: #DC2626; }
    .tag-important { background: #FEF3C7; color: #D97706; }
    .tag-normal-priority { background: #F3F4F6; color: #6B7280; }

    /* ========== 输入框 ========== */
    .input, .select, .textarea {
      height: 38px; border-radius: 8px; border: 1px solid #E5E7EB; padding: 0 12px;
      font-size: 13px; outline: none; background: #fff; transition: all 0.2s;
      font-family: inherit;
    }
    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--brand); box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
    }
    .textarea { height: auto; padding: 10px 12px; resize: none; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-required { color: #DC2626; }

    /* ========== 统计卡片 ========== */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #E5E7EB;
      cursor: pointer; transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--brand); box-shadow: var(--shadow); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; margin-bottom: 12px;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: #1F2937; }
    .stat-label { font-size: 12px; color: #6B7280; margin-top: 2px; }

    /* ========== Tab切换 ========== */
    .tab-bar { display: flex; gap: 6px; background: #F5F5F4; border-radius: 14px; padding: 5px; }
    .tab-item {
      flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 500;
      border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s;
      background: transparent; color: #737373;
    }
    .tab-item:hover { color: #171717; }
    .tab-item.active { background: #fff; color: var(--brand-dark); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    /* ========== 弹窗 ========== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; display: flex;
      align-items: center; justify-content: center; padding: 16px;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    }
    .modal-box {
      width: 100%; max-width: 560px; background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid #F3F4F6;
    }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-body { padding: 24px; }
    .modal-footer {
      display: flex; gap: 12px; padding: 16px 24px;
      border-top: 1px solid #F3F4F6; background: #F9FAFB;
      border-radius: 0 0 16px 16px; flex-wrap: wrap; align-items: center;
    }

    /* ========== 图片预览 ========== */
    .image-lightbox {
      position: fixed; inset: 0; z-index: 30000;
      background: rgba(0,0,0,0.88); display: flex;
      align-items: center; justify-content: center;
      padding: 24px; cursor: zoom-out;
    }
    .image-lightbox img {
      max-width: min(95vw, 1200px); max-height: 92vh;
      object-fit: contain; border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45); cursor: default;
    }

    /* ========== 任务卡片 ========== */
    .task-card {
      position: relative; padding: 14px 14px 14px 16px; background: #fff; border-radius: 12px;
      border: 1px solid #E5E7EB; margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 1px 3px rgba(15,23,42,0.04);
      border-left: 3px solid #E5E7EB;
    }
    .task-card:hover { border-color: var(--brand); box-shadow: var(--shadow); transform: translateY(-1px); }
    .task-card--overdue { border-left-color: #DC2626; border-color: #FECACA; background: #FFFBFB; }
    .task-card--duesoon { border-left-color: #D97706; border-color: #FDE68A; background: #FFFBEB; }
    .task-card--doing { border-left-color: #2563EB; }
    .task-card--done { border-left-color: #059669; opacity: 0.92; }
    .task-card--abolished { border-left-color: #9CA3AF; background: #F9FAFB; opacity: 0.7; }
    .task-card-context {
      display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px;
      font-size: 12px; color: #6B7280; line-height: 1.45; word-break: break-word;
    }
    .task-card-context > i { margin-top: 2px; flex-shrink: 0; color: #9CA3AF; font-size: 11px; }
    .task-card-context-project { font-weight: 600; color: #374151; }
    .task-card-context-sep { color: #D1D5DB; font-weight: 400; margin: 0 1px; }
    .task-card-context-ancestor { color: #6B7280; }
    .task-card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .task-card-title { font-size: 14px; font-weight: 600; color: #111827; flex: 1; line-height: 1.4; }
    .task-card-meta {
      display: flex; align-items: center; flex-wrap: wrap; gap: 4px 12px;
      font-size: 11px; color: #9CA3AF; line-height: 1.4;
    }
    .task-card-meta i { opacity: 0.75; width: 12px; text-align: center; }
    .task-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #F3F4F6; }
    .task-card-progress { margin-top: 10px; }
    .task-card-progress-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; color: #9CA3AF; }
    .task-card-progress-row strong { color: #4B5563; font-weight: 600; }
    .task-status-col {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 12px;
      box-shadow: var(--shadow); min-height: 120px;
    }
    .task-status-col-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid rgba(229,231,235,0.8);
    }
    .task-status-col-head .col-label { font-size: 13px; font-weight: 600; color: #374151; }
    .task-status-col-head .col-count {
      margin-left: auto; font-size: 11px; font-weight: 600; color: #fff;
      padding: 2px 8px; border-radius: 999px; min-width: 22px; text-align: center;
    }

    /* ========== 项目卡片网格 ========== */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .project-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      min-height: 168px;
    }
    .project-card:hover {
      border-color: var(--brand);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .project-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .project-card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--brand-soft);
      display: flex; align-items: center; justify-content: center;
      color: var(--brand-dark); font-size: 16px; flex-shrink: 0;
    }
    .project-card-title {
      font-size: 16px; font-weight: 600; color: #171717; line-height: 1.4;
      margin-bottom: 6px; letter-spacing: -0.02em;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .project-card-id { font-size: 11px; color: #6B7280; font-family: monospace; }
    .project-card-meta {
      display: flex; flex-wrap: wrap; gap: 10px;
      font-size: 12px; color: #4B5563; margin-bottom: 14px;
    }
    .project-card-meta span { display: inline-flex; align-items: center; gap: 4px; }
    .project-card-progress { margin-top: auto; }
    .project-card-progress-label {
      display: flex; justify-content: space-between; margin-bottom: 6px;
      font-size: 12px; color: #4B5563;
    }
    .project-card-footer {
      display: flex; justify-content: space-between; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid #F3F4F6;
      font-size: 12px; color: #6B7280;
    }

    /* ========== 状态标签 ========== */
    .status-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    }
    .status-todo { background: #F3F4F6; color: #6B7280; }
    .status-doing { background: #DBEAFE; color: #2563EB; }
    .status-done { background: #D1FAE5; color: #059669; }
    .status-abolished { background: #F3F4F6; color: #9CA3AF; }
    .status-overdue { background: #FEE2E2; color: #DC2626; }
    .status-blocked { background: #FEF3C7; color: #D97706; }
    .dep-badges { display: inline-flex; align-items: center; gap: 3px; margin-left: 6px; vertical-align: middle; }
    .dep-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .dep-badge.dep-in { background: #DBEAFE; color: #2563EB; }
    .dep-badge.dep-blocked { background: #FEF3C7; color: #D97706; font-weight: 600; }
    .dep-badge.dep-unblocked { background: #D1FAE5; color: #059669; }
    .dep-badge.dep-out { background: #D1FAE5; color: #10B981; }
    .dep-badge.dep-cross { background: #E2E8F0; color: #64748B; }
    .dep-badge.dep-warn { background: #FEE2E2; color: #DC2626; }
    .task-dep-blocked-row { background: #FFFBEB !important; border-color: #FDE68A !important; }

    /* ========== 协办人多选下拉 ========== */
    .collab-ms { position: relative; }
    .collab-ms-trigger {
      width: 100%; min-height: 38px; padding: 8px 32px 8px 12px;
      border: 1px solid #E5E7EB; border-radius: 8px; background: #fff;
      text-align: left; cursor: pointer; font-size: 13px; color: #374151;
      position: relative; line-height: 1.4;
    }
    .collab-ms-trigger:hover:not(:disabled) { border-color: #CBD5E1; }
    .collab-ms-trigger.open { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .collab-ms-trigger:disabled { background: #F3F4F6; cursor: not-allowed; color: #9CA3AF; }
    .collab-ms-trigger .chevron {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: #9CA3AF; font-size: 11px; transition: transform 0.2s;
    }
    .collab-ms-trigger.open .chevron { transform: translateY(-50%) rotate(180deg); }
    .collab-ms-backdrop { position: fixed; inset: 0; z-index: 119; background: transparent; }
    .collab-ms-panel {
      position: absolute; left: 0; right: 0; top: calc(100% + 4px);
      max-height: 240px; overflow-y: auto;
      background: #fff; border: 1px solid #E5E7EB; border-radius: 8px;
      box-shadow: 0 10px 28px rgba(15,23,42,0.14); z-index: 120; padding: 6px;
    }
    .collab-ms-option {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 6px; cursor: pointer; font-size: 13px; user-select: none;
    }
    .collab-ms-option:hover { background: #F9FAFB; }
    .collab-ms-option.selected { background: #EFF6FF; }
    .collab-ms-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .collab-ms-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px; background: #EFF6FF; color: #2563EB; border-radius: 4px;
    }
    .collab-ms-tag button {
      border: none; background: none; color: #93C5FD; cursor: pointer; padding: 0; font-size: 12px; line-height: 1;
    }
    .collab-ms-tag button:hover { color: #DC2626; }

    .status-dueSoon { background: #FEF3C7; color: #D97706; }
    .status-paused { background: #E5E7EB; color: #6B7280; }
    .status-rejected { background: #FEF3C7; color: #D97706; }
    .status-archived { background: #F3F4F6; color: #9CA3AF; }

    /* ========== 进度条 ========== */
    .progress-bar { height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--brand); border-radius: 3px; transition: width 0.3s; }

    /* ========== 优先级 ========== */
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .priority-urgent { background: #DC2626; }
    .priority-important { background: #F59E0B; }
    .priority-normal { background: #9CA3AF; }

    /* ========== 树形结构 ========== */
    .tree-item { padding-left: 20px; border-left: 2px solid #E5E7EB; margin-left: 8px; }
    .tree-item-root { border-left: none; padding-left: 0; margin-left: 0; }

    /* ========== 通知条 ========== */
    .alert-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-radius: 10px; margin-bottom: 16px;
    }
    .alert-warning { background: #FEF3C7; border: 1px solid #FDE68A; }
    .alert-danger { background: #FEE2E2; border: 1px solid #FECACA; }
    .alert-info { background: #DBEAFE; border: 1px solid #BFDBFE; }
    .alert-bar--compact { padding: 10px 14px; margin-bottom: 12px; }

    /* ========== 待办摘要条 ========== */
    .dash-summary {
      display: flex; align-items: center; flex-wrap: wrap; gap: 14px 22px;
      padding: 18px 22px; margin-bottom: 22px;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: none;
      box-sizing: border-box;
    }
    .dash-summary-item {
      display: inline-flex; align-items: baseline; gap: 8px;
      font-size: 13px; color: #6B7280;
    }
    .dash-summary-item strong { font-size: 24px; font-weight: 600; color: #1F2937; line-height: 1; letter-spacing: -0.03em; }
    .dash-summary-item.is-warn strong { color: #D97706; }
    .dash-summary-item.is-danger strong { color: #DC2626; }
    .dash-summary-sep { width: 1px; height: 22px; background: #E5E7EB; }
    .dash-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
    }
    .dash-chip--danger { background: #FEE2E2; color: #991B1B; }
    .dash-chip--warn { background: #FEF3C7; color: #92400E; }

    /* ========== 空状态 ========== */
    .empty-state {
      text-align: center; padding: 36px 20px; color: #9CA3AF;
      background: rgba(249,250,251,0.9); border: 1px dashed #E5E7EB; border-radius: 12px;
    }
    .empty-state-icon {
      width: 52px; height: 52px; margin: 0 auto 12px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: #F3F4F6; color: #9CA3AF; font-size: 20px;
    }
    .empty-state-title { font-size: 14px; font-weight: 600; color: #6B7280; margin-bottom: 4px; }
    .empty-state-hint { font-size: 12px; color: #9CA3AF; line-height: 1.5; }
    .empty-state--panel { grid-column: 1 / -1; padding: 56px 24px; background: #fff; border-style: solid; }

    /* ========== 项目英雄区 ========== */
    .project-hero {
      background: var(--bg-panel); border-radius: var(--radius); border: 1px solid var(--border);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
    }
    .project-hero-top {
      padding: 22px 24px 18px;
      background: #FAFAF9;
      border-bottom: 1px solid var(--border);
    }
    .project-hero-title-row {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .project-hero-title { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 6px; line-height: 1.3; }
    .project-hero-desc { font-size: 13px; color: #6B7280; line-height: 1.55; max-width: 640px; }
    .project-hero-actions { display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .project-hero-meta {
      display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 14px;
      font-size: 13px; color: #6B7280;
    }
    .project-hero-meta span { display: inline-flex; align-items: center; gap: 6px; }
    .project-hero-body { padding: 16px 22px 20px; }
    .project-hero-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .project-hero-stat {
      min-width: 88px; padding: 10px 14px; border-radius: 10px; background: #F9FAFB; text-align: center;
    }
    .project-hero-stat .v { font-size: 22px; font-weight: 700; color: #1F2937; line-height: 1.1; }
    .project-hero-stat .l { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

    /* ========== 项目卡片 / 详情对齐扣子版式 ========== */
    .project-card-icon-tile {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; font-weight: 700;
    }
    .project-card-head-row {
      display: flex; align-items: flex-start; gap: 12px;
    }
    .project-card-head-text { flex: 1; min-width: 0; }
    .project-card-head-text .project-card-name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-card-head-text .project-card-desc {
      margin-top: 4px; min-height: 0;
      -webkit-line-clamp: 1; line-clamp: 1;
    }
    .project-status-dot {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; color: var(--text-muted); flex-shrink: 0;
      white-space: nowrap;
    }
    .project-status-dot::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .project-card-progress-row {
      display: flex; align-items: center; gap: 10px; margin-top: 4px;
    }
    .project-card-progress-row .progress-bar { flex: 1; height: 6px; margin: 0; }
    .project-card-progress-row .progress-pct {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      font-variant-numeric: tabular-nums; min-width: 32px; text-align: right;
    }
    .project-card-foot {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-top: 2px;
    }
    .project-card-task-count {
      font-size: 11px; color: var(--text-muted); white-space: nowrap;
    }
    .avatar-stack {
      display: flex; align-items: center;
    }
    .avatar-stack .person-avatar {
      margin-left: -6px; box-shadow: 0 0 0 2px #fff;
    }
    .avatar-stack .person-avatar:first-child { margin-left: 0; }
    .avatar-stack-more {
      margin-left: -6px; width: 22px; height: 22px; border-radius: 50%;
      background: #E5E7EB; color: #6B7280; font-size: 9px; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 2px #fff;
    }
    .person-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; font-weight: 600; flex-shrink: 0;
    }
    .person-avatar--lg {
      width: 36px; height: 36px; font-size: 13px;
    }
    .project-detail-layout {
      display: grid; grid-template-columns: 1fr; gap: 20px;
    }
    @media (min-width: 960px) {
      .project-detail-layout--overview {
        grid-template-columns: minmax(240px, 1fr) minmax(0, 1.4fr);
        align-items: start;
      }
      .project-detail-layout--with-tree {
        grid-template-columns: minmax(240px, 1fr) minmax(0, 2fr);
        align-items: start;
      }
    }
    .project-detail-side { display: flex; flex-direction: column; gap: 20px; }
    .project-detail-section-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .project-member-panel,
    .project-task-preview-panel {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .project-member-list { display: flex; flex-direction: column; gap: 0; padding: 4px 0; }
    .project-member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
    }
    .project-member-row + .project-member-row { border-top: 1px solid #F3F4F6; }
    .project-member-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .project-member-role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .project-hero-identity {
      display: flex; align-items: flex-start; gap: 14px;
    }
    .project-hero-identity .project-card-icon-tile {
      width: 48px; height: 48px; font-size: 18px; border-radius: 14px;
    }
    .project-hero-stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin: 16px 0 12px; text-align: center;
    }
    .project-hero-stats-row .v {
      font-size: 18px; font-weight: 700; color: var(--text);
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .project-hero-stats-row .l { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
    .project-hero-overdue-hint {
      font-size: 12px; color: #DC2626; margin: 0 0 10px;
    }
    .project-task-preview-list { display: flex; flex-direction: column; gap: 8px; }
    .project-task-preview-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-align: left; width: 100%;
      font-family: inherit; color: inherit; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .project-task-preview-row:hover {
      border-color: var(--brand); box-shadow: 0 1px 4px rgba(61, 74, 140, 0.08);
    }
    .project-task-preview-row.is-done .project-task-preview-title {
      text-decoration: line-through; color: var(--text-muted);
    }
    .project-task-preview-row.is-overdue {
      border-color: #FECACA; background: #FFFBFB;
    }
    .project-task-check {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid #D1D5DB;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .project-task-check.is-done {
      background: #10B981; border-color: #10B981; color: #fff; font-size: 9px;
    }
    .project-task-preview-title {
      flex: 1; min-width: 0; font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-task-preview-meta {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      font-size: 11px; color: var(--text-muted);
    }
    .project-task-preview-meta .subtask-chip {
      padding: 1px 6px; border-radius: 4px; background: #F3F4F6; color: var(--brand-dark);
      font-size: 11px; white-space: nowrap;
    }
    .project-task-preview-more {
      font-size: 12px; color: var(--text-muted); text-align: center; padding: 8px 0 0;
    }
    .project-task-preview-more a,
    .project-task-preview-more button.linkish {
      background: none; border: none; color: var(--brand); cursor: pointer;
      font-size: 12px; padding: 0; font-family: inherit;
    }
    @media (max-width: 720px) {
      .project-task-preview-row {
        flex-wrap: wrap; align-items: flex-start;
      }
      .project-task-preview-title { flex: 1 1 calc(100% - 28px); white-space: normal; }
      .project-task-preview-meta {
        width: 100%; padding-left: 26px; flex-wrap: wrap;
      }
    }

    /* ========== 表单/详情分区 ========== */
    .form-section { margin-bottom: 8px; }
    .form-section + .form-section { margin-top: 4px; }
    .form-section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; color: #6B7280; letter-spacing: 0.02em;
      margin: 4px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #F3F4F6;
    }
    .form-section-title i { color: var(--brand); width: 14px; text-align: center; }
    .detail-section { margin-bottom: 18px; }
    .detail-section-title {
      font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .detail-section-title i { color: var(--brand); }

    /* ========== 日志表格 ========== */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th, .log-table td {
      padding: 10px 12px; text-align: left; border-bottom: 1px solid #F3F4F6;
      font-size: 13px;
    }
    .log-table th { background: #FAFAF9; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); }

    .task-project-list { display: flex; flex-direction: column; gap: 14px; }
    .task-special-zone {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    .task-special-zone--single { grid-template-columns: 1fr; }
    .task-special-zone .task-project-section {
      max-height: 360px;
      display: flex;
      flex-direction: column;
    }
    .task-special-zone .task-project-section-body {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .task-zone-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      margin: 8px 0 14px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .task-zone-label i { color: var(--brand); }
    .task-zone-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 6px;
    }
    .task-project-zone { margin-top: 4px; }
    .task-project-section {
      background: #fff; border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      box-shadow: none;
    }
    .task-project-section--temp { border-color: #FDE68A; }

    .task-project-section-head {

    /* 待办紧凑列表行 */

    .todo-kanban-card-top {

    .todo-view-toggle {

    .todo-board-card-top {

    .task-status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    // ========== 基础数据 ==========
    /** 缺省业务部门（与后端 defaultStaffDeptCatalog 一致）；运行时以 staffDeptCatalog 为准 */
    const DEFAULT_MEMBER_DEPT_NAMES = ['信息中心', '规划建设部', '实施交付部', '研发集成部', '网络运维部', '项目管控部', 'AI创新部'];
    const INFO_CENTER_DEPT_NAME = '信息中心';
    let staffDeptCatalog = DEFAULT_MEMBER_DEPT_NAMES.map(name => ({
      name,
      kind: 'member',
      parentName: name === INFO_CENTER_DEPT_NAME ? '' : INFO_CENTER_DEPT_NAME,
    }));

    function normalizeProfileKind(kind) {
      return kind === 'contact' ? 'contact' : 'member';
    }
    function isContactProfile(u) {
      return !!(u && normalizeProfileKind(u.profileKind) === 'contact');
    }
    function isBusinessMember(u) {
      return !!(u && isStaffActive(u) && !isContactProfile(u));
    }
    function getStaffDeptCatalog() {
      return (staffDeptCatalog || []).length
        ? staffDeptCatalog
        : DEFAULT_MEMBER_DEPT_NAMES.map(name => ({
          name,
          kind: 'member',
          parentName: name === INFO_CENTER_DEPT_NAME ? '' : INFO_CENTER_DEPT_NAME,
        }));
    }
    function getStaffDeptNames() {
      return getStaffDeptCatalog().map(d => d.name);
    }
    /** 业务部门名（项目归属等）；兼容旧代码 departments */
    function getMemberDeptNames() {
      const members = getStaffDeptCatalog().filter(d => d.kind === 'member').map(d => d.name);
      return members.length ? members : DEFAULT_MEMBER_DEPT_NAMES.slice();
    }
    function catalogKindForDept(deptName) {
      const name = String(deptName || '').trim();
      const list = getStaffDeptCatalog();
      const exact = list.find(d => d.name === name);
      if (exact) return exact.kind;
      const fuzzy = list.find(d => name.includes(d.name) || d.name.includes(name));
      return fuzzy ? fuzzy.kind : 'contact';
    }
    function applyStaffDeptCatalog(list) {
      if (!Array.isArray(list) || !list.length) return;
      const byName = new Map();
      list.forEach(raw => {
        const name = String(raw?.name || raw || '').trim();
        if (!name) return;
        let parentName = raw?.parentName != null ? String(raw.parentName).trim() : '';
        if (!parentName && name !== INFO_CENTER_DEPT_NAME && DEFAULT_MEMBER_DEPT_NAMES.includes(name)) {
          parentName = INFO_CENTER_DEPT_NAME;
        }
        byName.set(name, {
          name,
          kind: normalizeProfileKind(raw?.kind),
          parentName,
          dingTalkDeptId: raw?.dingTalkDeptId || '',
        });
      });
      if (byName.size) staffDeptCatalog = [...byName.values()];
    }
    /** 部门森林：根节点 + children */
    function buildClientOrgForest(catalog) {
      const list = (catalog && catalog.length) ? catalog : getStaffDeptCatalog();
      const byName = new Map(list.map(d => [d.name, { ...d, children: [] }]));
      const roots = [];
      byName.forEach(node => {
        const p = node.parentName;
        if (p && byName.has(p) && p !== node.name) byName.get(p).children.push(node);
        else roots.push(node);
      });
      const sortNodes = (arr) => {
        arr.sort((a, b) => {
          if (a.kind !== b.kind) return a.kind === 'member' ? -1 : 1;
          if (a.name === INFO_CENTER_DEPT_NAME) return -1;
          if (b.name === INFO_CENTER_DEPT_NAME) return 1;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
        arr.forEach(n => sortNodes(n.children || []));
      };
      sortNodes(roots);
      return roots;
    }
    /** @deprecated 请优先用 getMemberDeptNames / getStaffDeptNames；保留数组引用兼容旧写法 */
    const departments = DEFAULT_MEMBER_DEPT_NAMES.slice();
    function syncDepartmentsAlias() {
      departments.length = 0;
      getMemberDeptNames().forEach(n => departments.push(n));
    }
    syncDepartmentsAlias();

    /** 总经理与管理员权限相同，展示名称不同 */
    function isFullAccess(role) {
      return role === 'gm' || role === 'admin';
    }
    function isStaffActive(u) {
      return !u || u.active !== false;
    }
    function activeUsers() {
      return users.filter(isStaffActive);
    }
    /** 可登录、可分派任务的业务成员（排除通知联系人） */
    function businessUsers(includeInactive = false) {
      const pool = includeInactive ? users : activeUsers();
      return pool.filter(u => !isContactProfile(u));
    }
    /** 与钉钉长名/短名兼容：王元斌 ≈ 王元斌 Martin */
    function personNameCore(name) {
      const first = String(name || '').trim().split(/\s+/)[0];
      if (!first) return '';
      const dash = first.indexOf('-');
      return dash > 0 ? first.slice(0, dash) : first;
    }
    function isSamePersonName(a, b) {
      if (!a || !b) return false;
      if (a === b) return true;
      const ca = personNameCore(a);
      const cb = personNameCore(b);
      return !!ca && ca === cb;
    }
    function roleDisplayName(role) {
      if (role === 'gm') return '总经理';
      if (role === 'admin') return '管理员';
      if (role === 'manager') return '部门经理';
      return '执行人员';
    }
    function roleBadgeClass(role) {
      if (role === 'gm') return 'role-gm';
      if (role === 'admin') return 'role-admin';
      if (role === 'manager') return 'role-manager';
      return 'role-staff';
    }

    const INFO_CENTER_DEPT = '信息中心';

    function isInfoCenterMember(user = currentUser) {
      return !!(user && user.dept === INFO_CENTER_DEPT);
    }

    function canViewAllProjects(user = currentUser) {
      return !!(user && user.id);
    }

    /** 是否与项目相关（负责人/创建人/团队成员，或参与其下任务） */
    function isRelatedToProject(project) {
      if (!project) return false;
      if (project.manager === currentUser.name || project.creator === currentUser.name) return true;
      if (Array.isArray(project.teamMembers) && project.teamMembers.includes(currentUser.name)) return true;
      return getMyRelatedTasks().some(t => t.projectId === project.id);
    }

    /** 当前用户可查看的项目（未归档）— 全员可见全公司项目 */
    function getViewableProjects() {
      return getAllActiveProjects();
    }

    /** 当前用户可查看的已归档项目 */
    function getViewableArchivedProjects() {
      return projects.filter(p => isProjectArchived(p));
    }

    function canViewProject(project) {
      return !!project;
    }

    /** 能否打开任务详情（查看）。项目任务全员可读；无项目临时任务仅相关人 */
    function canViewTask(task) {
      if (!task) return false;
      if (task.type === 'temp' && !task.projectId) {
        return isRelatedToTask(task);
      }
      if (task.projectId) {
        return !!projects.find(p => p.id === task.projectId);
      }
      return isRelatedToTask(task);
    }

    function getProjectsPageIntro() {
      const count = getViewableProjects().length;
      const base = isFullAccess(currentUser.role)
        ? '管理全公司项目与任务。'
        : '您可查看全公司所有项目及项目下全部任务；仅可编辑本人负责或参与的项目与任务。';
      return `${base}（当前 ${count} 个未归档项目）`;
    }

    async function refreshProjectsFromServer() {
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请连接服务端后刷新');
        return;
      }
      const ok = await DataService.loadFromServer();
      render();
      if (ok) {
        alert(`已从服务端刷新，当前 ${getViewableProjects().length} 个未归档项目`);
      } else {
        alert('刷新失败，请检查网络或联系管理员');
      }
    }

    async function mergeSeedFromServer() {
      if (!isFullAccess(currentUser.role)) {
        alert('仅总经理/管理员可执行');
        return;
      }
      if (!ApiConfig.enabled || !authSession.token) {
        alert('请连接服务端后操作');
        return;
      }
      if (!confirm('将把系统种子中缺失的项目/任务补入服务端，不覆盖已有数据。是否继续？')) return;
      try {
        const res = await fetch(ApiConfig.baseUrl + '/data/admin/merge-seed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: '{}',
          signal: AbortSignal.timeout(ApiConfig.timeout),
        });
        const data = await res.json();
        if (!data.success) {
          alert(data.message || '补全失败');
          return;
        }
        await DataService.loadFromServer();
        render();
        alert(`${data.message}\n当前共 ${getViewableProjects().length} 个未归档项目，请通知同事刷新项目管理页。`);
      } catch (e) {
        alert('补全失败：' + e.message);
      }
    }

    function uniqueUsersById(userList) {
      const map = new Map();
      userList.forEach(u => { if (u?.id) map.set(u.id, u); });
      return [...map.values()];
    }

    function sortUsersForSelect(list) {
      return [...list].sort((a, b) =>
        a.dept.localeCompare(b.dept, 'zh-CN') || a.name.localeCompare(b.name, 'zh-CN'));
    }

    /** 任务负责人：可选业务成员（不含通知联系人） */
    function getTaskAssigneeCandidates() {
      return sortUsersForSelect(
        uniqueUsersById(getStaffDirectoryUsers().filter(u => isStaffActive(u) && !isContactProfile(u)))
      );
    }

    function getStaffDirectoryUsers() {
      return allStaffUsers.length ? allStaffUsers : users;
    }

    function sanitizeTaskCollaborators(assignee, collaborators) {

    }

    const COLLAB_TYPE_INFORM = 'inform';
    const COLLAB_TYPE_ASSIST = 'assist';
    const COLLAB_STATUS_ACTIVE = 'active';
    const COLLAB_STATUS_PENDING = 'pending_schedule';
    const COLLAB_STATUS_PROPOSED = 'proposed';
    const COLLAB_STATUS_APPROVED = 'approved';
    const COLLAB_STATUS_REJECTED = 'rejected';

    function collabTypeLabel(type) {
      return type === COLLAB_TYPE_ASSIST ? '辅助性' : '告知性';
    }

    function collabStatusLabel(entry) {
      if (!entry) return '';
      if (entry.type === COLLAB_TYPE_INFORM) return '告知中';
      const map = {
        pending_schedule: '待填写协助时段',
        proposed: '待负责人审批',
        approved: '已批准·计入工时',
        rejected: '未接受',
      };
      return map[entry.status] || entry.status;
    }

    function syncCollaboratorsArray(task) {
      if (!task) return;
      task.collaborators = (task.collaboratorEntries || [])
        .filter(e => e && e.userName && e.status !== COLLAB_STATUS_REJECTED)
        .map(e => e.userName)
        .filter(n => n !== task.assignee);
      task.collaborators = sanitizeTaskCollaborators(task.assignee, task.collaborators);
    }

    function ensureCollaboratorEntries(task) {
      if (!task) return;
      if (Array.isArray(task.collaboratorEntries) && task.collaboratorEntries.length) {
        task.collaboratorEntries.forEach(e => {
          if (!e.id) e.id = genId('COL');
          if (!e.type) e.type = COLLAB_TYPE_INFORM;
          if (!e.status) e.status = e.type === COLLAB_TYPE_ASSIST ? COLLAB_STATUS_PENDING : COLLAB_STATUS_ACTIVE;
        });
        syncCollaboratorsArray(task);
        return;
      }
      task.collaboratorEntries = (task.collaborators || [])
        .filter(n => n && n !== task.assignee)
        .map(name => ({
          id: genId('COL'),
          userName: name,
          type: COLLAB_TYPE_INFORM,
          status: COLLAB_STATUS_ACTIVE,
        }));
      syncCollaboratorsArray(task);

    function normalizeAllTaskCollaborators() {
      tasks.forEach(ensureCollaboratorEntries);
      normalizeMilestoneFlags();
    }

    /** 将项目一级根节点标记为里程碑（兼容历史数据） */
    function normalizeMilestoneFlags() {
      const byProject = new Map();
      tasks.forEach(t => {
        if (!t || !t.projectId || t.type === 'temp') return;
        if (!byProject.has(t.projectId)) byProject.set(t.projectId, []);
        byProject.get(t.projectId).push(t);
      });
      byProject.forEach(list => {
        const ids = new Set(list.map(t => t.id));
        list.forEach(t => {
          const isRoot = !t.parentId || t.parentId === t.id || !ids.has(t.parentId);
          if (isRoot) t.isMilestone = true;
          else if (t.isMilestone) t.isMilestone = false;
        });
      });
    }

    /** 里程碑：项目计划中的分组节点，不计入任务 */
    function isMilestoneTask(task) {
      if (!task || task.type === 'temp' || !task.projectId) return false;
      if (task.isMilestone === true) return true;
      if (task.isMilestone === false) return false;
      if (!task.parentId || task.parentId === task.id) return true;
      const parent = tasks.find(x => x.id === task.parentId);
      return !parent || parent.projectId !== task.projectId;
    }

    /** 里程碑下全部未作废任务（含子级），不含里程碑自身 */
    function getMilestoneDescendantTasks(milestoneId) {
      const result = [];
      const stack = [milestoneId];
      const visited = new Set([milestoneId]);
      while (stack.length) {
        const id = stack.pop();
        tasks.forEach(t => {
          if (t.parentId !== id || t.status === 'abolished' || visited.has(t.id)) return;
          visited.add(t.id);
          if (!isMilestoneTask(t)) result.push(t);
          stack.push(t.id);
        });
      }
      return result;
    }

    /** 里程碑下所有任务均已完成（至少有一条任务）才可完成里程碑 */
    function areAllMilestoneTasksDone(milestoneId) {
      const descendants = getMilestoneDescendantTasks(milestoneId);
      if (!descendants.length) return false;
      return descendants.every(t => t.status === 'done');
    }

    function canCompleteMilestone(milestone) {
      if (!milestone || !isMilestoneTask(milestone)) return false;
      if (milestone.status === 'done' || milestone.status === 'archived' || milestone.status === 'abolished') return false;
      return areAllMilestoneTasksDone(milestone.id);
    }

    function getMilestoneIncompleteHint(milestoneId) {
      const descendants = getMilestoneDescendantTasks(milestoneId);
      if (!descendants.length) return '请先在该里程碑下添加任务；全部任务完成后方可完成里程碑。';
      const open = descendants.filter(t => t.status !== 'done');
      return `该里程碑下仍有 ${open.length} 项未完成任务，全部完成后才可完成里程碑。`;
    }

    function getCollaboratorEntries(task, opts = {}) {
      if (!task) return [];
      ensureCollaboratorEntries(task);
      let list = task.collaboratorEntries || [];
      if (opts.type) list = list.filter(e => e.type === opts.type);
      if (opts.userName) list = list.filter(e => isSamePersonName(e.userName, opts.userName));
      if (opts.excludeRejected) list = list.filter(e => e.status !== COLLAB_STATUS_REJECTED);
      return list;

    function normalizeCollaboratorNames(raw, assignee) {

    function syncCollaboratorsByType(task, type, userNames, opts = {}) {
      ensureCollaboratorEntries(task);
      const names = normalizeCollaboratorNames(userNames, task.assignee);
      const otherType = type === COLLAB_TYPE_INFORM ? COLLAB_TYPE_ASSIST : COLLAB_TYPE_INFORM;
      for (const name of names) {
        if (getCollaboratorEntries(task, { type: otherType, userName: name, excludeRejected: true }).length > 0) {
          throw new Error(`「${name}」已担任${collabTypeLabel(otherType)}协办，不能同时选为${collabTypeLabel(type)}协办`);
        }
      }

      const prevOfType = (task.collaboratorEntries || []).filter(e => e.type === type);
      const prevNames = new Set(prevOfType.map(e => e.userName));
      const nameSet = new Set(names);

      task.collaboratorEntries = (task.collaboratorEntries || []).filter(e => e.type !== type || nameSet.has(e.userName));

      for (const name of names) {
        if ((task.collaboratorEntries || []).some(e => e.type === type && e.userName === name)) continue;
        const entry = {

          userName: name,
          type,
          status: type === COLLAB_TYPE_ASSIST ? COLLAB_STATUS_PENDING : COLLAB_STATUS_ACTIVE,

      syncCollaboratorsArray(task);
      return task.collaboratorEntries.filter(e => e.type === type);

    function calcAssistEntryEstimatedHours(startDate, endDate) {
      if (!startDate || !endDate) return 0;
      if (parseLocalDate(startDate) > parseLocalDate(endDate)) return 0;
      return calcWorkHoursBetween(startDate, endDate);
    }

    function getAssistEntryHoursInWeek(entry, weekStart, weekEnd) {
      if (!entry || entry.type !== COLLAB_TYPE_ASSIST || entry.status !== COLLAB_STATUS_APPROVED) return 0;
      const start = entry.planStartDate;
      const end = entry.planEndDate;
      const estimated = Number(entry.estimatedHours) || calcAssistEntryEstimatedHours(start, end);
      if (!start || !end || estimated <= 0) return 0;
      const totalWorkDays = calcWorkDays(start, end);
      if (!totalWorkDays) return 0;
      const overlapDays = countOverlapWorkDays(start, end, weekStart, weekEnd);
      if (!overlapDays) return 0;
      return Math.round((estimated * overlapDays / totalWorkDays) * 10) / 10;
    }

    function getMemberAssistWeeklyHours(userName, weekRange) {

    let workCalendar = null;

      return [...new Set(list.map(d => String(d).slice(0, 10)).filter(Boolean))].sort();

    function parseLocalDate(dateStr) {
      if (!dateStr) return null;
      const parts = String(dateStr).slice(0, 10).split('-').map(Number);
      if (parts.length < 3 || parts.some(n => Number.isNaN(n))) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function formatLocalDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function normalizeDateStr(dateStr) {

      return d ? formatLocalDate(d) : String(dateStr).trim().slice(0, 10);
    }

    function diffCalendarDays(fromStr, toStr) {

      if (!from || !to) return null;
      return Math.round((to.getTime() - from.getTime()) / 86400000);
