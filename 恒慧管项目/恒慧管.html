    // ========== 绩效管理 ==========
    function formatPerfMonthLabel(ym) {
      const m = String(ym || '').match(/^(\d{4})-(\d{2})$/);
      if (!m) return ym || '';
      return `${m[1]}年${parseInt(m[2], 10)}月`;
    }

    function defaultPerfMonth() {
      if (state.performanceMonth) return state.performanceMonth;
      if (performanceData.currentMonth) return performanceData.currentMonth;
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    async function ensurePerformanceLoaded(force) {
      if (!canAccessPerformance) return false;
      if (performanceData.loaded && !force) return true;
      if (!ApiConfig.enabled || !authSession.token) {
        alert('绩效管理需连接服务端并登录');
        return false;
      }
      try {
        const res = await fetch(ApiConfig.baseUrl + '/performance/bootstrap', {
          headers: { ...AuthService.getAuthHeaders() },
          signal: AbortSignal.timeout(ApiConfig.timeout || 15000),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '加载失败');
        performanceData = {
          loaded: true,
          template: data.template,
          cycles: data.cycles || [],
          assessments: data.assessments || [],
          users: data.users || [],
          projects: data.projects || [],
          months: data.months || [],
          currentMonth: data.currentMonth || '',
          myUserId: data.myUserId || currentUser.id,
          evidenceTypes: data.evidenceTypes || performanceData.evidenceTypes,
        };
        if (!state.performanceMonth) state.performanceMonth = performanceData.currentMonth || defaultPerfMonth();
        return true;
      } catch (e) {
        alert(e.message || '绩效数据加载失败');
        return false;
      }
    }

    function getPerfCycle(id) {
      return (performanceData.cycles || []).find(c => c.id === id) || null;
    }

    function getPerfAssessment(id) {
      return (performanceData.assessments || []).find(a => a.id === id) || null;
    }

    function getPerfUser(id) {
      return (performanceData.users || []).find(u => u.id === id)
        || users.find(u => u.id === id)
        || null;
    }

    function replacePerfAssessment(assessment) {
      if (!assessment) return;
      const idx = performanceData.assessments.findIndex(a => a.id === assessment.id);
      if (idx >= 0) performanceData.assessments[idx] = assessment;
      else performanceData.assessments.push(assessment);
    }

    function replacePerfCycle(cycle) {
      if (!cycle) return;
      const idx = performanceData.cycles.findIndex(c => c.id === cycle.id);
      if (idx >= 0) performanceData.cycles[idx] = cycle;
      else performanceData.cycles.push(cycle);
    }

    async function ensurePerformanceMonth(yearMonth, opts = {}) {
      const ym = String(yearMonth || '').trim();
      if (!/^\d{4}-\d{2}$/.test(ym)) {
        alert('请选择有效月份');
        return false;
      }
      if (!ApiConfig.enabled || !authSession.token) {
        alert('绩效管理需连接服务端并登录');
        return false;
      }
      state.performanceMonth = ym;
      state.performanceLoadingMonth = true;
      if (!opts.silent) render();
      try {
        const res = await fetch(ApiConfig.baseUrl + '/performance/ensure-month', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify({ yearMonth: ym }),
          signal: AbortSignal.timeout(ApiConfig.timeout || 15000),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '打开考核表失败');
        replacePerfCycle(data.cycle);
        replacePerfAssessment(data.assessment);
        if (Array.isArray(data.months) && data.months.length) {
          performanceData.months = data.months;
        } else if (!performanceData.months.includes(ym)) {
          performanceData.months = [ym, ...performanceData.months].sort((a, b) => b.localeCompare(a));
        }
        state.performanceCycleId = data.cycle.id;
        state.performanceAssessmentId = data.assessment.id;
        state.performanceView = 'mine';
        state.performanceDirty = false;
        state.performanceLoadingMonth = false;
        if (!opts.skipRender) render();
        return true;
      } catch (e) {
        state.performanceLoadingMonth = false;
        if (!opts.skipRender) render();
        alert(e.message || '打开考核表失败');
        return false;
      }
    }

    function onPerformanceMonthChange(ym) {
      ensurePerformanceMonth(ym);
    }

    function renderPerformancePage() {
      if (!canAccessPerformance) {
        return `<div class="empty-state"><i class="fas fa-lock"></i><p>无权访问绩效管理</p></div>`;
      }
      if (!performanceData.loaded) {
        ensurePerformanceLoaded().then(async ok => {
          if (!ok) return;
          await ensurePerformanceMonth(defaultPerfMonth(), { silent: true });
        });
        return `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>正在加载绩效数据…</p></div>`;
      }
      if (state.performanceLoadingMonth) {
        return `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>正在打开 ${escapeHtml(formatPerfMonthLabel(state.performanceMonth))} 考核表…</p></div>`;
      }
      if (!state.performanceAssessmentId) {
        ensurePerformanceMonth(defaultPerfMonth(), { silent: true });
        return `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>正在打开本月考核表…</p></div>`;
      }
      return renderPerformanceForm();
    }

    function renderPerformanceMonthBar() {
      const months = [...((performanceData.months || []).length
        ? performanceData.months
        : [defaultPerfMonth()])];
      const current = state.performanceMonth || defaultPerfMonth();
      if (!months.includes(current)) months.unshift(current);
      return `
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
          <label style="font-size:13px;color:#4B5563;display:flex;align-items:center;gap:8px;">
            <span style="font-weight:600;">考核月份</span>
            <select class="form-input" style="width:auto;min-width:140px;"
              onchange="onPerformanceMonthChange(this.value)">
              ${months.map(m =>
                `<option value="${escapeHtml(m)}" ${m === current ? 'selected' : ''}>${escapeHtml(formatPerfMonthLabel(m))}</option>`
              ).join('')}
            </select>
          </label>
          <button class="btn btn-ghost" onclick="ensurePerformanceLoaded(true).then(ok=>ok&&ensurePerformanceMonth(state.performanceMonth||defaultPerfMonth()))"><i class="fas fa-sync"></i> 刷新</button>

      `;
    }

    function formatPerfWeight(ind) {
      if (ind.weightLabel != null) return ind.weightLabel;
      if (ind.weight == null) return '—';
      return String(ind.weight);
    }

    function formatPerfMaxScore(ind) {
      if (ind.maxScoreLabel != null) return ind.maxScoreLabel;
      return ind.maxScore != null ? String(ind.maxScore) : '—';
    }

                      </div>
                      <button class="btn btn-ghost btn-sm" onclick="downloadPerformanceFile('${ev.fileId}')"><i class="fas fa-download"></i></button>
                      <button class="btn btn-ghost btn-sm" style="color:#DC2626;" onclick="deletePerformanceEvidence('${assessment.id}','${ev.id}')"><i class="fas fa-trash-alt"></i></button>

                  onchange="togglePerfProject('${assessment.id}','${p.id}',this.checked)">

            <thead>
              <tr>

              <tr>
                <td colspan="4" style="${td}">公司/部门名称：${escapeHtml(template.companyName || '信息中心')}</td>
                <td colspan="3" style="${td}">岗位名称：${escapeHtml(template.positionName || '项目经理（实施专员）')}</td>
                <td colspan="3" style="${td}">姓名：${escapeHtml(user?.name || assessment.userId || '')}</td>
                <td colspan="2" style="${td}">考核周期：${escapeHtml(cycleLabel)}</td>
              </tr>
              <tr>
                <th style="${th}">职能性<br>指标</th>
                <th style="${th}">关键指标内容</th>
                <th style="${th}">权重<br>比例%</th>
                <th style="${th}">对应<br>分值</th>
                <th style="${th}">定义和计算公式</th>
                <th style="${th}">目标值</th>
                <th style="${th}">评分标准</th>
                <th style="${th}">实际完成值</th>
                <th style="${th}">数据来源部门</th>
                <th style="${th}">自评得分</th>
                <th style="${th}">直系领导得分</th>
                <th style="${th}">部门领导<br>考核最终得分</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
              <tr>
                <td colspan="3" style="${td}font-weight:700;background:#F9FAFB;">合计分数</td>

                <td colspan="7" style="${td}background:#F9FAFB;font-size:11px;color:#6B7280;">
                  当前得分：<strong style="color:#059669;font-size:13px;">${assessment.total != null ? Number(assessment.total).toFixed(1) : '—'}</strong>
                  （价值观 ${summary.valuesScore ?? 0} + 岗位 ${summary.dutyScore ?? 0}
                  + 加分计入 ${summary.bonusCounted ?? 0}${summary.bonusRaw != null && summary.bonusRaw !== summary.bonusCounted ? `，原始加分${summary.bonusRaw}封顶${template.bonusCap}` : ''}
                  − 扣分 ${summary.penaltyScore ?? 0}）
                </td>
                <td style="${td}background:#F9FAFB;text-align:center;font-weight:700;color:#059669;">${assessment.total != null ? Number(assessment.total).toFixed(1) : ''}</td>
              </tr>
              <tr>
                <td colspan="${colCount}" style="${td}font-size:11px;color:#4B5563;line-height:1.5;">

        <div style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:14px 16px;margin-top:12px;">
          <div style="font-weight:600;margin-bottom:6px;">个人补充备注</div>
          <textarea class="form-input" rows="2" onchange="patchPerfAssessmentRemark('${assessment.id}',this.value)">${escapeHtml(assessment.remark || '')}</textarea>
        </div>
      `;
    }

    function patchPerfRowField(assessmentId, key, field, value) {
      const a = getPerfAssessment(assessmentId);
      if (!a) return;
      if (!a.rows[key]) a.rows[key] = { actualValue: '', selfScore: '', leaderScore: '', finalScore: '', note: '', evidences: [] };
      if (field === 'actualValue' || field === 'note') a.rows[key][field] = value;
      else a.rows[key][field] = value === '' ? '' : Number(value);
      state.performanceDirty = true;
    }

    function patchPerfAssessmentRemark(assessmentId, value) {
      const a = getPerfAssessment(assessmentId);
      if (!a) return;
      a.remark = value;
      state.performanceDirty = true;
    }

    async function togglePerfProject(assessmentId, projectId, checked) {
      const a = getPerfAssessment(assessmentId);
      if (!a) return;
      const set = new Set(a.projectIds || []);
      if (checked) set.add(projectId);
      else set.delete(projectId);
      a.projectIds = [...set];
      try {
        const res = await fetch(ApiConfig.baseUrl + '/performance/assessments/' + encodeURIComponent(assessmentId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify({ projectIds: a.projectIds }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '保存失败');
        replacePerfAssessment(data.assessment);
        render();
      } catch (e) {
        alert(e.message || '保存失败');
      }
    }

    async function savePerformanceAssessment(assessmentId) {
      const a = getPerfAssessment(assessmentId);
      if (!a) return;
      const rows = {};
      for (const [key, row] of Object.entries(a.rows || {})) {
        rows[key] = {
          actualValue: row.actualValue || '',
          selfScore: row.selfScore,
          leaderScore: row.leaderScore,
          finalScore: row.finalScore,
          note: row.note || '',
        };
      }
      try {
        const res = await fetch(ApiConfig.baseUrl + '/performance/assessments/' + encodeURIComponent(assessmentId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
          body: JSON.stringify({ rows, remark: a.remark || '', projectIds: a.projectIds || [] }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '保存失败');
        replacePerfAssessment(data.assessment);
        state.performanceDirty = false;
        render();
        alert('已保存，总分：' + (data.assessment.total != null ? Number(data.assessment.total).toFixed(1) : '—'));
      } catch (e) {
        alert(e.message || '保存失败');
      }
    }

    async function uploadPerformanceEvidence(assessmentId, indicatorKey, input) {
      const file = input.files && input.files[0];
      input.value = '';
      if (!file) return;
      const typeEl = document.getElementById('perfEvType_' + indicatorKey);
      const evidenceType = (typeEl && typeEl.value) || state.performanceEvidenceType || '其他';
      try {
        const form = new FormData();
        form.append('file', file, file.name);
        form.append('indicatorKey', indicatorKey);
        form.append('evidenceType', evidenceType);
        const res = await fetch(
          ApiConfig.baseUrl + '/performance/assessments/' + encodeURIComponent(assessmentId) + '/evidences',
          {
            method: 'POST',
            headers: { ...AuthService.getAuthHeaders() },
            body: form,
            signal: AbortSignal.timeout(60000),
          }
        );
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '上传失败');
        replacePerfAssessment(data.assessment);
        if (Array.isArray(data.assessment.projectIds) && data.assessment.projectIds.length) {
          await DataService.loadFromServer({ timeout: 20000 }).catch(() => {});
        }
        render();
      } catch (e) {
        alert(e.message || '上传失败');
      }
    }

    async function deletePerformanceEvidence(assessmentId, evidenceId) {
      if (!confirm('确认删除该证据文件？')) return;
      try {
        const res = await fetch(
          ApiConfig.baseUrl + '/performance/assessments/' + encodeURIComponent(assessmentId)
            + '/evidences/' + encodeURIComponent(evidenceId),
          {
            method: 'DELETE',
            headers: { ...AuthService.getAuthHeaders() },
          }
        );
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '删除失败');
        replacePerfAssessment(data.assessment);
        await DataService.loadFromServer({ timeout: 20000 }).catch(() => {});
        render();
      } catch (e) {
        alert(e.message || '删除失败');
      }
    }

    async function downloadPerformanceFile(fileId) {
      let fileName = fileId;
      const a = getPerfAssessment(state.performanceAssessmentId);
      if (a) {
        for (const row of Object.values(a.rows || {})) {
          const ev = (row.evidences || []).find(e => e.fileId === fileId);
          if (ev) { fileName = ev.name || fileId; break; }
        }
      }
      try {
        const res = await fetch(ApiConfig.baseUrl + '/performance/files/' + encodeURIComponent(fileId), {
          headers: { ...AuthService.getAuthHeaders() },
          signal: AbortSignal.timeout(60000),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || '下载失败');
        }
        const blob = await res.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName || fileId;
        link.click();
        setTimeout(() => URL.revokeObjectURL(link.href), 2000);
      } catch (e) {
        alert(e.message || '下载失败');
      }
    }

    function exportPerformanceAssessment() {
      const assessment = getPerfAssessment(state.performanceAssessmentId);
      const template = performanceData.template;
      const cycle = assessment ? getPerfCycle(assessment.cycleId) : null;
      const user = assessment ? getPerfUser(assessment.userId) : null;
      if (!assessment || !template) {
        alert('请先打开考核表');
        return;
      }
      const cycleLabel = formatPerfMonthLabel(state.performanceMonth || cycle?.name || cycle?.yearMonth || '');
      const headers = [
        '职能性指标', '关键指标内容', '权重比例%', '对应分值', '定义和计算公式', '目标值', '评分标准',
        '实际完成值', '数据来源部门', '自评得分', '直系领导得分', '部门领导考核最终得分',
      ];
      const sheetRows = [];
      sheetRows.push([template.name, '', '', '', '', '', '', '', '', '', '', '']);
      sheetRows.push([
        `公司/部门名称：${template.companyName || '信息中心'}`,
        '', '', '',
        `岗位名称：${template.positionName || '项目经理（实施专员）'}`,
        '', '',
        `姓名：${user?.name || assessment.userId || ''}`,
        '', '',
        `考核周期：${cycleLabel}`,
        '',
      ]);
      sheetRows.push(headers);
      let lastSection = '';
      (template.indicators || []).forEach(ind => {
        if (ind.sectionTitle !== lastSection) {
          lastSection = ind.sectionTitle;
          sheetRows.push([ind.sectionTitle, '', '', '', '', '', '', '', '', '', '', '']);
        }
        const row = assessment.rows?.[ind.key] || {};
        sheetRows.push([
          ind.category,
          ind.title,
          ind.weightLabel != null ? ind.weightLabel : (ind.weight != null ? ind.weight : '—'),
          ind.maxScoreLabel != null ? ind.maxScoreLabel : ind.maxScore,
          ind.definition,
          ind.target,
          ind.scoringRule,
          row.actualValue || '',
          ind.dataSource || '',
          row.selfScore ?? '',
          row.leaderScore ?? '',
          row.finalScore ?? '',
        ]);
      });
      sheetRows.push(['合计分数', '', '', template.baseScoreTotal != null ? template.baseScoreTotal : 100, '', '', '', '', '', '', '', assessment.total ?? '']);
      sheetRows.push([`备注：${template.remark || ''}`, '', '', '', '', '', '', '', '', '', '', '']);
      if (assessment.remark) {

    // ========== 数据导出 ==========
    function downloadExcel(sheetName, headers, rows, filename) {
      const aoa = headers ? [headers, ...rows] : rows;
      const colCount = Math.max(1, ...(aoa.map(r => (r || []).length)));
      if (typeof XLSX === 'undefined') {
        const csv = aoa.map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename.replace(/\.xlsx$/, '.csv');
        link.click();
        return;
      }
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = Array.from({ length: colCount }, () => ({ wch: 14 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, filename.endsWith('.xlsx') ? filename : filename + '.xlsx');
    }

    function getProjectsBeforeTabFilters() {
      let list = getViewableProjects().filter(p => !isProjectArchived(p));
      if (state.projectSearch) {
        const q = state.projectSearch.toLowerCase();
        list = list.filter(p =>
          (p.name || '').toLowerCase().includes(q) ||
          (p.id || '').toLowerCase().includes(q) ||
          (p.manager || '').toLowerCase().includes(q) ||
          (p.dept || '').toLowerCase().includes(q)
        );
      }
      list = applyProjectDeptFilter(list);
      list = applyProjectManagerFilter(list);
      list = applyProjectRiskFilter(list);
      return list;
    }

    function applyProjectStatusFilter(list) {
      const filter = state.projectFilter || 'all';
      if (filter === 'all') return list;
      return list.filter(p => p.status === filter);
    }

    function applyProjectDeptFilter(list) {
      const dept = state.projectDept || 'all';
      if (dept === 'all') return list;
      return list.filter(p => p.dept === dept);
    }

    function applyProjectManagerFilter(list) {
      const manager = state.projectManager || 'all';
      if (manager === 'all') return list;
      return list.filter(p => (p.manager || '') === manager);
    }

    function projectHasOverdueTasks(project) {
      if (!project) return false;
      return tasks.some(t => t.projectId === project.id && t.status !== 'abolished' && isOverdue(t));
    }

    /** 计划结束日在今天起 days 天内（含今天），已过期不算 */
    function projectEndsWithinDays(project, days) {
      const end = normalizeDateStr(project?.endDate);
      if (!end) return false;
      const daysUntil = diffCalendarDays(todayStr(), end);
      if (daysUntil == null) return false;
      return daysUntil >= 0 && daysUntil <= days;
    }

    function applyProjectRiskFilter(list) {
      const risk = state.projectRiskFilter || 'all';
      if (risk === 'overdue') return list.filter(p => projectHasOverdueTasks(p));
      if (risk === 'endingSoon') return list.filter(p => projectEndsWithinDays(p, 7));
      return list;
    }

    function getProjectManagerOptions() {
      const names = new Set();
      getViewableProjects().filter(p => !isProjectArchived(p)).forEach(p => {
        if (p.manager) names.add(p.manager);
      });
      return [...names].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    }

    const PROJECT_STATUS_SORT_ORDER = { active: 0, planning: 1, paused: 2, done: 3 };

    function projectEndDateSortKey(p) {
      return normalizeDateStr(p?.endDate) || '9999-99-99';
    }

    function sortProjectsForList(list) {
      const mode = state.projectSort || 'default';
      if (mode === 'progress') {
        const progressMap = new Map(list.map(p => [p.id, getProjectListStats(p).mainProgress]));
        return list.slice().sort((a, b) => {
          const diff = (progressMap.get(b.id) || 0) - (progressMap.get(a.id) || 0);
          if (diff !== 0) return diff;
          return (a.name || '').localeCompare(b.name || '', 'zh-CN');
        });
      }
      return list.slice().sort((a, b) => {
        if (mode === 'name') {
          return (a.name || '').localeCompare(b.name || '', 'zh-CN');
        }
        if (mode === 'endDate') {
          const cmp = projectEndDateSortKey(a).localeCompare(projectEndDateSortKey(b));
          if (cmp !== 0) return cmp;
          return (a.name || '').localeCompare(b.name || '', 'zh-CN');
        }
        const sa = PROJECT_STATUS_SORT_ORDER[a.status] ?? 9;
        const sb = PROJECT_STATUS_SORT_ORDER[b.status] ?? 9;
        if (sa !== sb) return sa - sb;
        const cmp = projectEndDateSortKey(a).localeCompare(projectEndDateSortKey(b));
        if (cmp !== 0) return cmp;
        return (a.name || '').localeCompare(b.name || '', 'zh-CN');
      });
    }

        const roleName = roleDisplayName(u.role);
        return { ...u, total, doing, todo, done, overdue, weeklyHours, originalPlannedHours, weeklyBreakdown, saturation, roleName, completionRate: total > 0 ? Math.round(done / total * 100) : 0, weekRange, pendingBlockedHours: weeklyBreakdown.pendingBlockedHours || 0 };

    function sortTeamMembers(list) {
      const sort = state.teamSort || 'saturation_desc';

      switch (sort) {
        case 'saturation_asc':
          return arr.sort((a, b) => a.saturation - b.saturation || byName(a, b));
        case 'weeklyHours_desc':
          return arr.sort((a, b) => b.weeklyHours - a.weeklyHours || b.saturation - a.saturation || byName(a, b));
        case 'weeklyHours_asc':
          return arr.sort((a, b) => a.weeklyHours - b.weeklyHours || a.saturation - b.saturation || byName(a, b));
        case 'name':
          return arr.sort(byName);
        case 'saturation_desc':

          return arr.sort((a, b) => b.saturation - a.saturation || b.weeklyHours - a.weeklyHours || byName(a, b));

    // ========== 项目列表 ==========
    function getProjectListStats(project) {
      const allNodes = tasks.filter(t => t.projectId === project.id && t.status !== 'abolished');
      const mainTasks = getProjectRootTasks(allNodes).filter(isMilestoneTask);
      const projectTasks = allNodes.filter(t => !isMilestoneTask(t));
      const doneTasks = projectTasks.filter(t => t.status === 'done');
      const overdueTasks = projectTasks.filter(t => isOverdue(t));
      const progress = projectTasks.length > 0 ? Math.round(doneTasks.length / projectTasks.length * 100) : 0;
      const mainDone = mainTasks.filter(t => t.status === 'done').length;
      const mainProgress = mainTasks.length > 0 ? Math.round(mainDone / mainTasks.length * 100) : 0;
      return {
        projectTasks,
        mainCount: mainTasks.length,
        mainDone,
        mainProgress,
        total: projectTasks.length,
        done: doneTasks.length,
        overdue: overdueTasks.length,
        progress,
        rootTasks: mainTasks,
      };
    }

    const PROJECT_ACCENT_COLORS = [
      '#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6',
    ];
    const PERSON_AVATAR_COLORS = [
      '#6366F1', '#10B981', '#F59E0B', '#EC4899', '#64748B', '#0EA5E9', '#8B5CF6', '#14B8A6',
    ];

    function hashStringToIndex(str, modulo) {
      const s = String(str || '');
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h) % Math.max(modulo, 1);
    }

    function getProjectAccentColor(project) {
      const key = (project && (project.id || project.name)) || '';
      return PROJECT_ACCENT_COLORS[hashStringToIndex(key, PROJECT_ACCENT_COLORS.length)];

    function buildPlanVisibleTaskIds(projectTasks, scope) {
      if (scope !== 'mine') return new Set(projectTasks.map(t => t.id));
      const idSet = new Set(projectTasks.map(t => t.id));
      const mineIds = new Set(
        getMyRelatedTasks().filter(t => idSet.has(t.id)).map(t => t.id)
      );
      const keep = new Set(mineIds);
      const byId = new Map(projectTasks.map(t => [t.id, t]));
      mineIds.forEach(id => {
        let t = byId.get(id);
        while (t && t.parentId && byId.has(t.parentId) && t.parentId !== t.id) {
          keep.add(t.parentId);
          t = byId.get(t.parentId);
        }
      });
      return { keepIds: keep, mineIds };
    }

    function getPlanRootTasks(project, milestoneId, scope) {
      const allProjectTasks = tasks.filter(t => t.projectId === project.id && t.status !== 'abolished');
      const { keepIds, mineIds } = scope === 'mine'
        ? buildPlanVisibleTaskIds(allProjectTasks, 'mine')
        : { keepIds: new Set(allProjectTasks.map(t => t.id)), mineIds: null };
      // 我的任务视图：若某里程碑下有我的任务，保留该里程碑作为分组头
      if (scope === 'mine') {
        allProjectTasks.filter(isMilestoneTask).forEach(m => {
          if (allProjectTasks.some(t => !isMilestoneTask(t) && keepIds.has(t.id) && getTaskBreadcrumb(t.id).some(a => a.id === m.id))) {
            keepIds.add(m.id);

        });

      const visibleTasks = allProjectTasks.filter(t => keepIds.has(t.id));
      let rootTasks = getProjectRootTasks(allProjectTasks).filter(t => isMilestoneTask(t) && keepIds.has(t.id));
      if (milestoneId) {
        rootTasks = rootTasks.filter(t => t.id === milestoneId);
      }
      return { allProjectTasks, visibleTasks, rootTasks, mineIds, keepIds };
    }

        active: scopeProjects.filter(p => p.status === 'active').length,
        paused: scopeProjects.filter(p => p.status === 'paused').length,
        done: scopeProjects.filter(p => p.status === 'done').length,
      };
      const totalAll = statusCounts.planning + statusCounts.active + statusCounts.paused + statusCounts.done;

      return `
        <div>
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
            <div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px;">
                <h2 style="margin:0;font-size:16px;font-weight:700;color:var(--text);">项目列表</h2>
                <div style="display:flex;align-items:center;gap:8px;">
                  ${ApiConfig.enabled ? `<button class="btn btn-ghost btn-sm" onclick="refreshProjectsFromServer()" title="从服务端重新拉取项目"><i class="fas fa-sync-alt"></i></button>` : ''}
                  ${canCreateProject() ? `<button class="btn btn-primary btn-sm" onclick="showProjectModal()"><i class="fas fa-plus"></i>新建项目</button>` : ''}
                </div>
              </div>
              <p class="content-intro" style="margin:0 0 12px;">${getProjectsPageIntro()}</p>
              <div class="todo-tabs">
                <button type="button" class="todo-tab${(state.projectFilter || 'all') === 'all' ? ' active' : ''}" onclick="state.projectFilter='all';render()">全部 <span class="count">(${totalAll})</span></button>
                <button type="button" class="todo-tab${state.projectFilter === 'active' ? ' active' : ''}" onclick="state.projectFilter='active';render()">进行中 <span class="count">(${statusCounts.active})</span></button>
                <button type="button" class="todo-tab${state.projectFilter === 'planning' ? ' active' : ''}" onclick="state.projectFilter='planning';render()">规划中 <span class="count">(${statusCounts.planning})</span></button>
                <button type="button" class="todo-tab${state.projectFilter === 'paused' ? ' active' : ''}" onclick="state.projectFilter='paused';render()">已暂停 <span class="count">(${statusCounts.paused})</span></button>
                <button type="button" class="todo-tab${state.projectFilter === 'done' ? ' active' : ''}" onclick="state.projectFilter='done';render()">已完成 <span class="count">(${statusCounts.done})</span></button>
              </div>
            </div>
          </div>

          <div class="todo-filter-bar">
            <div class="todo-field todo-field-grow">
              <i class="fas fa-search"></i>
              <input type="text" placeholder="搜索项目名称、编号、负责人、部门" value="${escapeHtml(state.projectSearch || '')}"
                onchange="state.projectSearch=this.value;render()" />
            </div>
            <div class="todo-field">
              <select onchange="state.projectDept=this.value;render()">
                <option value="all" ${selectedDept === 'all' ? 'selected' : ''}>全部部门</option>
                ${departments.map(dept => `<option value="${escapeHtml(dept)}" ${selectedDept === dept ? 'selected' : ''}>${escapeHtml(dept)}</option>`).join('')}
              </select>
            </div>
            <div class="todo-field">
              <select onchange="state.projectManager=this.value;render()">
                <option value="all" ${selectedManager === 'all' ? 'selected' : ''}>负责人</option>
                ${managers.map(name => `<option value="${escapeHtml(name)}" ${selectedManager === name ? 'selected' : ''}>${escapeHtml(name)}</option>`).join('')}
              </select>
            </div>
            <div class="todo-field">
              <select onchange="state.projectRiskFilter=this.value;render()">
                <option value="all" ${selectedRisk === 'all' ? 'selected' : ''}>异常情况</option>
                <option value="overdue" ${selectedRisk === 'overdue' ? 'selected' : ''}>有逾期任务</option>
                <option value="endingSoon" ${selectedRisk === 'endingSoon' ? 'selected' : ''}>7日内到期</option>
              </select>
            </div>
            <div class="todo-field">
              <select onchange="state.projectSort=this.value;render()">
                <option value="default" ${selectedSort === 'default' ? 'selected' : ''}>默认排序</option>
                <option value="endDate" ${selectedSort === 'endDate' ? 'selected' : ''}>按截止日</option>
                <option value="progress" ${selectedSort === 'progress' ? 'selected' : ''}>按进度</option>
                <option value="name" ${selectedSort === 'name' ? 'selected' : ''}>按名称</option>
              </select>
            </div>
            <button type="button" class="btn btn-ghost" onclick="resetProjectFilters()"><i class="fas fa-rotate-right"></i> 重置</button>
          </div>

          <div class="project-list-count">共 ${filteredProjects.length} 条</div>
          <div class="project-card-grid">
            ${filteredProjects.length === 0 ? renderEmptyState({ icon: 'fa-folder-open', title: '暂无项目', hint: '试试调整筛选，或新建一个项目', panel: true }) : ''}
            ${filteredProjects.map(p => {
            const stats = getProjectListStats(p);
            const accent = getProjectAccentColor(p);
            const members = getProjectMemberNames(p);
            return `
              <div class="project-card" onclick="viewProject('${p.id}')">
                <div class="project-card-head-row">
                  ${renderProjectIconTile(p)}
                  <div class="project-card-head-text">
                    <div class="project-card-name">${escapeHtml(p.name || '')}</div>
                    <div class="project-card-desc">${escapeHtml(p.desc || '暂无描述')}</div>
                  </div>
                  ${renderProjectStatusDot(p.status)}
                </div>
                <div class="project-card-progress-row">
                  <div class="progress-bar"><div class="progress-fill" style="width:${stats.mainProgress}%;background:${accent};"></div></div>
                  <span class="progress-pct">${stats.mainProgress}%</span>
                </div>
                <div class="project-card-foot">
                  ${renderAvatarStack(members, 3)}
                  <span class="project-card-task-count">${stats.mainDone}/${stats.mainCount} 里程碑</span>
                </div>
                <div class="project-card-actions" onclick="event.stopPropagation()">
                  <button type="button" class="btn btn-primary btn-sm" onclick="viewProject('${p.id}')"><i class="fas fa-eye"></i>详情</button>
                  ${!isProjectArchived(p) && canManageProject(p) ? `<button type="button" class="btn btn-ghost btn-sm" onclick="editProject('${p.id}')"><i class="fas fa-edit"></i>编辑</button>` : ''}
                </div>
              </div>
            `;
          }).join('')}
          </div>
        </div>
      `;
    }


    // ========== 任务中心 ==========
    const TEMP_PROJECT_GROUP_KEY = '__temp__';
    const INFORM_COLLAB_GROUP_KEY = '__inform__';

    /** 本人为告知协办（非负责人）的任务 */
    function isMyInformCollabTask(task) {
      if (!task) return false;
      if (isSamePersonName(task.assignee, currentUser.name)) return false;
      return isInformCollaborator(task);
    }

    function sortTasksForCenter(list) {
      return list.slice().sort((a, b) => {
        if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
        if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
        if (isOverdue(a) && !isOverdue(b)) return -1;
        if (isOverdue(b) && !isOverdue(a)) return 1;
        return new Date(a.dueDate || 0) - new Date(b.dueDate || 0);
      });
    }

    /** 临时任务 / 告知协办：已完成不在任务中心展示 */
    function isHiddenDoneSpecialTask(task) {
      if (!task || task.status !== 'done') return false;
      if (isMyInformCollabTask(task)) return true;
      return !task.projectId;
    }

    /** 任务中心顶部：按具体项目筛选/跳转（告知协办单独成区，不计入项目/临时下拉） */
    function getTaskCenterProjectTabs(baseTasks) {
      const visibleBase = baseTasks.filter(t => !isHiddenDoneSpecialTask(t));
      const counts = new Map();
      visibleBase.forEach(t => {
        if (isMyInformCollabTask(t)) return;
        const key = t.projectId || TEMP_PROJECT_GROUP_KEY;
        counts.set(key, (counts.get(key) || 0) + 1);
      });

      const tabs = [{ id: 'all', label: '全部', count: visibleBase.length, icon: 'fa-list', isTemp: false }];
      const projectTabs = [];
      counts.forEach((count, key) => {
        if (key === TEMP_PROJECT_GROUP_KEY) return;
        const project = projects.find(p => p.id === key);
        projectTabs.push({
          id: key,
          label: project?.name || '未知项目',
          count,
          icon: 'fa-folder',
          isTemp: false,
        });
      });
      projectTabs.sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, 'zh-CN'));
      tabs.push(...projectTabs);

      if (counts.has(TEMP_PROJECT_GROUP_KEY)) {
        tabs.push({
          id: TEMP_PROJECT_GROUP_KEY,
          label: '临时任务',
          count: counts.get(TEMP_PROJECT_GROUP_KEY),
          icon: 'fa-bolt',
          isTemp: true,
        });
      }
      return tabs;
    }

    function setTaskProjectTab(tabId) {
      state.taskTab = tabId || 'all';
      state.todoPage = 1;
      render();
    }

    function openTaskCenterProject(projectId, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      viewProject(projectId);
    }

    /** 待办行内快捷操作（权限与详情页一致） */
    function renderTodoRowQuickActions(task) {
      if (!task) return '';
      const bits = [];
      const canOp = typeof canOperateTask === 'function' && canOperateTask(task);
      const blocked = typeof hasHardBlock === 'function' && hasHardBlock(task);
      const hasKids = typeof hasActiveChildren === 'function' && hasActiveChildren(task.id);
      const isMs = typeof isMilestoneTask === 'function' && isMilestoneTask(task);
      if (!isMs && canOp && !blocked && !hasKids) {
        if (task.status === 'todo') {
          bits.push(`<button type="button" class="btn btn-ghost" title="开始" onclick="event.stopPropagation();updateTaskStatus('${task.id}','doing')"><i class="fas fa-play"></i></button>`);
          bits.push(`<button type="button" class="btn btn-ghost" title="暂停" onclick="event.stopPropagation();updateTaskStatus('${task.id}','paused')"><i class="fas fa-pause"></i></button>`);
        } else if (task.status === 'doing') {
          bits.push(`<button type="button" class="btn btn-ghost" title="暂停" onclick="event.stopPropagation();updateTaskStatus('${task.id}','paused')"><i class="fas fa-pause"></i></button>`);
          bits.push(`<button type="button" class="btn btn-ghost" title="完成" onclick="event.stopPropagation();updateTaskStatus('${task.id}','done')"><i class="fas fa-check"></i></button>`);
        } else if (task.status === 'paused') {
          bits.push(`<button type="button" class="btn btn-ghost" title="继续" onclick="event.stopPropagation();updateTaskStatus('${task.id}','doing')"><i class="fas fa-play"></i></button>`);
        }
      }
      if (typeof canPostTaskComment === 'function' && canPostTaskComment(task)) {
        bits.push(`<button type="button" class="btn btn-ghost" title="留言" onclick="event.stopPropagation();focusTaskComment('${task.id}')"><i class="fas fa-comment"></i></button>`);
      }
      if (!bits.length) return '<td class="col-actions" onclick="event.stopPropagation()"></td>';
      return `<td class="col-actions" onclick="event.stopPropagation()"><div class="todo-row-actions">${bits.join('')}</div></td>`;
    }

    function setTodoViewLayout(layout) {
      state.todoViewLayout = layout === 'list' ? 'list' : 'board';
      if (state.todoViewLayout === 'list' && (state.todoListTab === 'done' || state.todoListTab === 'paused')) {
        state.todoListTab = 'all';
      }
      render();
    }

    function handleTodoBoardDrop(event, newStatus) {
      event.preventDefault();
      const col = event.currentTarget;
      if (col) col.classList.remove('is-drop-target');
      const taskId = event.dataTransfer.getData('text/taskId');
      if (!taskId) return;
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      if (!canOperateTask(task)) {
        alert('无权修改该任务状态');
        return;
      }
      if (isMilestoneTask(task)) {
        alert('里程碑请在详情中操作完成');
        return;
      }
      if (hasActiveChildren(task.id)) {
        alert('存在未完成的下级任务，无法直接改状态');
        return;
      }
      if (hasHardBlock(task) && (newStatus === 'doing' || newStatus === 'done')) {
        alert('任务被前置依赖阻塞，无法开始或完成');
        return;
      }
      if (task.status === newStatus) return;
      updateTaskStatus(taskId, newStatus);
    }

    function renderTodoBoardCard(task) {
      const overdue = isOverdue(task) && task.status !== 'done';
      const dueSoon = !overdue && isDueSoon(task) && task.status !== 'done';
      const dueRaw = normalizeDateStr(resolveTaskDueDate(task)) || task.dueDate || '';
      const dueLabel = formatTodoBoardDate(dueRaw) || dueRaw || '-';
      const canDrag = canOperateTask(task) && !isMilestoneTask(task);
      const desc = String(task.description || task.remark || '').trim();
      const type = getTodoTaskType(task);
      const projectLabel = task.projectId ? getTaskProjectLabel(task) : '临时任务';
      const childTotal = getChildrenCount(task.id);
      const childDone = childTotal ? getChildrenDoneCount(task.id) : 0;
      const childPct = childTotal ? Math.round((childDone / childTotal) * 100) : 0;
      const prKey = task.priority || 'normal';
      const assignee = task.assignee || '-';
      const avatar = escapeHtml(String(assignee).charAt(0) || '?');
      const canEdit = canEditTask(task);
      const canAbolish = canAbolishTask(task) && task.status !== 'abolished' && task.status !== 'archived' && task.status !== 'done';
      const actions = [];
      if (canEdit) {
        actions.push(`<button type="button" title="编辑" onclick="event.stopPropagation();editTask('${task.id}')"><i class="fas fa-pen"></i></button>`);
      }
      if (canAbolish) {
        actions.push(`<button type="button" class="is-danger" title="作废" onclick="event.stopPropagation();abolishTask('${task.id}')"><i class="fas fa-trash-alt"></i></button>`);
      }
      return `
        <div class="todo-board-card${overdue ? ' is-overdue' : ''}${dueSoon ? ' is-duesoon' : ''}"
          draggable="${canDrag ? 'true' : 'false'}"
          ondragstart="event.dataTransfer.setData('text/taskId','${task.id}')"
          onclick="viewTask('${task.id}')">
          <div class="todo-board-card-top">
            <div class="todo-board-card-title">${escapeHtml(task.title || '')}</div>
            ${actions.length ? `<div class="todo-board-card-actions">${actions.join('')}</div>` : ''}
          </div>
          ${desc ? `<div class="todo-board-card-desc">${escapeHtml(desc)}</div>` : ''}
          <div class="todo-board-card-tags">
            <span class="tag">${escapeHtml(projectLabel)}</span>
            <span class="tag">${escapeHtml(getTodoTaskTypeLabel(type))}</span>
            ${renderIntakeSourceTag(task, true)}
            ${renderIntakeHoursHint(task, true)}
          </div>
          ${childTotal > 0 ? `
          <div class="todo-board-subtasks">
            <div class="todo-board-subtasks-head">
              <span><i class="fas fa-sitemap" style="margin-right:4px;"></i>子任务</span>
              <span>${childDone}/${childTotal}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${childPct}%;"></div></div>
          </div>` : ''}
          <div class="todo-board-card-footer">
            <span class="todo-board-avatar">${avatar}</span>
            <span class="todo-board-assignee">${escapeHtml(assignee)}</span>
            <span class="todo-board-date">${escapeHtml(dueLabel)}</span>
            <span class="priority-dot priority-${prKey}" title="${escapeHtml((priorityMap[prKey] || priorityMap.normal).label)}"></span>
          </div>
        </div>
      `;
    }

    function renderTodoBoardView(list) {
      const columns = [
        { key: 'todo', label: '待开始', color: '#6366F1', icon: 'fa-circle', match: t => t.status === 'todo' },
        { key: 'doing', label: '进行中', color: '#8B5CF6', icon: 'fa-spinner', match: t => t.status === 'doing' },
        { key: 'paused', label: '已暂停', color: '#6B7280', icon: 'fa-pause-circle', match: t => t.status === 'paused' },
        { key: 'done', label: '已完成', color: '#10B981', icon: 'fa-check-circle', match: t => t.status === 'done' },
        { key: 'other', label: '其他', color: '#D97706', icon: 'fa-ellipsis-h', match: t => !['todo', 'doing', 'paused', 'done'].includes(t.status) },
      ];
      const visibleCols = columns.map(col => ({
        ...col,
        tasks: sortTasksForCenter(list.filter(col.match)),
      })).filter(col => {
        if (col.key === 'other') return col.tasks.length > 0 || list.some(t => !['todo', 'doing', 'paused', 'done'].includes(t.status));
        if (col.key === 'paused') return col.tasks.length > 0 || list.some(t => t.status === 'paused');
        return true;
      });

      if (!list.length) {
        return renderEmptyState({ icon: 'fa-check-circle', title: '暂无任务', hint: '当前筛选下没有任务' });
      }

      return `
        <div class="todo-status-kanban" style="--todo-kanban-cols:${Math.max(visibleCols.length, 1)};">
          ${visibleCols.map(col => `
            <div class="todo-kanban-col"
              ondragover="event.preventDefault();this.classList.add('is-drop-target')"
              ondragleave="this.classList.remove('is-drop-target')"
              ondrop="${col.key === 'other' ? `event.preventDefault();this.classList.remove('is-drop-target')` : `handleTodoBoardDrop(event, '${col.key}')`}">
              <div class="todo-kanban-col-head">
                <i class="fas ${col.icon}" style="color:${col.color};"></i>
                <span class="col-label">${col.label}</span>
                <span class="col-count" style="background:${col.color};">${col.tasks.length}</span>
              </div>
              ${col.tasks.length ? col.tasks.map(renderTodoBoardCard).join('') : `<div class="todo-kanban-empty">暂无</div>`}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTasks() {
      const scopeTab = state.taskScopeTab || 'mine';
      const isDeptScope = scopeTab === 'dept' && canViewDeptTaskScope();
      const viewLayout = state.todoViewLayout === 'list' ? 'list' : 'board';
      const includeDone = viewLayout === 'board';
      const poolTasks = getTaskCenterBaseTasks({ includeDone })
        .filter(t => t.status !== 'abolished' && t.status !== 'archived' && !isHiddenDoneSpecialTask(t));
      const projectTabs = getTaskCenterProjectTabs(poolTasks);
      const validTabIds = new Set(projectTabs.map(t => t.id));
      let projectTab = state.taskTab || 'all';
      if (!validTabIds.has(projectTab)) {
        if (projectTab === 'temp') projectTab = TEMP_PROJECT_GROUP_KEY;
        else projectTab = 'all';
        state.taskTab = projectTab;
      }

      let list = poolTasks.slice();
      if (state.taskSearch) {
        const q = state.taskSearch.toLowerCase();
        list = list.filter(t => {
          const parent = t.parentId ? tasks.find(pt => pt.id === t.parentId) : null;
          const projectLabel = getTaskProjectLabel(t).toLowerCase();
          return (t.title || '').toLowerCase().includes(q) ||
            (t.id || '').toLowerCase().includes(q) ||
            (t.assignee || '').toLowerCase().includes(q) ||
            projectLabel.includes(q) ||
            (parent && (parent.title || '').toLowerCase().includes(q));
        });
      }

      if (projectTab === TEMP_PROJECT_GROUP_KEY || projectTab === 'temp') {
        list = list.filter(t => !t.projectId || isMyInformCollabTask(t));
      } else if (projectTab !== 'all' && projectTab !== 'normal') {
        list = list.filter(t => t.projectId === projectTab || (isMyInformCollabTask(t) && t.projectId === projectTab));
      }

      if (state.todoTypeFilter === 'project') list = list.filter(t => getTodoTaskType(t) === 'project');
      else if (state.todoTypeFilter === 'temp') list = list.filter(t => getTodoTaskType(t) === 'temp');
      else if (state.todoTypeFilter === 'inform') list = list.filter(t => getTodoTaskType(t) === 'inform');

      if (state.todoPriorityFilter && state.todoPriorityFilter !== 'all') {
        list = list.filter(t => (t.priority || 'normal') === state.todoPriorityFilter);
      }
      list = list.filter(t => matchesTodoDueFilter(t, state.todoDueFilter));

      const countAll = list.length;
      const countTodo = list.filter(t => t.status === 'todo').length;
      const countDoing = list.filter(t => t.status === 'doing').length;
      const countPaused = list.filter(t => t.status === 'paused').length;
      const countOverdue = list.filter(t => isOverdue(t) && t.status !== 'done' && t.status !== 'paused').length;
      const countDone = list.filter(t => t.status === 'done').length;

      let listTab = state.todoListTab || 'all';
      if ((listTab === 'done' || listTab === 'paused') && viewLayout !== 'board') {
        listTab = 'all';
        state.todoListTab = 'all';
      }
      if (listTab === 'todo') list = list.filter(t => t.status === 'todo');
      else if (listTab === 'doing') list = list.filter(t => t.status === 'doing');
      else if (listTab === 'paused') list = list.filter(t => t.status === 'paused');
      else if (listTab === 'overdue') list = list.filter(t => isOverdue(t) && t.status !== 'done' && t.status !== 'paused');
      else if (listTab === 'done') list = list.filter(t => t.status === 'done');

      list = sortTasksForCenter(list);

      const pageSize = state.todoPageSize || 20;
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      if (state.todoPage > totalPages) state.todoPage = totalPages;
      if (state.todoPage < 1) state.todoPage = 1;
      const page = state.todoPage;
      const pageRows = list.slice((page - 1) * pageSize, page * pageSize);

      const scopePool = (arr) => arr.filter(t => !isHiddenDoneSpecialTask(t));
      const allScopeCount = scopePool(getAllViewableLeafTasks({ includeDone })).length;
      const mineCount = scopePool(includeDone ? getMyTodoLeafTasksIncludingDone() : getMyTodoLeafTasks()).length;
      const deptCount = canViewDeptTaskScope()
        ? scopePool(includeDone
          ? getDeptScopeLeafTasks()
          : getDeptScopeLeafTasks().filter(t => !isExcludedFromTodo(t))).length
        : 0;

      const rowsHtml = pageRows.length ? pageRows.map(task => {
        const type = getTodoTaskType(task);
        const pr = priorityMap[task.priority] || priorityMap.normal;
        const prKey = task.priority || 'normal';
        const prIcon = prKey === 'urgent' ? 'fa-arrow-up' : (prKey === 'important' ? 'fa-minus' : 'fa-arrow-down');
        const displayStatus = getTaskDisplayStatus(task);
        const st = statusMap[displayStatus] || statusMap[task.status] || statusMap.todo;
        const planStart = normalizeDateStr(getEffectivePlanStart(task) || task.planStartDate) || '-';
        const due = normalizeDateStr(resolveTaskDueDate(task)) || task.dueDate || '-';
        const rel = formatTodoDueRelative(task);
        const projectLabel = task.projectId ? getTaskProjectLabel(task) : '—';
        const overdue = isOverdue(task) && task.status !== 'done';
        const dueSoon = !overdue && isDueSoon(task) && task.status !== 'done';
        const rowUrgency = overdue ? ' todo-row--overdue' : (dueSoon ? ' todo-row--duesoon' : '');
        return `
          <tr class="${rowUrgency.trim()}" onclick="viewTask('${task.id}')">
            <td class="col-check" onclick="event.stopPropagation()"><input type="checkbox" aria-label="选择任务" /></td>
            <td><span class="todo-task-title">${escapeHtml(task.title || '')}</span></td>
            <td style="color:var(--text-muted);">${escapeHtml(projectLabel)}</td>
            <td>${escapeHtml(getTodoTaskTypeLabel(type))}</td>
            <td><span class="todo-priority ${prKey}"><i class="fas ${prIcon}"></i> ${escapeHtml(pr.label)}</span></td>
            <td>${escapeHtml(planStart)}</td>
            <td>
              <div class="todo-due-cell">
                <span>${escapeHtml(due)}</span>
                ${rel.text ? `<span class="todo-due-rel ${rel.cls}">${escapeHtml(rel.text)}</span>` : ''}
              </div>
            </td>
            <td><span class="status-tag status-${task.status === 'abolished' ? task.status : displayStatus}"><i class="fas ${st.icon}"></i>${st.label}</span></td>

      const pageButtons = [];
      for (let i = 1; i <= totalPages && i <= 7; i++) {
        pageButtons.push(`<button type="button" class="todo-page-btn${i === page ? ' active' : ''}" onclick="setTodoPage(${i})">${i}</button>`);
      }

      const viewMode = state.todoViewMode || 'all';
      const summaryItems = [
        { key: 'todo', label: '待开始', count: countTodo, color: '#6366F1' },
        { key: 'doing', label: '进行中', count: countDoing, color: '#8B5CF6' },
        { key: 'overdue', label: '已延期', count: countOverdue, color: '#F59E0B' },
      ];
      if (viewLayout === 'board') {
        summaryItems.splice(2, 0, { key: 'paused', label: '已暂停', count: countPaused, color: '#6B7280' });
        summaryItems.push({ key: 'done', label: '已完成', count: countDone, color: '#10B981' });
      }

      return `
        <div>
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
            <div>
              <p class="content-intro" style="margin:0 0 12px;">${getTasksPageIntro()}</p>

                <button type="button" class="${viewMode === 'mine' ? 'active' : ''}" onclick="goToTodoView('mine')">与我相关</button>
                <button type="button" class="${viewMode === 'created' ? 'active' : ''}" onclick="goToTodoView('created')">我发起的</button>
                <button type="button" class="${viewMode === 'handled' ? 'active' : ''}" onclick="goToTodoView('handled')">我处理的</button>
              </div>
              <div class="todo-tabs">
                <button type="button" class="todo-tab${listTab === 'all' ? ' active' : ''}" onclick="setTodoListTab('all')">全部 <span class="count">(${countAll})</span></button>
                <button type="button" class="todo-tab${listTab === 'todo' ? ' active' : ''}" onclick="setTodoListTab('todo')">待开始 <span class="count">(${countTodo})</span></button>
                <button type="button" class="todo-tab${listTab === 'doing' ? ' active' : ''}" onclick="setTodoListTab('doing')">进行中 <span class="count">(${countDoing})</span></button>
                ${viewLayout === 'board' ? `<button type="button" class="todo-tab${listTab === 'paused' ? ' active' : ''}" onclick="setTodoListTab('paused')">已暂停 <span class="count">(${countPaused})</span></button>` : ''}
                <button type="button" class="todo-tab${listTab === 'overdue' ? ' active' : ''}" onclick="setTodoListTab('overdue')">已延期 <span class="count">(${countOverdue})</span></button>
                ${viewLayout === 'board' ? `<button type="button" class="todo-tab${listTab === 'done' ? ' active' : ''}" onclick="setTodoListTab('done')">已完成 <span class="count">(${countDone})</span></button>` : ''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              ${canViewDeptTaskScope() && (viewMode === 'all' || viewMode === 'mine') ? `
              <div class="scope-seg">
                <button type="button" class="${scopeTab === 'mine' ? 'active' : ''}" onclick="setTaskScopeTab('mine')"><i class="fas fa-globe" style="margin-right:6px;"></i>${viewMode === 'all' ? '全量' : '本人'} ${viewMode === 'all' ? allScopeCount : mineCount}</button>
                <button type="button" class="${scopeTab === 'dept' ? 'active' : ''}" onclick="setTaskScopeTab('dept')"><i class="fas fa-users" style="margin-right:6px;"></i>部门 ${deptCount}</button>
              </div>` : ''}
              <div class="todo-view-toggle">
                <button type="button" class="${viewLayout === 'list' ? 'active' : ''}" onclick="setTodoViewLayout('list')" title="列表"><i class="fas fa-list"></i> 列表</button>
                <button type="button" class="${viewLayout === 'board' ? 'active' : ''}" onclick="setTodoViewLayout('board')" title="看板"><i class="fas fa-columns"></i> 看板</button>
              </div>
            </div>
          </div>

          ${isDeptScope && isFullAccess(currentUser.role) ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
            ${getTaskCenterDeptOptions().map(opt => `
              <button type="button" onclick="setTaskCenterDept('${opt.id}')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid ${getActiveTaskCenterDept() === opt.id ? 'var(--brand)' : 'var(--border)'};background:${getActiveTaskCenterDept() === opt.id ? 'var(--brand-soft)' : '#fff'};color:${getActiveTaskCenterDept() === opt.id ? 'var(--brand-dark)' : 'var(--text-muted)'};cursor:pointer;">
                ${opt.label}
              </button>
            `).join('')}
          </div>` : ''}

          <div class="todo-status-summary">
            ${summaryItems.map(item => `
              <button type="button" class="todo-status-summary-item${listTab === item.key ? ' active' : ''}" onclick="setTodoListTab('${item.key}')">
                <span class="todo-status-summary-dot" style="background:${item.color};"></span>
                <span>${item.label}</span>
                <span class="todo-status-summary-num">${item.count}</span>
              </button>
            `).join('')}
          </div>

          <div class="todo-filter-bar">
            <div class="todo-field todo-field-grow">
              <i class="fas fa-search"></i>
              <input type="text" placeholder="请输入任务标题" value="${escapeHtml(state.taskSearch || '')}"
                onchange="state.taskSearch=this.value;state.todoPage=1;render()" />
            </div>
            <div class="todo-field">
              <select onchange="state.todoTypeFilter=this.value;state.todoPage=1;render()">
                <option value="all" ${state.todoTypeFilter === 'all' ? 'selected' : ''}>全部类型</option>
                <option value="project" ${state.todoTypeFilter === 'project' ? 'selected' : ''}>项目任务</option>
                <option value="temp" ${state.todoTypeFilter === 'temp' ? 'selected' : ''}>临时任务</option>
                <option value="inform" ${state.todoTypeFilter === 'inform' ? 'selected' : ''}>告知协办</option>
              </select>
            </div>
            <div class="todo-field">
              <select onchange="setTaskProjectTab(this.value);state.todoPage=1;">
                ${projectTabs.map(tab => `<option value="${escapeHtml(String(tab.id))}" ${projectTab === tab.id ? 'selected' : ''}>${escapeHtml(tab.label)}（${tab.count}）</option>`).join('')}
              </select>
            </div>
            <div class="todo-field">
              <select onchange="state.todoPriorityFilter=this.value;state.todoPage=1;render()">
                <option value="all" ${state.todoPriorityFilter === 'all' ? 'selected' : ''}>全部优先级</option>
                <option value="urgent" ${state.todoPriorityFilter === 'urgent' ? 'selected' : ''}>紧急</option>
                <option value="important" ${state.todoPriorityFilter === 'important' ? 'selected' : ''}>重要</option>
                <option value="normal" ${state.todoPriorityFilter === 'normal' ? 'selected' : ''}>普通</option>
              </select>
            </div>
            <div class="todo-field">
              <select onchange="state.todoDueFilter=this.value;state.todoPage=1;render()">
                <option value="all" ${state.todoDueFilter === 'all' ? 'selected' : ''}>全部到期</option>
                <option value="today" ${state.todoDueFilter === 'today' ? 'selected' : ''}>今天</option>
                <option value="week" ${state.todoDueFilter === 'week' ? 'selected' : ''}>本周</option>
                <option value="overdue" ${state.todoDueFilter === 'overdue' ? 'selected' : ''}>已延期</option>
              </select>
            </div>
            <button type="button" class="btn btn-ghost" onclick="resetTodoFilters()"><i class="fas fa-rotate-right"></i> 重置</button>
          </div>

          <div class="project-list-count">共 ${list.length} 条</div>
          ${viewLayout === 'board' ? `
          <div class="todo-board-wrap">${renderTodoBoardView(list)}</div>
          ` : `
          <div class="todo-table-card">
            <div class="todo-table-wrap">
              <table class="todo-table">
                <thead>
                  <tr>
                    <th class="col-check"><input type="checkbox" aria-label="全选" onclick="event.stopPropagation()" /></th>
                    <th>任务标题</th>
                    <th>所属项目</th>
                    <th>任务类型</th>
                    <th>优先级</th>
                    <th>计划开始时间</th>
                    <th>到期时间</th>
                    <th>状态</th>
                    <th>负责人</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody>${rowsHtml}</tbody>
              </table>
            </div>
            <div class="todo-pager">
              <div class="todo-pager-info">共 ${list.length} 条</div>
              <div class="todo-pager-controls">
                <button type="button" class="todo-page-btn" ${page <= 1 ? 'disabled' : ''} onclick="setTodoPage(${page - 1})"><i class="fas fa-chevron-left"></i></button>
                ${pageButtons.join('')}
                <button type="button" class="todo-page-btn" ${page >= totalPages ? 'disabled' : ''} onclick="setTodoPage(${page + 1})"><i class="fas fa-chevron-right"></i></button>
                <select class="todo-page-btn" style="width:auto;padding:0 8px;" onchange="setTodoPageSize(this.value)">
                  <option value="20" ${pageSize === 20 ? 'selected' : ''}>20 条/页</option>
                  <option value="50" ${pageSize === 50 ? 'selected' : ''}>50 条/页</option>
                </select>
              </div>
            </div>
          </div>
          `}
        </div>
      `;
    }

    const systemUpdateTypeMap = {
      feature: { icon: 'fa-star', color: '#059669', label: '新功能' },
      fix: { icon: 'fa-wrench', color: '#DC2626', label: '修复' },
      improve: { icon: 'fa-magic', color: '#2563EB', label: '优化' },
    };

    function renderSystemUpdateItems(items) {
      return (items || []).map(item => {
        const t = systemUpdateTypeMap[item.type] || systemUpdateTypeMap.improve;
        return `<li style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:14px;color:#374151;">
          <span style="flex-shrink:0;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:${t.color}15;color:${t.color};white-space:nowrap;"><i class="fas ${t.icon}" style="margin-right:4px;"></i>${t.label}</span>
          <span style="line-height:1.6;padding-top:2px;">${escapeHtml(item.text || '')}</span>
        </li>`;
      }).join('');
    }

    function renderSystemUpdates() {
      let list = state.systemUpdatesList || [];
      if (state.systemUpdateSearch) {
        const q = state.systemUpdateSearch.toLowerCase();
        list = list.filter(u =>
          (u.version && u.version.toLowerCase().includes(q)) ||
          (u.title && u.title.toLowerCase().includes(q)) ||
          (u.summary && u.summary.toLowerCase().includes(q)) ||
          (u.items || []).some(i => (i.text || '').toLowerCase().includes(q))
        );
      }

      return `
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <div style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:#FFFBEB;border-radius:20px;">
              <i class="fas fa-bullhorn" style="color:#D97706;"></i>
              <span style="font-size:13px;font-weight:500;color:#B45309;">共 ${list.length} 个版本记录</span>
            </div>
            <div style="position:relative;">
              <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;"></i>
              <input class="input search-input-wide" style="width:280px;padding-left:36px;" placeholder="搜索版本、标题、更新内容..." value="${state.systemUpdateSearch || ''}" onchange="state.systemUpdateSearch=this.value;render()">
            </div>
          </div>
          <p class="content-intro" style="margin-bottom:16px;"><i class="fas fa-info-circle" style="margin-right:6px;"></i>系统更新记录仅供查看，由运维在发版时写入；停留本页时约每 30 秒自动刷新。</p>
          <div style="display:flex;flex-direction:column;gap:16px;">
            ${list.map(u => `
              <div class="panel">
                <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                  <span class="panel-title"><i class="fas fa-tag" style="color:#D97706;margin-right:6px;"></i>${escapeHtml(u.title || ('v' + u.version))}</span>
                  <div style="display:flex;align-items:center;gap:10px;font-size:12px;color:#9CA3AF;">
                    <span style="padding:2px 10px;background:#FEF3C7;color:#B45309;border-radius:12px;font-weight:600;">v${escapeHtml(u.version)}</span>
                    <span><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>${escapeHtml(u.releaseDate || '')}</span>
                  </div>
                </div>
                <div class="panel-body">
                  ${u.summary ? `<p style="font-size:14px;color:#4B5563;margin-bottom:12px;line-height:1.6;">${escapeHtml(u.summary)}</p>` : ''}
                  ${(u.items || []).length ? `<ul style="list-style:none;padding:0;margin:0;">${renderSystemUpdateItems(u.items)}</ul>` : '<p style="color:#9CA3AF;font-size:13px;">暂无详细条目</p>'}
                </div>
              </div>
            `).join('')}
            ${list.length === 0 ? `
              <div class="panel">
                <div class="panel-body" style="padding:12px;">
                  ${renderEmptyState({ icon: 'fa-bullhorn', title: '暂无系统更新记录', hint: '发版说明会展示在这里' })}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ========== 项目详情 ==========
    /** 项目下用于树展示的根节点：无父、父等于自身、或父任务不在本项目 */
    function getProjectRootTasks(projectTasks) {
      const ids = new Set(projectTasks.map(t => t.id));
      return projectTasks.filter(t => !t.parentId || t.parentId === t.id || !ids.has(t.parentId));
    }

    function renderProjectDetailTaskPanel(project) {
      const scope = state.detailTaskScope === 'mine' ? 'mine' : 'all';
      const milestoneId = state.detailMilestoneId || '';
      const { allProjectTasks, visibleTasks, rootTasks, mineIds } = getPlanRootTasks(project, milestoneId, scope);
      const workVisible = visibleTasks.filter(t => !isMilestoneTask(t));
      const milestoneOpts = getProjectRootTasks(allProjectTasks).filter(isMilestoneTask);
      let emptyHint = '请先「添加里程碑」，再在里程碑下「添加任务」';
      let emptyTitle = '暂无任务计划';
      if (rootTasks.length && !workVisible.length) {
        if (milestoneId && scope === 'mine') {
          emptyTitle = '该里程碑下暂无我的任务';
          emptyHint = '可切换范围到「全部任务」，或选择其他里程碑';
        } else if (milestoneId) {
          emptyTitle = '该里程碑下暂无任务';
          emptyHint = '可点击「添加任务」在该里程碑下拆解';
        } else if (scope === 'mine') {
          emptyTitle = '暂无我的任务';
          emptyHint = '可切换范围到「全部任务」查看完整计划';
        } else {
          emptyTitle = '里程碑下暂无任务';
          emptyHint = '可在里程碑下添加任务';
        }
      } else if (!rootTasks.length && scope === 'mine' && allProjectTasks.some(isMilestoneTask)) {
        emptyTitle = '暂无我的任务';
        emptyHint = '可切换范围到「全部任务」查看完整计划';
      }
      return `
        <div class="project-detail-section-title">
          <span>任务计划</span>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <select class="select" style="min-width:120px;font-size:12px;" onchange="state.detailMilestoneId=this.value;render()">
              <option value="" ${!milestoneId ? 'selected' : ''}>全部里程碑</option>
              ${milestoneOpts.map(t => `
                <option value="${escapeHtml(t.id)}" ${milestoneId === t.id ? 'selected' : ''}>${escapeHtml(t.title || t.id)}</option>
              `).join('')}
            </select>
            <select class="select" style="min-width:100px;font-size:12px;" onchange="state.detailTaskScope=this.value;render()">
              <option value="all" ${scope === 'all' ? 'selected' : ''}>全部任务</option>
              <option value="mine" ${scope === 'mine' ? 'selected' : ''}>我的任务</option>
            </select>
            ${!isProjectArchived(project) && canManageProject(project) ? `
              <button class="btn btn-ghost btn-sm" onclick="showNewMilestoneModal('${project.id}')"><i class="fas fa-flag"></i>里程碑</button>
              <button class="btn btn-primary btn-sm" onclick="showNewTaskModal('${project.id}')"><i class="fas fa-plus"></i>任务</button>
            ` : ''}
          </div>
        </div>
        ${renderProjectDependencyPanel(project.id)}
        <div class="panel" style="margin-top:12px;">
          <div class="panel-body" style="padding:12px;">
            ${rootTasks.length === 0 ? renderEmptyState({ icon: 'fa-flag', title: emptyTitle, hint: emptyHint }) : ''}
            ${rootTasks.map(m => renderMilestonePlanSection(m, visibleTasks, mineIds)).join('')}
          </div>
        </div>
      `;
    }

    function renderProjectDetail() {
      const project = projects.find(p => p.id === state.form.projectId);
      if (!project || !canViewProject(project)) {
        if (project && !canViewProject(project)) alert('无权查看该项目');
        return renderProjects();
      }

      const stats = getProjectListStats(project);
      const accent = getProjectAccentColor(project);
      const memberNames = getProjectMemberNames(project);
      const canManage = canManageProject(project) && !isProjectArchived(project);

      const memberRows = memberNames.map(name => {
        const user = users.find(u => isSamePersonName(u.name, name));
        const isManager = project.manager && isSamePersonName(project.manager, name);
        const roleLabel = isManager
          ? '项目经理'
          : (user ? roleDisplayName(user.role) : '团队成员');
        return `
          <div class="project-member-row">
            ${renderPersonAvatar(name, { large: true })}
            <div style="min-width:0;flex:1;">
              <div class="project-member-name">${escapeHtml(name)}</div>
              <div class="project-member-role">${escapeHtml(roleLabel)}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div>
          ${isProjectArchived(project) ? `<p class="content-intro" style="margin-bottom:16px;"><i class="fas fa-archive" style="margin-right:6px;"></i>该项目已归档，仅可查看。归档操作请在未归档项目的详情页进行。</p>` : ''}
          ${isProjectPaused(project) ? `<p class="content-intro" style="margin-bottom:16px;"><i class="fas fa-pause-circle" style="margin-right:6px;"></i>项目已暂停：下属未完成任务已同步暂停，不计入待办与工时。恢复项目后将自动恢复这些任务状态。</p>` : ''}

          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
            <button class="btn btn-ghost" onclick="goBack()"><i class="fas fa-arrow-left"></i>返回项目列表</button>
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              ${canManage ? `
                <button class="btn btn-ghost btn-sm" onclick="editProject('${project.id}')" title="编辑项目"><i class="fas fa-edit"></i></button>
              ` : ''}
              ${canDeleteProject() ? `
                <button class="btn btn-ghost btn-sm" style="color:#DC2626;" onclick="deleteProject('${project.id}')" title="永久删除项目及全部关联任务"><i class="fas fa-trash-alt"></i></button>
              ` : ''}
            </div>
          </div>

          <div class="project-hero">
            <div class="project-hero-top">
              <div class="project-hero-identity">
                ${renderProjectIconTile(project, 'lg')}
                <div style="min-width:0;flex:1;">
                  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <h2 class="project-hero-title" style="margin:0;">${escapeHtml(project.name || '')}</h2>
                    ${renderProjectStatusDot(project.status)}
                  </div>
                  <div class="project-hero-desc" style="margin-top:6px;">${escapeHtml(project.desc || '暂无描述')}</div>
                  <div class="project-hero-meta">
                    <span><i class="fas fa-building"></i>${escapeHtml(project.dept || '-')}</span>
                    <span><i class="fas fa-calendar"></i>${escapeHtml((project.startDate || '-') + ' ~ ' + (project.endDate || '-'))}</span>
                    <span style="font-family:monospace;font-size:12px;color:#9CA3AF;">${escapeHtml(project.id || '')}</span>
                  </div>
                </div>
              </div>
              <div class="project-hero-stats-row">
                <div>
                  <div class="v">${stats.mainCount}</div>
                  <div class="l">里程碑</div>
                </div>
                <div>
                  <div class="v">${stats.mainDone}</div>
                  <div class="l">已完成</div>
                </div>
                <div>
                  <div class="v">${memberNames.length}</div>
                  <div class="l">成员</div>
                </div>
              </div>
              ${stats.overdue ? `<p class="project-hero-overdue-hint"><i class="fas fa-exclamation-circle" style="margin-right:4px;"></i>有 ${stats.overdue} 个延期任务</p>` : ''}
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                <span style="font-size:12px;color:var(--text-muted);">整体进度</span>
                <span style="font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;">${stats.mainProgress}%</span>
              </div>
              <div class="progress-bar" style="height:8px;"><div class="progress-fill" style="width:${stats.mainProgress}%;background:${accent};"></div></div>
              ${canManage ? `
              <div style="margin-top:12px;padding:12px;background:#F9FAFB;border-radius:8px;">
                <div style="font-size:12px;color:#9CA3AF;margin-bottom:8px;">项目状态</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">

    function renderProjectTaskTree(task, level, allTasks, mineIds = null) {
      if (isMilestoneTask(task)) return '';
      const displayStatus = getTaskDisplayStatus(task);
      const st = statusMap[displayStatus] || statusMap[task.status];
      const pr = priorityMap[task.priority];
      const children = allTasks.filter(t => t.parentId === task.id && !isMilestoneTask(t));
      const progress = children.length ? calcProgress(task.id) : (task.progress || 0);
      const indent = level * 24;
      const isAncestorOnly = !!(mineIds && !mineIds.has(task.id));

      let html = `
        <div class="${isAncestorOnly ? 'plan-task-ancestor' : ''}" style="padding:12px 16px;background:${task.status === 'abolished' ? '#F9FAFB' : level === 0 ? '#F9FAFB' : '#FAFAFA'};border-radius:8px;border:1px solid ${task.status === 'abolished' ? '#E5E7EB' : '#E5E7EB'};margin-bottom:8px;${level > 0 ? 'margin-left:' + indent + 'px;' : ''}cursor:pointer;opacity:${task.status === 'abolished' ? '0.75' : isAncestorOnly ? '0.62' : '1'};${isTaskBlocked(task) ? 'border-color:#FDE68A;background:#FFFBEB;' : isOverdue(task) ? 'border-color:#FECACA;background:#FFFBFB;' : ''}" onclick="viewTask('${task.id}')">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            ${level > 0 ? '<span style="color:#CBD5E1;font-size:12px;">└</span>' : ''}
            <span class="priority-dot priority-${task.priority}"></span>
            <span style="font-size:14px;font-weight:500;flex:1;${task.status === 'abolished' ? 'text-decoration:line-through;color:#9CA3AF;' : ''}">${task.title}${isAncestorOnly ? '<span class="plan-ancestor-tag">上级</span>' : ''}${renderDependencyBadges(task, true)}</span>
            ${task.type === 'temp' ? '<span class="tag tag-temp" style="font-size:10px;"><i class="fas fa-bolt"></i>临时</span>' : ''}
            ${renderIntakeSourceTag(task, true)}
            ${renderIntakeHoursHint(task, true)}
            ${task.status === 'abolished' ? '<span class="tag" style="background:#F3F4F6;color:#9CA3AF;font-size:10px;"><i class="fas fa-ban"></i>已作废</span>' : ''}
            <span class="status-tag status-${displayStatus}" style="font-size:10px;">${st.label}</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:#9CA3AF;">
            <span><i class="fas fa-user" style="margin-right:4px;"></i>${task.assignee}</span>
            <span><i class="fas fa-clock" style="margin-right:4px;"></i>${formatTaskCreatedAt(task.createdAt)}</span>
            <span><i class="fas fa-calendar" style="margin-right:4px;"></i>${task.dueDate || '-'}</span>
            <span>进度：${progress}%</span>
          </div>
          <div style="margin-top:8px;">
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
          </div>
        </div>
      `;

      children.forEach(c => {
        html += renderProjectTaskTree(c, level + 1, allTasks, mineIds);
      });

      return html;
    }
