    function getTaskProjectLabel(task) {
      if (!task) return '未知';
      if (!task.projectId) return '临时任务';
      return projects.find(p => p.id === task.projectId)?.name || '未知项目';
    }

    /** 卡片顶部上下文：默认「项目 › 上级」；hideProject 时仅上级（待办按项目分区用） */
    function renderTaskCardContext(task, opts = {}) {
      if (!task) return '';
      const hideProject = !!opts.hideProject;
      const ancestors = task.parentId ? getTaskBreadcrumb(task.parentId) : [];
      if (hideProject && ancestors.length === 0) return '';
      const parts = [];
      if (!hideProject) {
        parts.push(`<span class="task-card-context-project">${getTaskProjectLabel(task)}</span>`);
      }
      ancestors.forEach(t => {
        parts.push(`<span class="task-card-context-ancestor">${t.title}</span>`);
      });
      const icon = hideProject ? 'fa-level-up-alt' : 'fa-folder';
      const iconStyle = hideProject ? ' style="transform:rotate(90deg);"' : '';
      return `<div class="task-card-context"><i class="fas ${icon}" aria-hidden="true"${iconStyle}></i><span>${parts.join('<span class="task-card-context-sep"> › </span>')}</span></div>`;
    }

    function isAitableIntakeTask(task) {
      return !!(task?.intakeMeta && task.intakeMeta.source === 'aitable');
    }

    function needsIntakeEstimatedHours(task) {
      return isAitableIntakeTask(task) && !(Number(task.estimatedHours) > 0);
    }

    /**
     * 表单提报任务：开始/完成前必填预计工时；计划开始为空则默认当天。
     * @returns {boolean} 是否通过（取消或非法输入返回 false）
     */
    function ensureIntakeEstimatedHours(task) {
      if (!isAitableIntakeTask(task)) return true;
      if (!(Number(task.estimatedHours) > 0)) {
        const raw = prompt('表单提报任务须先填写预计工时（小时）后才能开始/完成：', '');
        if (raw === null) return false;
        const hours = Number(String(raw).trim());
        if (!Number.isFinite(hours) || hours <= 0) {
          alert('请输入大于 0 的预计工时');
          return false;
        }
        task.estimatedHours = Math.round(hours * 10) / 10;
      }
      if (!task.planStartDate) task.planStartDate = todayStr();
      return true;
    }

    function renderIntakeSourceTag(task, compact) {
      if (!isAitableIntakeTask(task)) return '';
      const label = compact ? '表单' : '表单提报';
      return `<span class="tag" style="background:#ECFDF5;color:#059669;font-size:10px;"><i class="fas fa-file-alt" style="margin-right:3px;"></i>${label}</span>`;
    }

    /** 表单提报且尚未填写预计工时的弱提示 */
    function renderIntakeHoursHint(task, compact) {
      if (!needsIntakeEstimatedHours(task)) return '';
      if (task.status === 'done' || task.status === 'abolished' || task.status === 'archived') return '';
      if (compact) {
        return `<span class="tag" style="background:#FFFBEB;color:#D97706;font-size:10px;" title="开始执行前请填写预计工时"><i class="fas fa-clock" style="margin-right:3px;"></i>须填工时</span>`;
      }
      return `<div style="margin-top:8px;padding:8px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;font-size:12px;color:#92400E;"><i class="fas fa-info-circle" style="margin-right:4px;"></i>开始执行前请填写预计工时，填写后计入当周饱和度</div>`;
    }

    function renderDependencyBadges(task, compact) {
      if (!task) return '';
      const parts = [];
      if (getTaskPredecessorDeps(task.id).length) {
        parts.push('<span class="dep-badge dep-in" title="有前置依赖">🔗' + (compact ? '' : ' 前置') + '</span>');
      }
      if (isTaskBlocked(task)) {
        parts.push('<span class="dep-badge dep-blocked" title="阻塞中，不计入饱和度">⏸' + (compact ? '' : ' 阻塞中') + '</span>');
      } else if (isRecentlyUnblocked(task)) {
        parts.push('<span class="dep-badge dep-unblocked" title="前置已完成，可继续">▶' + (compact ? '' : ' 可继续') + '</span>');
      }
      const outCount = getBlockingSuccessorCount(task.id);
      if (outCount > 0) {
        parts.push('<span class="dep-badge dep-out" title="阻塞后续任务">🚧' + (compact ? outCount : (' 阻塞后续(' + outCount + ')')) + '</span>');
      }
      if (taskHasCrossProjectDependency(task.id)) {
        parts.push('<span class="dep-badge dep-cross" title="跨项目依赖">🌐</span>');
      }
      if (getTaskPredecessorDeps(task.id).some(dep => isPredecessorAbnormal(getDependencyTask(dep.predecessorTaskId)))) {
        parts.push('<span class="dep-badge dep-warn" title="前置任务异常">⚠</span>');
      }
      return parts.length ? `<span class="dep-badges">${parts.join('')}</span>` : '';
    }

    function renderDependencyStatusIcon(dep, role) {
      const otherId = role === 'pred' ? dep.predecessorTaskId : dep.successorTaskId;
      const other = getDependencyTask(otherId);
      if (role === 'pred') {
        if (!other || isPredecessorAbnormal(other)) return '<span style="color:#DC2626;">⚠ 异常</span>';
        if (isPredecessorSatisfied(other)) return '<span style="color:#059669;">✅ 已完成</span>';
        if (isTaskBlocked(getDependencyTask(dep.successorTaskId))) return '<span style="color:#D97706;">⏸ 阻塞中</span>';
        return '<span style="color:#2563EB;">🔄 进行中</span>';
      }
      const succ = getDependencyTask(dep.successorTaskId);
      if (!succ) return '<span style="color:#9CA3AF;">—</span>';
      if (isTaskBlocked(succ)) return '<span style="color:#D97706;">⏸ 等待本任务</span>';
      return '<span style="color:#059669;">✅ 已可继续</span>';
    }

    function canManageTaskDependency(task) {
      if (!task) return false;
      if (isFullAccess(currentUser.role)) return true;
      if (canEditTask(task)) return true;
      return isTaskProjectManager(task);
    }

    function getProjectDependencyRows(projectId) {
      const rows = [];
      getActiveTaskDependencies().forEach(dep => {
        const pred = getDependencyTask(dep.predecessorTaskId);
        const succ = getDependencyTask(dep.successorTaskId);
        if (!pred || !succ) return;
        if (pred.projectId !== projectId && succ.projectId !== projectId) return;
        rows.push({ dep, pred, succ, cross: isDependencyCrossProject(dep) });
      });
      return rows;
    }

    function getTaskPendingBlockedHours(task) {
      if (!task || task.status === 'paused' || isTaskProjectPaused(task)) return 0;
      if (!isTaskBlocked(task) || !isActiveTaskStatus(task)) return 0;
      return Number(task.estimatedHours) || 0;
    }

    function getMemberPendingBlockedHours(userName) {
      return tasks
        .filter(t => t.assignee === userName && isActiveTaskStatus(t) && isTaskBlocked(t))
        .reduce((sum, t) => sum + getTaskPendingBlockedHours(t), 0);
    }

    function getHardBlockAlertMessage(task) {
      const deps = getTaskPredecessorDeps(task.id).filter(dep => {
        const pred = getDependencyTask(dep.predecessorTaskId);
        return pred && !isPredecessorSatisfied(pred);
      });
      const lines = deps.map(dep => {
        const pred = getDependencyTask(dep.predecessorTaskId);
        return `· ${getTaskProjectLabel(pred)} / ${pred?.title || dep.predecessorTaskId}（${statusMap[pred?.status]?.label || pred?.status || '未知'}）`;
      });
      return `任务存在未完成的硬阻塞前置依赖，无法开始或完成：\n\n${lines.join('\n')}\n\n请等待前置任务完成，或联系负责人调整依赖关系。`;
    }

    function removeDependenciesForTask(taskId) {
      taskDependencies = taskDependencies.filter(d =>
        d.predecessorTaskId !== taskId && d.successorTaskId !== taskId
      );
    }

    /** 已延期：截止日期严格早于今天（阻塞中不算延期） */
    function isOverdue(task) {
      if (isTaskBlocked(task)) return false;
      const dueDate = normalizeDateStr(resolveTaskDueDate(task));
      if (!isActiveTaskStatus(task) || !dueDate) return false;
      return dueDate < todayStr();
    }

    function getDaysOverdue(task) {
      if (!isOverdue(task)) return 0;
      return diffCalendarDays(normalizeDateStr(resolveTaskDueDate(task)), todayStr());
    }

    /** 临期：常规任务今天或明天到期；临时任务仅当天（不含已延期） */
    function isDueSoon(task) {
      if (isTaskBlocked(task)) return false;
      if (!isActiveTaskStatus(task) || isOverdue(task)) return false;
      const dueDate = normalizeDateStr(resolveTaskDueDate(task));
      if (!dueDate) return false;
      const daysUntilDue = diffCalendarDays(todayStr(), dueDate);
      if (daysUntilDue < 0) return false;
      const isTemp = task.type === 'temp' || !task.projectId;
      return isTemp ? daysUntilDue === 0 : daysUntilDue <= 1;
    }

    /** 任务展示用状态：终态优先，其次阻塞 > 延期 > 临期 > 业务状态 */
    function getTaskDisplayStatus(task) {
      if (!task) return 'todo';
      if (task.status === 'abolished' || task.status === 'archived' || task.status === 'rejected' || task.status === 'done' || task.status === 'paused') {
        return task.status;
      }
      if (isTaskBlocked(task) && isActiveTaskStatus(task)) return 'blocked';
      if (isOverdue(task)) return 'overdue';
      if (isDueSoon(task)) return 'dueSoon';
      return task.status;
    }

    function getWeekStartMonday(date) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function isSingleRestWeek(dateStr) {
      const cal = getWorkCalendar();
      if (cal.scheduleMode === 'single') return true;
      if (cal.scheduleMode === 'double') return false;
      const ref = parseLocalDate(cal.referenceDate);
      const cur = parseLocalDate(dateStr);
      if (!ref || !cur) return false;
      const refStart = getWeekStartMonday(ref).getTime();
      const curStart = getWeekStartMonday(cur).getTime();
      const weeksDiff = Math.round((curStart - refStart) / (7 * 24 * 3600 * 1000));
      const refIsSingle = cal.referenceIsSingleWeek !== false;
      return weeksDiff % 2 === 0 ? refIsSingle : !refIsSingle;
    }

    // 判断是否为工作日（节假日、单双休、调休补班）
    function isWorkDay(dateStr) {
      const ds = String(dateStr).slice(0, 10);
      const cal = getWorkCalendar();
      if (cal.extraWorkdays.includes(ds)) return true;
      if (cal.holidays.includes(ds)) return false;

      const date = parseLocalDate(ds);
      if (!date) return false;
      const day = date.getDay();
      if (day >= 1 && day <= 5) return true;
      if (day === 6) return isSingleRestWeek(ds);
      return false;
    }

    function parseWorkTimeInput(val) {
      if (val == null || val === '') return null;
      if (typeof val === 'number' && Number.isFinite(val)) return val;
      const text = String(val).trim();
      if (text.includes(':')) {
        const [h, m = '0'] = text.split(':');
        const hour = Number(h);
        const minute = Number(m);
        if (Number.isFinite(hour) && Number.isFinite(minute)) return hour + minute / 60;
      }
      const num = Number(text);
      return Number.isFinite(num) ? num : null;
    }

    function getWorkDayBounds() {
      const cal = getWorkCalendar();
      const start = parseWorkTimeInput(cal.workStartHour);
      const end = parseWorkTimeInput(cal.workEndHour);
      if (start != null && end != null && end > start) {
        return { start, end, hoursPerDay: Math.round((end - start) * 10) / 10 };
      }
      const hoursPerDay = Number(cal.hoursPerDay) || 8.5;
      return { start: 8.5, end: 17, hoursPerDay };
    }

    function addDaysLocal(date, days) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      d.setDate(d.getDate() + days);
      return d;
    }

    // 任务每日投入工时；未设置时按标准工作日满负荷（8.5h）推算
    function resolveDailyHours(val) {
      const n = Number(val);
      if (!Number.isFinite(n) || n <= 0) return null;
      return Math.round(n * 10) / 10;
    }

    function taskDailyHours(task) {
      return task ? resolveDailyHours(task.dailyHours) : null;
    }

    // 根据开始日期和工时（小时）计算截止日期（仅计工作日工时）
    function calcEndDate(startDate, hours, dailyHours) {
      if (!startDate || !hours || hours <= 0) return '';

      const perDay = resolveDailyHours(dailyHours);
      let remainingHours = hours;
      let currentDate = parseLocalDate(startDate);
      if (!currentDate) return '';

      if (perDay != null) {
        while (remainingHours > 0) {
          const dateStr = formatLocalDate(currentDate);
          if (isWorkDay(dateStr)) {
            if (remainingHours <= perDay) {
              remainingHours = 0;
            } else {
              remainingHours -= perDay;
              currentDate = addDaysLocal(currentDate, 1);
            }
          } else {
            currentDate = addDaysLocal(currentDate, 1);
          }
        }
        return formatLocalDate(currentDate);
      }

      const { start: workStartHour, end: workEndHour } = getWorkDayBounds();
      let currentHour = workStartHour;

      while (remainingHours > 0) {
        const dateStr = formatLocalDate(currentDate);
        if (isWorkDay(dateStr)) {
          const availableHours = workEndHour - currentHour;
          if (remainingHours <= availableHours) {
            remainingHours = 0;
          } else {
            remainingHours -= availableHours;
            currentDate = addDaysLocal(currentDate, 1);
            currentHour = workStartHour;
          }
        } else {
          currentDate = addDaysLocal(currentDate, 1);
          currentHour = workStartHour;
        }
      }

      return formatLocalDate(currentDate);
    }

    // 计算两个日期之间的工作日天数
    function calcWorkDays(startDate, endDate) {
      if (!startDate || !endDate) return 0;
      const start = parseLocalDate(startDate);
      const end = parseLocalDate(endDate);
      if (!start || !end || start > end) return 0;

      let count = 0;
      let currentDate = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      while (currentDate <= end) {
        if (isWorkDay(formatLocalDate(currentDate))) count++;
        currentDate = addDaysLocal(currentDate, 1);
      }
      return count;
    }

    // 计算两个日期之间的有效工时（小时，不含节假日与非工作日）
    function calcWorkHoursBetween(startDate, endDate) {
      if (!startDate) return 0;
      const end = endDate || formatLocalDate(new Date());
      return calcWorkDays(startDate, end) * getWorkDayBounds().hoursPerDay;
    }

    // 计算实际工时（小时）；可传入每日投入工时，未设置则按标准工作日满负荷
    function calcActualHours(startDate, endDate, dailyHours) {
      if (!startDate) return 0;
      const end = endDate || formatLocalDate(new Date());
      const perDay = resolveDailyHours(dailyHours) ?? getWorkDayBounds().hoursPerDay;
      return calcWorkDays(startDate, end) * perDay;
    }

    /** 当周范围（周一至周日） */
    function getCurrentWeekRange(refDate = new Date()) {
      const monday = getWeekStartMonday(refDate);
      const sunday = addDaysLocal(monday, 6);
      return { start: formatLocalDate(monday), end: formatLocalDate(sunday) };
    }

    function countOverlapWorkDays(rangeStart, rangeEnd, windowStart, windowEnd) {
      const rs = parseLocalDate(rangeStart);
      const re = parseLocalDate(rangeEnd);
      if (!rs || !re || rs > re) return 0;
      const os = parseLocalDate(windowStart);
      const oe = parseLocalDate(windowEnd);
      if (!os || !oe) return 0;
      const overlapStart = rs > os ? rs : os;
      const overlapEnd = re < oe ? re : oe;
      if (overlapStart > overlapEnd) return 0;
      return calcWorkDays(formatLocalDate(overlapStart), formatLocalDate(overlapEnd));
    }

    /** 任务计划窗口（与周分摊、看板周期筛选共用起止日解析） */
    function getTaskScheduleWindow(task) {
      const estimated = Number(task.estimatedHours) || 0;
      let taskStart = getEffectivePlanStart(task) || task.planStartDate || '';
      // 进行中且已实际开工：以实际开始日为准（可早于计划开始）
      if (task.status === 'doing' && task.actualStartDate) {
        if (!taskStart || task.actualStartDate < taskStart) taskStart = task.actualStartDate;
      }
      let taskEnd = resolveTaskDueDate(task) || '';
      if (taskStart && task.planStartDate && taskStart < task.planStartDate && estimated > 0) {
        taskEnd = calcEndDate(taskStart, estimated, taskDailyHours(task)) || taskEnd;
      }
      if (!taskStart && !taskEnd) return null;
      if (!taskStart) taskStart = taskEnd;
      if (!taskEnd) taskEnd = calcEndDate(taskStart, estimated, taskDailyHours(task)) || taskStart;
      return { start: taskStart, end: taskEnd };
    }

    /** 任务计划窗口与指定周是否有工作日重叠 */
    function taskOverlapsWeek(task, weekStart, weekEnd) {
      const window = getTaskScheduleWindow(task);
      if (!window) return false;
      return countOverlapWorkDays(window.start, window.end, weekStart, weekEnd) > 0;
    }

    /** 任务预计工时落在指定周内的部分（按工作日比例分摊；已暂停/项目暂停不计入） */
    function getTaskHoursInWeek(task, weekStart, weekEnd) {
      if (!canCountTaskHours(task)) return 0;
      if (isTaskBlocked(task)) return 0;
      const estimated = Number(task.estimatedHours) || 0;
      if (estimated <= 0) return 0;

      const window = getTaskScheduleWindow(task);
      if (!window) return 0;
      const totalWorkDays = calcWorkDays(window.start, window.end);
      if (!totalWorkDays) return 0;
      const overlapDays = countOverlapWorkDays(window.start, window.end, weekStart, weekEnd);
      if (!overlapDays) return 0;
      return Math.round((estimated * overlapDays / totalWorkDays) * 10) / 10;
    }

    /** 任务原计划窗口：仅用 planStartDate + 预计工时推算截止，不含实际开工/依赖顺延 */
    function getTaskOriginalPlanWindow(task) {
      const estimated = Number(task.estimatedHours) || 0;
      let taskStart = task.planStartDate || '';
      let taskEnd = '';
      if (taskStart && estimated > 0) {
        taskEnd = calcEndDate(taskStart, estimated, taskDailyHours(task)) || task.dueDate || '';
      } else {
        taskEnd = task.dueDate || '';
      }
      if (!taskStart && !taskEnd) return null;
      if (!taskStart) taskStart = taskEnd;
      if (!taskEnd) taskEnd = calcEndDate(taskStart, estimated, taskDailyHours(task)) || taskStart;
      return { start: taskStart, end: taskEnd };
    }

    /** 原计划工时落在指定周内的部分（含已完成/阻塞，不含作废/归档/已暂停/项目暂停） */
    function getTaskOriginalHoursInWeek(task, weekStart, weekEnd) {
      if (!task || task.status === 'archived' || task.status === 'abolished' || task.status === 'paused') return 0;
      if (isTaskProjectPaused(task)) return 0;
      const estimated = Number(task.estimatedHours) || 0;
      if (estimated <= 0) return 0;
      const window = getTaskOriginalPlanWindow(task);
      if (!window) return 0;
      const totalWorkDays = calcWorkDays(window.start, window.end);
      if (!totalWorkDays) return 0;
      const overlapDays = countOverlapWorkDays(window.start, window.end, weekStart, weekEnd);
      if (!overlapDays) return 0;
      return Math.round((estimated * overlapDays / totalWorkDays) * 10) / 10;
    }

    /** 成员本周原计划协办工时（已批准辅助性协办，按协助时段分摊；不含作废/归档/已暂停/项目暂停） */
    function getMemberAssistOriginalWeeklyHours(userName, weekRange) {
      return tasks
        .filter(t => t.status !== 'archived' && t.status !== 'abolished' && t.status !== 'paused' && !isTaskProjectPaused(t))
        .reduce((sum, t) => {
          const entry = getCollaboratorEntry(t, COLLAB_TYPE_ASSIST, userName);
          return sum + (entry ? getAssistEntryHoursInWeek(entry, weekRange.start, weekRange.end) : 0);
        }, 0);
    }

    function getMemberOriginalWeeklyHours(userName, weekRange) {
      const assigneeHours = tasks
        .filter(t => t.assignee === userName)
        .reduce((sum, t) => sum + getTaskOriginalHoursInWeek(t, weekRange.start, weekRange.end), 0);
      const assistHours = getMemberAssistOriginalWeeklyHours(userName, weekRange);
      return Math.round((assigneeHours + assistHours) * 10) / 10;
    }

    function getMemberWeeklyHours(userName, weekRange) {
      const assigneeHours = tasks
        .filter(t => t.assignee === userName && canCountTaskHours(t))
        .reduce((sum, t) => sum + getTaskHoursInWeek(t, weekRange.start, weekRange.end), 0);
      const assistHours = getMemberAssistWeeklyHours(userName, weekRange);
      return assigneeHours + assistHours;
    }

    function getMemberWeeklyHoursBreakdown(userName, weekRange) {
      const assigneeHours = tasks
        .filter(t => t.assignee === userName && canCountTaskHours(t))
        .reduce((sum, t) => sum + getTaskHoursInWeek(t, weekRange.start, weekRange.end), 0);
      const assistHours = getMemberAssistWeeklyHours(userName, weekRange);
      const pendingBlockedHours = getMemberPendingBlockedHours(userName);
      const originalPlannedHours = getMemberOriginalWeeklyHours(userName, weekRange);
      return {
        assigneeHours: Math.round(assigneeHours * 10) / 10,
        assistHours: Math.round(assistHours * 10) / 10,
        pendingBlockedHours: Math.round(pendingBlockedHours * 10) / 10,
        originalPlannedHours: Math.round(originalPlannedHours * 10) / 10,
        totalHours: Math.round((assigneeHours + assistHours) * 10) / 10,
      };
    }

    /** 根据有效计划开始+预计工时推算截止日期，否则用已填写的 dueDate */
    function resolveTaskDueDate(task) {
      if (!task) return '';
      const planStart = getEffectivePlanStart(task) || task.planStartDate;
      if (planStart && Number(task.estimatedHours) > 0) {
        return calcEndDate(planStart, task.estimatedHours, taskDailyHours(task)) || task.dueDate || '';
      }
      return task.dueDate || '';
    }

    function syncTaskScheduleFields(task) {
      if (!task) return task;
      const dueDate = resolveTaskDueDate(task);
      if (dueDate) task.dueDate = dueDate;
      return task;
    }

    // 状态定义
    const statusMap = {
      todo: { label: '待开始', color: '#6B7280', bg: '#F3F4F6', icon: 'fa-clock' },
      doing: { label: '进行中', color: '#2563EB', bg: '#DBEAFE', icon: 'fa-spinner' },
      done: { label: '已完成', color: '#059669', bg: '#D1FAE5', icon: 'fa-check-circle' },
      overdue: { label: '已延期', color: '#DC2626', bg: '#FEE2E2', icon: 'fa-exclamation-circle' },
      dueSoon: { label: '临期', color: '#D97706', bg: '#FEF3C7', icon: 'fa-clock' },
      blocked: { label: '阻塞中', color: '#D97706', bg: '#FEF3C7', icon: 'fa-pause-circle' },
      paused: { label: '已暂停', color: '#6B7280', bg: '#E5E7EB', icon: 'fa-pause-circle' },
      rejected: { label: '已驳回', color: '#D97706', bg: '#FEF3C7', icon: 'fa-undo' },
      archived: { label: '已归档', color: '#9CA3AF', bg: '#F3F4F6', icon: 'fa-archive' },
      abolished: { label: '已作废', color: '#9CA3AF', bg: '#F3F4F6', icon: 'fa-ban' },
    };

    // 项目状态定义
    const projectStatusMap = {
      planning: { label: '规划中', color: '#6B7280', bg: '#F3F4F6', icon: 'fa-lightbulb' },
      active: { label: '进行中', color: '#2563EB', bg: '#DBEAFE', icon: 'fa-spinner' },
      paused: { label: '已暂停', color: '#6B7280', bg: '#E5E7EB', icon: 'fa-pause-circle' },
      done: { label: '已完成', color: '#059669', bg: '#D1FAE5', icon: 'fa-check-circle' },
      archived: { label: '已归档', color: '#9CA3AF', bg: '#F3F4F6', icon: 'fa-archive' },
    };

    function isProjectArchived(project) {
      return !!(project && (project.archived === true || project.status === 'archived'));
    }

    function isProjectPaused(projectOrId) {
      const project = typeof projectOrId === 'string'
        ? projects.find(p => p.id === projectOrId)
        : projectOrId;
      return !!(project && project.status === 'paused');
    }

    /** 任务所属项目是否已暂停 */
    function isTaskProjectPaused(task) {
      if (!task?.projectId) return false;
      return isProjectPaused(task.projectId);
    }

    /** 不计入待办（已暂停任务，或所属项目已暂停） */
    function isExcludedFromTodo(task) {
      if (!task) return true;
      if (isTerminalTaskStatus(task.status) || task.status === 'done' || task.status === 'paused') return true;
      return isTaskProjectPaused(task);
    }

    /** 可计入饱和度/当周工时（任务与所属项目均未暂停） */
    function canCountTaskHours(task) {
      if (!task || !isHoursCountableStatus(task.status)) return false;
      if (isTaskProjectPaused(task)) return false;
      return true;
    }

    const PROJECT_PAUSE_SKIP_STATUSES = new Set(['done', 'abolished', 'archived']);

    /** 项目暂停：级联暂停其下未完成任务（已手动暂停的保留，恢复项目时不强制改回） */
    function applyProjectPauseCascade(projectId) {
      tasks.forEach(t => {
        if (t.projectId !== projectId) return;
        if (PROJECT_PAUSE_SKIP_STATUSES.has(t.status)) return;
        if (t.status === 'paused') return;
        t.statusBeforeProjectPause = t.status;
        t.pausedByProject = true;
        t.status = 'paused';
      });
    }

    /** 项目从暂停恢复：仅恢复因项目暂停而自动暂停的任务 */
    function clearProjectPauseCascade(projectId) {
      tasks.forEach(t => {
        if (t.projectId !== projectId || !t.pausedByProject) return;
        const restore = t.statusBeforeProjectPause || 'todo';
        t.status = restore === 'paused' ? 'todo' : restore;
        delete t.pausedByProject;
        delete t.statusBeforeProjectPause;
      });
    }

    function syncProjectPauseCascade(project, oldStatus) {
      if (!project) return;
      if (project.status === 'paused' && oldStatus !== 'paused') {
        applyProjectPauseCascade(project.id);
      } else if (oldStatus === 'paused' && project.status !== 'paused') {
        clearProjectPauseCascade(project.id);
      }
    }

    function normalizeProjectRecord(project) {
      if (!project) return project;
      if (isProjectArchived(project)) {
        project.archived = true;
        project.status = 'archived';
      } else if (project.archived == null) {
        project.archived = false;
      }
      if (!Array.isArray(project.teamMembers)) project.teamMembers = [];
      project.teamMembers = sanitizeProjectTeamMembers(project.manager, project.teamMembers);
      return project;
    }

    function normalizeAllProjects() {
      projects.forEach(normalizeProjectRecord);
    }

    /** 同步时可提交的项目（含已归档，避免归档后无法写回服务端） */
    function canUserSyncProject(project) {
      if (!project) return false;
      if (isFullAccess(currentUser.role)) return true;
      return project.manager === currentUser.name || project.creator === currentUser.name;
    }

    /** 同步时可提交的任务（含已作废/已归档，避免终态变更无法写回服务端） */
    function canUserSyncTask(task) {
      if (!task) return false;
      if (isFullAccess(currentUser.role)) return true;
      if (task.status !== 'archived' && task.status !== 'abolished' && canEditTask(task)) return true;
      if (canAbolishTask(task)) return true;
      return false;
    }

    // 优先级定义
    const priorityMap = {
      urgent: { label: '紧急', color: '#DC2626', bg: '#FEE2E2' },
      important: { label: '重要', color: '#D97706', bg: '#FEF3C7' },
      normal: { label: '普通', color: '#6B7280', bg: '#F3F4F6' },
    };

    // ========== 项目数据 ==========
    let projects = [];

    let tasks = [];

    // ========== 任务依赖 ==========
    let taskDependencies = [];

    // ========== 修改日志 ==========
    let changeLogs = [];

    // ========== 转办记录 ==========
    let transferLogs = [];

    // ========== 系统状态 ==========
    let state = {
      page: 'dashboard',
      prevPage: null,
      taskTab: 'all',
      taskScopeTab: 'mine',
      taskCenterDept: 'all',
      todoListTab: 'all',
      todoTypeFilter: 'all',
      todoPriorityFilter: 'all',
      todoDueFilter: 'all',
      todoPage: 1,
      todoPageSize: 20,
      todoViewMode: 'all', // all | mine | created | handled
      todoViewLayout: 'board', // board | list
      navOpen: { todo: true, project: true, team: true, more: true },
      settingsOpen: false,
      showModal: null,
      form: {},
      taskViewStack: [],
      roleFilter: 'all',
      // 各页面搜索关键词
      projectSearch: '',
      projectFilter: 'all',

      projectManager: 'all',
      projectRiskFilter: 'all',
      projectSort: 'default',
      projectExpandedId: null,
      taskSearch: '',

      staffKindFilter: 'all',
      staffSelectedDept: '信息中心',
      staffExpandedDepts: { '信息中心': true, '财务中心': true },
      staffDetailId: null,

      teamSort: 'saturation_desc',
      authError: null,

      syncHighlightIds: [],

      inboxOpen: false,

      inboxUnreadCount: 0,

    let canAccessPerformance = false;
    let workReportsCache = {
      loaded: false,

    };
    let performanceData = {

    let authSession = {

      expiresAt: null,
    };

    /** 留言草稿：待发送图片、@ 筛选词 */
    let commentDrafts = {};
    const fileObjectUrlCache = new Map();
    let taskCommentMentionTaskId = null;
    let taskCommentMentionScrollBound = false;
    /** 已成功同步到服务端的日志 id（其余为待增量上传） */
    let changeLogsSyncedIds = new Set();
    let transferLogsSyncedIds = new Set();

    const STORAGE_KEY = 'henghuiguan_data';

    const DataService = {
      _saveTimer: null,
      _syncing: false,
      _serverReady: false,

      mergePayload(data) {
        this.applyServerPayload(data, { mergeUsers: true });
      },

      /** 从服务端加载：钉钉模式下整表替换，并按角色只保留可见数据 */
      applyServerPayload(data, opts = {}) {
        const mergeUsers = opts.mergeUsers === true;
        if (Array.isArray(data.projects)) {
          projects = data.projects.slice();
          normalizeAllProjects();
        }
        if (Array.isArray(data.tasks)) {
          tasks = data.tasks.slice();
          normalizeAllTaskCollaborators();
        }
        backfillTaskAttachmentsToProjectsLocal();
        if (Array.isArray(data.taskDependencies)) taskDependencies = data.taskDependencies.slice();
        else if (!taskDependencies.length) taskDependencies = [];
        refreshAllDependencySchedules();
        if (Array.isArray(data.changeLogs)) changeLogs = data.changeLogs.slice();
        if (Array.isArray(data.transferLogs)) transferLogs = data.transferLogs.slice();
        if (Array.isArray(data.pushLogs)) pushLogs = data.pushLogs.slice();
        resetLogSyncState();
        if (data.workCalendar) applyWorkCalendar(data.workCalendar);
        if (Array.isArray(data.users)) {
          if ((ApiConfig.enabled || AuthService.isDingTalkMode()) && !mergeUsers) {
            users = data.users.slice();
          } else {
            data.users.forEach(saved => {
              const idx = users.findIndex(u => u.id === saved.id);
              if (idx >= 0) users[idx] = { ...users[idx], ...saved };
              else users.push(saved);
            });
          }
        }
        if (Array.isArray(data.allUsers) && data.allUsers.length) {
          allStaffUsers = data.allUsers.slice();
        } else if (Array.isArray(data.allStaffUsers) && data.allStaffUsers.length) {
          allStaffUsers = data.allStaffUsers.slice();
        } else if (Array.isArray(data.users) && data.users.length && !allStaffUsers.length) {
          allStaffUsers = data.users.slice();
        }
        if (Array.isArray(data.staffDeptCatalog)) {
          applyStaffDeptCatalog(data.staffDeptCatalog);
          syncDepartmentsAlias();
        }
        const meId = data.currentUserId || currentUser.id;
        const me = users.find(u => u.id === meId)
          || users.find(u => u.dingTalkUserId && u.dingTalkUserId === authSession.dingTalkUserId);
        if (me) currentUser = me;
        if (typeof data.canAccessPerformance === 'boolean') {
          canAccessPerformance = data.canAccessPerformance;
        }
      },

      cancelScheduledSave() {
        clearTimeout(this._saveTimer);
        this._saveTimer = null;
      },

      applyAllUsersFromServer(list) {
        if (!Array.isArray(list)) return;
        users = list.slice();
        allStaffUsers = list.slice();
        this._serverReady = true;
        const meId = currentUser.id;
        const me = users.find(u => u.id === meId)
          || users.find(u => u.dingTalkUserId && u.dingTalkUserId === authSession.dingTalkUserId);
        if (me) currentUser = me;
      },

      applyUserUpdates(updatedList) {
        if (!Array.isArray(updatedList)) return;
        updatedList.forEach(saved => {
          const idx = users.findIndex(u => u.id === saved.id);
          if (idx >= 0) users[idx] = { ...users[idx], ...saved };
          else users.push(saved);
          const allIdx = allStaffUsers.findIndex(u => u.id === saved.id);
          if (allIdx >= 0) allStaffUsers[allIdx] = { ...allStaffUsers[allIdx], ...saved };
          else if (saved?.id) allStaffUsers.push(saved);
        });
        const meId = currentUser.id;
        const me = users.find(u => u.id === meId)
          || users.find(u => u.dingTalkUserId && u.dingTalkUserId === authSession.dingTalkUserId);
        if (me) currentUser = me;
      },

      async loadFromServer(opts = {}) {
        if (!ApiConfig.enabled || !authSession.token) return false;
        const timeoutMs = opts.timeout || ApiConfig.timeout;
        try {
          const res = await fetch(ApiConfig.baseUrl + '/data/bootstrap', {
            headers: { ...AuthService.getAuthHeaders() },
            signal: AbortSignal.timeout(timeoutMs),
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.message || '加载失败');
          this.applyServerPayload(data, { mergeUsers: opts.mergeUsers === true });
          this._serverReady = true;
          persistLocalCache();
          console.log('[数据] 已从服务端加载', currentUser.name, currentUser.role,
            projects.length, '个项目、', tasks.length, '个任务');
          return true;
        } catch (e) {
          console.warn('[数据] 服务端加载失败，使用本地数据', e);
          this._serverReady = false;
          return false;
        }
      },

      scheduleSave(opts = {}) {
        if (!ApiConfig.enabled || !authSession.token) return;
        clearTimeout(this._saveTimer);
        this._saveTimer = setTimeout(() => this.syncToServer(opts), 600);
      },

      async syncToServer(opts = {}) {
        if (!ApiConfig.enabled || !authSession.token || this._syncing) return false;
        if (!opts.forceEmpty && projects.length === 0 && tasks.length === 0) {
          console.warn('[数据] 本地 projects/tasks 为空，跳过同步以免覆盖服务端');
          return false;
        }
        this._syncing = true;
        backfillTaskAttachmentsToProjectsLocal();
        const includeUsers = !opts.skipUsers && this._serverReady && isFullAccess(currentUser.role);
        const includeManagerUserUpdates = !opts.skipUsers && this._serverReady && currentUser.role === 'manager';
        const syncProjects = isFullAccess(currentUser.role)
          ? projects
          : projects.filter(p => canUserSyncProject(p));
        const syncTasks = isFullAccess(currentUser.role)
          ? tasks
          : tasks.filter(t => canUserSyncTask(t));
        const syncDeps = isFullAccess(currentUser.role)
          ? taskDependencies
          : taskDependencies.filter(dep => {
            const pred = tasks.find(t => t.id === dep.predecessorTaskId);
            const succ = tasks.find(t => t.id === dep.successorTaskId);
            return (succ && canEditTask(succ)) || (pred && canEditTask(pred));
          });
        try {
          const res = await fetch(ApiConfig.baseUrl + '/data/sync', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', ...AuthService.getAuthHeaders() },
            body: JSON.stringify({
              projects: syncProjects, tasks: syncTasks, taskDependencies: syncDeps,
              changeLogUpdates: getPendingChangeLogs(),
              transferLogUpdates: getPendingTransferLogs(),
              ...(includeUsers ? { users } : {}),
              ...(includeManagerUserUpdates ? {
                userUpdates: users.filter(u => u.dept === currentUser.dept && u.role === 'staff'),
              } : {}),
            }),
            signal: AbortSignal.timeout(ApiConfig.timeout),
          });
          const data = await res.json();
          if (!data.success) {
            console.warn('[数据] 同步失败', data.message);
            return false;
          }
          markLogsSynced();
          persistLocalCache();
          return true;
        } catch (e) {
          console.warn('[数据] 同步异常', e);
          return false;
        } finally {
          this._syncing = false;
        }
      },
    };

    function resetLogSyncState() {
      changeLogsSyncedIds = new Set(changeLogs.filter(l => l?.id).map(l => l.id));
      transferLogsSyncedIds = new Set(transferLogs.filter(l => l?.id).map(l => l.id));
    }

    function appendChangeLogEntry(entry) {
      const log = { ...entry };
      if (!log.id) log.id = genId('L');
      changeLogs.unshift(log);
      return log;
    }

    const LOG_FIELD_LABELS = {
      title: '标题',
      status: '状态',
      progress: '进度',
      assignee: '负责人',
      planStartDate: '计划开始',
      estimatedHours: '预计工时',
      dueDate: '截止日期',
      priority: '优先级',
      desc: '任务描述',
      informCollaborators: '告知性协办人',
      assistCollaborators: '辅助性协办人',
    };

    const LOG_DESC_MAX_LEN = 80;

    function normalizeCollaboratorListForLog(names) {
      const list = Array.isArray(names)
        ? names.filter(n => n && String(n).trim()).map(n => String(n).trim())
        : (names ? [String(names).trim()].filter(Boolean) : []);
      return [...new Set(list)].sort((a, b) => a.localeCompare(b, 'zh'));
    }

    function formatCollaboratorListForLog(names) {
      const list = normalizeCollaboratorListForLog(names);
      return list.length ? list.join('、') : '无';
    }

    function truncateLogDesc(text) {
      const s = text == null ? '' : String(text);
      if (s.length <= LOG_DESC_MAX_LEN) return s;
      return `${s.slice(0, LOG_DESC_MAX_LEN)}…`;
    }

    function getTaskChangeFieldValue(source, key, { isForm = false } = {}) {
      if (!source) return key === 'informCollaborators' || key === 'assistCollaborators' ? [] : '';
      if (key === 'informCollaborators') {
        if (isForm) return getTaskFormCollaboratorNames(source, COLLAB_TYPE_INFORM, source);
        return getCollaboratorEntries(source, { type: COLLAB_TYPE_INFORM, excludeRejected: true }).map(e => e.userName);
      }
      if (key === 'assistCollaborators') {
        if (isForm) return getTaskFormCollaboratorNames(source, COLLAB_TYPE_ASSIST, source);
        return getCollaboratorEntries(source, { type: COLLAB_TYPE_ASSIST, excludeRejected: true }).map(e => e.userName);
      }
      return source[key];
    }

    function formatLogFieldValue(key, value) {
      if (key === 'informCollaborators' || key === 'assistCollaborators') {
        return formatCollaboratorListForLog(value);
      }
      if (value === null || value === undefined || value === '') return '空';
      if (key === 'status') return statusMap[value]?.label || String(value);
      if (key === 'priority') return priorityMap[value]?.label || String(value);
      if (key === 'desc') return truncateLogDesc(value) || '空';
      if (key === 'progress') {
        const n = Number(value);
        return Number.isFinite(n) ? `${n}%` : String(value);
      }
      if (key === 'estimatedHours') {
        const n = Number(value);
        return Number.isFinite(n) ? `${n}小时` : String(value);
      }
      return String(value);
    }

    function normalizeLogCompareValue(key, value) {
      if (key === 'informCollaborators' || key === 'assistCollaborators') {
        return formatCollaboratorListForLog(value);
      }
      if (key === 'progress' || key === 'estimatedHours') {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }
      if (key === 'desc') return String(value == null ? '' : value).trim();
      if (key === 'priority') return value || 'normal';
      if (value === null || value === undefined) return '';
      return String(value);
    }

    function buildTaskChangeDiff(beforeTask, afterForm) {
      const keys = [
        'title', 'status', 'progress', 'assignee', 'planStartDate', 'estimatedHours', 'dueDate',
        'priority', 'desc', 'informCollaborators', 'assistCollaborators',
      ];
      const diffs = [];
      keys.forEach(key => {
        const beforeVal = getTaskChangeFieldValue(beforeTask, key, { isForm: false });
        const afterVal = getTaskChangeFieldValue(afterForm, key, { isForm: true });
        if (normalizeLogCompareValue(key, beforeVal) === normalizeLogCompareValue(key, afterVal)) return;
        diffs.push({
          key,
          label: LOG_FIELD_LABELS[key] || key,
          before: beforeVal,
          after: afterVal,
        });
      });
      return diffs;
    }

    function formatChangeDiffText(diffs, side) {
      if (!diffs || diffs.length === 0) {
        return '（无字段变更）';
      }
      return diffs.map(d => `${d.label}：${formatLogFieldValue(d.key, side === 'after' ? d.after : d.before)}`).join('\n');
    }

    function formatSnapshotObject(obj) {
      if (!obj || typeof obj !== 'object') return '';
      const keys = [
        'title', 'status', 'progress', 'assignee', 'planStartDate', 'estimatedHours', 'dueDate',
        'priority', 'desc', 'informCollaborators', 'assistCollaborators',
      ].filter(k => Object.prototype.hasOwnProperty.call(obj, k));
      if (keys.length === 0) return '';
      return keys.map(k => `${LOG_FIELD_LABELS[k] || k}：${formatLogFieldValue(k, obj[k])}`).join('\n');
    }

    function formatLogCell(raw) {
      if (raw === null || raw === undefined) return '';
      if (typeof raw !== 'string') return String(raw);
      const trimmed = raw.trim();
      if (!trimmed) return '';
      if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
        try {
          const parsed = JSON.parse(trimmed);
          const formatted = formatSnapshotObject(parsed);
          if (formatted) return formatted;
        } catch (_) { /* 非 JSON，按原文展示 */ }
      }
      return raw;
    }

    function appendTransferLogEntry(entry) {
      const log = { ...entry };
      if (!log.id) log.id = genId('TR');
      transferLogs.unshift(log);
      return log;
    }

    function getPendingChangeLogs() {
      return changeLogs.filter(l => l?.id && !changeLogsSyncedIds.has(l.id));
    }

    function getPendingTransferLogs() {
      return transferLogs.filter(l => l?.id && !transferLogsSyncedIds.has(l.id));
    }

    function markLogsSynced() {
      getPendingChangeLogs().forEach(l => changeLogsSyncedIds.add(l.id));
      getPendingTransferLogs().forEach(l => transferLogsSyncedIds.add(l.id));
    }

    function persistLocalCache() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          projects,
          tasks,
          taskDependencies,
          changeLogs,
          transferLogs,
          users,
          allStaffUsers,
          currentUserId: currentUser.id,
          pushLogs,
          pushSentKeys: [...pushSentKeys],
          authSession,
        }));
      } catch (e) {
        console.warn('本地缓存写入失败', e);
      }
    }

    /** 服务端无业务数据时，尝试从浏览器 localStorage 恢复（常见于改版后强刷） */
    function tryRecoverFromLocalStorage() {
      if (!ApiConfig.enabled || !authSession.token) return false;
      if (projects.length || tasks.length) return false;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        const localProjects = Array.isArray(data.projects) ? data.projects : [];
        const localTasks = Array.isArray(data.tasks) ? data.tasks : [];
        if (!localProjects.length && !localTasks.length) return false;
        DataService.mergePayload(data, { mergeUsers: true });
        console.log('[数据] 已从浏览器缓存恢复', localProjects.length, '个项目、', localTasks.length, '个任务');
        DataService.syncToServer({ skipUsers: !isFullAccess(currentUser.role) });
        return true;
      } catch (e) {
        console.warn('[数据] 浏览器缓存恢复失败', e);
        return false;
      }
    }

    function save(opts = {}) {
      persistLocalCache();
      if (ApiConfig.enabled && authSession.token) {
        if (opts.immediateSync) {
          clearTimeout(DataService._saveTimer);
          DataService.syncToServer(opts);
        } else {
          DataService.scheduleSave(opts);
        }
      }
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (ApiConfig.enabled) {
          if (data.authSession && typeof data.authSession === 'object') {
            authSession = { ...authSession, ...data.authSession };
          }
          if (data.currentUserId) {
            const user = users.find(u => u.id === data.currentUserId);
            if (user) currentUser = user;
          }
          return;
        }
        DataService.mergePayload(data);
        if (Array.isArray(data.taskDependencies)) taskDependencies = data.taskDependencies.slice();
        refreshAllDependencySchedules();
        if (data.currentUserId) {
          const user = users.find(u => u.id === data.currentUserId);
          if (user) currentUser = user;
        }
        if (Array.isArray(data.pushSentKeys)) pushSentKeys = new Set(data.pushSentKeys);
        if (data.authSession && typeof data.authSession === 'object') authSession = { ...authSession, ...data.authSession };
      } catch (e) {
        console.warn('数据加载失败', e);
      }
    }

    // ========== 辅助函数 ==========
    /** 是否为末级任务（无下级子任务；里程碑不计为待办任务） */
    function isLeafTask(task) {
      if (!task || isMilestoneTask(task)) return false;
      return !tasks.some(t => t.parentId === task.id && t.status !== 'abolished');
    }

    function filterLeafTasks(taskList) {
      return (taskList || []).filter(isLeafTask);
    }

    function getChildrenCount(taskId) {
      const children = tasks.filter(t => t.parentId === taskId);
      let count = children.length;
      children.forEach(c => { count += getChildrenCount(c.id); });
      return count;
    }

    function getChildrenDoneCount(taskId) {
      const children = tasks.filter(t => t.parentId === taskId);
      let count = children.filter(c => c.status === 'done').length;
      children.forEach(c => { count += getChildrenDoneCount(c.id); });
      return count;
    }

    function calcProgress(taskId) {
      const children = tasks.filter(t => t.parentId === taskId && t.status !== 'abolished');
      if (children.length === 0) {
        const t = tasks.find(x => x.id === taskId);
        if (!t || t.status === 'abolished') return 0;
        if (t.status === 'done') return 100;
        return Math.max(0, Math.min(100, t.progress || 0));
      }
      let total = 0;
      children.forEach(c => { total += calcProgress(c.id); });
      return Math.round(total / children.length);
    }

    /** 标记完成时的进度与工时字段 */
    function applyTaskDoneFields(task) {
      task.progress = 100;
      const today = todayStr();
      task.actualEndDate = task.actualEndDate || today;
      if (task.actualStartDate) {
        task.actualHours = calcActualHours(task.actualStartDate, task.actualEndDate, task.dailyHours);
      }
    }

    /** 任务创建时间（只读，保存时写入） */
    function getNowCreatedAt() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatTaskCreatedAt(value) {
      if (!value) return '未知';
      return String(value).replace('T', ' ').slice(0, 19);

    /** 从小喇叭消息解析可跳转的任务/项目 id */
    function resolveInboxJumpTarget(item) {
      if (!item) return { kind: 'none' };
      const eventType = item.eventType || '';
      const rawTaskId = String(item.taskId || '');
      const rawProjectId = String(item.projectId || '');
      const isMissingStaff = eventType === PushEventType.STAFF_ASSIGNEE_MISSING
        || eventType === PushEventType.STAFF_ASSIGNEE_MISSING_DIGEST
        || rawTaskId.startsWith('missing:')
        || rawTaskId.startsWith('missing-digest:');
      if (isMissingStaff) return { kind: 'staff' };

      let taskId = rawTaskId;
      let projectId = rawProjectId;
      if (taskId.startsWith('PROJECT-') && !projectId) {
        projectId = taskId.slice('PROJECT-'.length);
        taskId = '';
      }
      if (taskId && (taskId.startsWith('missing:') || taskId.startsWith('missing-digest:'))) {
        taskId = '';
      }
      if (taskId) {
        const t = tasks.find(x => x.id === taskId);
        if (t) {
          const toComments = eventType === PushEventType.TASK_COMMENT_MENTION;
          return { kind: toComments ? 'taskComment' : 'task', taskId };
        }
      }
      if (projectId) {
        const p = projects.find(x => x.id === projectId);
        if (p) return { kind: 'project', projectId };
      }
      return { kind: 'none' };
    }

    async function openInboxNotification(id) {
      const item = getDisplayInboxItems().find(n => String(n.id) === String(id));
      if (!item) return;

      // 单条点击：立即本地已读，再同步服务端
      if (item.synthetic || String(item.id || '').startsWith('N-MISS-')) {
        markMissingDigestReadToday();
        item.read = true;
      } else if (!item.read) {
        item.read = true;
        InboxService.syncLocalUnread();
        InboxService.persistLocal();
        await InboxService.markRead({ ids: [item.id] });
      }

      state.inboxOpen = false;
      const target = resolveInboxJumpTarget(item);
      if (target.kind === 'staff') {
        state.page = 'staff';
        state.showModal = null;
        render();
        return;
      }
      if (target.kind === 'taskComment') {
        viewTask(target.taskId);
        state.taskDetailTab = 'comments';
        render();
        return;
      }
      if (target.kind === 'task') {
        viewTask(target.taskId);
        return;
      }
      if (target.kind === 'project') {
        viewProject(target.projectId);
        return;
      }
      render();
    }

    // ========== 工作台（扣子模板布局）+ 任务中心 ==========
    function formatActivityRelative(operateTime) {
      if (!operateTime) return '';
      const d = new Date(String(operateTime).replace(/-/g, '/'));
      if (Number.isNaN(d.getTime())) return String(operateTime);
      const diff = Date.now() - d.getTime();
      if (diff < 0) return String(operateTime);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days} 天前`;
      return String(operateTime);
    }

    function getRecentActivityItems(limit) {
      const max = limit || 8;
      return (changeLogs || []).slice(0, max).map(l => {
        const task = l.taskId ? tasks.find(t => t.id === l.taskId) : null;
        const title = task?.title || l.taskId || '任务';
        const projectLabel = l.project || (task ? getTaskProjectLabel(task) : '') || '';
        let icon = 'fa-pen';
        const afterText = typeof l.after === 'string' ? l.after : '';
        if (/完成|done/i.test(afterText) || /状态：已完成/.test(afterText)) icon = 'fa-check';
        else if (/进行中|doing/i.test(afterText)) icon = 'fa-play';
        else if (/创建|新建/.test(l.reason || '')) icon = 'fa-plus';
        return {
          id: l.id,
          icon,
          text: `${l.operator || '有人'} 更新了「${title}」`,
          meta: [projectLabel, formatActivityRelative(l.operateTime)].filter(Boolean).join(' · '),
          taskId: l.taskId,
        };
      });
    }

    /** 本人本周已完成末级任务（周一至周日；优先 actualEndDate，否则看完成类变更日志） */
    function getMyWeekCompletedTasks() {
      const { start, end } = getCurrentWeekRange();
      const doneLogsByTask = new Map();
      (changeLogs || []).forEach(l => {
        if (!l?.taskId) return;
        const afterText = typeof l.after === 'string' ? l.after : '';
        if (!(/完成|done/i.test(afterText) || /状态：已完成/.test(afterText))) return;
        if (!changeLogInRange(l, start, end)) return;
        const prev = doneLogsByTask.get(l.taskId);
        const t = l.operateTime || l.createdAt || '';
        if (!prev || String(t) > String(prev)) doneLogsByTask.set(l.taskId, t);
      });

      let pool = [];
      try {
        pool = getMyTodoLeafTasksIncludingDone().filter(t => t.status === 'done');
      } catch {
        pool = [];
      }

      const items = pool.map(task => {
        const endDate = normalizeDateStr(task.actualEndDate) || '';
        let completedAt = '';
        if (endDate) {
          if (!dateInRange(endDate, start, end)) return null;
          completedAt = endDate;
        } else if (doneLogsByTask.has(task.id)) {
          const raw = String(doneLogsByTask.get(task.id));
          completedAt = normalizeDateStr(raw.slice(0, 10)) || raw.slice(0, 10);
        } else {
          return null;
        }
        return {
          task,
          completedAt,
          projectLabel: task.projectId ? getTaskProjectLabel(task) : '临时任务',
        };
      }).filter(Boolean);

      items.sort((a, b) => String(b.completedAt).localeCompare(String(a.completedAt)));
      return items;
    }

    function renderWorkbenchTodoCard(task) {
      const overdue = isOverdue(task) && task.status !== 'done';
      const dueSoon = !overdue && isDueSoon(task) && task.status !== 'done';
      const urgencyClass = overdue ? 'is-overdue' : (dueSoon ? 'is-duesoon' : '');
      const badge = overdue
        ? '<span class="wb-todo-badge is-overdue">已逾期</span>'
        : (dueSoon ? '<span class="wb-todo-badge is-duesoon">即将到期</span>' : '');
      const pr = priorityMap[task.priority] || priorityMap.normal;
      const prKey = task.priority || 'normal';
      const prLabel = prKey === 'urgent' ? '高' : (prKey === 'important' ? '中' : '低');
      const due = normalizeDateStr(resolveTaskDueDate(task)) || task.dueDate || '';
      const projectLabel = task.projectId ? getTaskProjectLabel(task) : '临时任务';
      const desc = (task.description || task.remark || '').trim();

      const canOp = typeof canOperateTask === 'function' && canOperateTask(task);
      const blocked = typeof hasHardBlock === 'function' && hasHardBlock(task);
      const hasKids = typeof hasActiveChildren === 'function' && hasActiveChildren(task.id);
      const isMs = typeof isMilestoneTask === 'function' && isMilestoneTask(task);
      const actions = [];
      if (!isMs && canOp && !blocked && !hasKids) {
        if (task.status === 'todo') {
          actions.push(`<button type="button" class="btn btn-primary" onclick="event.stopPropagation();updateTaskStatus('${task.id}','doing')"><i class="fas fa-play"></i> 开始</button>`);
          actions.push(`<button type="button" class="btn btn-warning" onclick="event.stopPropagation();updateTaskStatus('${task.id}','paused')"><i class="fas fa-pause"></i> 暂停</button>`);
        } else if (task.status === 'doing') {
          actions.push(`<button type="button" class="btn btn-warning" onclick="event.stopPropagation();updateTaskStatus('${task.id}','paused')"><i class="fas fa-pause"></i> 暂停</button>`);
          actions.push(`<button type="button" class="btn btn-success" onclick="event.stopPropagation();updateTaskStatus('${task.id}','done')"><i class="fas fa-check"></i> 完成</button>`);
        } else if (task.status === 'paused') {
          actions.push(`<button type="button" class="btn btn-primary" onclick="event.stopPropagation();updateTaskStatus('${task.id}','doing')"><i class="fas fa-play"></i> 继续</button>`);
        }
      }
      if (typeof canPostTaskComment === 'function' && canPostTaskComment(task)) {
        actions.push(`<button type="button" class="btn btn-ghost" onclick="event.stopPropagation();focusTaskComment('${task.id}')"><i class="fas fa-comment"></i> 留言</button>`);
      }

      return `
        <div class="wb-todo-card ${urgencyClass}" onclick="viewTask('${task.id}')">
          <div class="wb-todo-bar">
            <div class="wb-todo-bar-main">
              <div class="wb-todo-top">
                <div class="wb-todo-title">${escapeHtml(task.title || '')}</div>
                ${badge}
              </div>
            </div>
            ${actions.length ? `<div class="wb-todo-actions">${actions.join('')}</div>` : ''}
          </div>
          ${desc ? `<div class="wb-todo-desc">${escapeHtml(desc)}</div>` : ''}
          <div class="wb-todo-meta">
            <span class="tag">${escapeHtml(projectLabel)}</span>
            ${due ? `<span class="tag"><i class="far fa-calendar"></i> ${escapeHtml(due)}</span>` : ''}
            <span class="tag" style="color:${pr.color};">${escapeHtml(prLabel)}</span>
          </div>
        </div>
      `;
    }

      return renderWorkbenchHome();
